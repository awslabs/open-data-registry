Name: Geospatial Information Center
Description: |
  This dataset curates and distributes, in an AWS-friendly manner, only those publicly available datasets registered on the Geospatial Information Center (front.geospatial.jp) that explicitly specify a Creative Commons (CC) license.
  The collection includes a wide range of geospatial data types useful for analysis and application development, such as 3D city/building models (e.g., CityGML), elevation and terrain data (e.g., DEM), vector datasets for administrative boundaries, land use, and facilities, and disaster-related geospatial data (e.g., hazard information and damage scenarios).
Documentation: https://github.com/aigidjp/opendata-gsic/blob/main/README.md
Contact: gsic-admin@aigid.jp
ManagedBy: "[AIGID](https://aigid.jp/)"
UpdateFrequency: New datasets and updates are added as they become available in the Geospatial Information Center.
