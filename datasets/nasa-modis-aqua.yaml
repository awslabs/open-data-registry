Name: NASA modis-aqua Project
Description: |
  This global Level-3 data set (MYD10A1F) provides daily cloud-free snow cover derived from the MODIS/Aqua Snow Cover Daily L3 Global 500m SIN Grid data set (MYD10A1). Grid cells in MYD10A1 which are obscured by cloud cover are filled by retaining clear-sky views of the surface from previous days. A separate parameter is provided which tracks the number of days in each cell since the last clear-sky observation. Each data granule contains a 10° x 10° tile projected to the 500 m sinusoidal grid. The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD29
  This global Level-2 (L2) product provides daily sea ice extent and ice surface temperature. The data are derived from Level-1B radiances acquired by the Moderate Resolution Imaging Spectroradiometer (MODIS) on board the Aqua satellite. Each data granule contains 5 minutes of swath data observed at a resolution of 1000 m. The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD29E1D
  This global Level-3 (L3) data set provides Northern and Southern Hemisphere maps of sea ice extent and ice surface temperature. The maps are generated by compositing 1 km observations from the 'MODIS/Aqua Sea Ice Extent Daily L3 Global 1km EASE-Grid Day’ (https://doi.org/10.5067/MODIS/MYD29P1D.061) product. These data are provided daily in the EASE-Grid polar projection at a resolution of approximately 4 km. The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD29P1D
  This global Level-3 (L3) data set provides daily daytime sea ice extent and ice surface temperature derived from the 'MODIS/Aqua Sea Ice Extent 5-Min L2 Swath 1km' (https://doi.org/10.5067/MODIS/MYD29.061) product. Each data granule is a tile consisting of 10° x 10° of data gridded to the Lambert Azimuthal Equal Area Scalable Earth Grid (EASE-Grid). The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD29P1N
  This global Level-3 (L3) data set provides daily nighttime ice surface temperature derived from the 'MODIS/Aqua Sea Ice Extent 5-Min L2 Swath 1km' (https://doi.org/10.5067/MODIS/MYD29.061) product. Each data granule is a tile consisting of 10 x 10 degrees of data gridded to the Lambert Azimuthal Equal Area Scalable Earth Grid (EASE-Grid). The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD10_L2
  This global Level-2 (L2) data set provides daily snow cover detected using Normalized Difference Snow Index (NDSI) and a series of screens designed to alleviate errors and flag uncertain snow cover detections. The NDSI is derived from radiance data acquired by the Moderate Resolution Imaging Spectroradiometer (MODIS) on board the Aqua satellite: DOI:10.5067/MODIS/MYD02HKM.061 and DOI:10.5067/MODIS/MYD021KM.061. Each data granule contains 5 minutes of swath data observed at a resolution of 500 m. The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD10C2
  This global Level-3 (L3) data set provides the maximum percentage of snow-covered land and persistent cloud-covered land observed over eight-days, within 0.05° (approx. 5 km) MODIS Climate Modeling Grid (CMG) cells. Percentages are computed from snow cover observations in the 'MODIS/Aqua Snow Cover 8-Day L3 Global 500m SIN Grid' data set (DOI:10.5067/MODIS/MYD10A2.061). The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD10A2
  This global Level-3 (L3) data set provides the maximum snow cover extent (SNE) observed over an eight-day period within 10° x 10° MODIS sinusoidal grid tiles. Tiles are generated by compositing 500 m observations from the 'MODIS/Aqua Snow Cover Daily L3 Global 500m Grid' data set (DOI:10.5067/MODIS/MYD10A1.061). A bit flag index is used to track the eight-day snow/no-snow chronology for each 500 m cell. The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD10C1
  This global Level-3 (L3) data set provides the percentage of snow-covered land and cloud-covered land observed daily, within 0.05° (approx. 5 km) MODIS Climate Modeling Grid (CMG) cells. Percentages are computed from snow cover observations in the 'MODIS/Aqua Snow Cover Daily L3 Global 500m Grid' data set (DOI:10.5067/MODIS/MYD10A1.061). The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD10A1
  This global Level-3 (L3) data set provides a daily composite of snow cover and albedo derived from the 'MODIS/Aqua Snow Cover 5-Min L2 Swath 500m' data set (DOI:10.5067/MODIS/MYD10_L2.061). Each data granule is a 10°x10° tile projected to a 500 m sinusoidal grid. The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### MYD10CM
  This global Level-3 (L3) data set provides monthly average snow cover within 0.05° (approx. 5 km) MODIS Climate Modeling Grid (CMG) cells. Monthly averages are computed from daily snow cover observations in the MODIS/Aqua Snow Cover Daily L3 Global 0.05Deg CMG (https://doi.org/10.5067/MODIS/MYD10CM.061) data set. The terms "Version 61" and "Collection 6.1" are used interchangeably in reference to this release of MODIS data.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
