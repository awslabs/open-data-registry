Name: Met Office UK Marine Observations
Description: |+ 
 Marine surface weather observations for 32 parameters from 69 locations across the Met Office marine observation network. Observations are available for a rolling 7-day period (168 hours). The data is available as CSV files.<br><br>
 The data comes from moored buoys, light vessels and ships with automatic weather stations onboard. Buoys and light vessels are static and you can view their locations on the [Met Office Marine Observations page](https://weather.metoffice.gov.uk/specialist-forecasts/coast-and-sea/observations). You can use the data to monitor the latest weather affecting a specific marine location so you can plan for your business or operations.<br><br>
 [Join the Met Office research panel](https://forms.office.com/Pages/ResponsePage.aspx?id=YYHxF9cgRkeH_VD-PjtmGdxioYGoFbFIkZuB_q8Fb3VUQkoxRVQzTFdUMzNMVzczWVM5VTc3QTY3MC4u) to help us understand how people interact with weather and climate data, uncover challenges and explore opportunities. 
UpdateFrequency: Every hour, at 15 minutes past the hour, we retrieve a single set of parameter values for each location. For example, at 12:15 new data is retrieved for observations collected between 11:00 and 12:00. This is due to the quality checks required to verify data for public consumption and global network latency.
