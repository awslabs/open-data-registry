Name: Bureau of meteorology Atmospheric Regional Reanalysis for Australia (BARRA) v2
Description: BARRA is a high resolution regional atmospheric reanalysis model over Australia and surrounding regions developed by the Australian Bureau of Meteorology. BARRA is designed for providing multi-decadal meteorological data. It is intended to complement existing climate datasets. <br/ ><br/ > BARRA2 provides the Bureau's higher resolution regional atmospheric reanalysis over Australia and surrounding regions, spanning 1979-present day period. When completed, it replaces the first version of BARRA. Datasets include':'<br/ > BARRA R2/RE2 is a moderate resolution atmospheric reanalysis system. BARRA R2 provides deterministic output at 0.11° (~12 km) resolution, while BARRA RE2 provides ensemble output at 0.22° (~24 km). The modelling domain spans 87.27°–208.6°E longitude and –59.18°–14.19° latitude. For Level 1 post processed products, the domain is cropped to 88.48°–207.39°E and –57.97°–12.98° to remove boundary artefacts.<br/ > BARRA-C2 is a convective-scale downscaling system based on a horizontal grid spacing of 0.04 degrees (around 4.4 km). The modelling domain covers 107.02 to 160.90 degrees in longitude and -46.69 to -4.01 degrees in longitude. <br/ > Use for climate research and beyond, such as training of machine learning models for weather.
Documentation: Documentation is available for "[BARRA 2](https://opus.nci.org.au/spaces/NDP/pages/264241166/BOM+BARRA2+ob53)"
