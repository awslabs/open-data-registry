Name: NASA MOPITT Project
Description: |
  MOP03J_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta CO gridded daily means (Near and Thermal Infrared Radiances) version 109 product is an unvalidated beta product subject to recalibration, contains daily mean gridded versions of the daily Level 2 CO profile and total column retrievals. The averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. Data collection for this product is ongoing. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. [From the MOPITT version 3 Level 3 Data Quality Summary] MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03N
  MOP03N_109 is the Measurements of Pollution in the Troposphere (MOPITT) Beta CO gridded daily means (Near Infrared Radiances) version 109 product. It is a non-validated beta product subject to recalibration and contains daily mean-gridded versions of the daily Level 2 CO profile and total column retrievals. The averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. Version 109 products are beta versions of version 9 products; they are unvalidated beta products subject to recalibration. Data collection for this product is ongoing. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. [From the MOPITT version 3 Level 3 Data Quality Summary] MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03T
  MOP03T_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta CO gridded daily means (Thermal Infrared Radiances) version 109 product. It is an unvalidated beta product subject to recalibration and contains daily mean-gridded versions of the daily Level 2 CO profile and total column retrievals. The averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. Version 109 products are beta versions of version 9 products; they are unvalidated beta products subject to recalibration. Data collection for this version is ongoing. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. [From the MOPITT version 3 Level 3 Data Quality Summary] MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03JM
  MOP03JM_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta CO gridded monthly means (Near and Thermal Infrared Radiances) version 109 product. It contains monthly mean-gridded daily L2 CO profile versions and total column retrievals. The averaging kernels associated with each retrieval are also gridded and included in the L3 files. Version 109 products are beta versions of version 9 products; they are unvalidated beta products subject to recalibration. Data collection for this product is ongoing. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. [From the MOPITT version 3 Level 3 Data Quality Summary] MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03NM
  MOP03NM_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta CO gridded monthly means (Near Infrared Radiances) version 109 product. This product contains monthly mean-gridded daily Level 2 CO profile versions and total column retrievals. The averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. Version 109 products are beta versions of version 9 products; they are unvalidated beta products subject to recalibration. Data collection for this product is ongoing. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. [From the MOPITT version 3 Level 3 Data Quality Summary] MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03TM
  MOP03TM_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta CO gridded monthly means (Thermal Infrared Radiances) version 109 product. It is an unvalidated beta product subject to recalibration and contains monthly mean-gridded versions of the daily Level 2 CO profile and total column retrievals. The averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. Version 109 products are beta versions for version 9 products, they are unvalidated beta products subject to recalibration. Data collection for this product is ongoing. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. [From the MOPITT version 3 Level 3 Data Quality Summary] MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP02J
  MOP02J_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta Derived Carbon Monoxide (CO) (Near and Thermal Infrared Radiances) version 109 product. It consists of the geo-located, retrieved carbon monoxide profiles and total column amounts for carbon monoxide. Ancillary data concerning surface properties and cloud conditions at the locations of the retrieved parameters are also included. An estimated error accompanies each retrieval. Version 109 products are beta versions of version 9 products; they are unvalidated beta products subject to recalibration. Data collection for this product is ongoing. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP02N
  MOP02N_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta Derived CO (Near Infrared Radiances) version 109 product. It is an unvalidated beta product subject to recalibration, and consists of the geo-located, retrieved carbon monoxide profiles and total column amounts for carbon monoxide. Ancillary data concerning surface properties and cloud conditions at the locations of the retrieved parameters are also included. Each retrieval is accompanied by an estimated error. Version 109 products are beta versions for version 9 products, they are unvalidated beta products subject to recalibration. Data collection for this version is ongoing. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP02T
  MOP02T_109 is the Measurements Of Pollution In The Troposphere (MOPITT) Beta Derived CO (Thermal Infrared Radiances) version 109 product. It is an unvalidated beta product subject to recalibration and consists of the geo-located, retrieved carbon monoxide profiles and total column amounts for carbon monoxide. Ancillary data concerning surface properties and cloud conditions at the locations of the retrieved parameters are also included. An estimated error accompanies each retrieval. Version 109 products are beta versions of version 9 products; they are unvalidated beta products subject to recalibration. Data collection for this version is ongoing. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft,, on December 18, 1999. The instrument was constructed by a consortium of Canadian companies and funded by the Canadian Space Agency's Space Science Division.
  <br>

  #### MOP03J
  MOP03J_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Carbon Monoxide (CO) gridded daily means (Near and Thermal Infrared Radiances) version 9 data product. The "J" refers to the Joint use of the Thermal (T) and NIR (N) channels in the retrieval. It contains daily mean-gridded versions of the daily Level 2 CO profile and total column retrievals. For this data product, the averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03N
  MOP03N_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Carbon Monoxide (CO) gridded daily means (Near Infrared Radiances) version 9 data product. The "N" refers to the use of the NIR (N) channels in the retrieval. It contains daily mean-gridded versions of the daily Level 2 CO profile and total column retrievals. For this data product, the averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03T
  MOP03T_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Carbon Monoxide (CO) gridded daily means (Thermal Infrared Radiances) version 9 data product. The "T" refers to the use of the Thermal (T) channels in the retrieval. It contains daily mean-gridded versions of the daily Level 2 CO profile and total column retrievals. For this data product, the averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03JM
  MOP03JM_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Carbon Monoxide (CO) gridded monthly means (Near and Thermal Infrared Radiances) version 9 data product. The "J" refers to the Joint use of the Thermal (T) and NIR (N) channels in the retrieval. It contains monthly mean-gridded daily Level 2 CO profile versions and total column retrievals. For this data product, the averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03NM
  MOP03NM_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Carbon Monoxide (CO) gridded monthly means (Near Infrared Radiances) version 9 data product. The "N" refers to the use of the NIR (N) channels in the retrieval. It contains monthly mean-gridded daily Level 2 CO profile versions and total column retrievals. For this data product, the averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP03TM
  MOP03TM_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Carbon Monoxide (CO) gridded monthly means (Thermal Infrared Radiances) version 9 data product. The "T" refers to the use of the Thermal (T) channels in the retrieval. It contains monthly mean-gridded daily Level 2 CO profile versions and total column retrievals. For this data product, the averaging kernels associated with each retrieval are also gridded and included in the Level 3 files. For a description of the file contents, refer to the File Spec Document. The MOPITT Level 2 Data Quality Statement contains additional information about the retrievals' quality and limitations. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency. V9 is an improvement over V8 because of several scientific enhancements. These include a revision of the cloud filter to allow through a much higher number of pixels that were previously considered cloudy, a minor correction to the Forward Model to account for the long-term drift of the pressure in the gas cell, and a careful analysis of the NIR calibration process which reduces discontinuities associated with calibration events.
  <br>

  #### MOP02J
  MOP02J_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Derived Carbon Monoxide (CO) (Near and Thermal Infrared Radiances) version 9 product. The "J" refers to the Joint use of the Thermal (T) and NIR (N) channels in the retrieval. It consists of geo-located, retrieved CO profiles and total column amounts for CO. Ancillary data concerning surface properties and cloud conditions at the locations of the retrieved parameters are also included. An estimated error accompanies each retrieval. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP02N
  MOP02N_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Derived carbon monoxide (CO) (Near Infrared Radiances) version 9 dataset. The "N" refers to the use of the NIR (N) channels in the retrieval. It consists of geo-located, retrieved CO profiles and total column amounts for CO. Ancillary data concerning surface properties and cloud conditions at the locations of the retrieved parameters are also included. An estimated error accompanies each retrieval. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
  <br>

  #### MOP02T
  MOP02T_9 is the Measurements Of Pollution In The Troposphere (MOPITT) Derived Carbon Monoxide (CO) (Thermal Infrared Radiances) version 9 product. The "T" refers to the use of the Thermal (T) channels in the retrieval. It consists of geo-located, retrieved CO profiles and total column amounts for CO. Ancillary data concerning surface properties and cloud conditions at the locations of the retrieved parameters are also included. Each retrieval is accompanied by an estimated error. MOPITT was successfully launched into sun-synchronous polar orbit aboard Terra, NASA's first Earth Observing System spacecraft, on December 18, 1999. The MOPITT instrument was constructed by a consortium of Canadian companies and funded by the Space Science Division of the Canadian Space Agency.
