  Provides L2 high resolution (HR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This release is reduced to exclude the 20 Hz observations that are included in the standard product. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_HR_STD_OST_STC_F
  Provides L2 high resolution (HR) short time critical (STC; 36-hour latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz and 20 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This standard product release provides the geophysical parameters at both 1 and 20 Hz. The S6A STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_HR_RED_OST_STC_F
  Provides L2 high resolution (HR) short time critical (STC; 36-hour latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This release is reduced to exclude the 20 Hz observations that are included in the standard product. The S6A STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_LR_STD_OST_NRT_F
  Provides low resolution (LR) near real time (NRT; 3-hour latency) measurements of sea surface height anomaly (SSHA), Significant Wave Height (SWH), and Wind Speed, along with 1 Hz and 20 Hz measurements from the radar altimeter, orbit altitude, environmental range corrections, instrument corrections, and geophysical models. The NRT product is analogous to the Jason-3 OGDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_LR_RED_OST_NRT_F
