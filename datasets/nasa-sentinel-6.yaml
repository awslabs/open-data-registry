Name: NASA Sentinel-6 Project
Description: |
  Provides reprocessed L1A high resolution (HR) non-time critical (NTC; 60-day latency) altimetry intermediate outputs from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft, which are geo-located bursts of Ku-band echoes (at ~140 Hz) with all instrument calibrations applied and full rate complex waveforms for delay/Doppler or HR processing. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L1A_ALT_HR_STC_F
  Provides L1A high resolution (HR) short time critical (STC; 36-hour latency) altimetry intermediate outputs from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft, which are geo-located bursts of Ku-band echoes (at ~140 Hz) with all instrument calibrations applied and full rate complex waveforms for delay/Doppler or HR processing. The S6A STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L1B_GNSS_POD_DAILY
  Provides L1B daily GNSS-POD tracking data for the Sentinel-6A radar altimetry mission.
  <br>

  #### JASON_CS_S6A_L1B_GNSS_POD_HOURLY
  Provides L1B hourly GNSS-POD tracking data for the Sentinel-6A radar altimetry mission.
  <br>

  #### JASON_CS_S6A_L1B_GNSS_RO_POD_HOURLY
  Provides L1B GNSS-RO-POD tracking data for the Sentinel-6A radar altimetry mission.
  <br>

  #### JASON_CS_S6A_L1B_ALT_HR_NTC_F08
  Provides reprocessed L1B high resolution (HR) non-time critical (NTC; 60-day latency) altimetry data from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft which include the geolocated, fully SAR processed and calibrated multi-looked HR Ku-band waveforms. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L1B_ALT_HR_STC_F
  Provides L1B high resolution (HR) short time critical (STC; 36-hour latency) altimetry data from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft which include the geolocated, fully SAR processed and calibrated multi-looked HR Ku-band waveforms. The S6A STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L1B_ALT_LR_NTC_F08
  Provides reprocessed L1B low resolution (LR) non-time critical (NTC; 60-day latency) altimetry data from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft which include the geolocated, fully-calibrated pulse-limited LR power echoes. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L1B_ALT_LR_STC_F
  Provides L1B low resolution (LR) short time critical (STC; 36-hour latency) altimetry data from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft which include the geolocated, fully-calibrated pulse-limited LR power echoes. The S6A STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L2_AMR_RAD_NRT
  Provides L2 near real time (NRT; 3-hour latency) geophysical information from the Advanced Microwave Radiometer on the Sentinel-6A Michael Freilich spacecraft including surface type, wind speed, water vapor, brightness temperature, sigma0, wet troposphere, and associated quality flags. The data are interpolated to intervals that correspond to altimetry measurements from the Poseidon-4 SAR to supply the geophysical and environmental corrections for altimetry. The S6A NRT product is analogous to the Jason-3 OGDR product.
  <br>

  #### JASON_CS_S6A_L2_AMR_RAD_NTC_F08_UNVALIDATED
  Provides reprocessed L2 non-time critical (NTC; 60-day latency) geophysical information from the Advanced Microwave Radiometer on the Sentinel-6A Michael Freilich spacecraft including surface type, wind speed, water vapor, brightness temperature, sigma0, wet troposphere, and associated quality flags. The data are interpolated to intervals that correspond to altimetry measurements from the Poseidon-4 SAR to supply the geophysical and environmental corrections for altimetry. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_AMR_RAD_NTC_F08
  Provides L2 non-time critical (NTC; 60-day latency) validated geophysical information from the Advanced Microwave Radiometer on the Sentinel-6A Michael Freilich spacecraft including surface type, wind speed, water vapor, brightness temperature, sigma0, wet troposphere, and associated quality flags. The data are interpolated to intervals that correspond to altimetry measurements from the Poseidon-4 SAR to supply the geophysical and environmental corrections for altimetry. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_AMR_RAD_STC
  Provides L2 short time critical (STC; 36-hour latency) geophysical information from the Advanced Microwave Radiometer on the Sentinel-6A Michael Freilich spacecraft including surface type, wind speed, water vapor, brightness temperature, sigma0, wet troposphere, and associated quality flags. The data are interpolated to intervals that correspond to altimetry measurements from the Poseidon-4 SAR to supply the geophysical and environmental corrections for altimetry. The S6A STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_HR_STD_OST_NRT_F
  Provides L2 high resolution (HR) near real time (NRT; 3-hour latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz and 20 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This standard product release provides the geophysical parameters at both 1 and 20 Hz. The S6A NRT product is analogous to the Jason-3 OGDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_HR_RED_OST_NRT_F
  Provides L2 high resolution (HR) near real time (NRT; 3-hour latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This release is reduced to exclude the 20 Hz observations that are included in the standard product. The S6A NRT product is analogous to the Jason-3 OGDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_HR_STD_OST_NTC_F08_UNVALIDATED
  Provides reprocessed L2 high resolution (HR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz and 20 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This standard product release provides the geophysical parameters at both 1 and 20 Hz. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_HR_STD_OST_NTC_F08
  Provides L2 high resolution (HR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz and 20 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This standard product release provides the geophysical parameters at both 1 and 20 Hz. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_HR_RED_OST_NTC_F08_UNVALIDATED
  Provides reprocessed L2 high resolution (HR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This release is reduced to exclude the 20 Hz observations that are included in the standard product. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

