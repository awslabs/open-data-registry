  <br>

  #### JASON_CS_S6A_L2_ALT_LR_STD_OST_NTC_F08_UNVALIDATED
  Provides reprocessed L2 low resolution (LR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft. It contains Sea Surface Height (SSH), Sea Surface Height Anomalies (SSHA) and Significant Wave Height (SWH), along with 1 Hz and 20 Hz Ku-band measurements processed from L1B altimetry including the range, orbital altitude, time, and water vapour. It also includes altimetry corrections, significant wave height and wind-speed from the AMR-C. This standard product release provides the geophysical parameters at both 1 and 20 Hz. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_LR_STD_OST_NTC_F08
  Provides low resolution (LR) non-time critical (NTC; 60-day latency) measurements of sea surface height anomaly (SSHA), Significant Wave Height (SWH), and Wind Speed, along with 1 Hz and 20 Hz measurements from the radar altimeter, orbit altitude, environmental range corrections, instrument corrections, and geophysical models. The NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_LR_RED_OST_NTC_F08_UNVALIDATED
  Provides low resolution (LR) non-time critical (NTC; 60-day latency) measurements of sea surface height anomaly (SSHA), Significant Wave Height (SWH), and Wind Speed. The NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_LR_STD_OST_STC_F
  Provides low resolution (LR) short time critical (STC; 36-hour latency) measurements of sea surface height anomaly (SSHA), Significant Wave Height (SWH), and Wind Speed, along with 1 Hz and 20 Hz measurements from the radar altimeter, orbit altitude, environmental range corrections, instrument corrections, and geophysical models. The STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L2_ALT_LR_RED_OST_STC_F
  Provides low resolution (LR) short time critical (STC; 36-hour latency) measurements of sea surface height anomaly (SSHA), Significant Wave Height (SWH), and Wind Speed. The STC product is analogous to the Jason-3 IGDR product.
  <br>

  #### JASON_CS_S6A_L2P_ALT_HR_OST_NTC_F08
  Provides L2P high resolution (HR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft, and contains L2-equivalent geophysical sea-state data at a slightly different latency than the other L2 NRT products. The sea-state data were derived from L1B altimetry, and include range, orbital altitude, time, and water vapour. Environmental and geophysical corrections, significant wave height, and wind-speed information are supplied by the AMR-C. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L2P_ALT_LR_OST_NTC_F08
  Provides L2P low resolution (LR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft, and contains L2-equivalent geophysical sea-state data at a slightly different latency than the other L2 NRT products. The sea-state data were derived from L1B altimetry, and include range, orbital altitude, time, and water vapour. Environmental and geophysical corrections, significant wave height, and wind-speed information are supplied by the AMR-C. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L3_ALT_HR_OST_NTC_F08
  Provides L3 high resolution (HR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft, which includes the unfiltered geophysical sea-state parameters that have been spatially and/or temporally resampled or corrected, including potential averaging over multiple orbits. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

  #### JASON_CS_S6A_L3_ALT_LR_OST_NTC_F08
  Provides L3 low resolution (LR) non-time critical (NTC; 60-day latency) altimetry from the Poseidon-4 SAR altimeter on the Sentinel-6A Michael Freilich spacecraft, which includes the unfiltered geophysical sea-state parameters that have been spatially and/or temporally resampled or corrected, including potential averaging over multiple orbits. The S6A NTC product is analogous to the Jason-3 GDR product.
  <br>

