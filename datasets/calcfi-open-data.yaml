Name: CalcFi Open Data
Description: |
  117,956 observations across 34 free CC-BY financial and macroeconomic time
  series mirrored verbatim from US and international primary sources: Federal
  Reserve Bank of St. Louis (FRED), US Bureau of Labor Statistics (BLS),
  Freddie Mac, US Treasury, Bureau of Economic Analysis (BEA), World Bank,
  Board of Governors of the Federal Reserve System, Federal Deposit Insurance
  Corporation (FDIC), and US Energy Information Administration (EIA).

  Series include 30-year and 15-year fixed mortgage rates (Freddie Mac PMMS),
  2- and 10-year US Treasury constant-maturity yields, the Effective Federal
  Funds Rate, the Consumer Price Index for All Urban Consumers (CPI-U),
  Personal Consumption Expenditures (PCE) inflation, civilian unemployment
  rate, labor-force participation, average hourly earnings, WTI and Brent
  crude oil spot prices, US regular gasoline retail prices, USD/EUR, USD/GBP
  and USD/JPY exchange rates, copper and corn commodity prices, US and
  Eurozone GDP per capita, credit-card APR, personal-loan and auto-loan
  rates, world inflation and unemployment, and snapshot cryptocurrency and
  FDIC deposit rates.

  Each series ships with a Frictionless Data Package (datapackage.json)
  descriptor including the canonical primary-source URL, license, retrieval
  timestamp, and a typed CSV schema. Primary-source provenance is preserved
  verbatim in CSV comment headers (# Source:, # Primary URL:, # License:,
  # Retrieved:). All data is licensed CC BY 4.0.

  Five permanent dataset DOIs are deposited at Figshare
  (10.6084/m9.figshare.32332290), Zenodo CERN (10.5281/zenodo.20302283), OSF
  (10.17605/OSF.IO/PUMKT), Kaggle (10.34740/kaggle/dsv/16356447), and
  Mendeley Data. A companion methodology paper is under review at SSRN.

  Used as the open-data layer behind calcfi.app, a free personal-finance
  calculator platform with 300+ tools cited to primary sources.

Documentation: https://calcfidata.readthedocs.io/

Contact: jere.salmisto@gmail.com

ManagedBy: '[Jere Salmisto](https://orcid.org/0009-0000-0916-8684)'

UpdateFrequency: |
  Refreshed daily at 06:00 UTC via GitHub Actions; per-series cadence
  inherits from the primary publisher (daily for Treasury yields, FX, oil
  spot prices, Fed Funds; weekly for Freddie Mac PMMS and EIA gasoline;
  monthly for CPI, PCE, BLS employment; quarterly for consumer credit;
  annual for World Bank series).

