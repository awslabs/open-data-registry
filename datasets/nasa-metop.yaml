Name: NASA MetOp Project
Description: |
  This dataset represents the first historically reprocessed Level 2 coastal ocean surface wind vector climate data record from the Advanced Scatterometer (ASCAT) on MetOp-A sampled on a 12.5 km grid. This coastal dataset utilizes a spatial box filter to generate a spatial average of the Sigma-0 retrievals from the Level 1B dataset and obtains additional winds near the coast. Since the full resolution L1B Sigma-0 retrievals are used, all non-sea retrievals are discarded prior to the Sigma-0 averaging. Each box average Sigma-0 is then used to compute the vector cell wind using the same CMOD7 geophysical model function as in the operational OSI SAF ASCAT wind vector datasets. With this enhanced coastal retrieval, winds are computed as close to ~15 km from the coast. Each file corresponds to one complete orbit and is provided in netCDF version 3 format. The beginning of the orbit files is defined near the South Pole. ASCAT is a C-band fan beam radar scatterometer, providing two independent swaths of backscatter retrievals, aboard the MetOp-A platform in sun-synchronous polar orbit. It is a product of the European Organization for the Exploitation of Meteorological Satellites (EUMETSAT) Ocean and Sea Ice Satellite Application Facility (OSI SAF) provided through the Royal Netherlands Meteorological Institute (KNMI). For more information on the MetOp mission, please visit: https://www.eumetsat.int/our-satellites/metop-series . For access to more contemporaneous and near-real-time MetOp-A ASCAT 12.5km data, please visit: https://podaac.jpl.nasa.gov/dataset/ASCATA-L2-Coastal. For more timely announcements, users are encouraged to register with the KNMI scatterometer email list: scat@knmi.nl. All intellectual property rights of the OSI SAF products belong to EUMETSAT. The use of these products is granted to every interested user, free of charge. If you wish to use these products, EUMETSAT's copyright credit must be shown by displaying the words "copyright (year) EUMETSAT" on each of the products used. Use cases and feedback on the products will be much appreciated and in fact helps to sustain the reprocessing capability.
  <br>

  #### ASCATA_L2_25KM_CDR
  This dataset represents the first historically reprocessed Level 2 ocean surface wind vector climate data record from the Advanced Scatterometer (ASCAT) on MetOp-A sampled on a 25 km grid. Products at 25-km sampling are less noisy than 12.5-km products, but also contain less geophysical information on small scales and near the coasts. The wind vector retrievals are currently processed using the CMOD7 geophysical model function using a Hamming filter to spatially average the Level 1 Sigma-0 data over 25 km swath grid cells. Each file corresponds to one complete orbit and is provided in netCDF version 3 format. The beginning of the orbit files is defined near the South Pole. ASCAT is a C-band fan beam radar scatterometer, providing two independent swaths of backscatter retrievals, aboard the MetOp-A platform in sun-synchronous polar orbit. It is a product of the European Organization for the Exploitation of Meteorological Satellites (EUMETSAT) Ocean and Sea Ice Satellite Application Facility (OSI SAF) provided through the Royal Netherlands Meteorological Institute (KNMI). For more information on the MetOp mission, please visit: https://www.eumetsat.int/our-satellites/metop-series . For access to more contemporaneous and near-real-time MetOp-A ASCAT 25-km data, please visit: https://podaac.jpl.nasa.gov/dataset/ASCATA-L2-25km. For more timely announcements, users are encouraged to register with the KNMI scatterometer email list: scat@knmi.nl. All intellectual property rights of the OSI SAF products belong to EUMETSAT. The use of these products is granted to every interested user, free of charge. If you wish to use these products, EUMETSAT's copyright credit must be shown by displaying the words "copyright (year) EUMETSAT" on each of the products used. Use cases and feedback on the products will be much appreciated and in fact helps to sustain the reprocessing capability.
  <br>

  #### ASCATA-L2-25km
  This dataset contains operational near-real-time Level 2 ocean surface wind vector retrievals from the Advanced Scatterometer (ASCAT) on MetOp-A at 25 km sampling resolution (note: the effective resolution is 50 km). It is a product of the European Organization for the Exploitation of Meteorological Satellites (EUMETSAT) Ocean and Sea Ice Satellite Application Facility (OSI SAF) provided through the Royal Netherlands Meteorological Institute (KNMI). The wind vector retrievals are currently processed using the CMOD7.n geophysical model function using a Hamming filter to spatially average the Sigma-0 data in the ASCAT L1B data. Each file is provided in netCDF version 3 format, and contains one full orbit derived from 3-minute orbit granules. Latency is approximately 2 hours from the latest measurement. The beginning of the orbit is defined by the first wind vector cell measurement within the first 3-minute orbit granule that starts north of the Equator in the ascending node. ASCAT is a C-band dual fan beam radar scatterometer providing two independent swaths of backscatter retrievals in sun-synchronous polar orbit aboard the MetOp-A platform. For more information on the MetOp mission, please visit: https://www.eumetsat.int/our-satellites/metop-series . For more timely announcements, users are encouraged to register with the KNMI scatterometer email list: scat@knmi.nl. Users are also highly advised to check the dataset user guide periodically for updates and new information on known problems and issues. All intellectual property rights of the OSI SAF products belong to EUMETSAT. The use of these products is granted to every interested user, free of charge. If you wish to use these products, EUMETSAT's copyright credit must be shown by displaying the words "copyright (year) EUMETSAT" on each of the products used.
  <br>

  #### ASCATA-L2-Coastal
  This dataset contains operational near-real-time Level 2 coastal ocean surface wind vector retrievals from the Advanced Scatterometer (ASCAT) on MetOp-A at 12.5 km sampling resolution (note: the effective resolution is 25 km). It is a product of the European Organization for the Exploitation of Meteorological Satellites (EUMETSAT) Ocean and Sea Ice Satellite Application Facility (OSI SAF) provided through the Royal Netherlands Meteorological Institute (KNMI). This coastal dataset differs from the standard 25 km datasets in that it utilizes a spatial box filter (rather than the Hamming filter) to generate a spatial average of the Sigma-0 retrievals from the Level 1B dataset; all full resolution Sigma-0 retrievals within a 15 km radius of the wind vector cell centroid are used in the averaging. Since the full resolution L1B Sigma-0 retrievals are used, all non-sea retrievals are discarded prior to the Sigma-0 averaging. Each box average Sigma-0 is then used to compute the wind vector cell using the same CMOD7.n geophysical model function as in the standard OSI SAF ASCAT wind vector datasets. With this enhanced coastal retrieval, winds can be computed as close to ~15 km from the coast, as compared to the static ~35 km land mask in the standard 12.5 km dataset. Each file is provided in netCDF version 3 format, and contains one full orbit derived from 3-minute orbit granules. Latency is approximately 2 hours from the latest measurement. The beginning of the orbit is defined by the first wind vector cell measurement within the first 3-minute orbit granule that starts north of the Equator in the ascending node. ASCAT is a C-band dual fan beam radar scatterometer providing two independent swaths of backscatter retrievals in sun-synchronous polar orbit aboard the MetOp-A platform. For more information on the MetOp mission, please visit: https://www.eumetsat.int/our-satellites/metop-series . For more timely announcements, users are encouraged to register with the KNMI scatterometer email list: scat@knmi.nl. Users are also highly advised to check the dataset user guide periodically for updates and new information on known problems and issues. All intellectual property rights of the OSI SAF products belong to EUMETSAT. The use of these products is granted to every interested user, free of charge. If you wish to use these products, EUMETSAT's copyright credit must be shown by displaying the words "copyright (year) EUMETSAT" on each of the products used.
