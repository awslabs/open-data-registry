  <br>

  #### QUIKSCAT_ESDR_L3_WIND_STRESS_V1.0
  This dataset contains gridded ocean surface wind vectors (equivalent neutral and true 10m) and wind stress vectors derived from satellite-based scatterometer observations aboard QuikScat, representing the first science quality release of these data funded under the MEaSUREs program. This product from QuikScat has been intercalibrated with similar scatterometer measurements from instruments on the MetOp-A, MetOp-B, and ScatSat-1, all of which can be found on the MEaSUREs OSVW Project Page. The wind vector and stress retrievals are provided on a global grid (one per file) at 12.5 km pixel resolution, but data exist only over areas of the globe that fell within one of the satellite swaths/orbits for that day (see thumbnail). <br><br> The dataset represents the first science quality release funded under the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. Note that this is the first version of the Level 3 data (V1.0) but they were derived from V1.1 of the Level 2 product. The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST).
  <br>

  #### SCATSAT1_ESDR_ANCILLARY_L2_V1.1
  This dataset contains the first science quality release (post-provisional after v1.0) of the MEaSUREs-funded Earth Science Data Record (ESDR) of ancillary data corresponding to the SCATSAT-1 Level 2 (L2) data products, interpolated in space and time to the scatterometer observations. These auxiliary fields are included to complement those scatterometer observations, specifically for the SCATSAT_ESDR_L2_WIND_STRESS_V1.1 dataset. The fields include: i) ocean surface wind fields from ERA-5 short-term forecast (removed from the analyses times to reduce impacts from assimilated scatterometer retrievals at the beginning of the forecast); ii) collocated in space and time estimations of precipitation from the GPM IMERG product; iii) estimation of the surface currents from the GlobCurrent project. These auxiliary fields are included to complement the scatterometer observation fields and to help in the evaluation process. They are provided on a non-uniform grid within the native L2 SCATSAT-1 sampled locations at a nominal 12.5 km pixel resolution. Each file corresponds to a specific orbital revolution (rev) number, which begins at the southernmost point of the ascending orbit. The thumbnail shows data for two orbits - using all orbits for a single day will provide global coverage. <br><br> The dataset represents the first science quality release of this product with funding from the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. Version 1.1 provides a set of updates and improvements from version 1.0, including: 1) improved variable metadata, 2) removed the GlobCurrent stokes drift variables, and 3) provided data source metadata including DOIs for the ERA-5, IMERGE, and GlobCurrent data sources. The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST).
  <br>

  #### SCATSAT1_ESDR_L2_WSDERIV_V1.0
  This dataset contains the curl and divergence of ocean surface equivalent neutral wind and wind stress, derived from satellite-based scatterometer observations aboard SCATSAT-1, representing the first science quality release of these data funded under the MEaSUREs program. This product from SCATSAT-1 has been intercalibrated with similar scatterometer measurements from instruments on the MetOp-A, MetOp-B, and QuikScat satellites, all of which can be found on the MEaSUREs OSVW Project Page. These Level 2 data are provided on a non-uniform grid within the satellite swath at ~12.5 km pixel resolution. Each L2 file corresponds to a specific orbital revolution number, which begins at the southernmost point of the ascending orbit. There are typically 14 orbits per day, and the thumbnail preview shows coverage for the first ten orbits in an example day. Estimates for the curls and divergences are computed over several spatial domains with varying radii from the point of interest, and included as separate variables. <br><br> The dataset represents the first science quality release funded under the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST). This V1.0 of the data was derived from V1.1 of the L2 wind and stress product.
  <br>

  #### SCATSAT1_ESDR_L2_WIND_STRESS_V1.1
