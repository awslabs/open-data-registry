  #### QUIKSCAT_ESDR_ANCILLARY_L2_V1.1
  This dataset contains model output interpolated in space and time to the ESDR product from the scatterometer on the QuikSCAT satellite, representing the first science quality release of these data (post-provisional after v1.0) funded under the MEaAUREs program. These auxiliary fields are included to complement the scatterometer observations, specifically for the QUIKSCAT_ESDR_L2_WIND_STRESS_V1.1 dataset.. Model variables include: i) ocean surface wind fields from ERA-5 short-term forecast (removed from the analyses times to reduce impacts from assimilated scatterometer retrievals at the beginning of the forecast); ii) estimations of precipitation from the GPM IMERG product; iii) estimation of the surface currents from the GlobCurrent project. The modeled ocean surface auxiliary fields are provided on a non-uniform grid within the native L2 QuikSCAT sampled locations at a nominal 12.5 km pixel resolution. Each file corresponds to a specific orbital revolution (rev) number, which begins at the southernmost point of the ascending orbit. The thumbnail shows data for two orbits - using all orbits for a single day will provide global coverage. <br><br> Version 1.1 provides a set of updates and improvements from version 1.0, including: 1) improved variable metadata, 2) removed the GlobCurrent stokes drift variables, and 3) provided data source metadata including DOIs for the ERA-5, IMERGE, and GlobCurrent data sources. The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST).
  <br>

  #### QUIKSCAT_ESDR_L2_WSDERIV_V1.0
  This dataset contains the curl and divergence of ocean surface equivalent neutral wind and wind stress, derived from satellite-based scatterometer observations aboard QuikScat, representing the first science quality release of these data funded under the MEaSUREs program. This product from QuikScat has been intercalibrated with similar scatterometer measurements from instruments on the MetOp-A, MetOp-B ASCAT, and ScatSat-1 satellites, all of which can be found on the MEaSUREs OSVW Project Page. These Level 2 data are provided on a non-uniform grid within the satellite swath at ~12.5 km pixel resolution. Each L2 file corresponds to a specific orbital revolution number, which begins at the southernmost point of the ascending orbit - the thumbnail preview shows data for all orbits over a day (typically 14 orbits). Estimates for the curls and divergences are computed over several spatial domains with varying radii from the point of interest, and included as separate variables. <br><br> The dataset represents the first science quality release funded under the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST). This V1.0 of the data was derived from V1.1 of the L2 wind and stress product.
  <br>

  #### QUIKSCAT_ESDR_L2_WIND_STRESS_V1.1
