Name: NASA MEaSUREs/OSWV Project
Description: |
  This dataset contains model output interpolated in space and time to observations from the MetOp-A ASCAT (ASCAT-A) instrument (a satellite-based scatterometer), representing the first science quality release of these data (post-provisional after v1.0) funded under the MEaAUREs program. These auxiliary fields are included to complement those scatterometer observations, specifically for the ASCATA_ESDR_L2_WIND_STRESS_V1.1 dataset. Model variables include: i) ocean surface wind fields from ERA-5 short-term forecast (removed from the analyses times to reduce impacts from assimilated scatterometer retrievals at the beginning of the forecast); ii) estimations of precipitation from the GPM IMERG product; iii) estimation of the surface currents from the GlobCurrent project. The fields are provided on a non-uniform grid within the sampled locations of the ASCAT-A Level 2 product, and at a nominal 12.5 km pixel resolution. Each file corresponds to a specific orbital revolution number, which begins at the southernmost point of the ascending orbit. The thumbnail shows data for two orbits - using all orbits for a single day will provide global coverage. <br><br> The dataset represents the first science quality release of this product with funding from the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. Version 1.1 provides a set of updates and improvements from version 1.0, including: 1) cleaned up ancillary data points in between the left/right swaths for improved collocation with available satellite data, 2) improved variable metadata, 3) removed the GlobCurrent stokes drift variables, and 4) provided data source metadata including DOIs for the ERA-5, IMERGE, and GlobCurrent data sources. The primary purpose of this Version 1.1 release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST).
  <br>

  #### ASCATA_ESDR_L2_WSDERIV_V1.0
  This dataset contains the curl and divergence of ocean surface equivalent neutral wind and wind stress, derived from satellite-based scatterometer observations (the MetOp-A ASCAT scatterometer), representing the first science quality release of these data funded under the MEaSUREs program. This product from MetOp-A ASCAT has been intercalibrated with similar scatterometer measurements from instruments on the MetOp-B, ScatSat-1, and QuikScat satellites, all of which can be found on the MEaSUREs OSVW Project Page. These Level 2 data are provided on a non-uniform grid within the satellite swath at ~12.5 km pixel resolution. Each L2 file corresponds to a specific orbital revolution number, which begins at the southernmost point of the ascending orbit - the thumbnail preview shows data for all orbits over a day (typically 14 orbits). Estimates for the curls and divergences are computed over several spatial domains with varying radii from the point of interest, and included as separate variables. <br><br> The dataset represents the first science quality release funded under the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST). This V1.0 of the data was derived from V1.1 of the L2 wind and stress product.
  <br>

  #### ASCATA_ESDR_L2_WIND_STRESS_V1.1
  This dataset contains ocean surface wind vectors (equivalent neutral and true 10m) and wind stress vectors derived from satellite-based scatterometer observations (the MetOp-A ASCAT scatterometer), representing the first science quality release of these data (post-provisional after v1.0) funded under the MEaSUREs program. This product from MetOp-A ASCAT has been intercalibrated with similar scatterometer measurements from instruments on the MetOp-B, ScatSat-1, and QuikScat satellites (all of which can be found on the MEaSUREs OSVW Project Page), and if used together create an unbroken record of winds from 1999 to 2022. The wind vector and stress retrievals are provided on a non-uniform grid within the swath (Level 2 products) at 12.5 km pixel resolution. Each L2 file corresponds to a specific orbital revolution number, which begins at the southernmost point of the ascending orbit. The thumbnail shows data for two orbits - using all orbits for a single day will provide global coverage. <br><br> The dataset represents the first science quality release funded under the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. Version 1.1 provides a set of updates and improvements from version 1.0, including: 1) increased data coverage, 2) improved quality control, and 3) new global metadata attributes featuring revolution number, equator crossing longitude, and equator crossing time (UTC). The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST).
  <br>

  #### ASCATA_ESDR_L3_WIND_STRESS_V1.0
  This dataset contains gridded ocean surface wind vectors (equivalent neutral and true 10m) and wind stress vectors derived from satellite-based scatterometer observations (the MetOp-A ASCAT scatterometer), representing the first science quality release of these data funded under the MEaSUREs program. This product from MetOp-A ASCAT has been intercalibrated with similar scatterometer measurements from instruments on the MetOp-B, ScatSat-1, and QuikScat satellites, all of which can be found on the MEaSUREs OSVW Project Page. The wind vector and stress retrievals are provided on a global grid (one per file) at 12.5 km pixel resolution. Data exist only over areas of the globe that fell within one of the satellite swaths/orbits for that day (see thumbnail). <br><br> The dataset represents the first science quality release funded under the MEaSUREs (Making Earth System Data Records for Use in Research Environments) program. Note that this is the first version of the Level 3 data (V1.0) but they were derived from V1.1 of the Level 2 product. The primary purpose of this release is for science evaluation by the NASA International Ocean Vector Winds Science Team (IOVWST).
  <br>

  #### ASCATB_ESDR_ANCILLARY_L2_V1.1
