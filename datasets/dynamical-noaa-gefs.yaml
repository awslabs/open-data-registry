Name: NOAA GEFS - dynamical.org Icechunk Zarr
Description: |
    The Global Ensemble Forecast System (GEFS) is a National Oceanic and Atmospheric Administration (NOAA) National Centers for Environmental Prediction (NCEP) weather forecast model. GEFS creates 31 separate forecasts (ensemble members) to describe the range of forecast uncertainty.

    These datasets have been translated to cloud-optimized Icechunk Zarr format by [dynamical.org](https://dynamical.org).

    - [NOAA GEFS forecast, 35 day](https://dynamical.org/catalog/noaa-gefs-forecast-35-day/) - Weather forecasts from the Global Ensemble Forecast System (GEFS) operated by NOAA NWS NCEP.
    - [NOAA GEFS analysis](https://dynamical.org/catalog/noaa-gefs-analysis/) - Weather analysis from the Global Ensemble Forecast System (GEFS) operated by NOAA NWS NCEP.
Documentation: https://dynamical.org/catalog/
Contact: feedback@dynamical.org
ManagedBy: "[dynamical.org](https://dynamical.org)"
