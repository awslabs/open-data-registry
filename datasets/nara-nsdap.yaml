Name: National Archives Nationalsozialistische Deutsche Arbeiterpartei (NSDAP)
Description: The NSDAP dataset on the AWS Registry of Open Data includes over 16 million digital objects and metadata, including Textract-generated OCR text, from two portions (MFKL and MFOK) of microfilm publication A3340 - Records Relating to Membership in the Nationalsozialistische Deutsche Arbeiterpartei (NSDAP).
Documentation: https://github.com/usnationalarchives/nsdap
