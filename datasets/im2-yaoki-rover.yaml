Name: YAOKI Lunar Rover IM-2 Mission Telemetry and Imagery Dataset
Description: |
  Mission telemetry and imagery from Dymon's YAOKI Lunar rover, which was deployed aboard the Intuitive Machines IM-2 lander to the Lunar south pole (lat=84.79059, lon=29.19567). JAOPS conducted operations between 2025-03-07 02:17:15+00.00 and 2025-03-07 04:33:04+00.00 using the open source Yamcs Mission Control System. This dataset contains telemetry received from the rover, relevant lander telemetry shared by the IM-2 team, telecommands sent to the rover, and images captured by the rover's camera.  The Yamcs archive allows replay of the original mission control environment. 
Documentation: https://github.com/jaops-space/im2-yaoki-yamcs-public
Contact: Louis Burtz (ljburtz@jaops.com), Shinichiro Nakajima (s_nakajima@dymon.co.jp), Zack Gainsforth (data@openlunar.org)
ManagedBy: "[JAOPS Inc.](https://www.jaops.com/)"
UpdateFrequency: The dataset is static. The IM-2 / YAOKI mission concluded in March 2025; no further updates are planned.
Tags:
  - aws-pds
  - planetary
  - robotics
  - astronomy
  - exploration
  - lunar
Version: 1.0.0
License: CC-BY-4.0
Citation: "JAOPS and Dymon Co., Ltd. (2025). Dymon YAOKI Lunar Rover Mission Data (IM-2).  Registry of Open Data on AWS." 
Resources:
  - Description: |
      Time series data stored as csv and parquet for primary telemetry (TM) and telecommand (TC) channels.
    ARN: arn:aws:s3:::im2-yaoki-rover/timeseries/*  
    Region: ap-northeast-1
    Type: S3 Bucket
  - Description: |
      Lunar surface imagery captured by the YAOKI imager, provided both as raw sensor
      payloads (.raw) and reconstructed PNG images.
    ARN: arn:aws:s3:::im2-yaoki-rover/images/*
    Region: ap-northeast-1
    Type: S3 Bucket
  - Description: |
      Complete mission archive: Yamcs RocksDB data store containing all received
      telemetry packets and parameters, sent telecommands, and engineering events from
      the YAOKI rover and the relayed IM-2 lander telemetry. 
    ARN: arn:aws:s3:::im2-yaoki-rover/yamcs-data/*
    Region: ap-northeast-1
    Type: S3 Bucket
