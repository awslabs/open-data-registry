  #### CYGNSS_L2_V2.1
  This dataset contains the Version 2.1 CYGNSS Level 2 Science Data Record which provides the time-tagged and geolocated average wind speed (m/s) and mean square slope (MSS) with 25x25 kilometer resolution from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. This version supersedes Version 2.0. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. Only one netCDF data file is produced each day (each file containing data from up to 8 unique CYGNSS spacecraft) with a latency of approximately 6 days (or better) from the last recorded measurement time. The Version 2.1 release represents the second science-quality release. Here is a summary of improvements that reflect the quality of the Version 2.1 data release: 1) revised Geophysical Model Functions (GMFs) for both Fully Developed Seas (FDS) and Young Seas with Limited Fetch conditions, to be consistent with the calibration changes made to the v2.1 Level 1 science data products.; 2) Revised covariance matrix between DDMA and LES versions of the FDS wind speed retrieval, used by the minimum variance estimator, resulting from changes made to the v2.1 Level 1 science data products; 3) Revised debiasing algorithm coefficients used by the FDS L2 retrieval algorithm, resulting from changes made to the v2.1 Level 2 science data products; 4) revised quality control (Q/C) flags related to the required level of consistency between DDMA and LES versions of the FDS wind speed retrieval (the errors in the two retrievals are now less correlated so larger discrepancies are allowed; if either retrieval is not available, the sample receives a fatal Q/C flag); 5) new Q/C flag related to the block type of the GPS satellite which provided the transmitted signal. Samples using block II-F signals receive a fatal Q/C flag due to the higher level of uncertainty in their radiated power; 6) revised wind speed uncertainty values as a function of RCG and wind speed, plus a new dependence of the uncertainty on GPS block type to reflect the higher uncertainty in GPS radiated power for block II-F satellites.
  <br>

  #### CYGNSS_L2_V3.0
  This dataset contains the Version 3.0 CYGNSS Level 2 Science Data Record which provides the time-tagged and geolocated average wind speed (m/s) and mean square slope (MSS) with 25x25 kilometer resolution from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. This version supersedes Version 2.1; https://doi.org/10.5067/CYGNS-L2X21. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. Only one netCDF data file is produced each day (each file containing data from up to 8 unique CYGNSS spacecraft) with a latency of approximately 6 days (or better) from the last recorded measurement time. Here is a summary of processing changes reflected in the v3.0 data: 1) the changes to calibration and validation of the Level 1 Normalized Bistatic Radar Cross Section (NBRCS) necessitated updates to the Geophysical Model Functions (GMFs) used to retrieve wind speed; 2) the GMF for fully developed seas (FDS) conditions was generating using matchups between NBRCS measurements and coincident wind speeds produced by NASAs Modern-Era Retrospective analysis for Research and Applications, version 2 (MERRA-2) reanalysis model; 3) the GMF for young seas with limited fetch (YSLF) was generated using matchups between NBRCS and coincident wind speeds produced by NOAAs Hurricane Weather Research and Forecast (HWRF) System; 4) YSLF wind speed is a tapered linear combination of wind speeds derived from the FDS and YSLF GMFs, where the taper gives more weight to FDS at low wind speeds and more to YSLF at high wind speeds and accounts for the transition from FDS to YSLF sea state conditions near cyclonic storms; 5) re-introduces measurements using transmissions from previously discarded GPS satellite block types; in prior versions, Block II-F was completely discarded due to large variations in GPS transmit power. The real time transmit power monitoring and correction implemented in Level 1 v3.0 data now allows Block II-F signals to be used.
  <br>

  #### CYGNSS_L2_V3.1
  This dataset contains the Version 3.1 CYGNSS Level 2 Science Data Record which provides the time-tagged and geolocated average wind speed (m/s) and mean square slope (MSS) with 25x25 kilometer resolution from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. This version supersedes Version 3.0; https://doi.org/10.5067/CYGNS-L2X30. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. Only one netCDF data file is produced each day (each file containing data from up to 8 unique CYGNSS spacecraft) with a latency of approximately 6 days (or better) from the last recorded measurement time. Here is a summary of processing changes reflected in the v3.1 data: The L2 Geophysical Model Functions (GMFs) that map L1 observables to ocean surface wind speed were rederived to be consistent with the v3.1 L1 calibration. The method used for deriving the GMFs is the same as for v3.0. A new correction has been added to both the Fully Developed Seas (FDS) and Young Seas Limited Fetch (YSLF) wind speed products that is a function of the Significant Wave Height (SWH) of the ocean surface. The correction is based on an observed correlation between the wind speed error and SWH. The SWH value used by the correction algorithm is the ERA5 reanalysis product, coincident in space and time with a CYGNSS measurement. The FDS and YSLF retrieval algorithms are otherwise the same as v3.0.
  <br>

  #### CYGNSS_L3_CDR_V1.0
  This dataset contains the Version 1.0 CYGNSS Level 3 Climate Data Record which provides the average wind speed and mean square slope (MSS) on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. The Level 2 Delay Doppler Map (DDM) data are used in the direct processing of the average wind speed and MSS data that are binned on the Level 3 grid. A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. A single netCDF-4 data file is produced for each day of operation with an approximate 2 month latency. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). The Version 1.0 CDR represents the first climate-quality release and is a collection of reanalysis products derived from the SDR v2.1 Level 1 data. Calibration accuracy and long term stability are improved relative to the SDR v2.1 using a new trackwise correction algorithm which constrains the average value of the L1 data using MERRA-2 reanalysis wind speeds. Details of the algorithm are provided in the Trackwise Corrected CDR Algorithm Theoretical Basis Document. CDR Level 2 and 3 products (ocean surface wind speed, mean square slope, and latent and sensible heat flux) are generated from the CDR L1 data using the v2.1 SDR data processing algorithms. These products also exhibit improved calibration accuracy and stability over SDR v2.1. Trackwise correction is applied to the two primary CYGNSS L1 science data products the normalized bistatic radar cross section (NBRCS) and the leading edge slope of the Doppler-integrated delay waveform (LES). The correction compensates for variations in the transmit power level of the GPS signals measured by the CYGNSS bistatic radar receivers. The SDR v2.1 L1 algorithm assumes a constant GPS transmit power and variations in it can be misinterpreted as variations in the L1 data and in subsequent L2 science data products derived from them. The GPS constellation consists of several different satellite models (a.k.a. block types) and the level of transmit power variation differs between them. The more recent Block IIF models (which account for ~37% of the GPS constellation) have significantly larger variations than the older models and, for this reason, they have been screened out and not used to produce SDR v2.1 L2 or L3 science data products. Trackwise correction eliminates the need for this screening so CDR L2 and L3 data products now include Block IIF samples. It should be noted that the trackwise correction algorithm cannot be successfully applied to all SDR v2.1 L1 data so there is also some loss of samples that were present in SDR v2.1. Overall, there is a significant increase in sampling and improvement in spatial coverage with the CDR products.
  <br>

  #### CYGNSS_L3_CDR_V1.1
  This dataset contains the Version 1.1 CYGNSS Level 3 Climate Data Record which provides the average wind speed and mean square slope (MSS) on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. The Level 2 Delay Doppler Map (DDM) data are used in the direct processing of the average wind speed and MSS data that are binned on the Level 3 grid. A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. A single netCDF-4 data file is produced for each day of operation with an approximate 1 to 2 month latency. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). The Version 1.1 CDR is a collection of reanalysis products derived from the SDR v3.0 Level 1 data (https://doi.org/10.5067/CYGNS-L1X30 ). Calibration accuracy and long term stability are improved relative to SDR v3.0 (https://doi.org/10.5067/CYGNS-L3X30 ) using the same trackwise correction algorithm as was used by CDR v1.0 (https://doi.org/10.5067/CYGNS-L3C10 ), which was derived from SDR v2.1 Level 1 data (https://doi.org/10.5067/CYGNS-L1X21 ). Details of the algorithm are provided in the Trackwise Corrected CDR Algorithm Theoretical Basis Document. CDR Level 2 and 3 products (ocean surface wind speed, mean square slope, and latent and sensible heat flux) are generated from the CDR L1 data using the v3.0 SDR data processing algorithms. These products also exhibit improved calibration accuracy and stability over SDR v3.0. Trackwise correction is applied to the two primary CYGNSS L1 science data products, the normalized bistatic radar cross section (NBRCS) and the leading edge slope of the Doppler-integrated delay waveform (LES). The correction compensates for small errors in the Level 1 calibration, due e.g. to uncertainties in the GPS transmitting antenna gain patterns and the CYGNSS receiving antenna gain patterns. CDR v1.1 does not include a Young Seas with Limited Fetch (YSLF) wind speed product and investigators requiring wind speed measurements in and near the inner core of tropical cyclones should use the SDR v3.0 YSLF wind speed product. A YSLF wind speed product is omitted because the trackwise correction algorithm, which constrains the average value of the L1 data using MERRA-2 reanalysis wind speeds, is inherently biased toward fully developed sea state conditions. The constraint improves wind speed retrieval performance in fully developed seas but produces underestimates in YSLF conditions. It should also be noted that the trackwise correction algorithm cannot be successfully applied to all SDR v3.0 L1 data so there is also some loss of samples that were present in SDR v3.0.
  <br>

  #### CYGNSS_L3_CDR_V1.2
  This dataset contains the Version 1.2 CYGNSS Level 3 Climate Data Record which provides the average wind speed and mean square slope (MSS) on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. The Level 2 Delay Doppler Map (DDM) data are used in the direct processing of the average wind speed and MSS data that are binned on the Level 3 grid. A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. A single netCDF-4 data file is produced for each day of operation with an approximate 5 days latency. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). The Version 1.2 CDR is a collection of reanalysis products derived from the SDR v3.1 Level 1 data (https://doi.org/10.5067/CYGNS-L1X31 ). Calibration accuracy and long term stability are improved relative to SDR v3.1 (https://doi.org/10.5067/CYGNS-L3X31 ) using the same trackwise correction algorithm as was used by CDR v1.1 (https://doi.org/10.5067/CYGNS-L3C11 ), which was derived from SDR v3.0 Level 1 data (https://doi.org/10.5067/CYGNS-L1X30 ). Details of the algorithm are provided in the Trackwise Corrected CDR Algorithm Theoretical Basis Document. CDR Level 2 and 3 products (ocean surface wind speed, mean square slope, and latent and sensible heat flux) are generated from the CDR L1 data using the v3.1 SDR data processing algorithms. These products also exhibit improved calibration accuracy and stability over SDR v3.1. Trackwise correction is applied to the two primary CYGNSS L1 science data products, the normalized bistatic radar cross section (NBRCS) and the leading edge slope of the Doppler-integrated delay waveform (LES). The correction compensates for small errors in the Level 1 calibration, due e.g. to uncertainties in the GPS transmitting antenna gain patterns and the CYGNSS receiving antenna gain patterns. It should be noted that the trackwise correction algorithm cannot be successfully applied to all SDR v3.1 L1 data so there is also some loss of samples that were present in SDR v3.1.
  <br>

  #### CYGNSS_L3_MRG_NRT_V3.2
  This dataset contains the version 3.2 CYGNSS Level 3 Merged (MRG) Science Data Record Near Real Time (NRT) Storm Wind Speed derived from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. It combines CYGNSS storm-centric gridded (SCG) wind speeds, which are derived from the L2 Young Seas Limited Fetch (YSLF) winds for a region surrounding a given tropical cyclone (TC), with L2 Fully Developed Seas (FDS) winds away from the TC center on a 0.2x0.2 degree latitude by longitude equirectangular grid. <br><br> L3 MRG is a product which combines the L2 FDS and YSLF winds and eliminates the need to choose between them depending on sea state development and the proximity to storms. The data are provided in netCDF-4 format and starts from the June 11, 2024 through the present with an approximate latency between 2 and 24 hours . A tapered weighted averaging scheme is used centered on the 34-knot wind radius (R34) of the storm. The R34 value in each storm quadrant is also reported. The algorithm produces global (+/- 40 deg latitude) wind speeds reported on a 0.1x0.1 deg grid every 6 hours for each tropical cyclone, although some 6-hourly increments may be missing if there are an insufficient number of satellite overpasses of the storm during that time interval. The netCDF files are output on a storm-by-storm basis. <br><br> The CYGNSS is a NASA Earth System Science Pathfinder Mission that is intended to collect the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. This inclination allows CYGNSS to measure ocean surface winds between approximately 38° N and 38° S latitude. This range includes the critical latitude band for tropical cyclone formation and movement
  <br>

  #### CYGNSS_L3_MRG_NRT_V3.2.1
  This dataset contains the version 3.2.1 CYGNSS Level 3 Merged (MRG) Science Data Record Near Real Time (NRT) Storm Wind Speed derived from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. It combines CYGNSS storm-centric gridded (SCG) wind speeds, which are derived from the L2 Young Seas Limited Fetch (YSLF) winds for a region surrounding a given tropical cyclone (TC), with L2 Fully Developed Seas (FDS) winds away from the TC center on a 0.2x0.2 degree latitude by longitude equirectangular grid. <br><br> L3 MRG is a product which combines the L2 FDS and YSLF winds and eliminates the need to choose between them depending on sea state development and the proximity to storms. The data are provided in netCDF-4 format and starts from the September 1, 2024 through the present with an approximate latency between 2 and 24 hours. A tapered weighted averaging scheme is used centered on the 25 m/s wind radius of the storm. The 34 knot wind radius (R34) algorithm has been updated for v3.2.1 release to center around the National Hurricane Center or the Joint Typhoon Warning Center (NHC/JTWC) reported storm center instead of the CYGNSS Vmax location The algorithm produces global (+/- 40 deg latitude) wind speeds reported on a 0.1x0.1 deg grid every 6 hours for each tropical cyclone, although some 6-hourly increments may be missing if there are an insufficient number of satellite overpasses of the storm during that time interval. The netCDF files are output on a storm-by-storm basis. <br><br> The CYGNSS is a NASA Earth System Science Pathfinder Mission that is intended to collect the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. This inclination allows CYGNSS to measure ocean surface winds between approximately 38° N and 38° S latitude. This range includes the critical latitude band for tropical cyclone formation and movement.
  <br>

  #### CYGNSS_L3_MRG_NRT_V3.2.2
  CYGNSS_L3_MRG_NRT_V3.2.2 This dataset contains the Near Real Time (NRT) version of the 3.2.2 CYGNSS Level 3 Merged (MRG) Science Data Record Wind Speed which combines CYGNSS storm-centric gridded (SCG) wind speeds, which are derived from the L2 Young Seas Limited Fetch (YSLF) winds for a region surrounding a given tropical cyclone (TC), with L3 Fully Developed Seas (FDS) winds away from the TC center. The L3 MRG wind speeds are obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation and provided on a 0.1x0.1 degree latitude by longitude equirectangular grid. The NRT version of the L3 MRG product is intended to provide operational guidance via reduced latency compared to the standard CYGNSS L3 MRG product. In order to support this goal, as of v3.2.2 the averaging window has been reduced from the standard L3 MRG +/-6 hour window to +/-3 hours. <br><br> The L3 MRG product was developed to eliminate the need to choose between the FDS and YSLF winds depending on sea state development and the proximity to storms by providing a product that merges winds in areas of YSLF and FDS conditions into a single wind field. The L3 MRG NRT data are provided in netCDF-4 format and will extend from the 2025 storm season through the present with an approximate latency between 2 and 24 hours, compared to an approximately 6 day latency for the standard product. A tapered weighted averaging scheme is used for the merging, centered on the 25 m/s wind radius of the storm. The algorithm produces global (+/- 40 deg latitude) wind speeds reported on a 0.1x0.1 deg grid using wind speeds collected over a 6 hour window, centered 3 hours back from the most recent sample in the wind field. In contrast to the standard L3 MRG product, the NRT netCDF files are output for a single time. New files are produced for a storm as more recent data becomes available instead of a single file containing all the available wind fields over a storm’s lifecycle. Changes from the previous v3.2.1 version include a new algorithm for determining the 34-knot wind radii and the inclusion of 50-knot wind radii. Additionally, the 'epoch time' variable is now reported in 'seconds since' the epoch instead of 'hours since' the epoch. This change enables us to capture the exact timing of the L3 MRG Near Real Time (NRT) version time steps with full precision. <br><br> The CYGNSS is a NASA Earth System Science Pathfinder Mission that is intended to collect the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. This inclination allows CYGNSS to measure ocean surface winds between approximately 38° N and 38° S latitude. This range includes the critical latitude band for tropical cyclone formation and movement.
  <br>

  #### CYGNSS_L3_MRG_V3.2
  This dataset contains the version 3.2 CYGNSS level 3 science data record merged storm (MRG) wind speed which combines CYGNSS storm-centric gridded (SCG) wind speeds, which are derived from the L2 YSLF winds for a region surrounding a given tropical cyclone (TC), with L3 FDS winds away from the TC center on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. <br><br> L3 MRG is a new product which combines the L2 FDS and Young Seas Limited Fetch (YSLF) winds and eliminates the need to choose between them depending on sea state development and the proximity to storms. The data are provided in netCDF-4 format and extend from 1 August 2018 to the present with an approximate 6 day latency. A tapered weighted averaging scheme is used centered on the 34-knot wind radius (R34) of the storm. The R34 value in each storm quadrant is also reported. The algorithm produces global (+/- 40 deg latitude) wind speeds reported on a 0.1x0.1 deg grid every 6 hours for each tropical cyclone, although some 6-hourly increments may be missing if there are an insufficient number of satellite overpasses of the storm during that time interval. The netcdf files are output on a storm-by-storm basis.<br><br> The CYGNSS is a NASA Earth System Science Pathfinder Mission that is intended to collect the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. This inclination allows CYGNSS to measure ocean surface winds between approximately 38° N and 38° S latitude. This range includes the critical latitude band for tropical cyclone formation and movement.
  <br>

  #### CYGNSS_L3_MRG_V3.2.1
  This dataset contains the version 3.2.1 CYGNSS level 3 science data record merged storm (MRG) wind speed which combines CYGNSS storm-centric gridded (SCG) wind speeds, which are derived from the L2 Young Seas Limited Fetch (YSLF) winds for a region surrounding a given tropical cyclone (TC), with L3 Fully Developed Seas (FDS) winds away from the TC center on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. <br><br> L3 MRG combines the L2 FDS and Young Seas Limited Fetch (YSLF) winds and eliminates the need to choose between them depending on sea state development and the proximity to storms. The data are provided in netCDF-4 format and extend from 1 August 2018 to the present with an approximate 6 day latency. A tapered weighted averaging scheme is used centered on the 25 m/s wind radius of the storm. The 34 knot wind radius (R34) algorithm has been updated for v3.2.1 release to center around the National Hurricane Center or the Joint Typhoon Warning Center (NHC/JTWC) reported storm center instead of the CYGNSS Vmax location. The algorithm produces global (+/- 40 deg latitude) wind speeds reported on a 0.1x0.1 deg grid every 6 hours for each tropical cyclone, although some 6-hourly increments may be missing if there are an insufficient number of satellite overpasses of the storm during that time interval. The netCDF files are output on a storm-by-storm basis. <br><br> The CYGNSS is a NASA Earth System Science Pathfinder Mission that is intended to collect the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. This inclination allows CYGNSS to measure ocean surface winds between approximately 38° N and 38° S latitude. This range includes the critical latitude band for tropical cyclone formation and movement.
  <br>

  #### CYGNSS_L3_MRG_V3.2.2
  This dataset contains the version 3.2.2 CYGNSS level 3 science data record merged storm (MRG) wind speed which combines CYGNSS storm-centric gridded (SCG) wind speeds, which are derived from the L2 Young Seas Limited Fetch (YSLF) winds for a region surrounding a given tropical cyclone (TC), with L3 Fully Developed Seas (FDS) winds away from the TC center on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. <br><br> L3 MRG combines the L2 FDS and Young Seas Limited Fetch (YSLF) winds and eliminates the need to choose between them depending on sea state development and the proximity to storms. The data are provided in netCDF-4 format and extend from 1 August 2018 to the present with an approximate 6 day latency. A tapered weighted averaging scheme is used centered on the 25 m/s wind radius of the storm. The 34 knot wind radius (R34) algorithm was updated for the v3.2.1 release to center around the National Hurricane Center or the Joint Typhoon Warning Center (NHC/JTWC) reported storm center instead of the CYGNSS Vmax location. The algorithm produces global (+/- 40 deg latitude) wind speeds reported on a 0.1x0.1 deg grid every 6 hours for each tropical cyclone, although some 6-hourly increments may be missing if there are an insufficient number of satellite overpasses of the storm during that time interval. The netCDF files are output on a storm-by-storm basis. <br><br> The CYGNSS is a NASA Earth System Science Pathfinder Mission that is intended to collect the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. This inclination allows CYGNSS to measure ocean surface winds between approximately 38° N and 38° S latitude. This range includes the critical latitude band for tropical cyclone formation and movement.
  <br>

  #### CYGNSS_L3_MICROPLASTIC_V3.2
  The CYGNSS L3 Ocean Microplastic Concentration V3.2 dataset is provided by the CYGNSS Science Team of the University of Michigan. CYGNSS was launched on 15 December 2016, it is a NASA Earth System Science Pathfinder Mission that was launched with the purpose of collecting the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Originally made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. <br><br> This dataset contains the version 3.2 CYGNSS Level 3 ocean microplastic concentration data record, which provides daily netCDF files, each file containing a gridded map of microplastic number density (#/km^2). Microplastic concentration number density is indirectly estimated by an empirical relationship between ocean surface roughness and wind speed (Evans and Ruf, 2021). User caution is advised in regions containing independent, non-correlative factors affecting ocean surface roughness, such as anomalous atmospheric conditions within the Intertropical Convergence Zone, biogenic surfactants (such as algal blooms), oil spills, etc. This product reports microplastic concentration on a daily temporal and 0.25-degree latitude/longitude spatial grid with 30-day, 1 degree latitude/longitude feature resolution, as constrained by the binning and spatial temporal averaging of the Mean Square Slope (MSS) anomaly (i.e., difference between measured and predicted ocean surface roughness for a given wind speed). Version 3.2 uses CYGNSS MSS measurements that are derived from updated v3.2 Level 1 scattering cross section data and has updated the parameterizations in the data processing algorithm to use v3.2 data correctly.
  <br>

  #### CYGNSS_L3_V2.1
  This dataset contains the Version 2.1 CYGNSS Level 3 Science Data Record which provides the average wind speed and mean square slope (MSS) on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. The Level 2 Delay Doppler Map (DDM) data are used in the direct processing of the average wind speed and MSS data that are binned on the Level 3 grid. A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. A single netCDF-4 data file is produced for each day of operation with an approximate 6 day latency. This version supersedes Version 2.0. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). The Version 2.1 release represents the second science-quality release. Here is a summary of improvements that reflect the quality of the Version 2.1 data release: 1) first time availability of wind speeds using the Geophysical Model Function (GMF) calibrated for Young Seas with Limited Fetch (YSLF) conditions; 2) inherits all other improvements made to the version 2.1 Level 2 data intended to improve the quality of the wind speed retrievals and uncertainty estimates. For a full list of improvements to the version 2.1 Level 2 data, please refer to the following dataset information page: https://podaac.jpl.nasa.gov/dataset/CYGNSS_L2_V2.1
  <br>

  #### CYGNSS_L3_V3.0
  This dataset contains the Version 3.0 CYGNSS Level 3 Science Data Record which provides the average wind speed and mean square slope (MSS) on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. The Level 2 Delay Doppler Map (DDM) data are used in the direct processing of the average wind speed and MSS data that are binned on the Level 3 grid. A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. A single netCDF-4 data file is produced for each day of operation with an approximate 6 day latency. This version supersedes Version 2.1; https://doi.org/10.5067/CYGNS-L3X21. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). The Version 3.0 release inherits all improvements made to the version 3.0 Level 2 data intended to improve the quality of the wind speed retrievals. For a full list of improvements to the version 3.0 Level 2 data, please refer to: https://doi.org/10.5067/CYGNS-L2X30.
  <br>

  #### CYGNSS_L3_V3.1
  This dataset contains the Version 3.1 CYGNSS Level 3 Science Data Record which provides the average wind speed and mean square slope (MSS) on a 0.2x0.2 degree latitude by longitude equirectangular grid obtained from the Delay Doppler Mapping Instrument aboard the CYGNSS satellite constellation. The Level 2 Delay Doppler Map (DDM) data are used in the direct processing of the average wind speed and MSS data that are binned on the Level 3 grid. A subset of DDM data used in the direct processing of the average wind speed and MSS is co-located inside of the Level 2 data files. A single netCDF-4 data file is produced for each day of operation with an approximate 6 day latency. This version supersedes Version 3.0; https://doi.org/10.5067/CYGNS-L3X30. The reported sample locations are determined by the specular points corresponding to the Delay Doppler Maps (DDMs). The Version 3.1 release inherits all improvements made to the version 3.1 Level 2 data intended to improve the quality of the wind speed retrievals. For a full list of improvements to the version 3.1 Level 2 data, please refer to: https://doi.org/10.5067/CYGNS-L2X31.
  <br>

  #### CYGNSS_L3_SOIL_MOISTURE_V3.2
  The CYGNSS Level 3 Soil Moisture V3.2 dataset is provided by the CYGNSS Science Team of the University of Michigan. It estimates volumetric water content for soils between 0-5 cm depth at a 6-hour discretization for most of the subtropics from the V3.2 reflectivity measurements provided in the CYGNSS L1 SDR dataset (https://doi.org/10.5067/CYGNS-L1X32). CYGNSS was launched on 15 December 2016, it is a NASA Earth System Science Pathfinder Mission that was launched with the purpose of collecting the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Originally made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. <br><br> The soil moisture retrieval algorithm is an update of the previous version developed by UCAR-CU using a linear regression of CYGNSS angle-normalized effective surface reflectivity trained against collocated SMAP soil moisture during the calibration period 8/1/2018 to 11/15/2023. The data are archived in daily files in netCDF-4 format. Volumetric soil moisture water content in units of cm3/cm3 is provided with two gridding resolutions, 9x9 km and 36x36 km. The variable SM_subdaily contains data reported in six hour intervals. The variable SM_daily provides a daily average. The time series covers the period from August 2018 to present.
  <br>

  #### CYGNSS_L3_S1.0
  This dataset contains the Version 1.0 Cyclone Global Navigation Satellite System (CYGNSS) Level 3 Storm Centric Grid (SCG) Science Data Record (SDR) which provides the average wind speed combined from aggregated wind speed measurements made by the entire CYGNSS constellation whose specular points are located near a storm of interest in latitude, longitude and time. Data are provided on both a 0.1x0.1 degree latitude by longitude equirectangular grid and storm centric coordinates obtained from the Delay Doppler Mapping Instrument (DDMI) aboard the CYGNSS satellite constellation. Storm centric coordinates are derived from the National Hurricane Center (NHC) Best Track dataset to produce a 6 hourly wind speed averaging window. A single netCDF-4 data file is produced for each storm. Each storm is uniquely identified by the year, storm basin, and a storm number. This dataset is intended for historical storm analysis, and as such, this dataset is periodically updated based on the availability of the NHC Best Track storm center information that is typically made available in April for the previous year's hurricane season. SCG files are produced for named storms, as defined by the NHC, that reach hurricane strength (i.e., having a maximum sustained wind speed of at least 65 knots). Due to the dependency on NHC Best Track data, the SCG files produced in this dataset are confined to storms in the Northern Hemisphere within the North Atlantic and East Pacific ocean regions. Wind speed inputs are provided by the CYGNSS Level 2 SDR Version 3.0 (https://doi.org/10.5067/CYGNS-L2X30 ).
  <br>

  #### CYGNSS_NOAA_L2_SWSP_25KM_V1.2
  This dataset contains the Version 1.2 NOAA CYGNSS Level 2 Science Wind Speed Product Version 1.2 which provides the time-tagged and geolocated average wind speed (m/s) in 25x25 kilometer grid cells along the measurement tracks from the Delay Doppler Mapping Instrument (DDMI) aboard the CYGNSS satellite constellation. This version corresponds to the second science-quality released through the PO.DAAC, as produced by NOAA/NESDIS using a specific geophysical model function (GMF version 1.0) and a track-wise debiasing algorithm as part of the wind speed retrieval process. The reported retrieval locations are determined by averaging the specular point locations falling within each 25 km grid cell. Version 1.2 includes four major updates compared to Version 1.1 ( https://doi.org/10.5067/CYGNN-22511 ), namely: 1) the inclusion of data associated to a spacecraft roll angle exceeding +/- 5 degrees; 2) an improved wind speed performance in the higher wind speed regime; 3) a full revision of the quality flags; 4) the inclusion of a wind speed retrieval error variable. Only one netCDF-4 data file is produced for each day (each file containing data from up to 8 unique CYGNSS spacecraft) with a latency of approximately 6 days (or better) from the last recorded measurement time. Formatting of the data variables and metadata designed to be consistent with the netCDF-4 formatting provided by the legacy CYGNSS mission Level 2 wind speed science data record (SDR).
  <br>

  #### RONGOWAI_L1_SDR_V1.0
  The Rongowai Level 1 Science Data Record Version 1.0 dataset is generated by the University of Auckland (UoA) Rongowai Science Payloads Operations Centre in New Zealand. This initiative is supported by NASA and the New Zealand Space Agency. The data collection process is conducted using the Next-generation receiver (NgRx) mounted on the Air New Zealand domestic aircraft Q300.<br><br> This Level 1 (L1) dataset contains the Version 1.0 geo-located Delay Doppler Maps (DDMs) calibrated into Power Received (Watts) and Bistatic Radar Cross Section (BRCS) expressed in units of meters squared from the Delay Doppler Mapping Instrument onboard an Air New Zealand domestic Q300 (tail number ZK-NFA). 20 DDMs are contained within a typical L1 netcdf corresponding to 10 Left-Hand-Circularly Polarized (LHCP) and 10 Right-Hand-Circularly Polarized (RHCP) channels. Other useful scientific and engineering measurement parameters include the co- and cross-polarized Normalized Bistatic Radar Cross Section (NBRCS) of the specular point, the Leading Edge Slope (LES) of the integrated delay waveform and the normalized waveforms. The L1 dataset contains a number of other engineering and science measurement parameters, including coherence detection and a coherence state metric, sets of quality flags/indicators, error estimates, Fresnel-zone geometry estimates (and thereby the estimated per-sample spatial resolution) as well as a variety of timekeeping, and geolocation parameters. Each netCDF data files corresponds to a single flight between airports within New Zealand (flight durations typically range between 45 min and 1hr 30min with a median of 7 flights/day) and measurements are reported at 1 second increments. Latency is approximately 1 days (or better) from the last recorded measurement time.
  <br>

  #### CYGNSS_L3_UC_BERKELEY_WATERMASK_DAILY_V3.2
  The CYGNSS Level 3 UC Berkeley Watermask Record Version 3.2 was developed by CYGNSS investigators in the Department of Civil and Environmental Engineering at the University of California, Berkeley. CYGNSS was launched on 15 December 2016, it is a NASA Earth System Science Pathfinder Mission that was launched with the purpose of collecting the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Originally made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. <br><br> This dataset is derived from version 3.2 of the CYGNSS L1 SDR dataset (<href>https://doi.org/10.5067/CYGNS-L1X32</href>). This is an update from the previous watermask monthly product (<href>https://doi.org/10.5067/CYGNS-L3W31</href>) which derived from the CYGNSS L1 SDR v3.1 (<href>https://doi.org/10.5067/CYGNS-L1X31</href>). The new product provides daily binary inland surface water classification data at a 0.01-degree (~1x1 kilometer) resolution with an approximate 6-day latency. The algorithm utilized data from up to 30 days prior to generate the daily map. This product, known as the UC Berkeley Random Walk Algorithm WaterMask from CYGNSS (Berkeley-RWAWC), generates water classification for a given location based on CYGNSS observations combined with a random walker algorithm. The watermask variable includes binary values indicating land (0), surface water (1), and no data/ocean (-99). The data product is archived in daily files in netCDF-4 format and covers the period from September 2018 to present. <br><br> This product is recommended for operational use. For science applications, we recommend the use of the Berkeley-RWAWC monthly product instead: https://podaac.jpl.nasa.gov/dataset/CYGNSS_L3_UC_BERKELEY_WATERMASK_V3.1 Note that the daily product consist of maps constructed using the most recent 31 days of data to rapidly capture surface water dynamics without relying on historical data. While the oldest data within this 31 day-period is weighted less and replaced by newer observations as they become available, extreme flood events may still be detected with a delay due to the incorporation of prior days’ data into the algorithm. The incorporation of older data is necessary to maintain the spatial scale.
  <br>

  #### CYGNSS_L3_UC_BERKELEY_WATERMASK_V3.1
  The CYGNSS Level 3 UC Berkeley Watermask Record Version 3.1 was developed by CYGNSS investigators in the Department of Civil and Environmental Engineering at the University of California, Berkeley. CYGNSS was launched on 15 December 2016, it is a NASA Earth System Science Pathfinder Mission that was launched with the purpose of collecting the first frequent space‐based measurements of surface wind speeds in the inner core of tropical cyclones. Originally made up of a constellation of eight micro-satellites, the observatories provide nearly gap-free Earth coverage using an orbital inclination of approximately 35° from the equator, with a mean (i.e., average) revisit time of seven hours and a median revisit time of three hours. <br><br> This dataset is derived from version 3.1 of the CYGNSS L1 SDR dataset (https://doi.org/10.5067/CYGNS-L1X31), and provides monthly binary inland surface water classification data at a 0.01-degree (~1x1 kilometer) resolution with a 1-month latency. This product, known as the UC Berkeley Random Walk Algorithm WaterMask from CYGNSS (Berkeley-RWAWC), generates water classification for a given location based on CYGNSS observations combined with a random walker algorithm. The watermask variable includes binary values indicating land (0), surface water (1), and no data/ocean (-99). The data product is archived in monthly files in netCDF-4 format and covers the period from August 2018 to present.
  <br>

  #### CYGNSS_L3_SOIL_MOISTURE_V1.0
  The CYGNSS Level 3 Soil Moisture Product provides volumetric water content estimates for soils between 0-5 cm depth at a 6-hour discretization for most of the subtropics. The data were produced by CYGNSS investigators at the University Corporation for Atmospheric Research (UCAR) and the University Colorado at Boulder (CU), and derive from version 2.1 of the CYGNSS L1 SDR. The soil moisture algorithm uses collocated soil moisture retrievals from SMAP to calibrate CYGNSS observations from the same day. For a given location, a linear relationship between the SMAP soil moisture and CYGNSS reflectivity is determined and used to transform the CYGNSS observations into soil moisture. The data are archived in daily files in netCDF-4 format. Two soil moisture variables report the volumetric water content in units of cm3/cm3. The variable SM_subdaily includes up to four soil moisture estimates per day. Another variable SM_daily provides a daily average. The time series covers the period from March 2017 to present.
  <br>

