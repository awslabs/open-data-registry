Name: Multi-Anatomy Post-Surgical Magnetic Resonance Dataset (MAPSMR)
Description: The MAPSMR dataset is a multi-organ, post-surgical MRI benchmark dataset 
  focused on organ absence and altered anatomy after common abdominal and pelvic surgeries. 
  The dataset includes cases such as cholecystectomy, prostatectomy, nephrectomy, colectomy, hepatectomy, 
  and related procedures, with annotations identifying surgically absent organs and post-treatment anatomical changes. 
Documentation: https://github.com/fastestimator/gehcai-mapsmr
