Name: City of Jacksonville Compound Flood Model Data
Description: |
  Geographic (land cover, land elevation, etc.), meteorologic (precipitation, wind, etc.), hydrodynamic (water surface elevations), and built environment (floodwalls, structures, culverts) data used as inputs to and
  outputs from numerical modeling software for the prediction of flood risk in probabilistic frameworks. The input data was collected from open sources, such as from the National Oceanographic and Atmospheric Administration (NOAA), US Army Corps of Engineers (USACE) or the
  United States Geological Survey (USGS). The format of these input data is modified to suit the needs of the modeling program and software, and then used to predict flooding in Duval County across a range of scenarios. The modeling software used to predict
  flooding which utilizes and creates this data is freely available from the United States Army Corps of Engineers Hydrologic Engineering Center’s River Analysis System (HEC-RAS). The data stored is not all in the format needed by the modeling program and software. This data has been optimized for efficient cloud storage and dissemination. The data can be repurposed for inputs to the modeling program and software after download.

  **This data is made public by the City of Jacksonville for the benefit of its citizens.**
  
  This flood prediction data can be used by federal, state, and local decision makers as well as private citizens to assess the flood risk they face and make sound science-based decisions for response and adaptation.
