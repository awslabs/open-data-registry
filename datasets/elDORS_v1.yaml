---
Name: elDORS (v1) Database
Description: |
  The elDORS (elevalted Database of RNA Sequences) database provides a massive-scale, 
  updated repository of RNA sequence data curated from diverse genomic, non-coding RNA, 
  and metagenomic sources. Following a rigorous hierarchical redundancy removal workflow, 
  the dataset features two distinct tiers: the baseline elDORS_raw database (elDORS_raw_v1) containing 
  1.91 billion sequences, and a clustered and optimized elDORS version (elDORS_v1) containing 1.32 billion sequences 
  (clustered at 80% sequence identity and 80% overlap, keeping sequences between 10 and 4096 nucleotides). 
  To bypass severe network bottlenecks, the database is distributed in raw chunked formats, 
  compressed archives, and pre-indexed pipeline builds optimized for immediate drop-in compatibility 
  with deep RNA alignment tools like rMSA and the RNAcmap3-elDORS pipeline.

