Resources:
  - Description: |
      The complete elDORS v1 S3 bucket organized into four distinct database formats:
      1. Raw Sequence Distribution (/elDORS_v1_raw) - 1.2 TB baseline unclustered FASTA format sequence database.
      2. Compressed Archive (/GZIPPED_elDORS_v1) - elDORS (clustered at 80% identity, 80% sequence overlap, and filtering for length (10 to 4096), the optimized database contains 1.32 billion sequences (582 GB unzipped FASTA), 170 GB sequence-aware ~9GB chunks 
      3. rMSA-Optimized Build (/rMSA_optimized_elDORS) - 1.0 TB uncompressed FASTA and BLAST format files optimized for using the database with rMSA ().
      4. RNAcmap3-Optimized Build (/RNAcmap3_optimized_elDORS) - 861 GB multi-volume BLAST and FASTA format files optimized for RNAcmap3-elDORS split-strategy pipeline.
