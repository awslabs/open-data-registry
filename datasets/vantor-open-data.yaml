Name: Vantor Open Data Program
Description: |
  Pre and post event high-resolution satellite imagery in support of emergency planning, risk assessment, 
  monitoring of staging areas and emergency response, damage assessment, and recovery. These images are generated
  as full-strip COGs instead of the tiling system used by the previous Maxar Open Data images.
Documentation: https://www.vantor.com
Contact: https://vantor.com
UpdateFrequency: New data is released in response to activations. Older data may be migrated to match this format as needed.
Collabs:
  ASDI:
    Tags:
      - disaster response
