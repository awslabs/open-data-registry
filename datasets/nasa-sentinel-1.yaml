Name: NASA sentinel-1 Project
Description: |
  This data set contains annual surface melt onset and freeze onset dates across all glaciers in the Hindu Kush Himalayas (HKH) retrieved from time series synthetic aperture radar (SAR) imagery. The data set was based on analysis of C-band Sentinel-1 A/B SAR time series, comprising 32,741 Sentinel-1 A/B SAR images. The duration of annual glacier surface melt was determined for 105,432 mapped glaciers (83,102 km2 glacierized area) during the calendar years 2017-2020.
  <br>

  #### NSIDC-0720
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, provides annual maps of Antarctic ice velocity. The maps are assembled using SAR data from the Japanese Space Agency's (JAXA) ALOS PALSAR, the European Space Agency's (ESA) ENVISAT ASAR and Copernicus Sentinel-1, the Canadian Space Agency's (CSA) RADARSAT-1, RADARSAT-2, the German Aerospace Agency's (DLR) TerraSAR-X (TSX) and TanDEM –X (TDX), and the U.S. Geological Survey's (USGS) Landsat-8 optical imagery.. See <a href="https://nsidc.org/data/measures/aiv">Antarctic Ice Sheet Velocity and Mapping Data</a> for related data.
  <br>

  #### NSIDC-0642
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, consists of annual, digitized (polyline) ice front positions for 239 outlet glaciers in Greenland. Ice front positions are derived from Sentinel-1A, Sentinel-1B, and RADARSAT-1 synthetic aperture radar (SAR) mosaics, plus imagery from Landsat 1 through Landsat 5 and Landsat 7 and Landsat 8. Although temporal coverage varies by glacier, data are available for the winter seasons 1972–1973 through 2020–2021. Data are provided as shapefiles. See <a href="http://nsidc.org/data/measures/gimp">Greenland Ice Mapping Project (GrIMP)</a> for related data.
  <br>

  #### NSIDC-0766
  This data set contains 6 and 12 day surface velocity estimates for the Greenland Ice Sheet and periphery derived from images acquired between 2015–2021 by the European Space Agency (ESA) Copernicus Sentinel-1A and Sentinel-1B satellites.
  <br>

  #### NSIDC-0766
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, contains 6 and 12 day surface velocity estimates for the Greenland Ice Sheet and periphery. Velocities are derived from images acquired by the European Space Agency (ESA) Copernicus Sentinel-1A and Sentinel-1B satellites. See <a href="http://nsidc.org/grimp">Greenland Ice Mapping Project (GrIMP)</a> for related data sets.
  <br>

  #### NSIDC-0725
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, contains annual ice velocity mosaics for the Greenland Ice Sheet. Velocities are derived from synthetic aperture radar (SAR) data, obtained by TerraSAR-X/TanDEM-X and Sentinel-1A and -1B, and from optical imagery acquired by Landsat 8 and Landsat 9. See <a href="http://nsidc.org/data/measures/gimp">Greenland Ice Mapping Project (GrIMP)</a> for related data.
  <br>

  #### NSIDC-0478
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, contains seasonal (winter) ice sheet-wide velocity maps for Greenland. The maps are derived from Interferometric Synthetic Aperture Radar (InSAR) data obtained by the Canadian Space Agency's (CSA) RADARSAT-1, the Japan Aerospace Exploration Agency's (JAXA) Advanced Land Observation Satellite (ALOS), and the German Aerospace Center's (DLR) TerraSAR-X/TanDEM-X (TSX/TDX) satellites, as well as from the European Space Agency's (ESA) C-band Synthetic Aperture Radar data from Copernicus Sentinel-1A and -1B. See <a href="http://nsidc.org/data/measures/gimp">Greenland Ice Mapping Project (GIMP)</a> for related data.
  <br>

  #### NSIDC-0723
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, consists of 6-day and 12-day 50 m resolution image mosaics of the Greenland coastline and ice sheet periphery. The mosaics are derived from C-band Synthetic Aperture Radar (C-SAR) acquired by the Copernicus Sentinel-1A, -1B, and -1C satellites. See <a href="http://nsidc.org/grimp">Greenland Ice Mapping Project (GrIMP)</a> for related data sets.
  <br>

  #### NSIDC-0731
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, contains monthly ice velocity mosaics for the Greenland Ice Sheet. The data are derived from Synthetic Aperture Radar (SAR) data, obtained by TerraSAR-X/TanDEM-X and Sentinel-1A and -1B, and from optical imagery acquired by Landsat 8 and Landsat 9. See <a href="http://nsidc.org/grimp">Greenland Ice sheet Mapping Project (GrIMP)</a> for related data.
  <br>

  #### NSIDC-0727
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, contains quarterly (three-month interval) ice velocity mosaics for the Greenland Ice Sheet. This data set is derived from Synthetic Aperture Radar (SAR) data, obtained by TerraSAR-X/TanDEM-X and Sentinel-1A and -1B, and from optical imagery acquired by Landsat 8 and Landsat 9. See <a href="https://nsidc.org/grimp">Greenland Ice sheet Mapping Project (GrIMP)</a> for related data.
  <br>

  #### NSIDC-0778
  This data set provides a comprehensive map for the Antarctic Ice Sheet of the short-term zone of migration of the ice grounding line (i.e., the transition boundary between grounded ice and ice floating in the ocean waters) for the given period, due to changes in oceanic tide. This variation is represented by polylines that indicate the upstream and downstream bounds in the grounding line variation for a given year. The data are derived using an automated machine learning algorithm to delineate thousands of grounding lines in interferometric synthetic aperture radar (InSAR) data acquired by Sentinel-1 A/B, supplemented by data from COSMO SkyMed, RADARSAT-2, and European Remote Sensing (ERS) satellites.
  <br>

  #### NSIDC-0776
  This data set from the Inter-Mission Time Series of Land Ice Velocity and Elevation (ITS_LIVE) project, part of NASA's Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, consists of regionally compiled, mean annual surface velocities, plus climatological means, for major glacier-covered regions. Velocities are derived from imagery acquired by the Sentinel-1 and Sentinel-2 and Landsat 4, 5, 7, 8, and 9 satellites. Data are available from 1985 to 2022, with nearly complete annual coverage provided after 2013.
  <br>

  #### NSIDC-0781
  This data set consists of sub-seasonal, digitized (polyline) ice front positions for 219 outlet glaciers in Greenland. For 199 glaciers, ice front positions are digitized at a monthly resolution. For 20 glaciers in northwestern Greenland, ice front positions are digitized at a 6-12 day resolution, depending on the availability of satellite imagery. Ice front positions are derived from Sentinel-1A and Sentinel-1B synthetic aperture radar (SAR) mosaics.
  <br>

  #### SPL2SMAP_S
  This Level-2 (L2) soil moisture product provides estimates of land surface conditions retrieved by both the Soil Moisture Active Passive (SMAP) radiometer during 6:00 a.m. descending and 6:00 p.m. ascending half-orbit passes and the Sentinel-1A and -1B radar. SMAP L-band brightness temperatures and Copernicus Sentinel-1 C-band backscatter coefficients are used to derive soil moisture data, which are then resampled to an Earth-fixed, cylindrical 3 km Equal-Area Scalable Earth Grid, Version 2.0 (EASE-Grid 2.0). While the 3 km data product has undergone validation, the 1 km product has not and should be used with caution.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
