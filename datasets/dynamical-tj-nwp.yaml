Name: TianJi Global-Regional Integrated Numerical Weather Prediction System Dataset (TJ-NWP)
Description: |
  The Tianji Global–Regional Integrated Numerical Weather Prediction System Dataset (TJ-NWP) provides high-resolution weather forecasts generated by a next-generation numerical weather prediction system developed by Tianji Weather based on the Super Dynamics on Cube (SD3) framework. The system integrates a cubed-sphere grid, non-hydrostatic dynamical core, heterogeneous computing architecture, and Global Free-Zoom technology, enabling seamless transition from ~12 km global forecasts to 5 km refined simulations over Asia without traditional nesting artifacts.
  TJ-NWP provides forecasts extending up to 45 days, with reliable predictive skill reaching approximately 10 days. It demonstrates strong performance in complex terrain, extreme weather events, and subseasonal forecasting. The system delivers a comprehensive suite of meteorological, land-surface, and environmental variables across global to regional scales, including temperature, wind, precipitation, tropical cyclone tracks, and dust concentration.
Documentation: https://github.com/Tianji-Weather/aws-opendata-docs/blob/main/tj-nwp-descriptive-documentation.md
Contact: For any questions regarding the dataset, please visit [tjweather website](https://www.tjweather.com/) or email us at contact@tjweather.com.
ManagedBy: "[Tianji Weather Science and Technology Company](https://www.tjweather.com/)"
