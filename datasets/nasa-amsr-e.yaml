Name: NASA amsr-e Project
Description: |
  These Level-3 Snow Water Equivalent (SWE) data sets contain SWE data and quality assurance flags mapped to Northern and Southern Hemisphere 25 km Equal-Area Scalable Earth Grids (EASE-Grids).
  <br>

  #### AE_SI12
  This Level-3 gridded product (AE_SI12) includes brightness temperatures at 18.7 through 89.0 GHz, sea ice concentration, and snow depth over sea ice.
  <br>

  #### AE_SI12
  This data set (AE_SI12) reports average daily, 12.5 km resolution, horizontally and vertically polarized brightness temperatures (Tb) at four frequencies—18.7 GHz, 23.8 GHz, 36.5 GHz and 89.0 GHz. It also reports: daily sea ice concentrations derived with the Enhanced NASA Team (NT2) algorithm; daily sea ice concentration differences between NT2 and the legacy AMSR Basic Bootstrap Algorithm (BBA); and daily snow depths over sea ice. Data are provided on Northern and Southern Hemisphere, polar stereographic grids. These data are derived from observations acquired by the Advanced Microwave Scanning Radiometer for EOS (AMSR-E).
  <br>

  #### AE_SI25
  This Level-3 gridded product (AE_SI25) includes brightness temperatures at 6.9 through 89.0 GHz and sea ice concentrations.
  <br>

  #### AE_SI25
  This data set (AE_SI25) reports average daily, 25 km resolution, horizontally and vertically polarized brightness temperatures (Tb) at six frequencies—6.9 GHz, 10.7 GHz, 18.7 GHz, 23.8 GHz, 36.5 GHz, and 89.0 GHz—plus sea ice concentrations and sea ice concentration differences between the Enhanced NASA Team (NT2) algorithm and the legacy AMSR Basic Bootstrap Algorithm (BBA). Data are provided on Northern and Southern Hemisphere, polar stereographic grids. These data are derived from observations acquired by the Advanced Microwave Scanning Radiometer for EOS (AMSR-E) on board the NASA Aqua satellite.
  <br>

  #### AE_SI6
  This Level-3 gridded product (AE_SI6) includes brightness temperatures at 89.0 GHz. Data are mapped to a polar stereographic grid at 6.25 km spatial resolution. This product is an intermediate product during processing of AMSR-E Level-3 sea ice products at 12.5 km and 25 km resolution.
  <br>

  #### AE_SI6
  This data set (AE_SI6) reports average daily, 6.25 km resolution, horizontally and vertically polarized brightness temperatures (Tbs) at 89.0 GHz. Data are provided on Northern and Southern Hemisphere, polar stereographic grids. Tbs are derived from observations acquired by the Advanced Microwave Scanning Radiometer for EOS (AMSR-E). This data set is created as an intermediate product while generating the AMSR E Level 3 12.5 km (AE_SI12) and 25 km (AE_SI25) sea ice products.
  <br>

  #### AE_SID
  This product provides 6.25 km sea ice drift grids for the Northern and Southern Hemispheres.
  <br>

  #### AE_DyOcn
  The Level-3 daily product (AE_DyOcn), weekly product (AE_WkOcn), and monthly product (AE_MoOcn) include SST, near-surface wind speed, columnar water vapor, and columnar cloud liquid water over oceans in a 0.25 degree by 0.25 degree grid, generated from AE_Ocean.
  <br>

  #### AE_Land3
  This gridded Level-3 land surface product (AE_Land3) includes daily measurements of surface soil moisture and vegetation/roughness water content interpretive information, as well as brightness temperatures and quality control variables. Ancillary data include time, geolocation, and quality assessment.
  <br>

  #### AMSREL1A
  AMSR-E Level-1A observation counts are processed from Level-0 science packet data by the Japan Aerospace Exploration Agency (JAXA) Earth Observation Center (EOC) in Japan.
  <br>

  #### AE_L2A
  The AMSR-E Level-2A product (AE_L2A) contains daily 50 minute half-orbit swath brightness temperatures for six channels ranging from 6.9 GHz through 89 GHz. Data are resampled to spatial resolutions ranging from 5.4 km to 56 km. Each file is packaged with geolocation and quality information as well as ancillary data.
  <br>

  #### AE_Ocean
  This daily Level-2B swath data set includes Sea Surface Temperature (SST), Near-Surface Wind Speed, Columnar Water Vapor, and Cloud liquid Water data arrays, and was used as input to generate the following daily, weekly, and monthly Level-3 gridded ocean products; AE_DyOcn, AE_WkOcn, and AE_MoOcn.
  <br>

  #### AE_Rain
  The AMSR-E/Aqua Level-2B precipitation product includes instantaneous surface precipitation rate and type over ice-free/snow-free land and ocean between 89.24 degrees north and south latitudes at at 10 km spatial resolution along the track and 5 km spatial resolution along the scan. The data are generated by the GPROF 2010 Version 2 algorithm using Version 3 of the AMSR-E Level-2A Brightness Temperatures.
  <br>

  #### AE_Rain
  The AMSR-E/Aqua Level-2B precipitation product includes instantaneous surface precipitation rate and type over ice-free/snow-free land and ocean between 89.24 degrees north and south latitudes at at 10 km spatial resolution along the track and 5 km spatial resolution along the scan. The data are generated by the GPROF 2017 algorithm using Version 4 of the AMSR-E Level-2A Brightness Temperatures.
  <br>

  #### AE_Land
  This Level-2B land surface product (AE_Land) includes daily measurements of surface soil moisture, vegetation/roughness water content interpretive information, and quality control variables. Ancillary data include time, geolocation, and quality assessment.
  <br>

  #### AE_Land
  This data set contains gridded estimates of soil moisture in the top 1 cm of soil, averaged over the AMSR-E retrieval footprint. Soil moisture is estimated from AMSR-E/Aqua L2A brightness temperature (Tb) measurements using two different approaches: the Normalized Polarization Difference algorithm (NPD) and the Single Channel Algorithm (SCA). Ancillary data are also provided to help interpret the soil moisture observations, including vegetation roughness, observation counts for various surface conditions, and QA flags.
  <br>

  #### AE_RnGd
  This Level-3 rainfall accumulation product (AE_RnGd) consists of two grids of 28 rows by 72 columns of monthly averaged rainfall accumulation over ocean and land. Both grids are 5 degree by 5 degree resolution.
  <br>

  #### NSIDC-0079
  This sea ice concentration data set was derived using measurements from the Scanning Multichannel Microwave Radiometer (SMMR) on the Nimbus-7 satellite and from the Special Sensor Microwave/Imager (SSM/I) sensors on the Defense Meteorological Satellite Program's (DMSP) -F8, -F11, and -F13 satellites. Measurements from the Special Sensor Microwave Imager/Sounder (SSMIS) aboard DMSP-F17 are also included. The data set has been generated using the Advanced Microwave Scanning Radiometer - Earth Observing System (AMSR-E) Bootstrap Algorithm with daily varying tie-points. Daily (every other day prior to July 1987) and monthly data are available for both the north and south polar regions. Data are gridded on the SSM/I polar stereographic grid (25 x 25 km) and provided in two-byte integer format. Data coverage began on 01 November 1978 and is ongoing through the most current processing, with updated data processed several times annually.
  <br>

  #### NSIDC-0630
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, is an improved, enhanced-resolution, gridded passive microwave Earth System Data Record (ESDR) for monitoring cryospheric and hydrologic time series from SMMR, SSM/I-SSMIS, and AMSR-E. It is derived from the most mature and available Level-2 satellite passive microwave records from 1978 through the present.
  <br>

  #### NSIDC-0738
  This data set contains twice-daily, enhanced-resolution brightness temperature data derived from the SMAP radiometer. Data are available on the Northern Hemisphere, Southern Hemisphere, Temperate, and Mid-Latitude (sub-set of Global) EASE-Grid 2.0 projections and on the 3 km, 3.125 km, 9 km, 25 km, and 36 km resolution grids. This data set applies the same SIR technique used to derive brightness temperatures from the SMMR, AMSR-E, and SSM/I-SSMIS sensors and is a companion product for the MEaSUREs Calibrated Enhanced-Resolution Passive Microwave Daily EASE-Grid 2.0 Brightness Temperature ESDR data set (DOI: 10.5067/MEASURES/CRYOSPHERE/NSIDC-0630.001).
  <br>

  #### NSIDC-0738
  This data set contains twice-daily, enhanced-resolution brightness temperature data produced by image reconstruction of the standard SMAP product, SMAP L1B Radiometer Half-Orbit Time-Ordered Brightness Temperatures (SPL1BTB). Data are available in the Northern Hemisphere, Southern Hemisphere, Temperate, and Mid-Latitude (subset of Global) EASE-Grid 2.0 projections and on the 3 km, 3.125 km, 9 km, 25 km, and 36 km resolution grids. This is a companion product for the Calibrated Enhanced-Resolution Passive Microwave Daily EASE-Grid 2.0 Brightness Temperature ESDR data set. The same SIR technique is applied to derive brightness temperatures from the SMMR, AMSR-E, and SSM/I-SSMIS sensors as for that data set.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
