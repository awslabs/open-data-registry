Name: NASA measures Project
Description: |
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, provides a daily record of Arctic sea ice characteristics for the years 1979 through 2012 derived from passive microwave brightness temperatures. Characteristics include the location of sea ice cover, sea ice age, day of melt onset, and status of melt onset. Data are gridded in the 25 km Equal-Area Scalable Earth Grid (EASE-Grid) 2.0 and provided as netCDF files.
  <br>

  #### NSIDC-0756
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, contains a bed topography/bathymetry map of Antarctica based on mass conservation, streamline diffusion, and other methods. The data set also includes ice thickness, surface elevation, an ice/ocean/land mask, ice thickness estimation errors, and a map showing where each method was utilized.
  <br>

  #### NSIDC-0533
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, offers users a 25 km daily record of surface/near-surface melting on the Greenland Ice Sheet. The presence of melting is determined from brightness temperature data acquired during a 34 year span by three satellite-borne microwave radiometers: the Scanning Multichannel Microwave Radiometer (SMMR), the Special Sensor Microwave/Imager (SSM/I), and the Special Sensor Microwave Imager/Sounder (SSMIS).
  <br>

  #### NSIDC-0484
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, provides the first comprehensive, high-resolution, digital mosaics of ice motion in Antarctica assembled from multiple satellite interferometric, synthetic-aperture radar systems. Data were largely acquired during the International Polar Years 2007 to 2009, as well as between 2013 and 2016. Additional data acquired between 1996 and 2016 were used as needed to maximize coverage. See <a href="https://nsidc.org/data/measures/aiv">Antarctic Ice Sheet Velocity and Mapping Data</a> for related data.
  <br>

  #### NSIDC-0525
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, consists of two high-resolution digital mosaics of ice motion in Central Antarctica. The mosaics were assembled from satellite interferometric synthetic-aperture radar (InSAR) data acquired by RADARSAT-1 in 1997 and by RADARSAT-2 in 2009. See <a href="https://nsidc.org/data/measures/aiv">Antarctic Ice Sheet Velocity and Mapping Data</a> for related data.
  <br>

  #### NSIDC-0794
  This ITS_LIVE data set, part of the Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, consists of 240 m Antarctic Ice Sheet extent masks at roughly annual resolution from 1997 through 2021. The ice masks were generated by combining data acquired by multiple satellite-borne optical, thermal, and radar sensors. The ice thickness and velocity data used to determine the presence of ice are also provided.
  <br>

  #### NSIDC-0534
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, reports the location of Northern Hemisphere snow cover and sea ice extent, the status of melt onset across Greenland and Arctic sea ice, and the level of agreement between three different snow cover data sources.
  <br>

  #### NSIDC-0535
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, reports the location of Northern Hemisphere snow cover and sea ice extent, the status of melt onset across Greenland and Arctic sea ice, and the level of agreement between snow cover maps derived from two different sources.
  <br>

  #### NSIDC-0531
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, offers users weekly 100 km Northern Hemisphere snow cover extent represented by three different variables. Two of the variables are derived from individual source products: the NOAA/NCDC Northern Hemisphere Snow Cover Extent Climate Data Record and Defense Meteorological Satellite Program (DMSP) passive microwave brightness temperatures, respectively. The third variable merges the other two into a single representation of snow cover.
  <br>

  #### NSIDC-0754
  This data set, as part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, combines interferometric phases from multiple satellite interferometric synthetic-aperture radar systems to derive the first comprehensive phase-based map of Antarctic ice velocity. The precision in ice speed and flow direction over 80% of Antarctica is better than prior mappings based on feature and speckle tracking by a factor of 10. Phase-derived velocity mostly covers the years between 2007 and 2018, while tracking-derived velocity (for regions along the coasts) is mostly found in the years from 2013 to 2017. Additional data acquired between 1996 and 2018 were used as needed to maximize coverage. See <a href="https://nsidc.org/data/measures/aiv">Antarctic Ice Sheet Velocity and Mapping Data</a> for related data.
  <br>

  #### SNEX17_CAR
  This data set contains measurements of the bidirectional reflectance distribution function (BRDF) for two locations in Colorado, USA: Grand Mesa, a snow-covered, forested study site about 40 miles east of Grand Junction; and Senator Beck Basin approximately 80 miles to the SSE of Grand Mesa. Measurements were acquired using the NASA Cloud Absorption Radiometer (CAR), an airborne multi-angular, multi-wavelength scanning radiometer. The CAR instrument measures scattered light in 14 spectral bands between 0.34 μm and 2.30 μm, which lie in the UV, visible, and near-infrared atmospheric windows. Data were obtained for a variety of conditions including snow grain size (or age), snow liquid water content, solar zenith angle, cloud cover, and snowpack thickness. The data set can be used to assess the accuracy of satellite reflectance and albedo products in snow-covered, forested landscapes.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
