Name: DynaCell
Description: |
  DynaCell is a dynamic 3D live-cell imaging benchmark for virtual staining and cell profiling.
  The dataset pairs label-free transmitted-light volumes (phase-reconstructed from multi-angle
  illumination) with fluorescence ground truth for four organelles (nucleus, cell membrane,
  endoplasmic reticulum, mitochondria) across three viral perturbation conditions
  (uninfected, Zika-infected, Dengue-infected).

  The v1 release contains two components:
  (1) A549 human lung adenocarcinoma cells acquired on the Mantis correlative label-free and
  light-sheet fluorescence microscope at CZ Biohub San Francisco (24 OZX stores, 262 FOVs,
  ~407 GB), split into train and test sets across 4 organelle markers and 3 conditions.
  (2) WTC-11 hiPSC cells from the Allen Institute hiPSC single-cell image dataset, reprocessed
  as paired label-free and confocal fluorescence volumes (iPSC data to be added).

  All data are stored as RFC-9 zipped OME-Zarr (.ozx) archives following OME-NGFF v0.5,
  readable with iohub (https://github.com/czbiohub-sf/iohub).
Documentation: https://github.com/czbiohub-sf/dynacell
