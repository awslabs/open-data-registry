Name: NASA / USGS Europa Photogrammetrically Controlled Observations
Description: |
  The twin Voyager 1 and Voyager 2 spacecraft acquired images of the Galilean satellites including Europa. Each spacecraft was identically equipped with both wide-angle and narrow-angle slow-scan vidicon cameras that comprised the Imaging Science Subsystem (ISS). Here we provide a set of 221 photogrammetrically controleld images.<br/><br/>
  These images provide users with nearly the entire Voyager I and Voyager II Europa imaging dataset at its native resolution and with improved relative image locations. The Solid State Imager on NASA's Voyager Spacecraft supplement the already released Europa Galileo data. Unfortunately, uncertainty in the position and pointing of the spacecraft, as well as the position and orientation of Europa, when the images were acquired resulted in significant errors in image locations on the surface. The result of these errors is that images acquired during different Voyager fly-bys are significantly misaligned (errors of up to 100 km on the surface). <br/><br/>
  The dataset provides a set of individual images that can be used for scientific analysis and mission planning activities.
