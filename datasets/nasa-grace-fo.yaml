Name: NASA GRACE-FO Project
Description: |
  This data set is produced by the Center for Space Research (CSR) GRACE-FO (Gravity Recovery and Climate Experiment Follow-On) program and derives the terrestrial water storage anomaly given as equivalent water thickness. These monthly grids are derived from GRACE-FO time-variable gravity observations during the specified timespan, and relative to the specified time-mean reference period. This quantity represents the total terrestrial water storage anomalies from soil moisture, snow, surface water (incl. rivers, lakes, reservoirs etc.), as well as groundwater and aquifers. A glacial isostatic adjustment (GIA) correction has been applied, and standard corrections for geocenter (degree-1), C20 (degree-20) and C30 (degree-30) are incorporated. Post-processing filters have been applied to reduce correlated errors. Data grids are provided in ASCII/netCDF/GeoTIFF formats. <br><br> GRACE-FO was launched on 22 May 2018, and extends the original GRACE mission (2002 – 2017) and expands its legacy of scientific achievements in tracking earth surface mass changes. Version 04 (v04) of the terrestrial water storage data uses updated and consistent C20 and Geocenter corrections (i.e., Technical Notes TN-14 and TN-13), as well as an ellipsoidal correction to account for the non-spherical shape of the Earth when mapping gravity anomalies to surface mass change. Additionally, this release 06.3 is an updated version of the Level 3 products in coordination with the release of the analogous Level 2 products used to generate them. It differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 (GRACE-FO 2) satellite; see respective L-2 data descriptions. RL06.3 uses the ACX2-L1B data products. All GRACE-FO RL06.3 Level-3 fields are fully compatible with the GRACE RL06 data.
  <br>

  #### TELLUS_GRFO_L3_CSR_RL06.3_OCN_v04
  This data set is produced by the Center for Space Research (CSR) GRACE-FO (Gravity Recovery and Climate Experiment Follow-On) program and derives the ocean bottom pressure (OBP) anomaly given as equivalent water thickness. These monthly grids are derived from GRACE-FO time-variable gravity observations during the specified timespan, and relative to the specified time-mean reference period. This quantity represents sea floor pressure changes due to the integral effect of ocean and atmosphere processes, including global mean ocean bottom pressure changes (mean ocean mass and mean atmosphere mass over the global oceans). A glacial isostatic adjustment (GIA) correction has been applied, and standard corrections for geocenter (degree-1), C20 (degree-20) and C30 (degree-30) are incorporated. Post-processing filters have been applied to reduce correlated errors. Data grids are provided in ASCII/netCDF/GeoTIFF formats. <br><br> GRACE-FO was launched on 22 May 2018, and extends the original GRACE mission (2002 – 2017) and expands its legacy of scientific achievements in tracking earth surface mass changes. Version 04 (v04) of the ocean bottom pressure data uses updated and consistent C20 and Geocenter corrections (i.e., Technical Notes TN-14 and TN-13), as well as an ellipsoidal correction to account for the non-spherical shape of the Earth when mapping gravity anomalies to surface mass change. Additionally, this release 06.3 is an updated version of the Level 3 products in coordination with the release of the analogous Level 2 products used to generate them. It differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 (GRACE-FO 2) satellite; see respective L-2 data descriptions. RL06.3 uses the ACX2-L1B data products. All GRACE-FO RL06.3 Level-3 fields are fully compatible with the GRACE RL06 data.
  <br>

  #### TELLUS_GRFO_L3_GFZ_RL06.3_LND_v04
  This data set is produced by the German Research Centre for Geosciences (GFZ) as part of the GRACE-FO (Gravity Recovery and Climate Experiment Follow-On) program and derives the terrestrial water storage anomaly given as equivalent water thickness. These monthly grids are derived from GRACE-FO time-variable gravity observations during the specified timespan, and relative to the specified time-mean reference period. This quantity represents the total terrestrial water storage anomalies from soil moisture, snow, surface water (incl. rivers, lakes, reservoirs etc.), as well as groundwater and aquifers. A glacial isostatic adjustment (GIA) correction has been applied, and standard corrections for geocenter (degree-1), C20 (degree-20) and C30 (degree-30) are incorporated. Post-processing filters have been applied to reduce correlated errors. Data grids are provided in ASCII/netCDF/GeoTIFF formats. <br><br> GRACE-FO was launched on 22 May 2018, and extends the original GRACE mission (2002 – 2017) and expands its legacy of scientific achievements in tracking earth surface mass changes. Version 04 (v04) of the terrestrial water storage data uses updated and consistent C20 and Geocenter corrections (i.e., Technical Notes TN-14 and TN-13), as well as an ellipsoidal correction to account for the non-spherical shape of the Earth when mapping gravity anomalies to surface mass change. Additionally, this release 06.3 is an updated version of the Level 3 products in coordination with the release of the analogous Level 2 products used to generate them. It differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 (GRACE-FO 2) satellite; see respective L-2 data descriptions. RL06.3 uses the ACX2-L1B data products. All GRACE-FO RL06.3 Level-3 fields are fully compatible with the GRACE RL06 data.
  <br>

  #### TELLUS_GRFO_L3_GFZ_RL06.3_OCN_v04
  This data set is produced by the German Research Centre for Geosciences (GFZ) as part of the GRACE-FO (Gravity Recovery and Climate Experiment Follow-On) program and derives the ocean bottom pressure (OBP) anomaly given as equivalent water thickness. These monthly grids are derived from GRACE-FO time-variable gravity observations during the specified timespan, and relative to the specified time-mean reference period. This quantity represents sea floor pressure changes due to the integral effect of ocean and atmosphere processes, including global mean ocean bottom pressure changes (mean ocean mass and mean atmosphere mass over the global oceans). A glacial isostatic adjustment (GIA) correction has been applied, and standard corrections for geocenter (degree-1), C20 (degree-20) and C30 (degree-30) are incorporated. Post-processing filters have been applied to reduce correlated errors. Data grids are provided in ASCII/netCDF/GeoTIFF formats. <br><br> GRACE-FO was launched on 22 May 2018, and extends the original GRACE mission (2002 – 2017) and expands its legacy of scientific achievements in tracking earth surface mass changes. Version 04 (v04) of the ocean bottom pressure data uses updated and consistent C20 and Geocenter corrections (i.e., Technical Notes TN-14 and TN-13), as well as an ellipsoidal correction to account for the non-spherical shape of the Earth when mapping gravity anomalies to surface mass change. Additionally, this release 06.3 is an updated version of the Level 3 products in coordination with the release of the analogous Level 2 products used to generate them. It differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 (GRACE-FO 2) satellite; see respective L-2 data descriptions. RL06.3 uses the ACX2-L1B data products. All GRACE-FO RL06.3 Level-3 fields are fully compatible with the GRACE RL06 data.
  <br>

  #### GRACEFO_L1A_ASCII_GRAV_JPL_RL04
  FOR EXPERT USE ONLY. The GRACE-FO Level-1A data contains telemetry data that has been converted to engineering units, from which Level-1B data products are derived. For a detailed description, please see the GRACE-FO Level-1 documentation (https://podaac.jpl.nasa.gov/gravity/gracefo-documentation).
  <br>

  #### GRACEFO_L1B_ASCII_GRAV_JPL_RL04
  FOR EXPERT USE ONLY. The GRACE-FO Level-1B data provide all necessary inputs to derive monthly time variations in the Earth gravity field. Level-1B data are also used for GRACE orbit and mean gravity field determination. For a detailed description, please see the GRACE-FO Level-1 documentation (https://podaac.jpl.nasa.gov/gravity/gracefo-documentation).
  <br>

  #### GRACEFO_L2_JPL_MONTHLY_0063
  FOR EXPERT USE ONLY. This dataset contains estimates of the total month-by-month geopotential of the Earth, derived from the Gravity Recovery and Climate Experiment Follow-On (GRACE-FO) mission measurements, produced by the NASA Jet Propulsion Laboratory (JPL). The data are provided as spherical harmonic coefficients, averaged over approximately a month, and available from 2018 onward. These coefficients are derived from the Microwave Instrument (MWI) measured intersatellite range changes between the twin spacecraft of the GRACE-FO (Gravity Recovery and Climate Experiment Follow-On) mission. The GRACE-FO mission, a joint partnership between NASA and the German Research Centre for Geosciences (GFZ), launched on 22 May 2018. It uses twin satellites to accurately map variations in the Earth's gravity field and surface mass distribution. It is designed as a successor to the Gravity Recovery and Climate Experiment (GRACE) mission. <br><br> This GRACE-FO RL06.3 data is an updated version of the GRACE-FO RL06.1 Level-2 data products. RL06.3 differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 satellite: Level-2 RL06.3 uses ACH1B RL04 that is contained within the ACX2 Level-1 bundle, which replaces ACH1B RL04 contained within the ACX Level-1 bundle that was used for Level-2 RL06.1 (note: ACX2-L1B is only applicable for 01/2023 onwards in wide-pointing operational mode; from 6/2018 through 12/2022, RL06.1 and RL06.3 GRACE-FO data are identical and based on ACX; ACX2 is not available for 03/2023-06/2023 as the satellites were not in wide-pointing mode during that period). All GRACE-FO RL06.3 Level-2 products are fully compatible with the GRACE RL06 level-2 fields. Refer to the mission page for more information.
  <br>

  #### GRACEFO_L2_CSR_MONTHLY_0063
  FOR EXPERT USE ONLY. This dataset contains estimates of the total month-by-month geopotential of the Earth, derived from the Gravity Recovery and Climate Experiment Follow-On (GRACE-FO) mission measurements, produced by the University of Texas (at Austin) Center for Space Research (CSR). The data are provided as spherical harmonic coefficients, averaged over approximately a month, and available from 2018 onward. These coefficients are derived from the Microwave Instrument (MWI) measured intersatellite range changes between the twin spacecraft of the GRACE-FO (Gravity Recovery and Climate Experiment Follow-On) mission. The GRACE-FO mission, a joint partnership between NASA and the German Research Centre for Geosciences (GFZ), launched on 22 May 2018. It uses twin satellites to accurately map variations in the Earth's gravity field and surface mass distribution. It is designed as a successor to the Gravity Recovery and Climate Experiment (GRACE) mission. <br><br> This GRACE-FO RL06.3 data is an updated version of the GRACE-FO RL06.1 Level-2 data products. RL06.3 differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 satellite: Level-2 RL06.3 uses ACH1B RL04 that is contained within the ACX2 Level-1 bundle, which replaces ACH1B RL04 contained within the ACX Level-1 bundle that was used for Level-2 RL06.1 (note: ACX2-L1B is only applicable for 01/2023 onwards in wide-pointing operational mode; from 6/2018 through 12/2022, RL06.1 and RL06.3 GRACE-FO data are identical and based on ACX; ACX2 is not available for 03/2023-06/2023 as the satellites were not in wide-pointing mode during that period). All GRACE-FO RL06.3 Level-2 products are fully compatible with the GRACE RL06 level-2 fields. Refer to the mission page for more information.
  <br>

  #### GRACEFO_L2_GFZ_MONTHLY_0063
  FOR EXPERT USE ONLY. This dataset contains estimates of the total month-by-month geopotential of the Earth, derived from the Gravity Recovery and Climate Experiment Follow-On (GRACE-FO) mission measurements, produced by the German Research Centre for Geosciences (GFZ). The data are provided as spherical harmonic coefficients, averaged over approximately a month. These coefficients are derived from the Microwave Instrument (MWI) measured intersatellite range changes between the twin spacecraft of the GRACE-FO mission. Refer to the mission page for more information. <br><br> This GRACE-FO RL06.3 data is an updated version of the GRACE-FO RL06.1 Level-2 data products. RL06.3 differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 satellite: Level-2 RL06.3 uses ACH1B RL04 that is contained within the ACX2 Level-1 bundle, which replaces ACH1B RL04 contained within the ACX Level-1 bundle that was used for Level-2 RL06.1 (note: ACX2-L1B is only applicable for 01/2023 onwards in wide-deadband operational mode; from 6/2018 through 12/2022, RL06.1 and RL06.3 GRACE-FO data are identical). All GRACE-FO RL06.3 Level-2 products are fully compatible with the GRACE RL06 level-2 fields. Refer to the mission page for more information.
  <br>

  #### GRACE_ABPR_FO_L2_V1.0
  This dataset provides hourly ocean bottom pressure measurements at the North Pole from the Arctic Bottom Pressure Recorder - Follow On (ABPR-FO) from August 2022 to August 2023. Based around a Paroscientific Digiquartz pressure sensor, the ABPR-FO was designed and powered to collect and transmit data which was then collected, quality-controlled and updated at PO.DAAC on a yearly basis. The full time series is provided as a single netCDF file, and reports both bottom pressure (reported as liquid water equivalent thickness) and temperature. This dataset aims to serve as in situ validation for GRACE-FO data products in the central Arctic. This project is funded by NASA’s GRACE and GRACE-FO Science Team and supported by PONANT Science.
  <br>

  #### TELLUS_GRFO_L3_JPL_RL06.3_LND_v04
  This data set is produced by the Jet Propulsion Laboratory (JPL) as part of the GRACE-FO (Gravity Recovery and Climate Experiment Follow-On) program and derives the terrestrial water storage anomaly given as equivalent water thickness. These monthly grids are derived from GRACE-FO time-variable gravity observations during the specified timespan, and relative to the specified time-mean reference period. This quantity represents the total terrestrial water storage anomalies from soil moisture, snow, surface water (incl. rivers, lakes, reservoirs etc.), as well as groundwater and aquifers. A glacial isostatic adjustment (GIA) correction has been applied, and standard corrections for geocenter (degree-1), C20 (degree-20) and C30 (degree-30) are incorporated. Post-processing filters have been applied to reduce correlated errors. Data grids are provided in ASCII/netCDF/GeoTIFF formats. <br><br> GRACE-FO was launched on 22 May 2018, and extends the original GRACE mission (2002 – 2017) and expands its legacy of scientific achievements in tracking earth surface mass changes. Version 04 (v04) of the terrestrial water storage data uses updated and consistent C20 and Geocenter corrections (i.e., Technical Notes TN-14 and TN-13), as well as an ellipsoidal correction to account for the non-spherical shape of the Earth when mapping gravity anomalies to surface mass change. Additionally, this RL06.3 is an updated release of the previous RL06.1. It differs from RL06.1 only in the Level-1B accelerometer transplant data that is used for the GF2 (GRACE-FO 2) satellite; see respective L-2 data descriptions. RL06.3 uses the ACX2-L1B data products. All GRACE-FO RL06.3 Level-3 fields are fully compatible with the GRACE RL06 data.
