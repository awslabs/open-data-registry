Name: NeMO Human and Mammalian Brain Atlas

Description: >
  Scalable technologies for sequencing the transcriptomes and epigenomes of single cells are transforming our understanding of cell types and cell states. The Brain Research through Advancing Innovative Neurotechnologies (BRAIN) Initiative Cell Census Network (BICCN) is applying these technologies at unprecedented scale to map cell types in the mammalian brain. The NIH has established repositories to make data generated by the BICCN and related BRAIN Initiative projects accessible to the broader research community. The Neuroscience Multi-Omic Archive (NeMO Archive; nemoarchive.org) serves as the primary repository for genomics data from the BRAIN Initiative. Working closely with other BRAIN Initiative researchers, we have organized these data into a continually expanding, curated resource containing transcriptomic and epigenomic data from over 50 million brain cells, including single-cell genomic data from major regions of adult and prenatal human and mouse brains, as well as substantial single-cell genomic data from non-human primates. These data are hosted on AWS and are accessible through a searchable web portal, a cloud computing interface for large-scale analysis (Terra; terra.bio), and a visualization and analysis platform, NeMO Analytics (nemoanalytics.org).

  Notes added in preparation:
  Current file does not validate against AWS Open Data Registry schema.
  Requires RegistryEntryAdded fields. 
