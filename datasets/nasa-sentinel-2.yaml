Name: NASA sentinel-2 Project
Description: |
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, consists of surface velocity estimates for selected Greenland Ice Sheet outlet glaciers. Velocity fields were generated by tracking visible features in optical images acquired by the U.S. Geological Survey (USGS) Landsat 8 Operational Land Imager (OLI) and the European Space Agency (ESA) Copernicus Sentinel-2A and Sentinel-2B satellites.
  <br>

  #### NSIDC-0801
  This data set consists of velocity maps and error estimates for five surge-type glaciers: Nàłùdäy/Lowell Glacier, Canada; Medvezhiy Glacier, the Pamir mountains; South Rimo Glacier, the Karakoram; Sít' Kusá Glacier, Alaska; and Aavatsmarkbreen Glacier, Spitsbergen, Svalbard. The maps are generated using CautoRIFT, a pipeline that improves temporal coverage during periods of rapid glacier motion by adding pre-processed, daily high-resolution PlanetScope images and customized feature tracking parameters for each glacier to NASA's autonomous Repeat Image Feature Tracking (autoRIFT) algorithm for Sentinel-2 and Landsat imagery. Stable surface masks, area of interest (AOI) and glacier outlines, and ancillary data are also available for each glacier site.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
