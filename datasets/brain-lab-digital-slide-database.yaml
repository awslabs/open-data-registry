Name: University of Washington BRaIN Lab Digital Slide Database 
Description: This dataset comprises hundreds of thousands of slide images of human brains spanning decades of sampling.  Some cases also include 3D surface scans of exvivo hemi-brains. No identifying information is contained in this dataset.
