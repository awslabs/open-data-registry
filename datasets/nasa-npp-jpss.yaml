  #### VNP15A2H
  The VNP15A2H VIIRS Version 1 data product was decommissioned on April 8th, 2025. Users are encouraged to use Version 2 data products, which provide [better calibration and consistency](https://landweb.modaps.eosdis.nasa.gov/data/userguide/VIIRS_Land_C2_Changes_09152022.pdf) for the end user. VIIRS Version 2 data products are available from both the SNPP ([VNP15A2H](https://doi.org/10.5067/VIIRS/VNP15A2H.002)) and NOAA-20 ([VJ115A2H]( https://doi.org/10.5067/VIIRS/VJ115A2H.002)) satellites. The Visible Infrared Imaging Radiometer Suite (VIIRS) Leaf Area Index (LAI) and Fraction of Photosynthetically Active Radiation (FPAR) Version 1 data product provides information about the vegetative canopy layer at 500 meter resolution (VNP15A2H). The VIIRS sensor is located aboard the NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) satellite. LAI is an index that quantifies the one-sided leaf area of a canopy, while FPAR is the fraction of incoming solar energy absorbed through photosynthesis at 400 to 700 nanometers. This product is intentionally designed after the Terra and Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) LAI/FPAR operational algorithm to promote the continuity of the Earth Observation System (EOS) mission. The VNP15A2H product includes six Science Data Set Layers for the analysis of key factors in LAI/FPAR measurements. These include the LAI and FPAR measurements, quality detail for LAI/FPAR, extra quality detail for FPAR, and the standard deviation for LAI and FPAR. Two low resolution browse images are also available for each VNP15A2H granule: LAI and FPAR. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
