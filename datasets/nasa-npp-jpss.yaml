  The VNP43D47 Version 1 data product was decommissioned on July 31, 2025. Users are encouraged to use the [VNP43D47](https://doi.org/10.5067/VIIRS/VNP43D47.002) and [VJ143D47](https://doi.org/10.5067/VIIRS/VJ143D47.002) Version 2 data products. The NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Valid Observation Band M7 product (VNP43D47) is produced daily using 16 days of data at 30 arc second (1,000 meter) resolution. Data are temporally weighted to the ninth day, which is reflected in the file name. The VNP43D product suite is provided in a Climate Modeling Grid (CMG), which covers the entire globe for use in climate simulation models. Due to the large file size, each VNP43D product contains just one data layer for each of the parameters included in the [VNP43MA2](https://doi.org/10.5067/VIIRS/VNP43MA2.001) product. VNP43D40 through VNP43D53 are the 30 arc second BRDF/Albedo Quality values, the Local Solar Noon values, the Valid Observations of the moderate resolution bands (M1 through M5, M7, M8, M10, and M11) plus the Day/Night Band (DNB), the Snow Status, and the Uncertainty. Details regarding methodology are available on the [VNP43MA2](https://doi.org/10.5067/VIIRS/VNP43MA2.001) product page and in the Algorithm Theoretical Basis Document (ATBD). VNP43D47 contains the valid observation quality layer representing each of the 16 days of the retrieval period for VIIRS band M7. Known Issues: The abnormally high activation of the high aerosol flag in the Collection 1 (C1) VNP09 product has impacted downstream products. The VNP43 BRDF/Albedo/NBAR product is affected by reducing the number of otherwise acceptable observations used as input to characterize surface anisotropy. This effect (most obvious over arid bright surfaces), results in a reduced number of high quality full BRDF model inversions. Therefore, users should be aware tha