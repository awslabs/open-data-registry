  #### VNP14IMG
  The Visible Infrared Imaging Radiometer Suite (VIIRS) Active Fires (VNP14IMG) Version 2 product is produced in 6-minute temporal satellite increments (swaths) at 375 meter resolution from the VIIRS sensor aboard the NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) satellite. This Level 2 product is designed after the Terra and Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) Thermal Anomalies and Fire data products to promote the continuity of the Earth Observation System (EOS) mission. This data product can enable users to understand the location and intensity of fire events. Due to its higher spatial resolution, the VNP14IMG active fire product provides greater response over fires of relatively small areas, as well as improved mapping of large fire perimeters in comparison to the VNP14 fire data product. The VNP14IMG product includes 26 science dataset layers to analyze key factors in fire detection, including atmospheric conditions (e.g., radiance, solar zenith angle, brightness temperature) and fuel type for the event. The fire mask layer in the VNP14IMG product is the primary layer and can be used to identify fires and other thermal anomalies such as volcanoes. Each swath of data is approximately 3,060 kilometers along track (long) and 3,060 kilometers across track (wide). The VNP14IMG product is also used to generate higher-level fire data products. Use of the (VNP03MODLL) data product is required to apply accurate geolocation information to the VNP14IMG Science Datasets (SDS) / Variables. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VNP16A2
  The NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Actual and Potential Evapotranspiration (VNP16A2) data product is an 8-day composite dataset produced at 500 meter (m) pixel resolution. The VNP16A2 algorithm is based on the Penman-Monteith equation, which includes inputs of daily meteorological reanalysis data along with VIIRS remotely sensed data products such as 8-day vegetation property dynamics and daily surface albedo. Provided in the VNP16A2 product are layers for composited Evapotranspiration (ET), Latent Heat Flux (LE), Potential ET (PET) and Potential LE (PLE) along with a quality control layer. Two low resolution browse images, ET and LE, are also available for each VNP16A2 granule. The pixel values for the two Evapotranspiration layers (ET and PET) are the summation of 8-day total water loss within the composite period and the pixel values for the two Latent Heat layers (LE and PLE) are the average total energy over a unit area for a day during the composite period. Note that the last acquisition period of each year is a 5 or 6-day composite period, depending on the year. Known Issues: Please refer to the [VIIRS Land Products website](https://viirsland.gsfc.nasa.gov/Products/NASA/ET_ESDR.html) and [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) for information about VNP16A2 known issues.
