  #### VNP28C2
  The NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Water Reservoir 8-day Level 3 (L3) Global (VNP28C2) Version 2 product provides current data for 151 man-made reservoirs and 13 regulated natural lakes for a total of 164 reservoirs. The VNP28C2 data product provides an 8-day time series of surface area, elevation, and water storage. Datasets are combined with pre-established [Area-Elevation (A-E) curves](https://doi.org/10.1016/j.rse.2020.111831) and image classifications of near-infrared (NIR) reflectance from the surface reflectance product acquired by the VIIRS satellite ([VNP09H1](https://doi.org/10.5067/VIIRS/VNP09H1.002)). The VNP28C2 data product consists of a single layer with information about the reservoir identifier, dam location (longitude and latitude), reservoir surface area, elevation, and water storage capacity. Known Issues: Water occurrence images generally show smaller surface area dynamics in high latitude regions, creating pixels with low occurrence values that have relatively large uncertainties. In addition, the quality of raw water area classification can be affected by lake ice coverage typically creating an overestimation of surface area in the enhancement algorithm. This issue will be addressed in a future release of the enhancement algorithm. For additional information about known issues, refer to the User Guide.
  <br>

  #### VNP28C3
  The NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Water Reservoir Product Monthly Level 3 (L3) Global (VNP28C3) Version 2 product provides current data for 151 man-made reservoirs and 13 regulated natural lakes for a total of 164 reservoirs. The VNP28C3 data product is a composite of the 8-day area classifications from [VNP28C2](https://doi.org/10.5067/VIIRS/VNP28C2.002) which is converted to provide monthly elevation and water storage. The Lake Temperature and Evaporation Model ([LTEM](https://doi.org/10.1016/j.rse.2020.112104)) with input from VIIRS Land Surface Temperature and Emissivity ([VNP21A2](https://doi.org/10.5067/VIIRS/VNP21A2.002)) and meteorological data from Global Land Data Assimilation System ([GLDAS](https://earth.gsfc.nasa.gov/hydro/data/gldas-global-land-data-assimilation-system-data)) are used to produce monthly evaporation rates and volume losses. The VNP28C3 data product provides a monthly time series that consists of a single layer with information about the reservoir identifier, dam location (longitude and latitude), reservoir surface area, elevation, water storage capacity, evaporation rate, and evaporation volume. Known Issues: Water occurrence images generally show smaller surface area dynamics in high latitude regions, creating pixels with low occurrence values that have relatively large uncertainties. In addition, the quality of raw water area classification can be affected by lake ice coverage typically creating an overestimation of surface area in the enhancement algorithm. This issue will be addressed in a future release of the enhancement algorithm. For additional information about known issues, refer to the User Guide.
