  #### VNP64A1
  The VNP64A1 Version 1 data product was decommissioned on July 31, 2025. Users are encouraged to use the [VNP64A1](https://doi.org/10.5067/VIIRS/VNP64A1.002) Version 2 data product. The daily NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Burned Area (VNP64A1) Version 1 data product is a monthly, global gridded 500 meter (m) product containing per-pixel burned area and quality information. The VNP64 burned area mapping approach employs 750 m VIIRS imagery coupled with 750 m VIIRS active fire observations. The hybrid algorithm applies dynamic thresholds to composite imagery generated from a burn-sensitive Vegetation Index (VI) derived from VIIRS shortwave infrared channels M8 and M11, and a measure of temporal texture. VIIRS bands that are both sensitive and insensitive to biomass burning are used to detect changes caused by fire and to differentiate them from other types of change. The mapping algorithm ultimately identifies the date of burn, to the nearest day, for 500 m grid cells within the individual sinusoidal tile being processed. The date is encoded in a single data layer of the output product as the ordinal day of the calendar year on which the burn occurred (range 1-366), with a value of 0 for unburned land pixels and additional values reserved for missing data and water grid cells. The VNP64A1 data product is designed after the Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined burned area product to promote the continuity of the Earth Observation System (EOS) mission. VNP64A1 has been released on a limited basis due to concerns over the quality of the data along the edges of inland water bodies and at high latitudes. These regions contain grid cells falsely identified as burned as a result of coarse resolution inputs to the cloud mask used in the generation of the 750 m VIIRS active fire observations. Users are urged to exercise caution when using this [provisional](https://viirsland.gsfc.nasa.gov/Val_overview.html) data in research. The Version 2 burned area product generated with an improved cloud mask was released on October 22, 2024. Users are encouraged to use the improved V002 burned area product. The data layers provided in the VNP64A1 product include Burn Date, Burn Date Uncertainty, Quality Assurance (QA), along with First Day and Last Day of reliable change detection of the year. A low resolution browse is also provided showing the burned date layer with a color map applied in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS). Additional information on falsely identified burn areas related to cloud mask artifacts and cropland burning is provided in section 6 of the User Guide.
  <br>

