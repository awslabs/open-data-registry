  #### VNP14
  The VNP14 VIIRS Version 1 data product was decommissioned on April 8th, 2025. Users are encouraged to use Version 2 data products, which provide [better calibration and consistency](https://landweb.modaps.eosdis.nasa.gov/data/userguide/VIIRS_Land_C2_Changes_09152022.pdf) for the end user. VIIRS Version 2 data products are available from both the SNPP ([VNP14](https://doi.org/10.5067/VIIRS/VNP14.002)) and NOAA-20 ([VJ114]( https://doi.org/10.5067/VIIRS/VJ114.002)) satellites. The Visible Infrared Imaging Radiometer Suite (VIIRS) Thermal Anomalies (VNP14) Version 1 product is produced in 6-minute temporal satellite increments (swaths) at 750 meter resolution from the VIIRS sensor located on the NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) satellite. This product is designed after the Terra and Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) Thermal Anomalies and Fire data products to promote the continuity of the Earth Observation System (EOS) mission. This data product can enable users to understand the location and intensity of fire events as well as identifying thermal anomalies. The VNP14 product includes 31 science dataset layers to analyze key factors in fire detection, including atmospheric conditions (e.g. atmospheric reflectance, solar zenith angle, brightness temperature) and fuel type for the event. The fire mask layer in the VNP14 product is the primary layer and can be used to identify fires and other thermal anomalies such as volcanoes. In addition to the fire mask, brightness temperature is provided for VIIRS channels M5, M7, M11, M13, M15, and M16. Each swath of data is approximately 3,060 kilometers along track (long) and 3,060 kilometers across track (wide). The VNP14 product is also used to generate higher-level fire data products. Use of the [VNP03MODLL](https://doi.org/10.5067/viirs/vnp03modll.001) data product is required to apply accurate geolocation information to the VNP14 Science Datasets (SDS). Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
