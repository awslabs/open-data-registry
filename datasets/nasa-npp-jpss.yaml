  #### VNP18C2
  The VNP18C2 Version 2 is a NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Photosynthetically Active Radiation (PAR) Level 3 CMG product produced at 0.05 degree pixel resolution at daily intervals. PAR is incident solar radiation in the visible spectrum (400-700 nanometers) and is an important variable in land-surface models that address a variety of scientific and application issues. The VNP18 algorithm adapts the narrowband look-up table (LUT) approach to estimate DSR. The LUTs consider different types of loadings of aerosols and clouds at a variety of illumination/viewing geometry. Additional details regarding the methodology used to create the data are available in the Algorithm Theoretical Basis Document (ATBD). The VNP18C2 product is aggregated from VNP18A2 files and includes one set of global 3-hour PAR variables and one set of daily mean PAR.
  <br>

  #### VNP18A2
  The VNP18A2 Version 2 is a NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Photosynthetically Active Radiation (PAR) gridded Level 3 product. It is produced at 1 kilometer pixel resolution at daily intervals. PAR is the incident solar radiation in the visible spectrum (400-700 nanometers) and is a significant variable in land surface models (LSMs), receiving increased attention due to its importance for the management and operation of solar energy systems. The VNP18 algorithm adapts the narrowband look-up table (LUT) approach to estimate PAR. The LUTs consider different types of loadings of aerosols and clouds at a variety of illumination and viewing geometry. The Algorithm Theoretical Basis Document (ATBD) is forthcoming and will provide additional details regarding the methodology used to create the data. Provided in the VNP18A2 product are variables for instantaneous total, direct, and diffuse PAR, as well as 3-hour PAR, daily mean PAR, and a quality variable.
  <br>

  #### VNP09A1
  The VNP09A1 VIIRS Version 1 data product was decommissioned on April 8th, 2025. Users are encouraged to use Version 2 data products, which provide [better calibration and consistency](https://landweb.modaps.eosdis.nasa.gov/data/userguide/VIIRS_Land_C2_Changes_09152022.pdf) for the end user. VIIRS Version 2 data products are available from both the SNPP ([VNP09A1](https://doi.org/10.5067/VIIRS/VNP09A1.002)) and NOAA-20 ([VJ109A1]( https://doi.org/10.5067/VIIRS/VJ109A1.002)) satellites. The 8-day Visible Infrared Imaging Radiometer Suite (VIIRS) surface reflectance (VNP09A1) Version 1 composite product provides an estimate of land surface reflectance from the NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) VIIRS sensor for nine moderate resolution bands (M1 - M5, M7, M8, M10, M11) at nominal 1 kilometer resolution (~926 meter). The 1 kiliometer dataset is derived through resampling the native 750 meter VIIRS resolution in the Level 2 input product. The data are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. Each pixel represents the best possible Level 2G observation during an 8-day period that is selected on the basis of high observation coverage, low sensor angle, the absence of clouds or cloud shadow, and aerosol loading. Included in the product along with the nine reflectance bands are day of year, reflectance band quality, control, reflectance state quality assurance, relative azimuth angle, sensor zenith angle, and solar zenith angle layers. Known Issues: The VIIRS Land Surface Reflectance product (VNP09) may incorrectly flag retrievals as "High Aerosol" over brighter surfaces and at higher view angles. This will impact the downstream VIIRS BRDF/Albedo (VNP43) and Vegetation Index (VNP13) data products which use the aerosol quantity flag to screen out high aerosol values. * Corrections will be implemented in Collection 2 reprocessing in 2022. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and in Section 4.0 "Caveats and Known Problems" of the User Guide.
