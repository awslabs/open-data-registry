  #### VNP43D87
  The VNP43D87 Version 1 data product was decommissioned on July 31, 2025. Users are encouraged to use the [VNP43D87](https://doi.org/10.5067/VIIRS/VNP43D87.002) and [VJ143D87](https://doi.org/10.5067/VIIRS/VJ143D87.002) Version 2 data products. The NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Nadir BRDF-Adjusted Reflectance (NBAR) for Band M10 (VNP43D87) is produced daily using 16 days of data at 30 arc second (1,000 meter) resolution. Data are temporally weighted to the ninth day, which is reflected in the file name. The VNP43D product suite is provided in a Climate Modeling Grid (CMG), which covers the entire globe for use in climate simulation models. Due to the large file size, each VNP43D product contains just one data layer. VNP43D80 through VNP43D89 are the NBAR products of the VNP43D BRDF/Albedo product suite. NBAR values are provided for the nine VIIRS moderate resolution bands (M1 through M5, M7, M8, M10, and M11) included in the [VNP43MA4](https://doi.org/10.5067/VIIRS/VNP43MA4.001) product. In addition to the bands included in VNP43MA4, this product suite includes NBAR values for the VIIRS Day/Night Band (DNB). The NBAR algorithm removes view angle effects from directional reflectances to model the values as if they were collected from a nadir view at local solar noon. Details regarding methodology are available on the [VNP43MA4](https://doi.org/10.5067/VIIRS/VNP43MA4.001) product page and in the Algorithm Theoretical Basis Document (ATBD). VNP43D87 is the NBAR for VIIRS band M10 (1.61 μm). Known Issues: The abnormally high activation of the high aerosol flag in the Collection 1 (C1) VNP09 product has impacted downstream products. The VNP43 BRDF/Albedo/NBAR product is affected by reducing the number of otherwise acceptable observations used as input to characterize surface anisotropy. This effect (most obvious over arid 