  #### VNP43C2
  The VNP43C2 Version 1 data product was decommissioned on July 31, 2025. Users are encouraged to use the [VNP43C2](https://doi.org/10.5067/VIIRS/VNP43C2.002) and [VJ143C1](https://doi.org/10.5067/VIIRS/VJ143C2.002) Version 2 data products. The NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Snow-free Model Parameters Daily Global 0.05 Degree Climate Modeling Grid (CMG) Version 1 product (VNP43C2) is derived from the 30 arc second CMG VNP43D Version 1 product suite. VNP43C2 is generated daily from all available snow-free acquisitions over a 16-day moving window emphasizing the ninth day of the retrieval period, which is reflected in the Julian date in the filename. VNP43C2 supplies the weighting parameters associated with the RossThick/Li-Sparse-Reciprocal BRDF model, which is used to produce the [VNP43C3](https://doi.org/10.5067/VIIRS/VNP43C3.001) Albedo and [VNP43C4](https://doi.org/10.5067/VIIRS/VNP43C4.001) Nadir BRDF-Adjusted Reflectance (NBAR) products. The highest quality full inversion values are used for the temporal fitting effort and supplemented with lower quality pixels, spatial fitting, and spatial smoothing as needed. The status of each pixel can be found in the ancillary layers. Users are encouraged to assess the quality information before using the BRDF/Albedo data. This 0.05 degree (5,600 meters at the equator) CMG product covers the entire globe for use in climate simulation models. The VNP43C2 product includes 39 layers containing the three parameters (fiso, fvol, and fgeo) for the VIIRS Day/Night band (DNB), moderate resolution bands M1 through M5, M7, M8, M10, and M11, as well as the shortwave band, visible band, and near-infrared (NIR) broadbands. Along with the parameter data for the 13 bands are four ancillary layers for uncertainty, quality, local solar noon, and percent finer resolution inputs. Known Issues: T