  #### VNP03MODLL
  The VNP03MODLL Version 1 data product was decommissioned on July 31, 2025. Forward processing of VNP03MODLL Version 1 data product was discontinued on June 17, 2024. Users are encouraged to use the [VNP03MODLL](https://doi.org/10.5067/VIIRS/VNP03MODLL.002) Version 2 and [VJ103MODLL](https://doi.org/10.5067/VIIRS/VJ103MODLL.021) Version 2.1 data products. The Visible Infrared Imaging Radiometer Suite (VIIRS) Moderate Resolution Terrain Correction Geolocation (VNP03MODLL) Version 1 product from the NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) VIIRS sensor is produced in 6 minute temporal satellite increments (swaths) at 750 meter resolution. Intersecting the VIIRS line of sight vector with Earth's geoid and the World Geodetic System (WGS) ellipsoid, this product is based on the SRTM30 Version 2 digital elevation model (DEM), which uses GTOPO30 data for areas from 60° North to 60° South. VNP03MODLL is a terrain correction geolocation product that provides the spatial location for various VIIRS data products. Each swath of data is approximately 3,060 kilometers along track (long) and 3,060 kilometers across track (wide). Provided in the VNP03MODLL product are layers for height, latitude, and longitude. These Science Data Sets (SDS) layers are used in conjunction with the [VNP14](https://doi.org/10.5067/viirs/vnp14.001) swath product for accurate geolocation information. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/cgi-bin/QS/new/pages.cgi?name=known_issues).
