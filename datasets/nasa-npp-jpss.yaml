  #### VNP43D67
  The VNP43D67 Version 1 data product was decommissioned on July 31, 2025. Users are encouraged to use the [VNP43D67](https://doi.org/10.5067/VIIRS/VNP43D67.002) and [VJ143D67](https://doi.org/10.5067/VIIRS/VJ143D67.002) Version 2 data products. The NASA/NOAA Suomi National Polar-orbiting Partnership (Suomi NPP) Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo white-sky albedo for band M1 (VNP43D67) is produced daily using 16 days of data at 30 arc second (1,000 meter) resolution. Data are temporally weighted to the ninth day, which is reflected in the file name. The VNP43D product suite is provided in a Climate Modeling Grid (CMG), which covers the entire globe for use in climate simulation models. Due to the large file size, each VNP43D product contains just one data layer. VNP43D54 through VNP43D79 are the albedo products of the VNP43D BRDF/Albedo product suite. Black-sky albedo (BSA) and white-sky albedo (WSA) values are provided for the nine VIIRS moderate resolution bands (M1 through M5, M7, M8, M10, and M11) along with the visible, near-infrared (NIR), and shortwave bands included in the [VNP43MA3](https://doi.org/10.5067/VIIRS/VNP43MA3.001) product. In addition to the bands included in VNP43MA3, this product suite includes albedo values for the VIIRS Day/Night Band (DNB). The black-sky albedo (directional hemispherical reflectance) is defined as albedo in the absence of a diffuse component and is a function of solar zenith angle. White-sky albedo (bihemispherical reflectance) is defined as albedo in the absence of a direct component when the diffuse component is isotropic. Details regarding methodology are available on the [VNP43MA3](https://doi.org/10.5067/VIIRS/VNP43MA3.001) product page and in the Algorithm Theoretical Basis Document (ATBD). VNP43D67 is the WSA for VIIRS band M1 (0.412 μm). Known Issues: The abnormally high activation of the high aerosol flag in the Collection 1 (C1) VNP09