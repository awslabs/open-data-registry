Name: Genoxus Annotation
Description: 
  Genoxus Annotation is a harmonized and curated collection of human genetic variant databases designed to support accurate and salable variant annotation. Variant annotation following genetic testing such as whole genome sequencing (WGS) or whole exome sequencing (WES) is a critical step in identifying and interpreting disease-associated genetic factors. As sequencing technologies continue to generate large volumes of
  genomic data, robust and well-structured annotation resources are essential for translating raw variant calls into clinically meaningful insights.
  
  Genoxus Annotation v1.0 integrates data from NCBI ClinVar. ClinVar provides curated information on the clinical significance of a broad spectrum of genetic variants including single nucleotide variants (SNVs), insertions (INS), deletions (DEL), INDELs, copy number variations (CNVs), and structural variants (SVs) along with their associated diseases and traits. 
  
  GWAS catalog complements ClinVar by focusing primarily on SNVs identified through genome wide association studies, linking common variants to complex diseases and phenotype traits. (GWAS data is planned in a future release.) By harmonizing variant representations, standardizing disease terminology, and consolidating evidence across sources, Genoxus Annotation provides a unified framework that streamlines variant interpretation for research and clinical applications.

