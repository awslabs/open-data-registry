Name: NASA WELD Project
Description: |
  WELDLCLUC.015 was decommissioned on December 2, 2019. The Web-Enabled Landsat Data (WELD) 5-year Land Cover Land Use Change (LCLUC) is a composite of 30 meter (m) land use land change product for the contiguous United States (CONUS). The data were generated from five years of consecutive growing season WELD weekly composite inputs from April 15, 2006, to November 17, 2010. WELD data are created using Landsat Thematic Mapper Plus (ETM+) Terrain Corrected data. This product includes data about tree cover loss and bare ground gain, which are composited over the five year period. WELD LCLUC is distributed in Hierarchical Data Format 4 (HDF4). The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDAKLL
  WELDAKLL.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. The NASA Web-Enabled Landsat Data (WELD) Alaska Latitude Longitude (LL) products are defined with 30 meter (m) composite pixel of the center latitude/longitude point. The NASA WELD data contain a range of values for the minimum/maximum latitude and longitude points. The LL products were created to account for the actual center pixel latitude and longitude points. WELD systematically generated 30 m composited Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012 to provide consistent data for deriving land cover as well as geophysical and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. WELDAKLL is distributed in Hierarchical Data Format 4 (HDF4). The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDAKYR
  WELDAKYR.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved yearly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDYR.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDYR.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDYR.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012. These products provide consistent data to derive land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. This product includes Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. WELDAKYR is distributed in Hierarchical Data Format 4 (HDF4). The annual products include the preceding year’s December through the current year’s November. The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDAKMO
  WELDAKMO.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012. These mosaics provide consistent data for deriving land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. The Alaska Monthly products are defined with respect to each calendar year by the days in each month. This product includes Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. These products are distributed in Hierarchical Data Format 4 (HDF4). The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide. Improvements/Changes from Previous Version * Version 1.5 is the original version.
  <br>

  #### WELDAKSE
  WELDAKSE.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012. The mosaics provide consistent data for deriving land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. This product includes Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. WELDAKSE is distributed in Hierarchical Data Format 4 (HDF4). In the Alaska seasonal products, seasons are defined as follows: Winter: December, January, February Spring: March, April, May Summer: June, July, August Autumn: September, October, November The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDAKWK
  WELDAKWK.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2003 to 2012. These mosaics provide consistent data to derive land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. This product includes Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. WELDAKWK is distributed in Hierarchical Data Format 4 (HDF4). The WELD weekly products are defined with respect to each calendar year and as consecutive 7 day products with the following examples defined for the weeks: Week01: January 1 to January 7 Week02: January 8 to January 14 Week52: December 24 to December 30 (non-leap years) Week52: December 23 to December 29 (leap years) Week53: December 31 (non-leap years) Week53: December 30 to December 31 (leap years) The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDUSLL
  WELDUSLL.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012. These mosaics provide consistent data to derive land cover as well as geophysical and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. The Conterminous (CONUS) United States Latitude/Longitude (WELDUSLL) products provide the geographic latitude and longitude for the center of each 30 meter (m) pixel within a tile of WELD data. WELDUSLL is distributed in Hierarchical Data Format 4 (HDF4). The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDUSYR
  WELDUSYR.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved yearly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDYR.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDYR.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDYR.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012. These products provide consistent data to derive land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. The WELD Conterminous (CONUS) United States Annual (WELDUSYR) products include Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. WELDUSYR is distributed in Hierarchical Data Format 4 (HDF4). The WELDUSYR products include the preceding year’s December through the current year’s November. For example, for the year 2007, the product includes data from December 1, 2006, through November 30, 2007. The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDUSMO
  WELDUSMO.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012. These mosaics provide consistent data to derive land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. The WELD Conterminous (CONUS) United States Monthly products include Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. These products are distributed in Hierarchical Data Format 4 (HDF4). WELDUSMO products are defined by a calendar month (e.g. January, February, March, etc.) for December 2002 through November 2012. The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDUSSE
  WELDUSSE.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2002 to 2012. The mosaics provide consistent data to derive land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. The Conterminous (CONUS) United States Seasonal (WELDUSSE) product include Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. WELDUSSE is distributed in Hierarchical Data Format 4 (HDF4). In the WELDUSSE products, seasons are defined as follows: Winter: December, January, February Spring: March, April, May Summer: June, July, August Autumn: September, October, November The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
  <br>

  #### WELDUSWK
  WELDUSWK.015 was decommissioned on December 2, 2019. Users are encouraged to use the improved monthly Global Web-Enabled Landsat Data (GWELD) [Version 3](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.003), [3.1](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.031), and [3.2](https://doi.org/10.5067/MEaSUREs/GWELD/GWELDMO.032) datasets. NASA’s Web-Enabled Landsat Data (WELD) are generated from composited 30 meter (m) Landsat Enhanced Thematic Mapper Plus (ETM+) mosaics of the United States and Alaska from 2003 to 2012. These mosaics provide consistent data to derive land cover, geophysical, and biophysical products for regional assessments of surface dynamics for effective study of Earth system function. The WELD Conterminous (CONUS) United States Weekly (WELDUSWK) products include Top of Atmosphere (TOA) Reflectance and Brightness Temperature, along with the Normalized Difference Vegetation Index (NDVI) generated from Band 3 and Band 4 TOA Reflectance. WELDUSWK is distributed in Hierarchical Data Format 4 (HDF4). WELDUSWK products are consecutive 7 day products for 2003 through 2012. Individual weeks are defined as follows: Week01: January 1 to January 7 Week02: January 8 to January 14 Week52: December 24 to December 30 (non-leap years) Week52: December 23 to December 29 (leap years) Week53: December 31 (non-leap years) Week53: December 30 to December 31 (leap years) The WELD project is funded by the National Aeronautics and Space Administration (NASA) and is a collaboration between the United States Geological Survey (USGS) Earth Resources Observation and Science (EROS) Center and the South Dakota State University (SDSU) Geospatial Sciences Center of Excellence (GSCE). Known Issues: WELD Version 1.5 known issues can be found in the WELD Version 1.5 User Guide.
