Name: 'ECMWF real-time forecasts'
Description: |
  These products are a subset of the ECMWF real-time forecast data and are made available to the public free of charge. They are based on the medium-range (high-resolution and ensembles) forecast models.
  Note: The ECMWF Open Data Portal provides a rolling archive (most recent forecast runs), while the AWS replica bucket is updated as new data are published and may retain older data conventions/versions over time.
Documentation: "[User Documentation](https://confluence.ecmwf.int/display/DAC/ECMWF+open+data%3A+real-time+forecasts+from+IFS+and+AIFS)"
Contact: https://support.ecmwf.int
ManagedBy: "[European Centre for Medium-Range Weather Forecasts](https://www.ecmwf.int/)"
UpdateFrequency: |
  IFS data is published according to the [real-time dissemination schedule](https://confluence.ecmwf.int/display/DAC/Dissemination+schedule), while AIFS data is published as soon as it is available for dissemination.
