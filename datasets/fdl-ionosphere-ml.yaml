Name: Machine Learning Ready Dataset for Ionospheric Forecasting Models
Description: This dataset is machine learning ready to enable the development of ionospheric forecasting models and includes preprocessed and cleaned TEC data from Madrigal, Google Android, and JPLD sources, as well as solar and geomagnetic driver data from OMNI-Web, Celestrak, Space Environment Technologies, and SDO-FM embeddings of the SDO dataset. It supports both sparse and dense TEC modeling frameworks, such as IonCast and IonoPy. This research is the result of the Frontier Development Lab, Heliolab a partnership between NASA, Trillium Technologies Inc. (USA), Google Cloud, NVIDIA and Pasteur Labs, Contract No. 80GSFC23CA040. For a full description of the dataset, refer to the paper.
Documentation: https://github.com/FrontierDevelopmentLab/2025-HL-Ionosphere-dataset
Contact: linnea@wolniewicz.com
ManagedBy: '[Frontier Development Lab](https://frontierdevelopmentlab.org/)'
Tags:
  - machine learning
  - space weather
License: There are no restrictions on the use of this data.
Citation: Wolniewicz, Linnea M., et al. "Connecting the Dots A Machine Learning Ready Dataset for Ionospheric Forecasting Models." arXiv, Nov. 2025, https://doi.org/10.48550/arXiv.2511.15743.
Resources:
  - Description: Preprocessed data files including Madrigal and Google Android datasets (for sparse TEC models), JPLD data (for dense TEC models), and solar and geomagnetic driver data (OMNI-Web, Celestrak, Space Environment Technologies, and SDO-FM). The data files from each source are available in their respective folders (data has already been preprocessed and cleaned for machine learning applications). To see preprocessing steps, please refer to our publications, related GitHub repository used to train ML models (https://github.com/FrontierDevelopmentLab/2025-HL-Ionosphere/tree/main/scripts/data_processing), or contact the authors.
    ARN: arn:aws:s3:::nasa-radiant-data/helioai-datasets/ionosphere-data-public/
    Region: us-east-1
    Type: S3 Bucket
