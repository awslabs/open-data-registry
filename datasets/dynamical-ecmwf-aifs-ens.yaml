Name: ECMWF AIFS ENS - dynamical.org Icechunk Zarr
Description: |
    <p>The Artificial Intelligence Forecasting System (AIFS) is a data driven forecast model developed by the European Centre for Medium-Range Weather Forecasts (ECMWF). AIFS-ENS is the ensemble configuration of AIFS, containing 51 ensemble members. AIFS is trained on ECMWF's ERA5 re-analysis and ECMWF's operational numerical weather prediction (NWP) analyses.</p>
    <p>These datasets have been translated to cloud-optimized Icechunk Zarr format by <a href="https://dynamical.org">dynamical.org</a>.</p>
    <ul>
      <li><a href="https://dynamical.org/catalog/ecmwf-aifs-ens-forecast/">ECMWF AIFS ENS forecast</a> - Ensemble weather forecasts from the ECMWF Artificial Intelligence Forecasting System (AIFS) ENS model.</li>
    </ul>
