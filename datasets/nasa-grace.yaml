- Description: "GRC-GFO_GRIDDED_AOD1B_JPL_1-DEG_RL06.3 vRL06.3 - GRACE non-tidal high-frequency atmospheric and oceanic mass variation models are routinely generated at GFZ as so-called Atmosphere and Ocean De-aliasing Level-1B (AOD1B) products (in terms of corresponding spherical harmonic geopotential coefficients) to be added to the background static gravity model during GRACE monthly gravity field determination. AOD1B products are 3-hourly series of spherical harmonic coefficients up to degree and order 180 which are routinely provided to the GRACE Science Data System and the user community with only a few days time delay."
  ARN: arn:aws:s3:::podaac-ops-cumulus-protected/GRC-GFO_GRIDDED_AOD1B_JPL_1-DEG_RL06.3
  Region: us-west-2
  Type: S3 Bucket
  RequesterPays: false
  ControlledAccess: https://archive.podaac.earthdata.nasa.gov/s3credentials
- Description: "TELLUS_GLDAS-NOAH-3.3_TWS-ANOMALY_MONTHLY v3.3 - The total land water storage anomalies are aggregated from the Global Land Data Assimilation System (GLDAS) NOAH model. GLDAS outputs land water content by using numerous land surface models and data assimilation."
  ARN: arn:aws:s3:::podaac-ops-cumulus-protected/TELLUS_GLDAS-NOAH-3.3_TWS-ANOMALY_MONTHLY
