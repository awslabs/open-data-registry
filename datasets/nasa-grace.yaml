- Description: "TELLUS_GRAC_L3_CSR_RL06_OCN_v04 vRL06v04 - The monthly ocean bottom pressure anomaly grids are given as equivalent water thickness changes derived from GRACE & GRACE-FO time-variable gravity observations during the specified timespan, and relative to the specified time-mean reference period. The Equivalent water thickness represent sea floor pressure changes due to the integral effect of ocean and atmosphere processes, including global mean ocean bottom pressure changes (mean ocean mass and mean atmosphere mass over the global oceans)."
