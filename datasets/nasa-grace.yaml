- Description: "TELLUS_GRAC-GRFO_MASCON_GRID_RL06.3_V4 vRL06.3Mv04 - This dataset contains gridded monthly global water storage/height anomalies relative to a time-mean, derived from GRACE and GRACE-FO and processed at JPL using the Mascon approach (RL06.3Mv04). These data are provided in a single data file in netCDF format, and can be used for analysis for ocean, ice, and hydrology phenomena."
  ARN: arn:aws:s3:::podaac-ops-cumulus-protected/TELLUS_GRAC-GRFO_MASCON_GRID_RL06.3_V4
