- Description: "TELLUS_GIA_L3_0.5-DEG_V1.0 v1.0 - Glacial isostatic adjustment (GIA) is an ongoing geophysical process and is measured by gravimetry satellites like GRACE and GRACE-FO. To isolate signals of contemporary surface mass loss in the cumulative satellite gravimetry measurements, contemporary GIA rates are computed and subtracted from the satellite gravimetry observations."
  ARN: arn:aws:s3:::podaac-ops-cumulus-protected/TELLUS_GIA_L3_0.5-DEG_V1.0
  Region: us-west-2
  Type: S3 Bucket
  RequesterPays: false
