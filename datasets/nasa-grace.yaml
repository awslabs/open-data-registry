  #### TELLUS_GRAC-GRFO_MASCON_CRI_GRID_RL06.3_V4
  This dataset contains gridded monthly global water storage/height anomalies relative to a time-mean, derived from GRACE and GRACE-FO and processed at JPL using the Mascon approach (RL06.3Mv04). A Coastal Resolution Improvement (CRI) filter has been applied to this data set to reduce signal leakage errors across coastlines. For most land hydrology, oceanographic as well as land-ice applications this is the recommend data set for the analysis of surface mass changes. The data are provided in a single data file in netCDF format, with water storage/height anomalies in equivalent water thickness units (cm). The data are derived from solving for monthly gravity field variations on geolocated spherical cap mass concentration functions, rather than global spherical harmonic coefficients. Additionally, realistic geophysical information is introduced during the computation to intrinsically remove correlated errors. Thus, these Mascon grids do not need to be de-correlated or smoothed, like traditional spherical harmonic gravity solutions. <br><br> The complete Mascon solution consists of 4,551 independent estimates of surface mass change that have been derived using an equal-area 3-degree grid of individual mascons. A subset of these individual mascons span coastlines, and contain mixed land and ocean mass change signals. In a post-processing step, the CRI filter is applied to those mixed land/ocean Mascons to separate land and ocean mass. The land mask used to perform this separation is provided in the same directory as this dataset, as are uncertainty values, and the gridded mascon-ID number to enable further analysis. Since the individual mascons act as an inherent smoother on the gravity field, a set of optional gain factors (or scale factors) is provided within the netCDF and can be applied to the solution to study mass change signals at sub-mascon resolution (e.g. for continental hydrology applications). For use-case examples and further background on the gain factors, please see Wiese, Landerer & Watkins, 2016, https://doi.org/10.1002/2016WR019344. <br><br> This RL06.3Mv04 is an updated version of the previous Tellus JPL Mascon RL06.1Mv03 (DOI, 10.5067/TEMSC-3JC63). For a detailed description on the Mascon solution, including the mathematical derivation, implementation of geophysical constraints, and solution validation, please see Watkins et al., 2015, doi: 10.1002/2014JB011547. For a detailed description of the CRI filter implementation, please see Wiese et al., 2016, doi:10.1002/2016WR019344.
  <br>

  #### TELLUS_GRAC-GRFO_MASCON_GRID_RL06.3_V4
  This dataset contains gridded monthly global water storage/height anomalies relative to a time-mean, derived from GRACE and GRACE-FO and processed at JPL using the Mascon approach (RL06.3Mv04). These data are provided in a single data file in netCDF format, and can be used for analysis for ocean, ice, and hydrology phenomena. The data are provided in a single data file in netCDF format, with water storage/height anomalies in equivalent water thickness units (cm). The data are derived from solving for monthly gravity field variations on geolocated spherical cap mass concentration functions, rather than global spherical harmonic coefficients. Additionally, realistic geophysical information is introduced during the computation to intrinsically remove correlated errors. Thus, these Mascon grids do not need to be de-correlated or smoothed, like traditional spherical harmonic gravity solutions. <br><br> The complete Mascon solution consists of 4,551 independent estimates of surface mass change that have been derived using an equal-area 3-degree grid of individual mascons. Please note that this dataset does not correct for leakage errors across coastlines; it is therefore recommended only for users who want to apply their own algorithm to separate between land and ocean mass very near coastlines. <br><br> This RL06.3Mv04 is an updated version of the previous Tellus JPL Mascon RL06.1Mv03. For more information, please visit https://grace.jpl.nasa.gov/data/get-data/jpl_global_mascons/. For a detailed description on the Mascon processing, including the mathematical derivation, implementation of geophysical constraints, and validation, please see Watkins et al., 2015, doi: 10.1002/2014JB011547. This product is intended for expert use only; other users are encouraged to use the CRI-filtered Mascon dataset, which is available here: https://podaac.jpl.nasa.gov/dataset/TELLUS_GRAC-GRFO_MASCON_GRID_RL06.3_V4.
  <br>

  #### GRC-GFO_GRIDDED_AOD1B_JPL_1-DEG_RL06.3
  GRACE non-tidal high-frequency atmospheric and oceanic mass variation models are routinely generated at GFZ as so-called Atmosphere and Ocean De-aliasing Level-1B (AOD1B) products (in terms of corresponding spherical harmonic geopotential coefficients) to be added to the background static gravity model during GRACE monthly gravity field determination. AOD1B products are 3-hourly series of spherical harmonic coefficients up to degree and order 180 which are routinely provided to the GRACE Science Data System and the user community with only a few days time delay. These products reflect spatio-temporal mass variations in the atmosphere and oceans deduced from an operational atmospheric model and corresponding ocean dynamics provided by an ocean model. The variability is derived by subtraction of a long-term mean of vertical integrated atmospheric mass distributions and a corresponding mean of ocean bottom pressure as simulated with the ocean model. <br><br> The Gridded AOD1B data sets provided here contain the monthly mean AOD1B data in geolocated gridded form, smoothed or spatially aggregated to be consistent with the GRACE and GRACE-FO Tellus Level-3 data products of land and/or ocean mass anomalies. With these gridded AOD1B Level-3 products, users can remove or add the effects of the modeled mean monthly atmospheric and ocean bottom pressure change (e.g., to compare different models).
  <br>

  #### TELLUS_GLDAS-NOAH-3.3_TWS-ANOMALY_MONTHLY
  The total land water storage anomalies are aggregated from the Global Land Data Assimilation System (GLDAS) NOAH model. GLDAS outputs land water content by using numerous land surface models and data assimilation. For more information on the GLDAS project and model outputs please visit https://ldas.gsfc.nasa.gov/gldas. The aggregated land water anomalies (sum of soil moisture, snow, canopy water) provided here can be used for comparison against and evaluations of the observations of Gravity Recovery and Climate Experiment (GRACE) and GRACE-FO over land. The monthly anomalies are computed over the same days during each month as GRACE and GRACE-FO data, and are provided on monthly 1 degree lat/lon grids in NetCDF format. Currently, the days included in these monthly anomaly computation are same as GRACE-FO monthly Level-2 RL06.3 JPL solutions.
  <br>

  #### TELLUS_GIA_L3_0.5-DEG_V1.0
  Glacial isostatic adjustment (GIA) is an ongoing geophysical process and is measured by gravimetry satellites like GRACE and GRACE-FO. To isolate signals of contemporary surface mass loss in the cumulative satellite gravimetry measurements, contemporary GIA rates are computed and subtracted from the satellite gravimetry observations. The GIA correction models provided here are filtered such that they are compatible with Level-3 post-processing filters applied to GRACE(-FO) data as indicated in the [product_id]. In this way, user can effectively assess the impact of the applied GIA correction, and substitute different GIA models should that be desired. This GIA dataset is mapped into 0.5-degree global grid compatible with the JPL Mascon solution, provided in netCDF format.
  <br>

  #### ANTARCTICA_MASS_TELLUS_MASCON_CRI_TIME_SERIES_RL06.3_V4
  This dataset is a time series of mass variability averaged over all of Antarctica. It provides the ice mass changes of Antarctica over time. The mass variability are derived from JPL GRACE Mascon Ocean, Ice, and Hydrology Equivalent Water Height CRI Filtered RL063Mv04 dataset, which can be found at https://doi.org/10.5067/TEMSC-3JC634. A more detailed description on the Mascon solution, including the mathematical derivation, implementation of geophysical constraints, and solution validation, please see Watkins et al., 2015, doi: 10.1002/2014JB011547. The mass variability are provided as an ASCII table.
  <br>

  #### GREENLAND_MASS_TELLUS_MASCON_CRI_TIME_SERIES_RL06.3_V4
  This dataset is a time series of mass variability averaged over all of the global ocean. It provides the non-steric or mass only sea level changes over time. The mass variability are derived from JPL GRACE Mascon Ocean, Ice, and Hydrology Equivalent Water Height CRI Filtered RL06.3Mv04 dataset, which can be found at https://doi.org/10.5067/TEMSC-3JC634. A more detailed description on the Mascon solution, including the mathematical derivation, implementation of geophysical constraints, and solution validation, please see Watkins et al., 2015, doi: 10.1002/2014JB011547. The mass variability is provided as an ASCII table.
