- Description: "TELLUS_GRAC-GRFO_MASCON_CRI_GRID_RL06.3_V4 vRL06.3Mv04 - This dataset contains gridded monthly global water storage/height anomalies relative to a time-mean, derived from GRACE and GRACE-FO and processed at JPL using the Mascon approach (RL06.3Mv04). A Coastal Resolution Improvement (CRI) filter has been applied to this data set to reduce signal leakage errors across coastlines."
  ARN: arn:aws:s3:::podaac-ops-cumulus-protected/TELLUS_GRAC-GRFO_MASCON_CRI_GRID_RL06.3_V4
  Region: us-west-2
