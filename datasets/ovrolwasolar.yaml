Name: OVRO LWA Solar Observation
Description: >
  This dataset contains long-term low-frequency solar radio imaging spectroscopy
  observations from the Owens Valley Radio Observatory Long Wavelength Array
  (OVRO-LWA). The data are produced from solar radio interferometric observations
  and distributed as HDF5 spectral image products and FITS all-day spectrogram
  products, with metadata describing the observation time, frequency coverage,
  imaging products, and other relevant parameters. The dataset provides dynamic,
  imaging-based measurements of solar radio emission at low frequencies, which are
  closely connected to solar coronal activity, solar radio bursts, and space weather
  phenomena. These observations support studies of solar eruptions, particle
  acceleration, coronal plasma properties, radio wave propagation, and machine
  learning applications for solar radio burst detection, event classification,
  anomaly detection, and space weather prediction.
Documentation: https://ovsa.njit.edu/lwa/
Contact: Peijin Zhang <peijin.zhang@njit.edu>
ManagedBy: New Jersey Institute of Technology
UpdateFrequency: >
  New observations are added regularly. The dataset currently contains
  approximately 12 TB and grows by approximately 9 TB per year.
