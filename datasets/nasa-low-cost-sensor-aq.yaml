  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.asdc.earthdata.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
