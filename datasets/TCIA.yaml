Name: The Cancer Imaging Archive (TCIA)
Description: This dataset holds Cancer-related imaging and other data that has been curated by The Cancer Imaging Archive (TCIA) team and that is not currently available in the Imaging Data Commons (IDC - see https://registry.opendata.aws/nci-imaging-data-commons/). The data includes whole slide pathology data in a variety of formats, data in the NFiTI or BIDS research formats, as well as data in various multi-media formats such as mpeg, jpeg, tiff, etc. Data from TCIA in DICOM format is copied to IDC, and is not duplicated here. Hence, see both AWS datasets to get all publicly-available TCIA data.
Documentation: https://cancerimagingarchive.net
Contact: help@cancerimagingarchive.net
ManagedBy: The Cancer Imaging Archive team, centered at the University of Arkansas for Medical Sciences, under contract to the National Cancer Institute Cancer Imaging Program administered by Frederick National Laboratory
UpdateFrequency: Rolling updates, after approved datasets complete the data curation process.  Typically one or more datasets come out each month.
