License: CC By, either 4.0 or 3.0, in very few cases NC.  The exact licenses used by each collection is described on the landing page for each collection, found by following the links in the collection table at https://www.cancerimagingarchive.net/browse-collections/.  The most common license is CC By 4.0 (Attribution 4.0 International)
Citation: The landing page for each collection includes a section titled, "Citations & Data Usage Policy", with collection-specific instructions for citing that collection.  Each collection also is referenced by a Digital Object Identifier (DOI).  See also the "Attribution Requirements" section at https://www.cancerimagingarchive.net/data-usage-policies-and-restrictions/
Resources:
  - Description: There are two main prefixes in the TCIA open data bucket. The first, "manifests/", prefixes objects named for each TCIA collection. These manifest objects are comma separated value files that list objects that are part of a particular version or subset of a collection. These manifests correspond to the Aspera Faspex packages referenced on TCIA's main web site and are suitable for feeding into programs used to analyze or download the data in the collection. The second top level prefix, "data/" organizes the data objects themselves that are listed in those manifests. The objects in "data/" have subprefixes identifying the collection the data object belongs to.  The format is "data/<collection name>/<object name>".  Objects prefixed by "data/" may be referred to by more than one manifest in "manifests/".
    ARN: arn:aws:s3:::tcia-open-data
    Region: TBD
    Type: S3 Bucket
    Explore: aws s3 ls --no-sign-request s3://tcia-open-data/
