e retrieval depends on the amount of measurements with a high cloud cover. The products are restricted in the tropical region (-20 degrees to 20 degrees of latitude). The main outputs of the Copernicus S5P/TROPOMI tropospheric ozone product include the tropospheric ozone column and corresponding errors, upper tropospheric ozone and corresponding errors, stratospheric ozone column and corresponding errors, and the retrieval quality flags. The data are stored in an enhanced netCDF-4 format. Data are stored in individual files, or granules, that contain one orbit of information. The data are stored in netCDF4 data format and files and complete files are ~20 MB.
