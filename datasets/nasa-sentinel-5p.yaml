  #### S5P_L2__NP_BD7_HiR
  Starting from August 6th in 2019, Sentinel-5P TROPOMI along-track high spatial resolution (~5.5km at nadir) has been implemented. For data before August 6th of 2019, please check S5P_L2__NP_BD7_1 data collection. The Copernicus Sentinel-5 Precursor (Sentinel-5P or S5P) satellite mission is one of the European Space Agency's (ESA) new mission family - Sentinels, and it is a joint initiative between the Kingdom of the Netherlands and the ESA. The sole payload on Sentinel-5P is the TROPOspheric Monitoring Instrument (TROPOMI), which is a nadir-viewing 108 degree Field-of-View push-broom grating hyperspectral spectrometer, covering the wavelength of ultraviolet-visible (UV-VIS, 270nm to 495nm), near infrared (NIR, 675nm to 775nm), and shortwave infrared (SWIR, 2305nm-2385nm). Sentinel-5P is the first of the Atmospheric Composition Sentinels and is expected to provide measurements of ozone, NO2, SO2, CH4, CO, formaldehyde, aerosols and cloud at high spatial, temporal and spectral resolutions. Copernicus Sentinel-5P is flying in a loose formation with U.S. Suomi National Polar-orbiting Partnership (SNPP) so that S5P is able to utilize the high spatial resolution capability of the Visible Infrared Imager Radiometer Suite (VIIRS) instrument. S5P_L2_NP_BDx product contains VIIRS cloud information for each S5P across-track observation in a given band (i.e. band 3, band 6 and band 7). In addition to the nominal filed-of-view (FOV), the S5P_NPPC products are also generated for three scaled FOVs both in along and across-track directions to account for the presence of cloud covering a more extended area than the nominal FOV. The main output of S5P_L2_NP_BDx are the number of VIIRS pixels classified as confidently cloudy, probably cloudy, probably clear, and confidently clear; and the VIIRS sun-normalized radiance information in band M7, M9, and M11 such as mean, standard deviation, as well as number of valid radiance contributions.
