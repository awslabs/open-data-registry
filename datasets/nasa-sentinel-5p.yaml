  #### S5P_L2__CLOUD__HiR
  Starting from August 6th in 2019, Sentinel-5P TROPOMI along-track high spatial resolution (~5.5km at nadir) has been implemented. Starting from July 13th in 2020, five Sentinel-5P TROPOMI level-2 products including total and tropospheric column ozone, sulfur dioxide, CLOUD, and formaldehyde have been generated in processor version 2. For data before August 6th of 2019, please check S5P_L2__CLOUD__1 data collection. For data between August 6th of 2019 and July 13th of 2020, please check S5P_L2__CLOUD__HiR_1 data collection. For data after July 13th of 2020, please check S5P_L2__CLOUD__HiR_2 data collection. The Copernicus Sentinel-5 Precursor (Sentinel-5P or S5P) satellite mission is one of the European Space Agency's (ESA) new mission family - Sentinels, and it is a joint initiative between the Kingdom of the Netherlands and the ESA. The sole payload on Sentinel-5P is the TROPOspheric Monitoring Instrument (TROPOMI), which is a nadir-viewing 108 degree Field-of-View push-broom grating hyperspectral spectrometer, covering the wavelength of ultraviolet-visible (UV-VIS, 270nm to 495nm), near infrared (NIR, 675nm to 775nm), and shortwave infrared (SWIR, 2305nm-2385nm). Sentinel-5P is the first of the Atmospheric Composition Sentinels and is expected to provide measurements of ozone, NO2, SO2, CH4, CO, formaldehyde, aerosols and cloud at high spatial, temporal and spectral resolutions. The TROPOMI Cloud products are retrieved by two algorithms. The S5P_CLOUD_OCRA is based on the Optical Cloud Recognition Algorithm which generates the fractional cloud cover. The S5P_CLOUD_ROCINN (the Retrieval Of Cloud Information through Neural Networks algorithm) is built on measurements in and around the O2 A-band, which produces the cloud optical thickness and the cloud top height.
