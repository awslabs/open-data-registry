  #### S5P_L2__CO_____HiR
  Starting from August 6th in 2019, Sentinel-5P TROPOMI along-track high spatial resolution (~5.5km at nadir) has been implemented. For data before August 6th of 2019, please check S5P_L2__CO_____1 data collection. The Copernicus Sentinel-5 Precursor (Sentinel-5P or S5P) satellite mission is one of the European Space Agency's (ESA) new mission family - Sentinels, and it is a joint initiative between the Kingdom of the Netherlands and the ESA. The sole payload on Sentinel-5P is the TROPOspheric Monitoring Instrument (TROPOMI), which is a nadir-viewing 108 degree Field-of-View push-broom grating hyperspectral spectrometer, covering the wavelength of ultraviolet-visible (UV-VIS, 270nm to 495nm), near infrared (NIR, 675nm to 775nm), and shortwave infrared (SWIR, 2305nm-2385nm). Sentinel-5P is the first of the Atmospheric Composition Sentinels and is expected to provide measurements of ozone, NO2, SO2, CH4, CO, formaldehyde, aerosols and cloud at high spatial, temporal and spectral resolutions. The TROPOMI Carbon Monoxide total column applies a modified SWIR CO retrieval (SICOR) algorithm based on the CO absorption band between 2305 nm and 2385 nm. The S5P SICOR algorithm accounts for cloudy and aerosol loaded atmosphere conditions and is suitable for clear sky observations over land and cloudy observations over both land and oceans.
