Name: "Accelerating Medicines Partnership Alzheimer's Disease (AMP-AD) Diverse Cohorts Study"

Description: |
  The Accelerating Medicines Partnership Alzheimer's Disease (AMP-AD) Diverse
  Cohorts Study is a cross-consortium project generating harmonized datasets
  from diverse human cohorts. It provides post-mortem multi-omic data from more
  than 850 individuals representing the spectrum of Alzheimer's disease
  phenotypes, with substantial representation of Black or African American and
  Hispanic or Latino individuals. Data were generated by research teams at Rush
  University, Emory University, Mayo Clinic, Columbia University, and the Icahn
  School of Medicine at Mount Sinai.

