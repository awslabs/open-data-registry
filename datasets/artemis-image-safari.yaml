Resources:
  - Description: >
      Artemis structured phenotyping images (1,387,665 images, four crops:
      common bean, cowpea, soybean, sorghum) with linked agronomic, genotypic,
      and environmental metadata. Field images (JPEG, original acquisition
      resolution), semantic segmentation masks (PNG), and object-level
      annotations (COCO JSON) organised by crop species, collection site, and
      acquisition date. Parquet and CSV metadata tables under each crop
      directory's metadata/ subtree.
    ARN: arn:aws:s3:::[S3_BUCKET_NAME]/Artemis
    Region: us-east-1
    Type: S3 Bucket
    Explore:
      - '[Browse Bucket](https://[S3_BUCKET_NAME].s3.amazonaws.com/index.html#Artemis/)'
  - Description: >
      Image Safari diversity-driven crop images (6,081,555 images, 18 crops)
      across nine countries in sub-Saharan Africa. Field images (JPEG, original
      acquisition resolution), semantic segmentation masks (PNG), and
      object-level annotations (COCO JSON) organised by crop species,
      collection site, and acquisition date. Parquet and CSV metadata tables
      under each crop directory's metadata/ subtree.
    ARN: arn:aws:s3:::[S3_BUCKET_NAME]/ImageSafari
    Region: us-east-1
    Type: S3 Bucket
    Explore:
      - '[Browse Bucket](https://[S3_BUCKET_NAME].s3.amazonaws.com/index.html#ImageSafari/)'

