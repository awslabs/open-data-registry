Name: Artemis and Image Safari Agricultural Imaging Dataset
Description: >
  Artemis and Image Safari are complementary large-scale agricultural imaging
  datasets containing approximately 7.5 million field images (7,469,220) from
  smallholder and phenotyping farming systems across 18 crop species in 11
  countries spanning sub-Saharan Africa, Latin America, and the United States.
  Artemis (1,387,665 images) pairs imagery with linked agronomic, genotypic,
  and environmental metadata across four crops and four countries. Image
  Safari (6,081,555 images) captures diversity across 18 crops and nine
  countries. A subset of 42,981 images includes organ-level annotations in
  standard and benchmark tracks. The datasets combine crop imagery, structured
  metadata, and benchmark annotations to support agricultural foundation
  models, plant disease detection, growth stage recognition, and
  cross-environment generalisation research.

Documentation: https://github.com/CIAT-Artemis/imagesafari-artemis-crop-images/blob/main/README.md

Contact: alliance-data-helpdesk@cgiar.org

ManagedBy: "[Alliance of Bioversity International and CIAT](https://alliancebioversityciat.org/)"

UpdateFrequency: >
  New imagery collected during annual field campaigns is reviewed, annotated, and
  added to the dataset approximately once per year. Annotation updates and quality
  corrections are versioned and documented in CHANGELOG.md.

