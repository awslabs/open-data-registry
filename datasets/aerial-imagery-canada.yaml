Name: "Aerial Imagery of Canada"
Description: |
    Recent and historical high-resolution aerial imagery of Canada in Cloud Optimized Geotiff (COG) format. This dataset groups aerial imagery from the Government of Canada from different sources, including time series from the National Air Photo Library (NAPL) in the "napl" sub-bucket and prefix, and aerial orthophoto mosaics from Parks Canada in the "parks-canada" sub-bucket with park name as the prefix.
    <br/>
    The NAPL of Natural Resources Canada archives over 6 million aerial photographs covering all of Canada, some of which date back to the 1920s. The NAPL mosaics are created using the best spatial resolution available for each time period, which means that the orthophotos composing a NAPL time series are not necessarily co-registered. 
    Use cases include vegetation analysis, change detection using time series, land-use monitoring, and more. This dataset can be used to help communities understand climate change, enhance emergency management and response, and support sustainable resource development. 
    <br/>
    <br/>
    Imageries aériennes haute résolution récentes et historiques du Canada en format Cloud Optimized Geotiff (COG). Cet ensemble de données regroupe des images aériennes du Canada provenant de différentes sources, notamment les séries temporelles de la Photothèque nationale de l'air (PNA) dans le sous-répertoire et le préfixe « napl », et les mosaïques d'orthophotographies aériennes de Parcs Canada dans le sous-répertoire « parks-canada », ayant pour préfixe le nom du parc.
    <br/>
    La PNA de Ressources naturelles Canada conserve plus de 6 millions de photographies aériennes couvrant l’ensemble du Canada, dont certaines remontent aux années 1920. Les mosaïques de la PNA sont réalisées à partir de la meilleure résolution spatiale disponible pour chaque période, ce qui signifie que les orthophotos composant une série temporelle de la PNA ne sont pas nécessairement corégistrées.
    Les cas d'utilisation comprennent l'analyse de la végétation, la détection des changements à partir de séries temporelles, le suivi de l'utilisation des terres, etc. Cet ensemble de données peut aider les communautés locales à évaluer les impacts des changements climatiques, à améliorer la gestion et la réponse aux situations d'urgence, et à soutenir le développement durable des ressources.
Documentation: "[National Air Photo Library / Photothèque nationale de l'air](https://ressources-naturelles.canada.ca/carte-outils-publications/imagerie-satellitaire-donnees-elevation-photos-aeriennes/photographies-aeriennes/phototheque-nationale-lair)"
