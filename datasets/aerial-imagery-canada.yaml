Name: "Aerial Imagery of Canada"
Description: |
    Recent and historical high-resolution aerial imagery of Canada. This dataset groups Federal Government of Canada aerial imagery from different sources, including the time series from the National Air Photo Library (NAPL) in the napl sub-bucket and prefix, and aerial orthophoto mosaic from Parks Canada in the parks-canada sub-bucket with park name prefix.
    <br/>
    The NAPL of Natural Resources Canada archives over 6 million aerial photographs covering all of Canada, some of which date back to the 1920s. The NAPL mosaics are made from the best spatial resolution available for each time period, which means that the orthophotos composing a NAPL time series are not necessarily coregistered. 
    Data can be discovered via our STAC API 
    <br/>
    <br/>
    Imageries aériennes haute résolution récentes et historiques du Canada. Cet ensemble de données regroupe des images aériennes du Canada provenant de différentes sources, notamment les séries temporelles de la Photothèque nationale de l'air (PNA) dans le sous-répertoire et le préfixe « napl » et les mosaïques d'orthophotographies aériennes de Parcs Canada dans le sous-répertoire « parks-canada », ayant pour préfixe le nom du parc.
    <br/>
    La PNA de Ressources naturelles Canada conserve plus de 6 millions de photographies aériennes couvrant l’ensemble du Canada, dont certaines remontent aux années 1920. Les mosaïques de la PNA sont réalisées à partir de la meilleure résolution spatiale disponible pour chaque période, ce qui signifie que les orthophotos composant une série chronologique de la PNA ne sont pas nécessairement corégistrées.
Documentation: "[National Air Photo Library / Photothèque nationale de l'air](https://ressources-naturelles.canada.ca/carte-outils-publications/imagerie-satellitaire-donnees-elevation-photos-aeriennes/photographies-aeriennes/phototheque-nationale-lair)"
Contact: geoinfo@nrcan-rncan.gc.ca
ManagedBy: "[Natural Resources Canada](https://nrcan.gc.ca/)"
UpdateFrequency: |
    The dataset is updated as new aerial imagery gets processed.
    <br/>
    L'ensemble de données est mis à jour à mesure du traitement de nouvelles images aériennes.
