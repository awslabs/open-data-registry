Name: NASA icesat-2 Project
Description: |
  These Level 1B time-ordered telemetry data are used for system-level, quality control analysis by the Advanced Topographic Laser Altimeter System (ATLAS) ICESat-2 Science Investigator-led Processing System (SIPS). They also provide source data for the Level 2 products and the Precision Orbit Determination (POD) and Precision Pointing Determination (PPD) computations.
  <br>

  #### ATL03
  ATL03 contains height above the WGS 84 ellipsoid, latitude, longitude, and time for each photon downlinked by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board ICESat-2. This product was designed to be a single source for all photon data and ancillary information needed by higher-level ATLAS/ICESat-2 products.
  <br>

  #### ATL04
  ATL04 contains along-track normalized relative backscatter profiles of the atmosphere. The product includes full 532 nm (14 km) uncalibrated attenuated backscatter profiles at 25 times per second for vertical bins of approximately 30 meters. Calibration coefficient values derived from data within the polar regions are also included. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the Ice, Cloud and land Elevation Satellite-2 (ICESat-2) observatory.
  <br>

  #### ATL04
  ATL04 contains along-track normalized relative backscatter (NRB) profiles of the atmosphere. The product includes full 532 nm (14 km tall) uncalibrated attenuated backscatter profiles at 25 times per second for vertical bins of approximately 30 meters. Calibration coefficient values derived from data between 13.5 and 11 km above the surface are also included. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the ICESat-2 observatory.
  <br>

  #### ATL24
  ATL24 provides global along-track coastal and nearshore bathymetry, consisting of refraction-corrected seafloor and sea surface heights (orthometric and ellipsoidal heights and instantaneous depths), as well as associated uncertainties. The data are derived from ATLAS/ICESat-2 L2A Global Geolocated Photon Data (ATL03).
  <br>

  #### ATL13
  This data set (ATL13) contains along-track surface water products for inland water bodies. Inland water bodies include lakes, reservoirs, rivers, bays, estuaries and a 7km near-shore buffer. Principal data products include the along-track water surface height and standard deviation, subsurface signal (532 nm) attenuation, significant wave height, wind speed, and coarse depth to bottom topography (where data permit).
  <br>

  #### ATL13
  ATL13 provides along-track surface water products for inland water bodies, defined as lakes, reservoirs, bays, estuaries, rivers, and a 7 km near-shore buffer. Data parameters include surface water height statistics and related parameters including significant wave height, transect slope, subsurface signal attenuation, and shallow water bathymetry. Water surface heights are provided as both orthometric height and height referencing the WGS84 ellipsoid. ATL13 is also used to produce the ATLAS/ICESat-2 L3B Mean Inland Surface Water Data product (ATL22).
  <br>

  #### ATL09
  This data set (ATL09) contains calibrated, attenuated backscatter profiles, layer integrated attenuated backscatter, and other parameters including cloud layer height and atmospheric characteristics obtained from the data. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the Ice, Cloud and land Elevation Satellite-2 (ICESat-2) observatory.
  <br>

  #### ATL09
  ATL09 contains calibrated, attenuated backscatter profiles (CAB), layer-integrated attenuated backscatter, blowing snow, and other parameters including cloud and aerosol layer height and atmospheric characteristics. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the ICESat-2 observatory.
  <br>

  #### ATL08
  This data set (ATL08) contains along-track heights above the WGS84 ellipsoid (ITRF2014 reference frame) for the ground and canopy surfaces. The canopy and ground surfaces are processed in fixed 100 m data segments, which typically contain more than 100 signal photons. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the Ice, Cloud and land Elevation Satellite-2 (ICESat-2) observatory.
  <br>

  #### ATL08
  ATL08 contains along-track estimates of terrain height, canopy height, and canopy cover, as well as beam and reference parameters. Data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the ICESat-2 observatory.
  <br>

  #### ATL06
  This data set (ATL06) provides geolocated, land-ice surface heights (above the WGS 84 ellipsoid, ITRF2014 reference frame), plus ancillary parameters that can be used to interpret and assess the quality of the height estimates. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the Ice, Cloud and land Elevation Satellite-2 (ICESat-2) observatory.
  <br>

  #### ATL06
  ATL06 contains geolocated land-ice surface heights above the WGS84 ellipsoid, plus ancillary parameters that can be used to interpret and assess the quality of the height estimates. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the ICESat-2 observatory.
  <br>

  #### ATL12
  This data set (ATL12) contains along-track sea surface height of the global open ocean, including the ice-free seasonal ice zone and near-coast regions. Estimates of height distributions, significant wave height, sea state bias, and 10 m heights are also provided. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the Ice, Cloud and land Elevation Satellite-2 (ICESat-2) observatory.
  <br>

  #### ATL12
  ATL12 contains along-track sea surface height (SSH) of the global open ocean relative to the WGS84 ellipsoid. Height averages, distributions, and uncertainties are provided over ocean segments 400 to 7,000 m in length. Heights relative to the EGM2008 geoid and variables such as photon return rate are provided in 10 m along-track bins within each ocean segment. Additionally, 10 m bins corresponding to ATL07 bright leads are identified, and heights within the bins are averaged over ocean segments to yield accurate SSHs where ice concentrations are greater than 15%. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the ICESat-2 observatory.
  <br>

  #### ATL10
  This data set (ATL10) contains estimates of sea ice freeboard, calculated using three different approaches. Sea ice leads used to establish the reference sea surface and descriptive statistics used in the height estimates are also provided. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the Ice, Cloud and land Elevation Satellite-2 (ICESat-2) observatory.
  <br>

  #### ATL10
  ATL10 contains along-track sea ice freeboard calculated for 10 km swath segments. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the ICESat-2 observatory.
  <br>

  #### ATL07
  The data set (ATL07) contains along-track heights for sea ice and open water leads (at varying length scales) relative to the WGS84 ellipsoid (ITRF2014 reference frame) after adjustment for geoidal and tidal variations, and inverted barometer effects. Height statistics and apparent reflectance are also provided. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the Ice, Cloud and land Elevation Satellite-2 (ICESat-2) observatory.
  <br>

  #### ATL07
  ATL07 contains along-track sea surface height and sea ice height for segments of variable lengths for all beams as well as fixed 10-meter segments for strong beams. Heights are also computed using the DDA-Bifurcation algorithm for strong beams. The data were acquired by the Advanced Topographic Laser Altimeter System (ATLAS) instrument on board the ICESat-2 observatory.
  <br>

  #### ATL21
  ATL21 contains daily and monthly gridded polar sea surface height (SSH) anomalies, derived from the along-track ATLAS/ICESat-2 L3A Sea Ice Height product (ATL10, V6). The ATL10 product identifies leads in sea ice and establishes a reference sea surface used to estimate SSH in 10 km along-track segments. ATL21 aggregates the ATL10 along-track SSH estimates and computes daily and monthly gridded SSH anomaly in NSIDC Polar Stereographic Northern and Southern Hemisphere 25 km grids.
  <br>

  #### ATL21
  ATL21 contains daily and monthly gridded polar sea surface height anomalies, derived from ATLAS/ICESat-2 L3A Sea Ice Freeboard (ATL10) along-track freeboard estimates.
  <br>

  #### ATL20
  ATL20 contains daily and monthly gridded estimates of sea ice freeboard, derived from along-track freeboard estimates in the ATLAS/ICESat-2 L3A Sea Ice Freeboard product (ATL10). Data are gridded at 25 km using the SSM/I Polar Stereographic Projection.
  <br>

  #### ATL20
  ATL20 contains daily and monthly gridded estimates of sea ice freeboard, derived from ATLAS/ICESat-2 L3A Sea Ice Freeboard (ATL10) along-track freeboard estimates.
  <br>

  #### ATL15
  This data set contains land ice height changes and change rates for the Antarctic ice sheet and regions around the Arctic gridded at four spatial resolutions (1 km, 10 km, 20 km, and 40 km). The data are derived from the ATLAS/ICESat-2 L3B Slope-Corrected Land Ice Height Time Series product (ATL11).
  <br>

  #### ATL14
  This data set contains a high-resolution (100 m) gridded digital elevation model (DEM) for the Antarctic ice sheet and regions around the Arctic. The data can be used to initialize ice sheet models, as boundary conditions for atmospheric models, or to help with the reduction of other satellite data such as optical imagery or synthetic aperture radar (SAR). The data are derived from the ATLAS/ICESat-2 L3B Slope-Corrected Land Ice Height Time Series product (ATL11).
  <br>

  #### ATL22
  ATL22 is a derivative of the continuous Level 3A ATL13 Along Track Inland Surface Water Data product. ATL13 contains the high-resolution, along-track inland water surface profiles derived from analysis of the geolocated photon clouds from the ATL03 product. Starting from ATL13, ATL22 computes the mean surface water quantities with no additional photon analysis. The two data products, ATL22 and ATL13, can be used in conjunction as they include the same orbit and water body nomenclature independent from version numbers.
  <br>

  #### ATL22
  ATL22 includes the per-beam mean surface water height, mean surface height standard deviation, and mean ATLAS 532 nm attenuation coefficient over a water body transect, reported at the center of the beam transect. Additional parameters include the beginning and end of the transect, transect length, and center of transect. ATL22 is derived from ATLAS/ICESat-2 L3A Along Track Inland Surface Water Data (ATL13).
  <br>

  #### ATL23
  This data set contains 3-month gridded averages of dynamic ocean topography (DOT) over midlatitude, north-polar, and south-polar grids derived from the along-track ATLAS/ICESat-2 L3A Ocean Surface Height product (ATL12). Monthly gridded sea surface height (SSH) can be calculated by adding the mean DOT and the weighted average geoid height also provided. Both single beam and all-beam gridded averages are available. Simple averages, degree-of-freedom averages, and averages interpolated to the center of grid cells are included, as well as uncertainty estimates.
  <br>

  #### ATL23
  ATL23 contains monthly 3-month gridded averages of dynamic ocean topography (DOT) over midlatitude, north-polar, and south-polar grids derived from the along-track ATLAS/ICESat-2 L3A Ocean Surface Height product (ATL12). Monthly gridded sea surface height (SSH) can be calculated by adding the mean DOT and the corresponding weighted average geoid height. Both single beam and all-beam gridded averages are available: single beam averages are useful for identifying potential biases among the beams, and the all-beam averages are useful in physical oceanography. Simple averages, degree-of-freedom averages, and averages interpolated to the center of grid cells are included, as well as uncertainty estimates. Sea surface statistics histograms and wave statistics within grid are also provided.
  <br>

  #### ATL17
  This data set contains a gridded summary of monthly global cloud fraction, total column optical depth over the oceans, polar cloud fraction, blowing snow frequency, apparent surface reflectivity, and ground detection frequency.
  <br>

  #### ATL19
  This data set contains monthly gridded dynamic ocean topography (DOT), derived from along-track ATLAS/ICESat-2 L3A Ocean Surface Height product (ATL12). Monthly gridded sea surface height (SSH) can be calculated by adding the mean DOT and the weighted average geoid height also provided in this data set. Both single beam and all-beam gridded averages are available in this data set. Single beam averages are useful to identify biases among the beams and the all-beam averages are advised to use for physical oceanography.
  <br>

  #### ATL19
  ATL19 contains monthly gridded dynamic ocean topography (DOT) over midlatitude, north-polar, and south-polar grids derived from the along-track ATLAS/ICESat-2 L3A Ocean Surface Height product (ATL12). Monthly gridded sea surface height (SSH) can be calculated by adding the monthly gridded DOT and the weighted average geoid height also provided. Both single beam and all-beam gridded averages are available: single beam averages are useful for identifying potential biases among the beams, and the all-beam averages are useful in physical oceanography. Simple averages, degree-of-freedom uncertainty averages, and averages interpolated to the center of grid cells are included, as well as uncertainty estimates.
  <br>

  #### ATL11
  This data set provides time series of land-ice surface heights derived from the ICESat-2 ATL06 Land Ice Height product. It is intended primarily as an input for higher level gridded products but can also be used on its own as a spatially organized product that allows easy access to height-change information derived from ICESat-2 observations.
  <br>

  #### ATL11
  ATL11 provides spatially organized time series of land-ice surface heights and ice-shelf locations where ICESat-2 operates in repeat-track mode (i.e., for polar ice), along with parameters useful in determining whether each height estimate is valid or a result of potential errors. ATL11 is derived from the ATLAS/ICESat-2 L3A Land Ice Height product (ATL06) and intended primarily as an input for higher-level gridded products.
  <br>

  #### ATL16
  This product reports weekly global cloud fraction, total column optical depth over the oceans, polar cloud fraction, blowing snow frequency, apparent surface reflectivity, and ground detection frequency.
  <br>

  #### ISSITGR4
  This data set reports seasonal gridded winter sea ice thickness across the Arctic Ocean. Sea ice thickness is estimated using ICESat/GLAS L3A Sea Ice Freeboard data and NASA Eulerian Snow On Sea Ice Model (NESOSIM) Version 1.1 snow loading. This data set is a historical complement to ICESat-2 L4 Monthly Gridded Sea Ice Thickness (IS2SITMOGR4).
  <br>

  #### NSIDC-0773
  This data set comprises monthly estimates of Arctic sea ice snow depth and ice thickness using combined ICESat-2 and CryoSat-2 freeboard measurements.
  <br>

  #### IS2OLVIS1BCV
  This data set contains georeferenced imagery from the NASA Land, Vegetation, and Ice Sensor (LVIS) PhaseOne medium-format camera, which was operated on high-altitude segments of flights during the ICESat-2 2022 Arctic Summer calibration campaign.
  <br>

  #### IS2ATBABD
  This data set provides a quality-filtered set of ATLAS/ICESat-2 L3A Land and Vegetation Height, Version 5 (ATL08) observations of relative canopy heights and aboveground biomass density model results for circumpolar boreal forests. The data were collected at 30 m along-track segment lengths for strong beams only during the 2019–2021 high northern latitude growing seasons. The ATL08 point observations were clipped to the extent of the boreal forest spatial domain.
  <br>

  #### IS2CHM
  This data set provides a regression-based canopy height model of the contiguous United States (CONUS) using data from ATLAS/ICESat-2 L3A Land and Vegetation Height (ATL08), as well as data from Landsat, LANDFIRE, and NASADEM.
  <br>

  #### IS2MPDDA
  This data set provides locations and depths of melt ponds in the Multi-Year Arctic Sea Ice Region, calculated from ATLAS/ICESat-2 L2A Global Geolocated Photon Data, Version 5 (ATL03) using an autoadaptive algorithm.
  <br>

  #### IS2SITDAT4
  This data set reports daily, along-track winter sea ice thickness across the Arctic Ocean. Sea ice thickness is estimated using ATLAS/ICESat-2 L3A Sea Ice Freeboard (ATL10), Version 5 data and NASA Eulerian Snow On Sea Ice Model (NESOSIM) snow loading.
  <br>

  #### IS2GZANT
  This data set provides an Antarctic ice shelf grounding zone geolocation product, including the landward limit of ice flexure caused by ocean tidal movement (Point F), the seaward limit of ice flexure (Point H), and the break in surface slope (Point Ib) based on the ATLAS/ICESat-2 ATL06 Land Ice Height data set acquired between March 2019 and September 2020. The grounding zone estimates were derived from automated techniques using ICESat-2 repeat tracks.
  <br>

  #### IS2SITMOGR4
  This data set provides monthly, gridded, winter Arctic sea ice thickness, freeboard, ice density, snow depth, and snow density estimates derived from ICESat-2 L4 Along-Track Sea Ice Thickness (IS2SITDAT4).
  <br>

  #### NSIDC-0715
  This data set consists of an enhanced resolution digital elevation model (DEM) for the Greenland Ice Sheet, derived from sub-meter resolution, panchromatic stereoscopic imagery collected by the GeoEye-1, WorldView-1, -2, and -3 satellites operated by Maxar Technologies. The DEM was created from in-track image pairs (i.e., both images collected minutes apart along the same orbital pass) and cross-track images (i.e., from different orbits) within the in-track imaging geometry and maximum time separation criteria. The DEM is registered to ATLAS/ICESat-2 L3A Land Ice Height, Version 5 (ATL06, V5) data collected in the summers of 2019 and 2020. See <a href="http://nsidc.org/data/measures/gimp">Greenland Ice Mapping Project (GrIMP)</a> for related data
  <br>

  #### NSIDC-0782
  This data product contains monthly ice sheet elevation change data for Antarctica derived from five radar altimetry missions (Geosat, ERS-1 and -2, Envisat and CryoSat-2) and two laser altimetry missions (ICESat and ICESat-2). Each time step and grid node includes relative error estimates and a quality flag that can be used to filter the data in space and time. The product is also provided with an estimate of static topography in the form of a digital elevation model (DEM), which was used to estimate monthly ice sheet elevation change. With a temporal coverage of 17 April 1985 to 16 December 2020, this product can be used to determine changes in ice sheet mass balance over time.
  <br>

  #### NSIDC-0812
  This data set provides weekly snow stake height measurements in Summit Station, Greenland, near the ice divide. The array comprises 121 snow stakes and helps understand snowfall processes and contextualizes snow accumulation, which is a major component of the region’s surface mass balance. As a long-term climate record, this data set provides valuable ground validation for ICESat-2 and other satellite and airborne missions.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
