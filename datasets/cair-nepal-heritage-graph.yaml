Name: "HeritageGraph: Open Knowledge Graph Dataset for Cultural Heritage"
Description: HeritageGraph is a large-scale open cultural heritage knowledge graph dataset designed to represent and connect cultural heritage information across countries, civilizations, institutions, and collections. The dataset currently focuses on Nepalese cultural heritage and is being extended to include heritage resources from other countries such as Türkiye through international collaborations. HeritageGraph represents cultural entities such as monuments, archaeological sites, artifacts, manuscripts, traditions, historical events, organizations, places, and people, together with their semantic relationships. These data are cleaned, normalized, linked to the HeritageGraph ontology, and published as structured knowledge graph resources using semantic web standards. The dataset integrates multimodal information. It supports cultural preservation, digital humanities research, knowledge discovery, education, semantic search, graph analytics, heritage visualization, question answering, digital preservation, and AI-driven applications such as retrieval-augmented generation, graph machine learning, and cultural heritage assistants.
Documentation: Documentation can be found at <a href="https://github.com/CAIRNepal/heritagegraph-aws-open-data">our GitHub repository</a>.
Contact: info@cair-nepal.org
ManagedBy: "[CAIR-Nepal](https://www.cair-nepal.org/)"
UpdateFrequency: The dataset is regularly updated as new cultural heritage resources become available and pass established quality assurance and quality control (QA/QC) procedures.

