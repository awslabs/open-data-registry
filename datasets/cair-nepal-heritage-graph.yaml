Name: "HeritageGraph: Open Knowledge Graph Dataset for Cultural Heritage"
Description: |
  HeritageGraph is an RDF knowledge graph of Nepal's tangible and intangible cultural heritage,   built on the CIDOC-CRM-aligned HeritageGraph ontology (https://cairnepal.github.io/heritagegraphontology/) and populated from trusted open sources. It contains ~7,850 tangible heritage entities (temples, stupas, monasteries, traditional stone water spouts / dhunge dhara, monuments) with coordinates, dates and images, plus a curated intangible-heritage layer (festivals and chariot festivals, masked dances, Guthi institutions, the Living-Goddess Kumari lifecycle, caste ritual roles, deities and syncretic relationships). Every entity carries machine-readable provenance (source, confidence and epistemic stance) and, where available, owl:sameAs links to Wikidata and OpenStreetMap. Data is published as RDF 1.1 Turtle in separate named graphs per source so each can be used under its own license, and is validated against the published SHACL shapes. No synthetic data is used.
Documentation: Documentation can be found at <a href="https://github.com/CAIRNepal/heritagegraph-aws-open-data">our GitHub repository</a>.
Contact: info@cair-nepal.org
ManagedBy: "[CAIR-Nepal](https://www.cair-nepal.org/)"
UpdateFrequency: The dataset is regularly updated as new cultural heritage resources become available and pass established quality assurance and quality control (QA/QC) procedures.

