Name: NASA Terra Project
Description: |
  The AST14DEM Version 3 data product was decommissioned on December 15, 2025. Users are encouraged to use the [AST14DEM Version 4 data product](https://doi.org/10.5067/ASTER/AST14DEM.004). The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Digital Elevation Model (AST14DEM) product is generated using bands 3N (nadir-viewing) and 3B (backward-viewing) of an [ASTER Level 1A](https://doi.org/10.5067/ASTER/AST_L1A.003) image acquired by the Visible and Near Infrared (VNIR) sensor. The VNIR subsystem includes two independent telescope assemblies that facilitate the generation of stereoscopic data. The band 3 stereo pair is acquired in the spectral range of 0.78 and 0.86 microns with a base-to-height ratio of 0.6 and an intersection angle of 27.7 degrees. There is a time lag of approximately one minute between the acquisition of the nadir and backward images.For a better understanding, refer to the [ASTER Along Track Imaging Geometry diagram](https://lpdaac.usgs.gov/documents/301/ASTER_Along_Track_Imaging_Geometry.png) depicting the along-track imaging geometry of the ASTER VNIR nadir and backward-viewing sensors. The accuracy of the new LP DAAC produced DEMs will meet or exceed accuracy specifications set for the ASTER relative DEMs by the Algorithm Theoretical Basis Document (ATBD). Users likely will find that the DEMs produced by the new LP DAAC system have accuracies approaching those specified in the ATBD for absolute DEMs. Validation testing has shown that DEMs produced by the new system frequently are more accurate than 25 meters root mean square error (RMSE) in xyz dimensions. The ASTER Digital Elevation Model data product is only available through [NASA's Earthdata Search](https://search.earthdata.nasa.gov/search?q=C1299783579-LPDAAC_ECS). The ASTER Order Instructions provide step-by-step directions for ordering this product. Known Issues: Data acquisition gaps: On November 28, 2024, one of Terra's power-transmitting shunt units failed. As a result, there was insufficient power to maintain functionality of the ASTER instrument. ASTER resumed acquisitions for the VNIR bands on January 18, 2025, and for the TIR bands on April 15, 2025. Users should note the data gap in ASTER acquisitions from November 28, 2024, through January 16, 2025, for VNIR observations, and a gap from November 28, 2024, through April 15, 2025, for TIR acquisitions. Improvements/Changes from Previous Versions * As of January 2021, the LP DAAC has implemented version 3.0 of the Sensor Information Laboratory Corporation ASTER DEM/Ortho (SILCAST) software, which is used to generate the Level 2 on-demand ASTER Orthorectified and Digital Elevation Model (DEM) products (AST14). The updated software provides digital elevation extraction and orthorectification from ASTER L1A input data without needing to enter ground control points or depending on external global DEMs at 30-arc-second resolution (GTOPO30). It utilizes the ephemeris and attitude data derived from both the ASTER instrument and the Terra spacecraft platform. The outputs are geoid height-corrected and waterbodies are automatically detected in this version. Users will notice differences between AST14DEM, AST14DMO, and AST14OTH products ordered before January 2021 (generated with SILCAST V1) and those generated with the updated version of the production software (version 3.0). Differences may include slight elevation changes over different surface types, including waterbodies. Differences have also been observed over cloudy portions of ASTER scenes. Additional information on SILCAST version 3.0 can be found on the [SILCAST website](http://www.silc.co.jp/en/products.html). * Starting June 23, 2021, radiometric calibration coefficient Version 5 (RCC V5) will be applied to newly observed ASTER data and archived ASTER data products. Details regarding RCC V5 are described in the following journal article. * Tsuchida, S., Yamamoto, H., Kouyama, T., Obata, K., Sakuma, F., Tachikawa, T., Kamei, A., Arai, K., Czapla-Myers, J.S., Biggar, S.F., and Thome, K.J., 2020, Radiometric Degradation Curves for the ASTER VNIR Processing Using Vicarious and Lunar Calibrations: Remote Sensing, v. 12, no. 3, at https://doi.org/10.3390/rs12030427.
  <br>

  #### AST14DEM
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Digital Elevation Model (AST14DEM) product is generated using bands 3N (nadir-viewing) and 3B (backward-viewing) of an ASTER [Level 1A](https://doi.org/10.5067/ASTER/AST_L1A.004) image acquired by the Visible and Near Infrared (VNIR) sensor. The VNIR subsystem includes two independent telescope assemblies that facilitate the generation of stereoscopic data. The band 3 stereo pair is acquired in the spectral range of 0.78 and 0.86 microns with a base-to-height ratio of 0.6 and an intersection angle of 27.7 degrees. There is a time lag of approximately one minute between the acquisition of the nadir and backward images. For a better understanding, refer to the [diagram](https://lpdaac.usgs.gov/documents/301/ASTER_Along_Track_Imaging_Geometry.png) depicting the along-track imaging geometry diagram of the ASTER VNIR nadir and backward-viewing sensors.
  <br>

  #### ASTGTM_NUMNC
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Digital Elevation Model (GDEM) Version 3 (ASTGTM) provides a global digital elevation model (DEM) of land areas on Earth at a spatial resolution of 1 arc second (approximately 30 meter horizontal posting at the equator). The development of the ASTER GDEM data products is a collaborative effort between National Aeronautics and Space Administration (NASA) and Japan's Ministry of Economy, Trade, and Industry (METI). The ASTER GDEM data products are created by the Sensor Information Laboratory Corporation (SILC) in Tokyo. The ASTER GDEM Version 3 data product was created from the automated processing of the entire [ASTER Level 1A](https://doi.org/10.5067/ASTER/AST_L1A.003) archive of scenes acquired between March 1, 2000, and November 30, 2013. Stereo correlation was used to produce over one million individual scene based ASTER DEMs, to which cloud masking was applied. All cloud screened DEMs and non-cloud screened DEMs were stacked. Residual bad values and outliers were removed. In areas with limited data stacking, several existing reference DEMs were used to supplement ASTER data to correct for residual anomalies. Selected data were averaged to create final pixel values before partitioning the data into 1 degree latitude by 1 degree longitude tiles with a one pixel overlap. To correct elevation values of water body surfaces, the ASTER Global Water Bodies Database ([ASTWBD](https://doi.org/10.5067/ASTER/ASTWBD.001)) Version 1 data product was also generated. The geographic coverage of the ASTER GDEM extends from 83° North to 83° South. Each tile is distributed in both a Cloud Optimized GeoTIFF (COG) and NetCDF4 format through NASA Earthdata Search. Data are projected on the 1984 World Geodetic System (WGS84)/1996 Earth Gravitational Model (EGM96) geoid. Each of the 22,912 tiles in the collection contain at least 0.01% land area. Provided in the ASTER GDEM product are layers for DEM and number of scenes (NUM). The NUM layer indicates the number of scenes that were processed for each pixel and the source of the data. While the ASTER GDEM Version 3 data products offer substantial improvements over Version 2, users are advised that the products still may contain anomalies and artifacts that will reduce its usability for certain applications. Known Issues: ASTER GDEM Version 3 tiles overlap by one pixel to the north, south, east, and west of the tile perimeter. In most cases the overlapping edge pixels have identical pixel values, but it is possible that in some instances values will differ. * ASTER GDEM Version 3 is considered to be void free except for Greenland and Antarctica. * Users are reminded that because there are known inaccuracies and artifacts in the dataset, to use the product with awareness of these limitations. The data are provided "as is" and neither NASA nor METI/Earth Resources Satellite Data Analysis Center (ERSDAC) will be responsible for any damages resulting from use of the data.
  <br>

  #### ASTWBD_ATTNC
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Water Bodies Database (ASTWBD) Version 1 data product provides global coverage of water bodies larger than 0.2 square kilometers at a spatial resolution of 1 arc second (approximately 30 meters) at the equator, along with associated elevation information. The ASTWBD data product was created in conjunction with the ASTER Global Digital Elevation Model (ASTER GDEM) Version 3 data product by the Sensor Information Laboratory Corporation (SILC) in Tokyo. The ASTER GDEM Version 3 data product was generated using [ASTER Level 1A](https://doi.org/10.5067/ASTER/AST_L1A.003) scenes acquired between March 1, 2000, and November 30, 2013. The ASTWBD data product was then generated to correct elevation values of water body surfaces. To generate the ASTWBD data product, water bodies were separated from land areas and then classified into three categories: ocean, river, or lake. Oceans and lakes have a flattened, constant elevation value. The effects of sea ice were manually removed from areas classified as oceans to better delineate ocean shorelines in high latitude areas. For lake water bodies, the elevation for each lake was calculated from the perimeter elevation data using the mosaic image that covers the entire area of the lake. Rivers presented a unique challenge given that their elevations gradually step down from upstream to downstream; therefore, visual inspection and other manual detection methods were required. The geographic coverage of the ASTWBD extends from 83°N to 83°S. Each tile is distributed in GeoTIFF format and referenced to the 1984 World Geodetic System (WGS84)/1996 Earth Gravitational Model (EGM96) geoid. Each data product is provided as a zipped file that contains an attribute file with the water body classification information and a DEM file, which provides elevation information in meters.
  <br>

  #### AST_L1A
  The AST_L1A Version 3 data product was decommissioned on December 15, 2025. Users are encouraged to use the [AST_L1A Version 4 data product](https://doi.org/10.5067/ASTER/AST_L1A.004). The Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Level 1A (AST_L1A) contains reconstructed, instrument digital numbers (DNs) derived from the acquired telemetry streams of the telescopes: Visible and Near Infrared (VNIR), Shortwave Infrared (SWIR), and Thermal Infrared (TIR). Additionally, geometric correction coefficients and radiometric calibration coefficients are calculated and appended to the metadata but not applied. The AST_L1A product has a spatial resolution of 15 meters (m) for the VNIR bands, 30 m for the SWIR bands, and 90 m for the TIR bands. Known Issues: Users are advised that ASTER SWIR data acquired from April 2008 to the present exhibit anomalous saturation of values and anomalous striping. This effect is also present for some prior acquisition periods. Please refer to the ASTER SWIR User Advisory for more details. * Data acquisition gaps: On November 28, 2024, one of Terra's power-transmitting shunt units failed. As a result, there was insufficient power to maintain functionality of the ASTER instrument. ASTER resumed acquisitions for the VNIR bands on January 18, 2025, and for the TIR bands on April 15, 2025. Users should note the data gap in ASTER acquisitions from November 28, 2024, through January 16, 2025, for VNIR observations, and a gap from November 28, 2024, through April 15, 2025, for TIR acquisitions. Improvements/Changes from Previous Version * Geometric correction to account for Earth's rotation angle and nutation. * Geometric correction for geolocation errors associated with nighttime TIR scenes. * Radiometric correction to account for degradation of onboard calibration lamps. * Starting June 23, 2021, radiometric calibration coefficient Version 5 (RCC V5) will be applied to newly observed ASTER data and archived ASTER data products. Details regarding RCC V5 are described in the following journal article. * Tsuchida, S., Yamamoto, H., Kouyama, T., Obata, K., Sakuma, F., Tachikawa, T., Kamei, A., Arai, K., Czapla-Myers, J.S., Biggar, S.F., and Thome, K.J., 2020, Radiometric Degradation Curves for the ASTER VNIR Processing Using Vicarious and Lunar Calibrations: Remote Sensing, v. 12, no. 3, at https://doi.org/10.3390/rs12030427.
  <br>

  #### AST_L1A
  The Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Level 1A (AST_L1A) contains reconstructed, instrument digital numbers (DNs) derived from the acquired telemetry streams of the telescopes: Visible and Near Infrared (VNIR), Shortwave Infrared (SWIR), and Thermal Infrared (TIR). Additionally, geometric correction coefficients and radiometric calibration coefficients are calculated and appended to the metadata but not applied. The AST_L1A product has a spatial resolution of 15 meters (m) for the VNIR bands, 30 m for the SWIR bands, and 90 m for the TIR bands. Know Issues * The QAPERCENTINTERPOLATEDDATA field in .met files was found to be inconsistent due to a software upgrade. Following evaluation by the ASTER Science Team, it was determined to have no impact on science data and has been set to 0 and nullified. * SWIR data acquired after April 2008 may exhibit anomalous saturation and striping. Users should consult the ASTER SWIR User Advisory for additional details.
  <br>

  #### AST_L1B
  The AST_L1B Version 3 data product was decommissioned on December 15, 2025. Users are encouraged to use the [AST_LB1 Version 4 of this product](https://doi.org/10.5067/ASTER/AST_L1B.004) The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Level 1B (AST_L1B) Registered Radiance at the Sensor data product is radiometrically calibrated and geometrically co-registered. Application of intra-telescope and inter-telescope registration corrections for all bands are relative to the reference band for each telescope: Visible and Near Infrared (VNIR) Band 2, Shortwave Infrared (SWIR) Band 6, and Thermal Infrared (TIR) Band 11. The AST_L1B product has a spatial resolution of 15 meters (m) for the VNIR bands, 30 m for the SWIR bands, and 90 m for the TIR bands. The ASTER L1B Registered Radiance at the Sensor data product is only available through [NASA's Earthdata Search](https://search.earthdata.nasa.gov/search?q=C190733714-LPDAAC_ECS). The ASTER Order Instructions provide step-by-step directions for ordering this product. Known Issues: Users are advised that ASTER SWIR data acquired from April 2008 to the present exhibit anomalous saturation of values and anomalous striping. This effect is also present for some prior acquisition periods. Please refer to the ASTER SWIR User Advisory for more details. * Data acquisition gaps: On November 28, 2024, one of Terra's power-transmitting shunt units failed. As a result, there was insufficient power to maintain functionality of the ASTER instrument. ASTER resumed acquisitions for the VNIR bands on January 18, 2025, and for the TIR bands on April 15, 2025. Users should note the data gap in ASTER acquisitions from November 28, 2024, through January 16, 2025, for VNIR observations, and a gap from November 28, 2024, through April 15, 2025, for TIR acquisitions. Improvements/Changed from Previous Version * Starting June 23, 2021, radiometric calibration coefficient Version 5 (RCC V5) will be applied to newly observed ASTER data and archived ASTER data products. Details regarding RCC V5 are described in the following journal article. * Tsuchida, S., Yamamoto, H., Kouyama, T., Obata, K., Sakuma, F., Tachikawa, T., Kamei, A., Arai, K., Czapla-Myers, J.S., Biggar, S.F., and Thome, K.J., 2020, Radiometric Degradation Curves for the ASTER VNIR Processing Using Vicarious and Lunar Calibrations: Remote Sensing, v. 12, no. 3, at https://doi.org/10.3390/rs12030427.
  <br>

  #### AST_L1B
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Level 1B (AST_L1B) Registered Radiance at the Sensor data product is radiometrically calibrated and geometrically co-registered. Application of intra-telescope and inter-telescope registration corrections for all bands are relative to the reference band for each telescope: Visible and Near Infrared (VNIR) Band 2, Shortwave Infrared (SWIR) Band 6, and Thermal Infrared (TIR) Band 11. The AST_L1B product has a spatial resolution of 15 meters (m) for the VNIR bands, 30 m for the SWIR bands, and 90 m for the TIR bands. Known Issues: The QAPERCENTINTERPOLATEDDATA field in .met files was found to be inconsistent due to a software upgrade. Following evaluation by the ASTER Science Team, it was determined to have no impact on science data and has been set to 0 and nullified. * SWIR data acquired after April 2008 may exhibit anomalous saturation and striping. Users should consult the ASTER SWIR User Advisory for additional details.
  <br>

  #### AST_05
  The AST_05 Version 3 data product was decommissioned on December 15, 2025. Users are encouraged to use the [AST_05 Version 4 data product](https://doi.org/10.5067/ASTER/AST_05.004). The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Surface Emissivity (AST_05) is produced using the Temperature/Emissivity Separation (TES) algorithm for the five Thermal Infrared (TIR) 90 meter bands, acquired during the day or night. The product is comprised of per-pixel emissivity measurements generated over land in addition to embedded metadata and quality assurance data planes. The ASTER L2 Surface Emissivity data product is only available through [NASA's Earthdata Search](https://search.earthdata.nasa.gov/search?q=C1299783607-LPDAAC_ECS). The ASTER Order Instructions provide step-by-step directions for ordering this product. Known Issues: Data acquisition gaps: On November 28, 2024, one of Terra's power-transmitting shunt units failed. As a result, there was insufficient power to maintain functionality of the ASTER instrument. ASTER resumed acquisitions for the VNIR bands on January 18, 2025, and for the TIR bands on April 15, 2025. Users should note the data gap in ASTER acquisitions from November 28, 2024, through January 16, 2025, for VNIR observations, and a gap from November 28, 2024, through April 15, 2025, for TIR acquisitions. Improvements/Changes from Previous Version * The Science Scalable Scripts-based Science Processor for Missions (S4PM) Version 3.4 algorithm, which is used to generate L2 Product Generation Executables (PGEs), is relying on a new ancillary input for atmospheric parameters. Modern-Era Retrospective analysis for Research and Applications Version 2 (MERRA-2) is global atmospheric reanalysis that combines remote sensing observations and interactions with the climate system. It will be one of the primary ozone and water vapor, pressure, and temperature inputs for L2 PGEs. MERRA-2 will provide a finer geographic resolution grid since it is a 3-dimensional, 3-hourly data collection with 50-km (latitudinal direction) spatial resolution. * The fallback options for L2 PGEs are as follows: * Ozone: [TOVS Ozone (OZ_DLY ) > AURA Ozone Monitoring Instrument (AURAOMI) > Total Ozone Analysis from Stratospheric and Tropospheric (TOAST) > Earth Probe-Total Ozone Mapping Spectrometer (EPTOMS)] or [MERRA-2] > National Centers for Environmental Prediction (NCEP)/Global Data Assimilation System (GDAS) > Climatology * Water Vapor, Pressure, and Temperature: [MOD07_L2] or [MERRA-2] > NCEP/GDAS > Climatology * Caveat: The temporal range for MERRA-2 covers 1980 to present; however, there is latency of ~3 weeks after the end of a month. Hence, NCEP/GDAS > Climatology fallback sequence will be applied for on-demand requests that fall outside of MERRA-2's temporal range or if the data is not science grade. * Starting June 23, 2021, radiometric calibration coefficient Version 5 (RCC V5) will be applied to newly observed ASTER data and archived ASTER data products. Details regarding RCC V5 are described in the following journal article. * Tsuchida, S., Yamamoto, H., Kouyama, T., Obata, K., Sakuma, F., Tachikawa, T., Kamei, A., Arai, K., Czapla-Myers, J.S., Biggar, S.F., and Thome, K.J., 2020, Radiometric Degradation Curves for the ASTER VNIR Processing Using Vicarious and Lunar Calibrations: Remote Sensing, v. 12, no. 3, at https://doi.org/10.3390/rs12030427. * As of December 15, 2021, the LP DAAC has implemented changes to ASTER PGE Version 3.4, which will affect all ASTER Level 2 on-demand products. Changes include: * Aura Ozone Monitoring Instrument (OMI) has been added as one of the ancillary ozone inputs for any observations made after May 27, 2020. The sequence of fallbacks for ozone will remain the same. * Toolkit has been updated from Version 5.2.17 to 5.2.20. Users may notice minor differences between the two versions. Differences may include minuscule changes in digital numbers around the peripheral of the granule and boundaries of a cloud for Surface Reflectance and Surface Radiance (AST07 and AST09) QA Data Plane depending on the Operating System and libraries being used by the user to process the data. * Additionally, Climatology, which is one of the inputs for Ozone and Moisture, Temperature and Pressures (MTP) will be removed from the Earthdata Order Form. It has been observed that PGEs generated with Climatology as an input yield noticeable differences statistically during image and spectral analysis. Climatology will continue to be used as the final default if neither of the first two selectable options are available for Ozone and MTP. Users can check the OPERATIONALQUALITYFLAGEXPLANATION field in the metadata or the output file for atmospheric parameters that were applied.
  <br>

  #### AST_05
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Surface Emissivity (AST_05) is produced using the Temperature/Emissivity Separation (TES) algorithm for the five Thermal Infrared (TIR) 90 meter bands, acquired during the day or night. The product comprises per-pixel emissivity measurements generated over land in addition to embedded metadata and quality assurance data planes. Known Issues: Level 2 products that are on the international date line/anti-meridian have incorrect bounding coordinates for the Universal Transverse Mercator (UTM) zone defined in the file metadata.
  <br>

  #### AST_08
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Surface Kinetic Temperature (AST_08) V004 product delivers surface kinetic temperature data derived from the five Thermal Infrared (TIR) bands (Bands 10–14), collected during both daytime and nighttime observations. The AST_08 product has a spatial resolution of 90 meters (m) for the TIR bands. This Level 2 (L2) product is produced using the Temperature/Emissivity Separation (TES) algorithm, which processes atmospherically corrected ASTER surface radiance (TIR) data to estimate emissivity and compute temperature. In Version 4, atmospheric correction has been significantly improved by integrating Modern-Era Retrospective analysis for Research and Applications Version 2 (MERRA-2) data, enhancing the accuracy of temperature retrievals. Known Issues: Level 2 products that are on the international date line/anti-meridian have incorrect bounding coordinates for the UTM zone defined in the file metadata.
  <br>

  #### AST_09XT
  The AST_09XT Version 3 data product was decommissioned on December 15, 2025. Users are encouraged to use the [AST_09XT Version 4 data product](https://doi.org/10.5067/ASTER/AST_09XT.004). The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Surface Radiance VNIR and Crosstalk Corrected SWIR (AST_09XT) is a multi-file product that contains atmospherically corrected data for both the Visible and Near Infrared (VNIR) and Shortwave Infrared (SWIR) sensors. The crosstalk phenomenon was discovered during the nascent stage of the Terra Mission. It is whereby the incident light with band 4 caused multiple reflections for the SWIR bands, which resulted in blurred images. This has been corrected with the ASTER L2 Surface Radiance VNIR and Crosstalk Corrected SWIR data product. The AST_09XT product has a spatial resolution of 15 meters (m) for the VNIR bands and 30 m for the SWIR bands. Each product delivery includes two Hierarchical Data Format - Earth Observing System (HDF-EOS) files: one for the VNIR, and the other for the SWIR. Both the VNIR and the SWIR data are atmospherically corrected using the corresponding bands from an [ASTER Level 1B]( https://doi.org/10.5067/ASTER/AST_L1B.003) image. The ASTER L2 Surface Radiance VNIR and Crosstalk Corrected SWIR data product is only available through [NASA's Earthdata Search](https://search.earthdata.nasa.gov/search?q=C1299783631-LPDAAC_ECS). The ASTER Order Instructions provide step-by-step directions for ordering this product. Known Issues: SWIR Crosstalk Correction: The ASTER SWIR sensor is affected by a crosstalk signal scattering problem, a phenomenon discovered after the launch of ASTER aboard the Terra platform in December 1999. The SWIR detector contains 2048 Pt-Si (platinum-silicide) arrays for each of its six spectral bands. There are six pairs of staggered linear CCD arrays for each band that are spaced 1.33 µm apart in the band order 7, 8, 9, 4, 5, and 6. In front of each CCD array pair, there are interference filters that spectrally separate the radiation reflected from the Earth. * Data Anomalies: Users are advised that ASTER SWIR data acquired from April 2008 to the present exhibit anomalous saturation of values and anomalous striping. This effect is also present for some prior acquisition periods. Please refer to the ASTER SWIR User Advisory for more details. * Data acquisition gaps: On November 28, 2024, one of Terra's power-transmitting shunt units failed. As a result, there was insufficient power to maintain functionality of the ASTER instrument. ASTER resumed acquisitions for the VNIR bands on January 18, 2025, and for the TIR bands on April 15, 2025. Users should note the data gap in ASTER acquisitions from November 28, 2024, through January 16, 2025, for VNIR observations, and a gap from November 28, 2024, through April 15, 2025, for TIR acquisitions. Improvements/Changes from Previous Version * The Science Scalable Scripts-based Science Processor for Missions (S4PM) Version 3.4 algorithm, which is used to generate L2 Product Generation Executables (PGEs), is relying on a new ancillary input for atmospheric parameters. Modern-Era Retrospective analysis for Research and Applications Version 2 (MERRA-2) is global atmospheric reanalysis that combines remote sensing observations and interactions with the climate system. It will be one of the primary ozone and water vapor, pressure, and temperature inputs for L2 PGEs. MERRA-2 will provide a finer geographic resolution grid since it is a 3-dimensional, 3-hourly data collection with 50-km (latitudinal direction) spatial resolution. * The fallback options for L2 PGEs are as follows: * Ozone: [TOVS Ozone (OZ_DLY ) > AURA Ozone Monitoring Instrument (AURAOMI) > Total Ozone Analysis from Stratospheric and Tropospheric (TOAST) > Earth Probe-Total Ozone Mapping Spectrometer (EPTOMS)] or [MERRA-2] > National Centers for Environmental Prediction (NCEP)/Global Data Assimilation System (GDAS) > Climatology * Water Vapor, Pressure, and Temperature: [MOD07_L2] or [MERRA-2] > NCEP/GDAS > Climatology * Caveat: The temporal range for MERRA-2 covers 1980 to present; however, there is latency of ~3 weeks after the end of a month. Hence, NCEP/GDAS > Climatology fallback sequence will be applied for on-demand requests that fall outside of MERRA-2's temporal range or if the data is not science grade. * Starting June 23, 2021, radiometric calibration coefficient Version 5 (RCC V5) will be applied to newly observed ASTER data and archived ASTER data products. Details regarding RCC V5 are described in the following journal article. * Tsuchida, S., Yamamoto, H., Kouyama, T., Obata, K., Sakuma, F., Tachikawa, T., Kamei, A., Arai, K., Czapla-Myers, J.S., Biggar, S.F., and Thome, K.J., 2020, Radiometric Degradation Curves for the ASTER VNIR Processing Using Vicarious and Lunar Calibrations: Remote Sensing, v. 12, no. 3, at [https://doi.org/10.3390/rs12030427](https://doi.org/10.3390/rs12030427). * As of December 15, 2021, the LP DAAC has implemented changes to ASTER PGE Version 3.4, which will affect all ASTER Level 2 on-demand products. Changes include: * Aura Ozone Monitoring Instrument (OMI) has been added as one of the ancillary ozone inputs for any observations made after May 27, 2020. The sequence of fallbacks for ozone will remain the same. * Toolkit has been updated from Version 5.2.17 to 5.2.20. Users may notice minor differences between the two versions. Differences may include minuscule changes in digital numbers around the peripheral of the granule and boundaries of a cloud for Surface Reflectance and Surface Radiance (AST07 and AST09) QA Data Plane depending on the Operating System and libraries being used by the user to process the data. * Additionally, Climatology, which is one of the inputs for Ozone and Moisture, Temperature and Pressures (MTP) will be removed from the Earthdata Order Form. It has been observed that PGEs generated with Climatology as an input yield noticeable differences statistically during image and spectral analysis. Climatology will continue to be used as the final default if neither of the first two selectable options are available for Ozone and MTP. Users can check the OPERATIONALQUALITYFLAGEXPLANATION field in the metadata or the output file for atmospheric parameters that were applied.
