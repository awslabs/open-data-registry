  #### MCD12C1
  The MCD12C1 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD12C1 Version 6.1](https://doi.org/10.5067/MODIS/MCD12C1.061) data product. The Terra and Aqua combined Moderate Resolution Imaging Spectroradiometer (MODIS) Land Cover Climate Modeling Grid (CMG) (MCD12C1) Version 6 data product provides a spatially aggregated and reprojected version of the tiled [MCD12Q1 Version 6](https://doi.org/10.5067/MODIS/MCD12Q1.006) data product. Maps of the International Geosphere-Biosphere Programme (IGBP), University of Maryland (UMD), and Leaf Area Index (LAI) classification schemes are provided at yearly intervals at 0.05 degree (5,600 meter) spatial resolution for the entire globe from 2001 to 2020. Additionally, sub-pixel proportions of each land cover class in each 0.05 degree pixel is provided along with the aggregated quality assessment information for each of the three land classification schemes. Provided in each MCD12C1 Version 6 Hierarchical Data Format 4 (HDF4) file are layers for Majority Land Cover Type 1-3, Majority Land Cover Type 1-3 Assessment, and Majority Land Cover Type 1-3 Percent. Known Issues: Known issues are described on pages 3 and 4 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=6).
