  #### MCD19A2CMG
  The MCD19A2CMG Version 6.1 data product is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Multi-Angle Implementation of Atmospheric Correction (MAIAC) Land Aerosol Optical Depth (AOD) and Water Vapor Level 3 product produced daily in a 0.05 degree (5,600 meters at the equator) Climate Modeling Grid (CMG). The MCD19A2CMG product provides the atmospheric properties and view geometry used to calculate the MAIAC Surface Reflectance data products ([MCD19A1CMGL](https://doi.org/10.5067/MODIS/MCD19A1CMGL.061) and [MCD19A1CMGO](https://doi.org/10.5067/MODIS/MCD19A1CMGO.061)). The MCD19A2CMG AOD data product contains the following Science Dataset (SDS) layers: blue band AOD at 0.47 µm, green band AOD at 0.55 µm, AOD uncertainty, column water vapor for Terra, column water vapor for Aqua, average cloud fraction, available AOD, satellite overpass times, line and sample number, offset, and number of AOD records. A low-resolution browse image is also included showing AOD of the blue band at 0.47 µm created using a composite of all available orbits. Known Issues: Known issues are described in Section 6 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=61).
  <br>

  #### MCD19A3
  The MCD19A3 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD19A3 Version 6.1](https://doi.org/10.5067/MODIS/MCD19A3.061) data product. The MCD19A3 Version 6 data product is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Multi-angle Implementation of Atmospheric Correction (MAIAC) Bidirectional Reflectance Distribution Function (BRDF) Model Parameters gridded Level 3 product which is output every 8 days at 1 kilometer resolution. The MCD19A3 product provides three coefficients (weights) of the RossThick/Li-Sparse (RTLS) BRDF model that can be used to describe the anisotropy of each pixel. The retrievals represent cloud-free and low aerosol conditions. The MCD19A3 BRDF Model Parameters product contains the following Science Dataset (SDS) layers: RTLS isotropic kernel parameter (Kiso) for bands 1-8, the RTLS volumetric kernel parameter (Kvol) for bands 1-8, RTLS geometric kernel parameter (Kgeo) for bands 1-8, surface albedo for bands 1-8, and the number of days since last update to current day. Three low-resolution browse images are also included showing the BRDF coefficients for the red band: (1) Kiso, (2) Kvol, and (3) Kgeo. Known Issues: Due to Terra MODIS calibration degradation, BRDF in MODIS Band 8 may contain artifacts (e.g., 10 km striping), particularly after 2015. * Known issues are described on page 14 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=6).
  <br>

  #### MCD19A3D
  The MCD19A3D Version 6.1 data product is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Bidirectional Reflectance Distribution Function (BRDF) Model Parameters gridded Level 3 product. Output daily at 1 kilometer (km) resolution, the Multi-angle Implementation of Atmospheric Correction (MAIAC) MCD19A3D product provides three coefficients (weights) of the RossThick/Li-Sparse (RTLS) BRDF model that can be used to describe the anisotropy of each pixel. The retrievals represent cloud-free and low aerosol conditions. When snow is detected, gap-filled snow grain size and sub-pixel snow fraction are computed. The gap-filling process retains the parameter in MAIAC’s memory for each grid cell until updated with the latest cloud-free observation. The number of days since the last update is provided in a separate layer. Over snow-free land, MAIAC also reports gap-filled Normalized Difference Vegetation Index (NDVI) at 1 km resolution and gap-filled Nadir BRDF-Adjusted Reflectance (NBAR) at 250 m resolution in the red and near-infrared (NIR) bands. The MCD19A3 BRDF Model Parameters product contains the following Science Dataset (SDS) layers: RTLS isotropic kernel parameter (Kiso) for bands 1-8, the RTLS volumetric kernel parameter (Kvol) for bands 1-8, RTLS geometric kernel parameter (Kgeo) for bands 1-8, three snow parameters, NDVI, NBAR, and three separate layers for the number of days since last update to current day. Known Issues: Known issues are described in Section 6 of the User Guide. * An artifact was discovered in the NDVI1km and NBAR_250m layers over the southern polar region. The affected region shows false retrieval of data during the summer months. The artifacts occurred over permanently snow-covered areas where no meaningful NDVI retrieval is expected. A software fix was implemented for forward processing in June 2023. Existing data products will not be reprocessed. Affected dates are listed on the [Land Data Operational Products Evaluation Quality Assessment note](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=187). * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=61).
  <br>

  #### MCD43A3
  The MCD43A3 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD43A3 Version 6.1](https://doi.org/10.5067/MODIS/MCD43A3.061) data product. The Moderate Resolution Imaging Spectroradiometer (MODIS) MCD43A3 Version 6 Albedo Model dataset is produced daily using 16 days of Terra and Aqua MODIS data at 500 meter (m) resolution. Data are temporally weighted to the ninth day of the 16 day which is reflected in the Julian date in the file name. The MCD43A3 provides black-sky albedo (directional hemispherical reflectance) and white-sky albedo (bihemispherical reflectance) data at local solar noon for MODIS bands 1 through 7 and the visible, near infrared (NIR), and shortwave bands. Along with the albedo layers are the simplified mandatory quality layers for each of the 10 bands. Essential quality information provided in the corresponding [MCD43A2](https://doi.org/10.5067/MODIS/MCD43A2.006) data file should be consulted when using this product. Users are also urged to use the band specific quality flags to isolate the highest quality full inversion results for their own science applications as described in the User Guide. Known Issues: The incorrect representation of the aerosol quantities (low average high) [in the C6 MYD09 and MOD09 surface reflectance products](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=86) may have impacted downstream products particularly over arid bright surfaces. This (and a few other issues) have been corrected for C6.1. Therefore users should avoid substantive use of the C6 MCD43 products and wait for the C6.1 products. In any event, users are always strongly encouraged to download and use the extensive QA data provided in MCD43A2, in addition to the briefer mandatory QAs provided as part of the MCD43A1, 3, and 4 products. * [Corrections](https://landweb.modaps.eosdis.nasa.gov/data/userguide/LSRHighAerosolFlagFinal.pdf) were implemented in Collection 6.1 reprocessing. * For complete information about the MCD43A3 known issues refer to the [MODIS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&as=6).
  <br>

