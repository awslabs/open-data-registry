  #### MOD11C2
  The MOD11C2 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD11C2 Version 6.1](https://doi.org/10.5067/MODIS/MOD11C2.061) data product. The MOD11C2 Version 6 product provides Land Surface Temperature and Emissivity (LST&E) values in a 0.05 degree (5,600 meters at the equator) latitude/longitude Climate Modeling Grid (CMG). A CMG granule follows a geographic grid with 7,200 columns and 3,600 rows, representing the entire globe. The LST&E values in the MOD11C2 product are derived by compositing and averaging the values from the corresponding eight [MOD11C1](https://doi.org/10.5067/MODIS/MOD11C1.006) daily files. The MOD11C2 granule consists of 17 layers. Each MOD11C2 product consists of the following layers for daytime and nighttime observations: LSTs, quality control assessments, observation times, view zenith angles, and number of clear-sky observations along with percentage of land in the grid and emissivities from bands 20, 22, 23, 29, 31, and 32. Known Issues: Production of V6 Terra MODIS Land Surface Temperature and Emissivity (LST&E) data products was discontinued on November 16, 2022, due to [significant loss of data retrieval](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=98) following the Constellation Exit Maneuvers. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6).
