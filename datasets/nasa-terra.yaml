  #### MCD18C1
  The MCD18C1 Version 6.1 dataset was decommissioned on June 1, 2024. Users are encouraged to use the [MCD18C1 Version 6.2 data product](https://doi.org/10.5067/MODIS/MCD18C1.062). The MCD18C1 Version 6.1 is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Downward Shortwave Radiation (DSR) Level 3 product produced daily in a 0.05 degree (5,600 meters at the equator) Climate Modeling Grid (CMG) with estimates of DSR every 3 hours. DSR is incident solar radiation over land surfaces in the shortwave spectrum (300-4,000 nanometers) and is an important variable in land-surface models that address a variety of scientific and application issues. The MCD18 products are based on a prototyping algorithm that uses multi-temporal signatures of MODIS data to derive surface reflectance and then calculate incident DSR using the look-up table (LUT) approach. The LUTs consider different types of loadings of aerosols and clouds at a variety of illumination/viewing geometry. Global DSR products are generated from MODIS and geostationary satellite data. Additional details regarding the methodology used to create the data are available in the Algorithm Theoretical Basis Document (ATBD). Provided in the MOD18C1 product are layers for instantaneous DSR array for each individual MODIS overpass and 3-hour DSR array along with a View Zenith Angle layer. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=61).
  <br>

