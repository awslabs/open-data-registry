  #### MODTBGA
  The MODTBGA Version 6 data product was decommissioned on July 31, 2023. The MODTBGA Version 6 Moderate Resolution Imaging Spectroradiometer (MODIS) Level 2 Gridded Lite (L2G-lite) Thermal Band product consists of brightness temperature data from MODIS bands 20, 31, and 32 and albedo data from band 20 along with the orbit and granule pointer fields. MODTBGA is a daily product with a pixel size of 1 kilometer (km). The MODTBGA, as with other L2G data sets, stores the “best available pixel” from all the qualifying observations in the first layer and any subsequent observations are stored in either full or a compact layers within the Hierarchical Data Format (HDF) file. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6). Improvements/Changes from Previous Versions * New product for MODIS Version 6.
  <br>

  #### MOD05_L2
  The MODIS/Terra Total Precipitable Water Vapor 5-Min L2 Swath 1km and 5km (MOD05_L2) product consists of atmospheric column water-vapor amounts. This product is derived from data collected by the Moderate-Resolution Imaging Spectroradiometer (MODIS) on board the Terra satellite. There are two different algorithms used to derive total precipitable water vapor in this data product: a near-infrared algorithm and an infrared algorithm. The near-infrared algorithm relies on observations of reflected solar radiation in MODIS's near-infrared channels, thus, the near-infrared retrievals are only produced during the daytime over surfaces that reflect near-infrared energy. As a result, the near-infrared algorithm is only applied over clear, cloud free land areas of the globe and above clouds over both the land and ocean. Over clear ocean areas, water-vapor estimates are provided over extended sun glint areas. Data produced by the near-infrared algorithm are generated at a 1-km spatial resolution. The other algorithm is the infrared algorithm which can be used to derive atmospheric precipitable water vapor profiles during both day and night. Data from the infrared algorithm are generated at a 5-km spatial resolution when at least nine field of views (FOVs) are cloud free. The infrared-derived precipitable water vapor is generated as a component of product MOD07, and is simply added to product MOD05 for convenience. There are two MODIS Precipitable Water Vapor products: MOD05_L2, containing data collected from the Terra platform; and MYD05_L2, containing data collected from the Aqua platform. This dataset has a short name of MOD05_L2 and provides data from the Terra platform only. The MODIS Adaptive Processing System (MODAPS) is currently generating an improved version 6.1 (061) for all MODIS Level-1 (L1) and higher-level Level-2 (L2) & Level-3 (L3) Atmosphere Team products. The decision to create a new improved Collection 6.1 (061) was driven by the need to address a number of issues in the current Collection 6 (006) Level-1B (L1B) data, which have a negative impact in varying degrees in downstream products. It should be noted that the near-infrared algorithm refinement for this product is no longer being supported by NASA and as such there has been no update to this algorithm for Collection 6.1. For more information, visit the MODIS Atmosphere website at: https://modis-atmos.gsfc.nasa.gov/products/water-vapor
  <br>

  #### MOD44B
  The MOD44B Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD44B Version 6.1](https://doi.org/10.5067/MODIS/MOD44B.061) data product. The MOD44B Version 6 Vegetation Continuous Fields (VCF) yearly product is a global representation of surface vegetation cover as gradations of three ground cover components: percent tree cover, percent non-tree cover, and percent non-vegetated (bare). VCF products provide a continuous, quantitative portrayal of land surface cover at 250 meter (m) pixel resolution, with a sub-pixel depiction of percent cover in reference to the three ground cover components. The sub-pixel mixture of ground cover estimates represents a revolutionary approach to the characterization of vegetative land cover that can be used to enhance inputs to environmental modeling and monitoring applications. The MOD44B data product layers include percent tree cover, percent non-tree cover, percent non-vegetated, cloud cover, and quality indicators. The start date of the annual period for this product begins with day of year (DOY) 65 (March 6 except for leap year which corresponds to March 5). Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6).
  <br>

