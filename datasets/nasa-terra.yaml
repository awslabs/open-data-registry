  #### MOD16A2
  The MOD16A2 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD16A2 Version 6.1](https://doi.org/10.5067/MODIS/MOD16A2.061) data product. The MOD16A2 Version 6 Evapotranspiration/Latent Heat Flux product is an 8-day composite dataset produced at 500 meter (m) pixel resolution. The algorithm used for the MOD16 data product collection is based on the logic of the Penman-Monteith equation, which includes inputs of daily meteorological reanalysis data along with Moderate Resolution Imaging Spectroradiometer (MODIS) remotely sensed data products such as vegetation property dynamics, albedo, and land cover. Provided in the MOD16A2 product are layers for composited Evapotranspiration (ET), Latent Heat Flux (LE), Potential ET (PET) and Potential LE (PLE) along with a quality control layer. Two low resolution browse images, ET and LE, are also available for each MOD16A2 granule. The pixel values for the two Evapotranspiration layers (ET and PET) are the sum of all eight days within the composite period and the pixel values for the two Latent Heat layers (LE and PLE) are the average of all eight days within the composite period. Note that the last acquisition period of each year is a 5 or 6-day composite period, depending on the year. Known Issues: Operational and uncertainty issues are provided under Section 3 in the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6).
  <br>

