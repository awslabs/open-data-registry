  #### MCD43C4
  The MCD43C4 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD43C4 Version 6.1](https://doi.org/10.5067/MODIS/MCD43C4.061) data product. The Moderate Resolution Imaging Spectroradiometer (MODIS) MCD43C4 Version 6 Bidirectional Reflectance Distribution Function and Albedo (BRDF/Albedo) Nadir BRDF-Adjusted Reflectance (NBAR) dataset is produced daily using 16 days of Terra and Aqua MODIS data in a 0.05 degree (5,600 meters at the equator) Climate Modeling Grid (CMG). Data are temporally weighted to the ninth day of the retrieval period which is reflected in the Julian date in the file name. This CMG product covers the entire globe for use in climate simulation models. Users are urged to use the band specific quality flags to isolate the highest quality full inversion results for their own science applications as described in the User Guide. MCD43C4 removes view angle effects from directional reflectances to model the values as if they were collected from a nadir view at local solar noon. These NBAR values are calculated from [MCD43C1](https://doi.org/10.5067/MODIS/MCD43C1.006). The product includes separate NBAR layers for MODIS spectral bands 1 through 7 as well as ancillary layers for quality, local solar noon, percent finer resolution inputs, snow cover, and uncertainty. Known Issues: The incorrect representation of the aerosol quantities (low average high) [in the C6 MYD09 and MOD09 surface reflectance products](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=86) may have impacted downstream products particularly over arid bright surfaces. This (and a few other issues) have been corrected for C6.1. Therefore users should avoid substantive use of the C6 MCD43 products and wait for the C6.1 products. In any event, users are always strongly encouraged to download and use the extensive QA data provided in MCD43A2, in addition to the briefer mandatory QAs provided as part of the MCD43A1, 3, and 4 products. * [Corre