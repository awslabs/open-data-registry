  #### MOD16A2GF
  The MOD16A2GF Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD16A2GF Version 6.1](https://doi.org/10.5067/MODIS/MOD16A2GF.061) data product. The MOD16A2GF Version 6 Evapotranspiration/Latent Heat Flux (ET/LE) product is a year-end gap-filled 8-day composite dataset produced at 500 meter (m) pixel resolution. The algorithm used for the MOD16 data product collection is based on the logic of the Penman-Monteith equation, which includes inputs of daily meteorological reanalysis data along with Moderate Resolution Imaging Spectroradiometer (MODIS) remotely sensed data products such as vegetation property dynamics, albedo, and land cover. The MOD16A2GF will be generated at the end of each year when the entire yearly 8-day [MOD15A2H](https://doi.org/10.5067/MODIS/MOD15A2H.006) is available. Hence, the gap-filled MOD16A2GF is the improved MOD16, which has cleaned the poor-quality inputs from 8-day Leaf Area Index and Fraction of Photosynthetically Active Radiation (LAI/FPAR) based on the Quality Control (QC) label for every pixel. If any LAI/FPAR pixel did not meet the quality screening criteria, its value is determined through linear interpolation. However, users cannot get MOD16A2GF in near-real time because it will be generated only at the end of a given year. Provided in the MOD16A2GF product are layers for composited ET, LE, Potential ET (PET), and Potential LE (PLE) along with a quality control layer. Two low resolution browse images, ET and LE, are also available for each MOD16A2GF granule. The pixel values for the two Evapotranspiration layers (ET and PET) are the sum of all eight days within the composite period, and the pixel values for the two Latent Heat layers (LE and PLE) are the average of all eight days within the composite period. The last acquisition period of each year is a 5- or 6-day composite period, depending on the year. Known Issues: Operational and uncertainty issues are provided under Section 3 in the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6).
