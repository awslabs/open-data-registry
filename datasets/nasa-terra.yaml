  #### MIRCCMF
  This is the FIRSTLOOK Radiometric Camera-by-camera Cloud Mask (RCCM) product. It contains initial estimated classifications of pixels/regions as clear or cloudy. It also has masks for the presence of glitter or dust. The FIRSTLOOK RCCM product is superceded by the final RCCM product following seasonal calibration.
  <br>

  #### MIL2TCCF
  Multi-angle Imaging SpectroRadiometer (MISR) is an instrument designed to view Earth with cameras pointed in 9 different directions. As the instrument flies overhead, each piece of Earth's surface below is successively imaged by all 9 cameras, in each of 4 wavelengths (blue, green, red, and near-infrared). The goal of MISR is to improve our understanding of the fate of sunlight in Earth environment, as well as distinguish different types of clouds, particles and surfaces. Specifically, MISR monitors the monthly, seasonal, and long-term trends in three areas: 1) amount and type of atmospheric particles (aerosols), including those formed by natural sources and by human activities; 2) amounts, types, and heights of clouds, and 3) distribution of land surface cover, including vegetation canopy structure. MISR Level 2 FIRSTLOOK TOA/Cloud Classifier parameters V002 contains the Angular Signature Cloud Mask (ASCM), Cloud Classifiers, and Support Vector Machine classifiers, produced using ancillary inputs and Terrestrial Atmosphere and Surface Climatology (TASC) from the previous time period.
  <br>

  #### MCD06COSP_D3_MODIS
  The combined MODIS (Aqua/Terra) Cloud Properties Level 3 daily, 1x1 degree grid product represents a new addition that is especially geared to facilitate climate scientists who deal with both models and observations. MCD06COSP_D3_MODIS represents the daily product’s short-name. The “COSP” acronym in its short-name stands for Cloud Feedback Model Intercomparison Project (CFMIP) Observation Simulator Package. This product is an aggregation of combined MODIS Level-2 inputs from both the Terra and Aqua incarnations (MOD35/MOD06 and MYD35/MYD06, respectively), and employs an aggregation methodology consistent with the MOD08 and MYD08 products. Provided in netCDF4 format, it contains 23 aggregated science data sets (SDS/parameters). The Collection 6.2 (C6.2) is an improved version from the previous version (C6.1) because a number of bugs detected in Collection 6.1 are fixed.
  <br>

  #### MCD06COSP_M3_MODIS
  The combined MODIS (Aqua/Terra) Cloud Properties Level 3 monthly, 1x1 degree grid product represents a new addition that is especially geared to facilitate climate scientists who deal with both models and observations. MCD06COSP_D3_MODIS represents the daily product’s short-name. The “COSP” acronym in its short-name stands for Cloud Feedback Model Intercomparison Project (CFMIP) Observation Simulator Package. The L3 monthly product is derived by aggregating the daily-produced Aqua+Terra/MODIS D3 Cloud Properties product (MCD06COSP_D3_MODIS). Provided in netCDF4 format, it contains 23 aggregated science data sets (SDS/parameters). The Collection 6.2 (C6.2) is an improved version from the previous version (C6.1) because a number of bugs detected in Collection 6.1 are fixed.
  <br>

  #### MOD04_L2
  The MODIS/Terra Aerosol 5-Min L2 Swath 10km (MOD04_L2) product provides full global coverage of aerosol properties from the Dark Target (DT) and Deep Blue (DB) algorithms. The DT algorithm is applied over ocean and dark land (e.g., vegetation), while the DB algorithm now covers the entire land areas including both dark and bright surfaces. Both results are provided on a 10x10 pixel scale (10 km at nadir). Each MOD04_L2 product file covers a five-minute time interval. The output grid is 135 pixels in width by 203 pixels in length. Every tenth file has an output grid size of 135 by 204 pixels. MOD04_L2 product files are stored in Hierarchical Data Format (HDF-EOS). The new Collection 6.1 (C61) MOD04_L2 product is an improved version based on algorithm changes in Dark Target (DT) Aerosol retrieval over urban areas and uncertainty estimates for Deep Blue (DB) Aerosol retrievals. The MODIS level-2 atmospheric aerosol product provides retrieved ambient aerosol optical properties, quality assurance, and other parameters, globally over ocean and land. In Collection 5 and in earlier collections, there was only one aerosol product (MOD04_L2) at 10km (at nadir) spatial resolution. Starting from C6, the Dark Target (DT) Aerosol algorithm team provided a new 3 km spatial resolution product (MOD04_3k) intended for the air quality community. For more information visit the MODIS Atmosphere website at: https://modis-atmos.gsfc.nasa.gov/products/aerosol And, for C6.1 changes and updates, visit: https://modis-atmosphere.gsfc.nasa.gov/documentation/collection-61
  <br>

  #### MOD04_3K
  The new Collection 6.1 (C61) MODIS/Terra Aerosol 5 Min L2 Swath 3km (MOD04_3K) product is an improved version based on algorithm changes in Dark Target (DT) Aerosol retrieval over urban areas and uncertainty estimates for Deep Blue (DB) Aerosol retrievals. The MODIS level-2 atmospheric aerosol product provides retrieved ambient aerosol optical properties, quality assurance, and other parameters, globally over ocean and land. In Collection 5, and earlier collections, there was only one aerosol product (MOD04_L2) at 10km (at nadir) spatial resolution. Starting from C6, the Dark Target (DT) Aerosol algorithm team provided a new 3 km spatial resolution product (MOD04_3k) intended for the air quality community. The MOD04_3K product is based on the same algorithm and Look up Tables as the standard Dark Target aerosol product. Because of finer resolution, subtle differences are made in selecting pixels for retrieval and in determining QA. The only differences between the existing 10km algorithm and the new 3km algorithm are: 1) the size of the pixel-arrays defining each retrieval box ( 6x6 retrieval boxes of 36 pixels at 0.5km resolution for 3km algorithm as oppose to 20x20 retrieval boxes of 400 pixels at 0.5km resolution for 10km product); 2) the minimum percentage of "good" pixels required for a retrieval (a minimum of 5 pixels over ocean and 6 pixels over land instead of a minimum of 10 pixels over ocean or 12 pixels over land for 10km product retrieval); 3) the 10km algorithm attemptes a "poor quality" retrieval while 3km algorithm does not. Everything else is the same between two products. For more information on C6.1 changes and updates, visit the MODIS Atmosphere website at: https://modis-atmosphere.gsfc.nasa.gov/documentation/collection-61
  <br>

  #### MOD08_E3
  The MODIS/Terra Aerosol Cloud Water Vapor Ozone 8-Day L3 Global 1Deg CMG product (MOD08_E3) contains 8-Day 1 x 1 degree grid average values of atmospheric parameters related to atmospheric aerosol particle properties, total ozone burden, atmospheric water vapor, cloud optical and physical properties, and atmospheric stability indices. This product also provides standard deviations, quality assurance weighted means and other statistically derived quantities for each parameter. The MOD08_E3 contains nearly 1000 statistical datasets (SDS's) that are derived from the Level-3 MODIS Atmosphere Daily Global Product. Statistics are computed over a 1 degree equal-angle lat-lon grid that spans an 8-Day interval. Since the grid cells are 1 degree by 1 degree, the output grid is always 360 pixels in width and 180 pixels in length. MOD08_E3 product files are stored in Hierarchical Data Format (HDF-EOS). Each gridded global parameter is stored as Scientific Data Sets (SDS) within the file. The MODIS 8-Day Product will be used in the simultaneously study of clouds, water vapor, aerosol , trace gases, land surface and oceanic properties, as well as the interaction between them and their effect on the Earth's energy budget and climate. This product will also be used to investigate seasonal and inter-annual changes in cirrus (semi-transparent) global cloud cover and cloud phase with multispectral observations at high spatial resolution. For more information about the MOD08_E3 product, please visit the MODIS-Atmosphere site at: https://modis-atmos.gsfc.nasa.gov/products/eight-day
  <br>

  #### MOD08_D3
  The MODIS/Terra Aerosol Cloud Water Vapor Ozone Daily L3 Global 1Deg CMG product (MOD08_D3) contains daily 1 x 1 degree grid average values of atmospheric parameters related to atmospheric aerosol particle properties, total ozone burden, atmospheric water vapor, cloud optical and physical properties, and atmospheric stability indices. This product also provides standard deviations, quality assurance weighted means and other statistically derived quantities for each parameter. The MOD08_D3 contains roughly 600 statistical datasets that are derived from approximately 80 scientific parameters from four Level-2 MODIS Atmosphere Products: MOD04_L2, MOD05_L2, MOD06_L2, and MOD07_L2. Statistics are computed over a 1 degree equal-angle lat-lon grid that spans a 24-hour (0000 to 2400 Greenwich Mean Time) interval. Since the grid cells are 1 degree by 1 degree, the output grid is always 360 pixels in width and 180 pixels in length. MOD08_D3 product files are stored in Hierarchical Data Format (HDF-EOS). Each gridded global parameter is stored as Scientific Data Sets (SDS) within the file. The MODIS Daily Product will be used in the simultaneously study of clouds, water vapor, aerosol , trace gases, land surface and oceanic properties, as well as the interaction between them and their effect on the Earth's energy budget and climate. This product will also be used to investigate seasonal and inter-annual changes in cirrus (semi-transparent) global cloud cover and cloud phase with multispectral observations at high spatial resolution. For more information about the MOD08_D3 product, please visit the MODIS-Atmosphere site at: https://modis-atmos.gsfc.nasa.gov/products/daily
  <br>

  #### MOD08_M3
  The MODIS/Terra Aerosol Cloud Water Vapor Ozone Monthly L3 Global 1Deg CMG product (MOD08_M3) contains monthly 1 x 1 degree grid average values of atmospheric parameters related to atmospheric aerosol particle properties, total ozone burden, atmospheric water vapor, cloud optical and physical properties, and atmospheric stability indices. This product also provides standard deviations, quality assurance weighted means and other statistically derived quantities for each parameter. The MOD08_M3 contains roughly 800 statistical datasets that are derived from the Level-3 MODIS Atmosphere Daily Global Product. Statistics are sorted into 1x1 degree cells on an equal-angle grid that spans a (calendar) monthly interval and then summarized over the globe. MOD08_M3 product files are stored in Hierarchical Data Format (HDF-EOS). Each gridded global parameter is stored as Scientific Data Sets (SDS) within the file. The MODIS monthly Product will be used in the simultaneously study of clouds, water vapor, aerosol , trace gases, land surface and oceanic properties, as well as the interaction between them and their effect on the Earth's energy budget and climate. This product will also be used to investigate seasonal and inter-annual changes in cirrus (semi-transparent) global cloud cover and cloud phase with multispectral observations at high spatial resolution. For more information about the MOD08_M3 product, please visit the MODIS-Atmosphere site at: https://modis-atmos.gsfc.nasa.gov/products/monthly
  <br>

  #### MODATML2
  The MODIS/Terra Aerosol, Cloud and Water Vapor Subset 5-Min L2 Swath 5km and 10km (MODATML2) product contains a combination of key high interest science parameters. The ATML2 product provides a subset of datasets from the suite of atmosphere team products on both a 10 km scale (aerosols) and 5km scale (native 5 km cloud properties and a 5x5 pixel sample of the 1km cloud datasets). The ATML2 product employs the same 5x5 pixel sampling scheme for the 1km native resolution Level 2 products as is used in the MOD08 Level 3 global aggregated product, an approach that has been shown to retain statistical integrity for multi-day aggregations. The C6 significantly increases the number of datasets included in the ATML2 product, including the full suite of QA datasets. Since the ATML2 data granule file size is significantly smaller than the combined size of the individual L2 products, and because the 1 km pixel sampling is consistent with the L3 algorithm, the ATML2 product is a more practical means for the user community to develop research L3 algorithms for their own specific purposes. For more information, visit the MODIS Atmosphere website at: https://modis-atmos.gsfc.nasa.gov/products/joint-atm
  <br>

  #### MOD09
  The MODIS/Terra Atmospherically Corrected Surface Reflectance 5-Min L2 Swath 250m, 500m, 1km (MOD09) product is computed from the MODIS Level 1B land bands 1, 2, 3, 4, 5, 6, and 7 (centered at 648 nm, 858 nm, 470 nm, 555 nm, 1240 nm, 1640 nm, and 2130 nm, respectively). The product is an estimate of the surface spectral reflectance for each band as it would have been measured at ground level if there were no atmospheric scattering or absorption. The surface-reflectance product is the input for product generation for several land products: vegetation Indices (VIs), Bidirectional Reflectance Distribution Function (BRDF), thermal anomaly, snow/ice, and Fraction of Photosynthetically Active Radiation/Leaf Area Index (FPAR/LAI).
  <br>

  #### MOD021KM
  The MODIS/Terra Calibrated Radiances 5Min L1B Swath 1km data set contains calibrated and geolocated at-aperture radiances for 36 discrete bands located in the 0.4 to 14.4 micron region of the electromagnetic spectrum. These data are generated from the MODIS Level 1A scans of raw radiance which during processing are converted to geophysical units of W/(m^2 um sr). Additional data are provided including quality flags, error estimates and calibration data. Visible, shortwave infrared, and near infrared measurements are only made during the daytime (except band 26), while radiances for the thermal infrared region (bands 20-25, 27-36) are measured continuously. The shortname for this product is MOD021KM and is stored in the Earth Observing System Hierarchical Data Format (HDF-EOS). A typical file size is approximately 110 MB (a day granule around 150MB and a night granule around 70 MB). In this new version (Collection 6.1) of MOD021KM, an advanced technique is introduced to mitigate the crosstalk contamination issue among the LWIR PV bands using data from lunar calibration events. The electronic crosstalk contamination issue in the Terra long-wave infrared photovoltaic (LWIR PV) bands (27 -30), has existed since the beginning of the mission but become more noticeable during later half of the mission. The electronic crosstalk is where signal from each of the detectors among the LWIR PV bands can leak to the other detectors, producing a false signal contribution. This contamination has had a noticeable effect on the MODIS science products since 2010 for band 27, and since 2012 for bands 28 and 29. Environmental information derived from MODIS L1B measurements will offer a comprehensive and unprecedented look at terrestrial, atmospheric, and ocean phenomenology for a wide and diverse community of users throughout the world. See the MODIS Characterization Support Team webpage for more C6 product information at: https://mcst.gsfc.nasa.gov/l1b/product-information or visit the Science Team homepage at: https://modis.gsfc.nasa.gov/data/dataprod/
  <br>

  #### MOD02QKM
  The MODIS/Terra Calibrated Radiances 5Min L1B Swath 250m data set contains calibrated and geolocated at-aperture radiances for 2 discrete bands located in the 0.62 to 0.88 micron region of the electromagnetic spectrum. These data are generated from the MODIS Level 1A scans of raw radiance which have been processed to geophysical units of W / (m^2 um sr). Additional data are provided including quality flags, error estimates and calibration data. Separate L1B products are available for the five 500m resolution channels (MOD02HKM) and the twenty-nine 1km resolution channels (MOD021KM). For the 500m product, there are actually seven channels available since the data from the two 250 m channels have been aggregated to 500m resolution. Similarly, for the 1km product, all 36 MODIS channels are available since the data from the two 250m and five 500m channels have been aggregated into equivalent 1km pixel values. Spatial resolution for pixels at nadir is 250 m, degrading to 1.2 km in the along-scan direction and 0.5 km in the along-track direction for pixels located at the scan extremes. A 55 degree scanning pattern at the EOS orbit of 705 km results in a 2330 km orbital swath width and provides global coverage every one to two days. A single MODIS Level 1B 250 m granule will contain a scene built from 203 scans sampled 5416 times in the cross-track direction, corresponding to approximately 5 minutes worth of data; thus 288 granules will be produced per day. Since an individual MODIS scan will contain 40 along-track spatial elements for the 250 m channels, the scene will be composed of (5416 x 8120) pixels, resulting in a spatial coverage of (2330 km x 2040 km). Due to the MODIS scan geometry, there will be increasing scan overlap beyond about 17 degrees scan angle. The shortname for this product is MOD02QKM and is stored in the Earth Observing System Hierarchical Data Format (HDF-EOS). A typical file size will be approximately 140 MB and the total daily volume is around 22GB. Environmental information derived from MODIS L1B measurements will offer a comprehensive and unprecedented look at terrestrial, atmospheric, and ocean phenomenology for a wide and diverse community of users throughout the world. See the MODIS Characterization Support Team webpage for more C6 product information at: https://mcst.gsfc.nasa.gov/l1b/product-information or visit the Science Team homepage at: https://modis.gsfc.nasa.gov/data/dataprod/
  <br>

  #### MOD02HKM
  The MODIS/Terra Calibrated Radiances 5Min L1B Swath 500m data set contains calibrated and geolocated at-aperture radiances for 7 discrete bands located in the 0.45 to 2.20 micron region of the electromagnetic spectrum. These data are generated from the MODIS Level 1A scans of raw radiance and in the process converted to geophysical units of W/(m^2 um sr). Additional data are provided including quality flags, error estimates and calibration data. Visible, shortwave infrared, and near infrared measurements are only made during the daytime (except band 26), while radiances for the thermal infrared region (bands 20-25, 27-36) are measured continuously. Channels 1 and 2 have 250 m resolution, channels 3 through 7 have 500 m resolution. However, for the MODIS L1B 500 m product, the 250 m band radiance data and their associated uncertainties have been aggregated to 500m resolution. Thus the entire channel data set has been co-registered to the same spatial scale in the 500 m product. Separate L1B products are available for the 250 m resolution channels (MOD02QKM) and 1 km resolution channels (MOD021KM). For the latter product, the 250 m and 500 m channel data (bands 1 through 7) have been aggregated into equivalent 1 km pixel values. Spatial resolution for pixels at nadir is 500 km, degrading to 2.4 km in the along-scan direction at the scan extremes. However, thanks to the overlapping of consecutive swaths and respectively pixels there, the resulting resolution at the scan extremes is about 1 km. A 55 degree scanning pattern at the EOS orbit of 705 km results in a 2330 km orbital swath width and provides global coverage every one to two days. A single MODIS Level 1B 500 m granule will contain a scene built from 203 scans sampled 2708 times in the cross-track direction, corresponding to approximately 5 minutes worth of data; thus 288 granules will be produced per day. Since an individual MODIS scan will contain 20 along-track spatial elements for the 500 m channels, the scene will be composed of (2708 x 4060) pixels, resulting in a spatial coverage of (2330 km x 2040 km). Due to the MODIS scan geometry, there will be increasing scan overlap beyond about 20 degrees scan angle. To summarize, the MODIS L1B 500 m data product consists of: 1. Calibrated radiances, uncertainties and number of samples for (2) 250 m reflected solar bands aggregated to 500 m resolution 2. Calibrated radiances and uncertainties for (5) 500 m reflected solar bands 3. Geolocation for 1km pixels, that must be interpolated to get 500 m pixel locations. For the relationship of 1km pixels to 500m pixels, see the Geolocation ATBD https://modis.gsfc.nasa.gov/data/atbd/atbd_mod28_v3.pdf. 4. Calibration data for all channels (scale and offset) 5. Comprehensive set of file-level metadata summarizing the spatial, temporal and parameter attributes of the data, as well as auxiliary information pertaining to instrument status and data quality characterization users requiring all geolocation and solar/satellite geometry fields at 1km resolution can obtain the separate MODIS Level 1 Geolocation product (MOD03) from LAADS https://ladsweb.modaps.eosdis.nasa.gov/ . The shortname for this product is MOD02HKM and is stored in the Earth Observing System Hierarchical Data Format (HDF-EOS). A typical MOD02HKM file size is approximately 135 MB. Environmental information derived from MODIS L1B measurements will offer a comprehensive and unprecedented look at terrestrial, atmospheric, and ocean phenomenology for a wide and diverse community of users throughout the world. See the MODIS Characterization Support Team webpage for more C6 product information at: https://mcst.gsfc.nasa.gov/l1b/product-information or visit Science Team homepage at: https://modis.gsfc.nasa.gov/data/dataprod/
  <br>

  #### MOD35_L2
  The MODIS/Terra Cloud Mask and Spectral Test Results 5-Min L2 Swath 250m and 1km product consists of global cloud mask quality assurance and other ancillary parameters. The algorithm employs a series of visible and infrared threshold and consistency tests to specify confidence levels that an unobstructed view of the Earth's surface is observed. An indication of shadows affecting the scene is also provided. The 250-m cloud mask flags are based on the visible channel data only. Radiometrically accurate radiances are required, so holes in the cloud mask will appear wherever the input radiances are incomplete or of poor quality. The shortname for this Level-2 MODIS cloud mask product is MOD35_L2. The MOD35_L2 product files are stored in Hierarchical Data Format (HDF-EOS). This product consists of 9 parameters and each of these parameters are stored as a Scientific Data Set (SDS) within the HDF-EOS file. The Cloud Mask and Quality Assurance SDS's are stored at 1 kilometer pixel resolution. All other SDS's (those relating to time, geolocation, and viewing geometry) are stored at 5 kilometer pixel resolution. For more information about the MOD35_L2 product, visit the MODIS-Atmosphere site at: https://modis-atmos.gsfc.nasa.gov/products/cloud-mask
  <br>

  #### MOD06_L2
  The MODIS/Terra Clouds 5-Min L2 Swath 1km and 5km product (MOD06_L2) consists of cloud optical and physical parameters. These parameters are derived using remotely sensed infrared, visible and near infrared solar reflected radiances. MODIS infrared channel radiances are used to derive cloud top temperature, cloud top height, effective emissivity, cloud phase (ice vs. water, opaque vs. non-opaque), and cloud fraction under both daytime and nighttime conditions. MODIS visible radiances are used to derive cloud optical thickness and effective particle radius and cloud shadow effects. Near infrared solar reflected radiance provides additional information in the retrieval of cloud particle phase (ice vs. water, clouds vs. snow). The shortname for this level-2 MODIS cloud product is MOD06_L2. MOD06_L2 consists of parameters at a spatial resolution of either 1- km or 5-km (at nadir). Each MOD06_L2 product file covers a five-minute time interval. This means that for 5-km resolution parameters, the output grid is 270 pixels in width by 406 pixels in length. C6.1 changes for the cloud optical property retrievals are low-impact, and are limited primarily to ancillary product usage, the Quality Assurance (QA), and handling of cloud top (CT) properties fill values; no updates to retrieval science are implemented. The MODIS Cloud Product is used to investigate seasonal and inter-annual changes in cirrus (semi-transparent) global cloud cover and cloud phase with multispectral observations at high spatial (1 kilometer) resolution. For more information about the MOD06_L2 product, visit the MODIS-Atmosphere site at: https://modis-atmos.gsfc.nasa.gov/products/cloud
  <br>

  #### MOD03
  The MODIS/Terra Geolocation Fields 5Min L1A Swath 1km are calculated for each 1 km MODIS Instantaneous Field of Views (IFOV) for all orbits daily (in Collection 6 and later, information is provided to claculate 500m geolocation fields). The locations and ancillary information corresponds to the intersection of the centers of each IFOV from 10 detectors in an ideal 1 km band on the Earth's surface. A digital terrain model is used to model the Earth's surface. The main inputs are the spacecraft attitude and orbit, the instrument telemetry and the digital elevation model. The geolocation fields include geodetic Latitude, Longitude, surface height above geoid, solar zenith and azimuth angles, satellite zenith and azimuth angles, and a land/sea mask for each 1 km sample. Additional information is included in the header to enable the calculation of the approximate location of the center of the detectors of any of the 36 MODIS bands. This product is used as input by a large number of subsequent MODIS products, particularly the products produced by the Land team. The short name for this product is MOD03. Each file is roughly 30 MB in size, and the total data volume is approximately 8 GB/day. See the MODIS Science Team homepage for more data set information: https://modis.gsfc.nasa.gov/data/dataprod/
  <br>

  #### MOD17A2H
  The MOD17A2H Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD17A2H Version 6.1](https://doi.org/10.5067/MODIS/MOD17A2H.061) data product. The MOD17A2H Version 6 Gross Primary Productivity (GPP) product is a cumulative 8-day composite of values with 500 meter (m) pixel size based on the radiation use efficiency concept that can be potentially used as inputs to data models to calculate terrestrial energy, carbon, water cycle processes, and biogeochemistry of vegetation. The data product includes information about GPP and Net Photosynthesis (PSN). The PSN band values are the GPP less the Maintenance Respiration (MR). The data product also contains a PSN Quality Control (QC) layer. The quality layer contains quality information for both the GPP and the PSN. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6).
  <br>

  #### MOD17A2H
  The MOD17A2H Version 6.1 Gross Primary Productivity (GPP) product is a cumulative 8-day composite of values with 500 meter (m) pixel size based on the radiation use efficiency concept that can be potentially used as inputs to data models to calculate terrestrial energy, carbon, water cycle processes, and biogeochemistry of vegetation. The data product includes information about GPP and Net Photosynthesis (PSN). The PSN band values are the GPP less the Maintenance Respiration (MR). The data product also contains a PSN Quality Control (QC) layer. The quality layer contains quality information for both the GPP and the PSN. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=61).
