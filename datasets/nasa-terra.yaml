sues: Since October 1, 2017, a correction addresses zero-filled scans in low-latitude, ascending orbit (nighttime) TIR data. Additional details are available in the ASTER L1T User Advisory. * Data from the SWIR bands collected after April 2008 may show anomalous saturation and striping. See the ASTER SWIR User Advisory for further information.
