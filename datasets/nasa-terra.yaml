  #### AST_09XT
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Surface Radiance VNIR and Crosstalk Corrected SWIR (AST_09XT) contains atmospherically corrected data for the Visible and Near Infrared (VNIR) and Shortwave Infrared (SWIR) sensors. The AST_09XT product has a spatial resolution of 15 meters (m) for the VNIR bands and 30 m for the SWIR bands. Both the VNIR and the SWIR data are atmospherically corrected using the corresponding bands from an ASTER [Level 1B](https://doi.org/10.5067/ASTER/AST_L1B.004) image. Known Issues: Level 2 products that are on the international date line/anti-meridian have incorrect bounding coordinates for the UTM zone defined in the file metadata. * SWIR data acquired after April 2008 may exhibit anomalous saturation and striping. Users should consult the ASTER SWIR User Advisory for additional details.
