  The MOD11B2 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD11B2 Version 6.1](https://doi.org/10.5067/MODIS/MOD11B2.061) data product. The MOD11B2 Version 6 product provides an average 8-day per pixel Land Surface Temperature and Emissivity (LST&E) in a 1,200 by 1,200 kilometer (km) tile with a pixel size of 5,600 meters (m). Each temperature and emissivity pixel value in the MOD11B2 is a simple average of all the corresponding values from the LST&E values from the [MOD11B1](https://doi.org/10.5067/MODIS/MOD11B1.006) product collected during that 8-day period. Each MOD11B2 granule consists of 19 layers including daytime and nighttime layers for LSTs, quality control assessments, observation times, view zenith angles, and number of clear sky observations along with percentage of land in the tile and emissivities from bands 20, 22, 23, 29, 31, and 32. Unique to the MOD11B products are additional day and night LST layers generated from band 31 of the corresponding 1 km [MOD11_L2](https://doi.org/10.5067/MODIS/MOD11_L2.006) swath product aggregated to the 6 km grid. Known Issues: Production of V6 Terra MODIS Land Surface Temperature and Emissivity (LST&E) data products was discontinued on November 16, 2022, due to [significant loss of data retrieval](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=98) following the Constellation Exit Maneuvers. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6).
