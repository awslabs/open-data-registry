  #### MCD12Q1
  The MCD12Q1 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD12Q1 Version 6.1](https://doi.org/10.5067/MODIS/MCD12Q1.061) data product. The Terra and Aqua combined Moderate Resolution Imaging Spectroradiometer (MODIS) Land Cover Type (MCD12Q1) Version 6 data product provides global land cover types at yearly intervals (2001-2020), derived from six different classification schemes listed in the User Guide. The MCD12Q1 Version 6 data product is derived using supervised classifications of MODIS Terra and Aqua reflectance data. The supervised classifications then undergo additional post-processing that incorporate prior knowledge and ancillary information to further refine specific classes. Layers for Land Cover Type 1-5, Land Cover Property 1-3, Land Cover Property Assessment 1-3, Land Cover Quality Control (QC), and a Land Water Mask are provided in each MCD12Q1 Version 6 Hierarchical Data Format 4 (HDF4) file. Known Issues: The "units" field is missing in the metadata, however, this information can be found in the table above or on page 5 of the User Guide. * Known issues are described on pages 3 and 4 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=6).
