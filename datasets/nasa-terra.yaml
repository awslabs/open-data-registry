  #### MOD07_L2
  The MODIS/Terra Temperature and Water Vapor Profiles 5-Min L2 Swath 5km (MOD07_L2) product consists of a numbers of parameters related to atmospheric stability, atmospheric temperature and moisture profiles, total atmospheric water vapor, and total ozone. All of these parameters are produced for both daytime and nighttime conditions at 5-km pixel resolution when at least 9 Field Of View (FOV) are cloud free. The MODIS total-ozone burden is an estimate of the total-column tropospheric and stratospheric ozone content. The MODIS atmospheric stability consists of three daily Level 2 atmospheric stability indices. The Total Totals (TT), the Lifted Index (LI), and the K index (K) are each computed using the infrared temperature- and moisture-profile data, also derived as part of MOD07. The MODIS temperature and moisture profiles are produced at 20 vertical levels. The MODIS atmospheric water-vapor product is an estimate of the total tropospheric column water vapor made from integrated MODIS infrared retrievals of atmospheric moisture profiles in clear scenes. Additional information is available at: https://modis-atmos.gsfc.nasa.gov/products/atm-profile.
  <br>

  #### MOD14
  The MOD14 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD14 Version 6.1](https://doi.org/10.5067/MODIS/MOD14.061) data product. The Moderate Resolution Imaging Spectroradiometer (MODIS) Thermal Anomalies and Fire MOD14 Version 6 product is produced daily in 5-minute temporal satellite increments (swaths). The MOD14 product is used to generate all of the higher level fire products, but can also be used to identify fires and other thermal anomalies, such as volcanoes. Each swath of data is approximately 2,030 kilometers along track (long), and 2,300 kilometers across track (wide). Known Issues: Known issues are described on the [MODIS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6) and in Section 7.2 of the User Guide which covers Pre-November 2000 Data Quality, Detection Confidence, Flagging of Static Sources, and the August 2020 MODIS Aqua Outage
  <br>

