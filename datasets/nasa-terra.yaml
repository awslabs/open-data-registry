  #### AST_L1T
  The AST_L1T Version 3 data product was decommissioned on December 15, 2025. Users are encouraged to use the [AST_L1T Version 4 data product](https://doi.org/10.5067/ASTER/AST_L1T.004). The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Level 1 Precision Terrain Corrected Registered At-Sensor Radiance (AST_L1T) data contains calibrated at-sensor radiance, which corresponds with the ASTER Level 1B ([AST_L1B](https://doi.org/10.5067/ASTER/AST_L1B.003)), that has been geometrically corrected and rotated to a north-up UTM projection. The AST_L1T is created from a single resampling of the corresponding ASTER L1A ([AST_L1A](https://doi.org/10.5067/ASTER/AST_L1A.003)) product. The bands available in the AST_L1T depend on the bands in the AST_L1A and can include up to three Visible and Near Infrared (VNIR) bands, six Shortwave Infrared (SWIR) bands, and five Thermal Infrared (TIR) bands. The AST_L1T dataset does not include the aft-looking VNIR band 3. The AST_L1T product has a spatial resolution of 15 meters (m) for the VNIR bands, 30 m for the SWIR bands, and 90 m for the TIR bands. The precision terrain correction process incorporates GLS2000 digital elevation data with derived ground control points (GCPs) to achieve topographic accuracy for all daytime scenes where correlation statistics reach a minimum threshold. Alternate levels of correction are possible (systematic terrain, systematic, or precision) for scenes acquired at night or that otherwise represent a reduced quality ground image (e.g., cloud cover). For daytime images, if the VNIR or SWIR telescope collected data and precision correction was attempted, each precision terrain corrected image will have an accompanying independent quality assessment. It will include the geometric correction available for distribution in both as a text file and a single band browse images with the valid GCPs overlaid. This multi-file product also includes georeferenced full resolution browse images. The number of browse images and the band combinations of the images depends on the bands available in the corresponding [AST_L1A](https://doi.org/10.5067/ASTER/AST_L1A.003) dataset. AST_L1T V3 will continue forward processing using radiometric calibration coefficients (RCC) Version 4 and will remain available for direct download through the [LP DAAC Data Pool](https://e4ftl01.cr.usgs.gov/ASTT/AST_L1T.003/) and [NASA's Earthdata Search](https://search.earthdata.nasa.gov/search?q=C1000000320-LPDAAC_ECS). The new [AST_L1T V3.1](https://doi.org/10.5067/ASTER/AST_L1T.031) data product will be processed with RCC V5 and can be ordered through [NASA's Earthdata Search](https://search.earthdata.nasa.gov/search?q=C2052604735-LPDAAC_ECS). Known Issues: A modification has been incorporated within the processing of the AST_L1T data product for correcting zero-filled scans that appear in the processing of low-latitude, ascending orbit (night) thermal infrared (TIR) data acquisitions. This correction has been implemented for the historical archive of the ASTER L1T data product and for newly processed scenes as of October 1, 2017. Additional information can be found in the ASTER L1T User Advisory document for more details. * Users are advised that ASTER SWIR data acquired from April 2008 to the present exhibit anomalous saturation of values and anomalous striping. This effect is also present for some prior acquisition periods. Please refer to the ASTER SWIR User Advisory for more details. * Since April 1, 2008, when the anomalies in the SWIR data rendered it unusable, the SWIR band data has not been included in the AST_L1T product. * Data acquisition gaps: On November 28, 2024, one of Terra's power-transmitting shunt units failed. As a result, there was insufficient power to maintain functionality of the ASTER instrument. ASTER resumed acquisitions for the VNIR bands on January 18, 2025, and for the TIR bands on April 15, 2025. Users should note the data gap in ASTER acquisitions from November 28, 2024, through January 16, 2025, for VNIR observations, and a gap from November 28, 2024, through April 15, 2025, for TIR acquisitions.
