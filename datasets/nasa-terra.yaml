  #### MCD12Q2
  The MCD12Q2 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD12Q2 Version 6.1](https://doi.org/10.5067/MODIS/MCD12Q2.061) data product. The Terra and Aqua combined Moderate Resolution Imaging Spectroradiometer (MODIS) Land Cover Dynamics (MCD12Q2) Version 6 data product provides global land surface phenology metrics at yearly intervals from 2001 to 2019. The MCD12Q2 Version 6 data product is derived from time series of the 2-band Enhanced Vegetation Index (EVI2) calculated from MODIS Nadir Bidirectional Reflectance Distribution Function (BRDF)-Adjusted Reflectance (NBAR). Vegetation phenology metrics at 500 meter spatial resolution are identified for up to two detected growing cycles per year. For pixels with more than two valid vegetation cycles, the data represent the two cycles with the largest NBAR-EVI2 amplitudes. Provided in each MCD12Q2 Version 6 Hierarchical Data Format 4 (HDF4) file are layers for the total number of vegetation cycles detected for the product year, the onset of greenness, greenup midpoint, maturity, peak greenness, senescence, greendown midpoint, dormancy, EVI2 minimum, EVI2 amplitude, integrated EVI2 over a vegetation cycle, as well as overall and phenology metric-specific quality information. A low-resolution browse image showing greenup is also available when viewing each MCD12Q2 granule. SDS layers may be multi-dimensional with up to two valid vegetation cycles. For areas where the NBAR-EVI2 values are missing due to cloud cover or other reasons, the data gaps are filled with good quality NBAR-EVI2 values from the year directly preceding or following the product year. Known Issues: Known issues are described on pages 5 and 6 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=6).
  <br>

