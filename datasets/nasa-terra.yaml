  #### MCD64A1
  The MCD64A1 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD64A1 Version 6.1](https://doi.org/10.5067/MODIS/MCD64A1.061) data product. The Terra and Aqua combined MCD64A1 Version 6 Burned Area data product is a monthly, global gridded 500 meter (m) product containing per-pixel burned-area and quality information. The MCD64A1 burned-area mapping approach employs 500 m Moderate Resolution Imaging Spectroradiometer (MODIS) Surface Reflectance imagery coupled with 1 kilometer (km) MODIS active fire observations. The algorithm uses a burn sensitive Vegetation Index (VI) to create dynamic thresholds that are applied to the composite data. The VI is derived from MODIS shortwave infrared atmospherically corrected surface reflectance bands 5 and 7 with a measure of temporal texture. The algorithm identifies the date of burn for the 500 m grid cells within each individual MODIS tile. The date is encoded in a single data layer as the ordinal day of the calendar year on which the burn occurred with values assigned to unburned land pixels and additional special values reserved for missing data and water grid cells. The data layers provided in the MCD64A1 product include Burn Date, Burn Data Uncertainty, Quality Assurance, along with First Day and Last Day of reliable change detection of the year. Known Issues: Known issues are described on the [MODIS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=6) and in Section 8 of the User Guide which covers Cropland Burning, the August 2000 and June 2001 Data Outages, and the August 2020 Aqua Outage.
  <br>

