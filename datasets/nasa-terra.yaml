  #### MCD43A1
  The MCD43A1 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD43A1 Version 6.1](https://doi.org/10.5067/MODIS/MCD43A1.061) data product. The Moderate Resolution Imaging Spectroradiometer (MODIS) MCD43A1 Version 6 Bidirectional Reflectance Distribution Function and Albedo (BRDF/Albedo) Model Parameters dataset is produced daily using 16 days of Terra and Aqua MODIS data at 500 meter (m) resolution. Data are temporally weighted to the ninth day of the retrieval period which is reflected in the Julian date in the file name. MCD43A1 provides the three model weighting parameters (isotropic, volumetric, and geometric) used to derive the Albedo ([MCD43A3](https://doi.org/10.5067/MODIS/MCD43A3.006)) and Nadir BRDF-Adjusted Reflectance (NBAR) ([MCD43A4](https://doi.org/10.5067/MODIS/MCD43A4.006)) products. Users are urged to use the band specific quality flags to isolate the highest quality full inversion results for their own science applications as described in the User Guide. The MCD43A1 provides the three model weighting parameters for MODIS spectral bands 1 through 7 as well as the visible, near infrared (NIR), and shortwave bands. Along with the three-dimensional parameter layers for these bands are the simplified mandatory quality layers for each of the 10 bands. Essential quality information provided in the corresponding [MCD43A2](https://doi.org/10.5067/MODIS/MCD43A2.006) data file should be consulted when using this product. Known Issues: The incorrect representation of the aerosol quantities (low average high) [in the C6 MYD09 and MOD09 surface reflectance products](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=86) may have impacted downstream products particularly over arid bright surfaces. This (and a few other issues) have been corrected for C6.1. Therefore users should avoid substantive use of the C6 MCD43 products and wait for the C6.1 products. In any event, users are always strongly encouraged to download and use the extensive QA data provided in MCD43A2, in addition to the briefer mandatory QAs provided as part of the MCD43A1, 3, and 4 products. * [Corrections](https://landweb.modaps.eosdis.nasa.gov/data/userguide/LSRHighAerosolFlagFinal.pdf) were implemented in Collection 6.1 reprocessing. * For complete information about the MCD43A1 known issues refer to the [MODIS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&as=6).
