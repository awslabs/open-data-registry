gh April 15, 2025, for TIR acquisitions. Improvements/Changes from Previous Version * Available via on-demand processing through [NASA's Earthdata Search](https://search.earthdata.nasa.gov/search?q=C2052604735-LPDAAC_ECS). * Utilizes new radiometric calibration coefficients. Details regarding RCC V5 are described in the following journal article. * Tsuchida, S., Yamamoto, H., Kouyama, T., Obata, K., Sakuma, F., Tachikawa, T., Kamei, A., Arai, K., Czapla-Myers, J.S., Biggar, S.F., and Thome, K.J., 2020, Radiometric Degradation Curves for the ASTER VNIR Processing Using Vicarious and Lunar Calibrations: Remote Sensing, v. 12, no. 3, at https://doi.org/10.3390/rs12030427.
