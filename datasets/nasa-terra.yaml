  #### MCD43D62
  The MCD43D62 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MCD43D62 Version 6.1](https://doi.org/10.5067/MODIS/MCD43D62.061) data product. The MCD43D62 Version 6 Bidirectional Reflectance Distribution Function and Albedo (BRDF/Albedo) Nadir BRDF-Adjusted Reflectance (NBAR) dataset is produced daily using 16 days of Terra and Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) data at 30 arc second (1,000 meter (m)) resolution. Data are temporally weighted to the ninth day which is reflected in the Julian date in the file name. This Climate Modeling Grid (CMG) product covers the entire globe for use in climate simulation models. Due to the large file size, each MCD43D product contains just one data layer. MCD43D62 through MCD43D68 are the NBAR products of the MCD43D BRDF/Albedo product suite for MODIS bands 1 through 7. The NBAR algorithm removes view angle effects from directional reflectances to model the values as if they were collected from a nadir view at local solar noon. MCD43D62 is the NBAR for MODIS band 1. Users are urged to use the band specific quality flags to isolate the highest quality full inversion results for their own science applications as described in the [User Guide](https://www.umb.edu/spectralmass/modis-user-guide-v006-and-v0061/mcd43d-cmg-30-arc-second-products/). Known Issues: The incorrect representation of the aerosol quantities (low average high) [in the C6 MYD09 and MOD09 surface reflectance products](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=86) may have impacted downstream products particularly over arid bright surfaces. This (and a few other issues) have been corrected for C6.1. Therefore users should avoid substantive use of the C6 MCD43 products and wait for the C6.1 products. In any event, users are always strongly encouraged to download and use the extensive QA data provided in MCD43A2, in addition to the briefer mandatory QAs provided as part of the MCD43A1, 3,