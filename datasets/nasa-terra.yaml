  #### MCD19A2
  The MCD19A2 Version 6.1 data product is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Multi-angle Implementation of Atmospheric Correction (MAIAC) Land Aerosol Optical Depth (AOD) gridded Level 2 product produced daily at 1 kilometer (km) pixel resolution. The MCD19A2 product provides the atmospheric properties and view geometry used to calculate the MAIAC Land Surface Bidirectional Reflectance Factor (BRF) or surface reflectance, MCD19A1 product. The MCD19A2 AOD data product contains the following Science Dataset (SDS) layers: blue band AOD at 0.47 µm, green band AOD at 0.55 µm, AOD uncertainty, fine mode fraction over water, column water vapor over land and clouds (in cm), smoke injection height (m above ground), AOD QA, AOD model at 1km, cosine of solar zenith angle, cosine of view zenith angle, relative azimuth angle, scattering angle, and glint angle at 5km. A low-resolution browse image is also included showing AOD of the blue band at 0.47 µm created using a composite of all available orbits. Each SDS layer within each MCD19A2 Hierarchical Data Format 4 (HDF4) file contains a third dimension that represents the number of orbit overpasses. This factor could affect the total number of bands for each SDS layer. Known Issues: Known issues are described in Section 6 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=61). * Users should be aware that they may see a dip in AOD values for the first 5 months of 2022. A fix is planned to be implemented in Collection 7.
