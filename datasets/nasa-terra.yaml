  MCD18A1 Version 6 was decommissioned on October 28, 2022. Users are encouraged to use the [MCD18A1 Version 6.2 data product](https://doi.org/10.5067/MODIS/MCD18A1.062). The MCD18A1 Version 6 is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Downward Shortwave Radiation (DSR) gridded Level 3 product produced daily at 5 kilometer pixel resolution with estimates of DSR every 3 hours. DSR is incident solar radiation over land surfaces in the shortwave spectrum (300-4,000 nanometers) and is an important variable in land-surface models that address a variety of scientific and application issues. The MCD18 products are based on a prototyping algorithm that uses multi-temporal signatures of MODIS data to derive surface reflectance and then calculate incident DSR using the look-up table (LUT) approach. The LUTs consider different types of loadings of aerosols and clouds at a variety of illumination/viewing geometry. Global DSR products are generated from MODIS and geostationary satellite data. Additional details regarding the methodology used to create the data are available in the Algorithm Theoretical Basis Document (ATBD). Provided in the MOD18A1 product are layers for instantaneous DSR array for each individual MODIS overpass and 3-hour DSR array along with a View Zenith Angle layer. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=6).
  <br>

  #### MCD19A1CMGL
  The MCD19A1CMGL Version 6.1 data product is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Multi-Angle Implementation of Atmospheric Correction (MAIAC) Surface Reflectance Level 3 (Bands 1-7) product produced daily in a 0.05 degree (5,600 meters at the equator) Climate Modeling Grid (CMG). The MCD19A1CMGL product is corrected for atmospheric gases and aerosols using a new MAIAC algorithm that is based on a time series analysis and a combination of pixel- and image-based processing. The MODIS MAIAC products provide an estimate of the surface spectral reflectance, also referred to as Bidirectional Reflectance Factor (BRF), as it would be measured at ground-level in the absence of atmospheric scattering or absorption. The Surface Reflectance dataset includes BRF, BRF normalized to a fixed geometry of solar zenith angle at 45° and nadir view, and Nadir Bidirectional Reflectance Distribution Function (BRDF)-Adjusted Reflectance (NBAR) normalized to the nadir view and local sun angle at 1:30 pm. The MCD19A1CMGL MAIAC Surface Reflectance product for land bands includes 25 Science Dataset (SDS) layers: BRF for bands 1-7, BRF normalized to a fixed geometry for bands 1-7, NBAR for bands 1-7, Quality Assessment (QA) bits, cosine of solar zenith angle, cosine of view zenith angle, and relative azimuth angle. A low-resolution browse is also included. Known Issues: Known issues are described in Section 6 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=61).
  <br>

  #### MCD19A1CMGO
  The MCD19A1CMGO Version 6.1 data product is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Multi-Angle Implementation of Atmospheric Correction (MAIAC) Surface Reflectance Level 3 (Bands 8-12) product produced daily in a 0.05 degree (5,600 meters at the equator) Climate Modeling Grid (CMG). The MCD19A1CMGO product is corrected for atmospheric gases and aerosols using a new MAIAC algorithm that is based on a time series analysis and a combination of pixel- and image-based processing. The MODIS MAIAC products provide an estimate of the surface spectral reflectance, also referred to as Bidirectional Reflectance Factor (BRF), as it would be measured at ground-level in the absence of atmospheric scattering or absorption. The Surface Reflectance dataset includes BRF, BRF normalized to a fixed geometry of solar zenith angle at 45° and nadir view, and Nadir Bidirectional Reflectance Distribution Function (BRDF)-Adjusted Reflectance (NBAR) normalized to the nadir view and local sun angle at 1:30 pm. The MCD19A1CMGO MAIAC Surface Reflectance product for ocean bands includes 19 Science Dataset (SDS) layers: BRF for bands 8-12, BRF normalized to a fixed geometry for bands 8-12, NBAR for bands 8-12, Quality Assessment (QA) bits, cosine of solar zenith angle, cosine of view zenith angle, and relative azimuth angle. A low-resolution browse is also included. Known Issues: Known issues are described in Section 6 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=61).
  <br>

  #### MCD19A3CMG
  The MCD19A3CMG Version 6.1 data product is a Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua combined Multi-Angle Implementation of Atmospheric Correction (MAIAC) Vegetation Index Level 3 product produced daily in a 0.05 degree (5,600 meters at the equator) Climate Modeling Grid (CMG). The MCD19A3CMG product provides Normalized Difference Vegetation Index (NDVI) and Enhanced Vegetation Index (EVI) at ground level in the absence of atmospheric scattering or absorption. The MCD19A3CMG Vegetation Index data product contains the following Science Dataset (SDS) layers: NDVI, NDVI normalized to a fixed geometry of solar zenith angle at 45° and nadir view, gap-filled NDVI, EVI, and EVI normalized to a fixed geometry of solar zenith angle at 45° and nadir view. A low-resolution browse image is also included showing NDVI created using a composite of all available orbits. Known Issues: Known issues are described in Section 6 of the User Guide. * An artifact was discovered in the EVI, NDVI, and NDVI_gapfill layers over the entire swath of southern polar region. The affected region shows false retrieval of data during the summer months. The artifacts occurred over permanently snow-covered areas where no meaningful NDVI retrieval is expected. A software fix was implemented for forward processing in June 2023. Existing data products will not be reprocessed. Affected dates are listed on the [Land Data Operational Products Evaluation Quality Assessment note](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=187). * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=TerraAqua&as=61).
  <br>

  #### MODFDS_MON_GLB_L3
  Version 1 is the current version of the dataset. This collection MODFDS_MON_GLB_L3 provides level 3 monthly frequency of dust storms (FDS) over land from 175°W to 175°E and 80°S to 80°N at a spatial resolution of 0.1˚ x 0.1˚. It is derived from Level 2, the Moderate Resolution Imaging Spectroradiometer (MODIS) Deep Blue aerosol products Collection 6.1 from Terra (MOD04_L2). The dataset covers the monthly mean from 2000 to 2022. The FDS is calculated as the number of days per month when the daily dust optical depth is greater than a threshold optical depth (e.g., 0.025) with two quality flags: the lowest (1) and highest (3). It is advised to use flag 1, which is of lower quality, over dust source regions, and flag 3 over remote areas or polluted regions. Eight thresholds (0.025, 0.05, 0.1, 0.25, 0.5, 0.75, 1, 2) are saved separately in eight files. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
  <br>

  #### MODFDS_SDV_GLB_L3
  Version 1 is the current version of the dataset. This collection MODFDS_SDV_GLB_L3 provides level 3 standard deviation of climatological monthly frequency of dust storms (FDS) over land from 175°W to 175°E and 80°S to 80°N at a spatial resolution of 0.1˚ x 0.1˚. It is derived from Level 2, the Moderate Resolution Imaging Spectroradiometer (MODIS) Deep Blue aerosol products Collection 6.1 from Terra (MOD04_L2). The dataset is the standard deviation of climatological monthly mean for each month over 2000 to 2022. The FDS is calculated as the number of days per month when the daily dust optical depth is greater than a threshold optical depth (e.g., 0.025) with two quality flags: the lowest (1) and highest (3). It is advised to use flag 1, which is of lower quality, over dust source regions, and flag 3 over remote areas or polluted regions. Eight thresholds (0.025, 0.05, 0.1, 0.25, 0.5, 0.75, 1, 2) are saved separately in eight files. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
  <br>

  #### AER_DBDT_D10KM_L3_MODIS_TERRA
  This High-Resolution (0.1 x 0.1 degree) Level 3 daily Aerosol Optical Depth (AOD) product is generated by combining two Moderate Resolution Imaging Spectroradiometer (MODIS) operational algorithms, namely Deep Blue (DB) and Dark Target (DT), on board the TERRA satellite. This dataset is provided in daily files ranging from 2000-02-24 to the present. The spatial coverage is global and the dataset is gridded at 0.1 x 0.1 degree spatial resolution. The data are generated using Level 2 AOD retrieved using DT and DB algorithms. The product provides multiple options for using data either from DT or DB or combined. Depending on user need and application, they can choose one or more relevant parameter. The pixels with highest quality as recommended by science teams are only considered in these averaging. In addition to averaged AOD at 0.1 x 0.1 degree resolution, standard deviation and number of pixels averaged from each algorithm are also provided. Average sensor zenith angle is also provided for additional filtering of the data. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
  <br>

  #### AER_DBDT_M10KM_L3_MODIS_TERRA
  This High-Resolution (0.1 x 0.1 degree) Level 3 monthly Aerosol Optical Depth (AOD) product is generated by combining two Moderate Resolution Imaging Spectroradiometer (MODIS) operational algorithms, namely Deep Blue (DB) and Dark Target (DT), on board the TERRA satellite. This dataset is provided in monthly files ranging from February 2000 to the present. The spatial coverage is global and the dataset is gridded at 0.1 x 0.1 degree spatial resolution. The data are generated using Level 2 AOD retrieved using DT and DB algorithms. The product provides multiple options for using data either from DT or DB or combined. Depending on user need and application, they can choose one or more relevant parameter. The pixels with highest quality as recommended by science teams are only considered in these averaging. In addition to averaged AOD at 0.1 x 0.1 degree resolution, standard deviation and number of pixels averaged from each algorithm are also provided. Average sensor zenith angle is also provided for additional filtering of the data. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
  <br>

