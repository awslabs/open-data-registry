  #### MOD13C1
  The MOD13C1 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MOD13C1 Version 6.1](https://doi.org/10.5067/MODIS/MOD13C1.061) data product. The MOD13C1 Version 6 product provides a Vegetation Index (VI) value at a per pixel basis. There are two primary vegetation layers. The first is the Normalized Difference Vegetation Index (NDVI) which is referred to as the continuity index to the existing National Oceanic and Atmospheric Administration-Advanced Very High Resolution Radiometer (NOAA-AVHRR) derived NDVI. The second vegetation layer is the Enhanced Vegetation Index (EVI), which has improved sensitivity over high biomass regions. The Climate Modeling Grid (CMG) consists 3,600 rows and 7,200 columns of 5,600 meter (m) pixels. Global MOD13C1 data are cloud-free spatial composites of the gridded 16-day 1 kilometer [MOD13A2](https://doi.org/10.5067/MODIS/MOD13A2.006) data, and are provided as a Level 3 product projected on a 0.05 degree (5,600 m) geographic CMG. The MOD13C1 has data fields for NDVI, EVI, VI QA, reflectance data, angular information, and spatial statistics such as mean, standard deviation, and number of used input pixels at the 0.05 degree CMG resolution. Known Issues: The incorrect representation of the aerosol quantities (low, average, high) in the Collection 6 MOD09 surface reflectance products may have [impacted](https://landweb.modaps.eosdis.nasa.gov/displayissue?id=86) MOD13 Vegetation Index data products particularly over arid bright surfaces. * [Corrections](https://landweb.modaps.eosdis.nasa.gov/data/userguide/LSRHighAerosolFlagFinal.pdf) were implemented in Collection 6.1 reprocessing. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6). Improvements/Changes from Previous Versions * The 16-day composite VI is generated using the two 8-day composite surface reflectance granules ([MOD09A1](https://doi.org/10.5067/MODIS/MOD09A1.006)) in the 16-day period. * This surface reflectance input is based on the minimum blue compositing approach used to generate the 8-day surface reflectance product. * The product format is consistent with the Version 5 product generated using the Level 2 gridded daily surface reflectance product. * A frequently updated long-term global CMG Average Vegetation Index product database is used to fill the gaps in the CMG product suite.
