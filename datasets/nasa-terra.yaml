  #### MODFDS_CLM_GLB_L3
  Version 1 is the current version of the dataset. This collection MODFDS_CLM_GLB_L3 provides level 3 climatological monthly frequency of dust storms (FDS) over land from 175°W to 175°E and 80°S to 80°N at a spatial resolution of 0.1˚ x 0.1˚. It is derived from Level 2, the Moderate Resolution Imaging Spectroradiometer (MODIS) Deep Blue aerosol products Collection 6.1 from Terra (MOD04_L2). The dataset is the climatological monthly mean for each month averaged over 2000 to 2022. The FDS is calculated as the number of days per month when the daily dust optical depth is greater than a threshold optical depth (e.g., 0.025) with two quality flags: the lowest (1) and highest (3). It is advised to use flag 1, which is of lower quality, over dust source regions, and flag 3 over remote areas or polluted regions. Eight thresholds (0.025, 0.05, 0.1, 0.25, 0.5, 0.75, 1, 2) are saved separately in eight files. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
  <br>

  #### FluxSatMGPP_L3_Daily_p05deg
  This dataset provides global gridded daily estimates of gross primary production (GPP) and uncertainties at 0.05 deg latitude by 0.05 deg longitude resolution for the period March 2000 to present. The GPP is derived from MODerate-resolution Imaging Spectroradiometer (MODIS) instruments on NASA Terra and Aqua satellites. GPP is derived using the MODIS Nadir Bidirectional Reflectance Distribution Function (BRDF)-Adjusted Reflectances (NBAR) product, which is used as input to neural network models to globally upscale GPP estimated from selected collocated FLUXNET 2015 and OneFlux eddy covariance tower sites used for model training. Version 2.2 is the current version of the dataset. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
  <br>

  #### FluxSatMGPP_L3_Daily_p5deg
  This dataset provides global gridded daily estimates of gross primary production (GPP) and uncertainties at 0.5 deg latitude by 0.625 deg longitude resolution for the period March 2000 to present. The GPP is derived from MODerate-resolution Imaging Spectroradiometer (MODIS) instruments on NASA Terra and Aqua satellites. GPP is derived using the MODIS Nadir Bidirectional Reflectance Distribution Function (BRDF)-Adjusted Reflectances (NBAR) product, which is used as input to neural network models to globally upscale GPP estimated from selected collocated FLUXNET 2015 and OneFlux eddy covariance tower sites used for model training. Version 2.2 is the current version of the dataset. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
