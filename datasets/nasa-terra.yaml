  #### MODOCGA
  The MODOCGA Version 6 data product was decommissioned on July 31, 2023. The MODOCGA Version 6 Level 2 Gridded Lite (L2G-lite) Ocean Reflectance product provides an estimate of the surface spectral reflectance data from Terra Moderate Resolution Imaging Spectroradiometer (MODIS) bands 8 through 16. Data have been corrected for atmospheric conditions such as gasses, aerosols, and Rayleigh scattering. MODOCGA is a daily land product with a pixel size of 1 kilometer (km). The product is referred to as ocean reflectance because bands 8 through 16 are used primarily to produce ocean products. The MODOCGA, as with other L2G data sets, stores the “best available pixel” from all the qualifying observations in the first layer and any subsequent observations are stored in either a full or compact format layer within the Hierarchical Data Format (HDF) file. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Terra&as=6). Improvements/Changes from Previous Versions * New product for MODIS Version 6.
