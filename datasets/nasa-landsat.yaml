Name: NASA landsat Project
Description: |
  This data set contains shapefiles of Greenland’s glacial termini and basins for the years 1972 to 2019. These vector data were created from Landsat 1-8 satellite imagery using the Calving Front Machine (CALFIN) an automated processing workflow utilizing neural networks for extracting calving fronts from satellite images of marine-terminating glaciers.
  <br>

  #### HMA2_DCG_SGL
  This data set identifies the extent of supraglacial lakes (SGLs) from 1988 to 2023 on 769 of the largest debris-covered glaciers in the High Mountain Asia region. SGLs were generated via automated processing of 30 m Landsat imagery and are provided at 1-year intervals from 2004-2023, at 2-year intervals from 1992-2003, and as a single 4-year interval from 1988-1991.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
