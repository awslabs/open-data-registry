Name: NASA MASTER Project
Description: |
  This dataset includes Level 1B (L1B) data products from the MODIS/ASTER Airborne Simulator (MASTER) instrument. The spectral data were collected during 7 flights aboard a DOE B-200 aircraft over Baja California, Mexico, and Nevada, U.S., on 1999-04-23 to 1999-05-05. Data products include L1B georeferenced multispectral imagery of calibrated radiance in 50 bands covering wavelengths of 0.460 to 12.879 micrometers at approximately 20-meter spatial resolution. The L1B file format is HDF-4. In addition, the dataset includes flight paths, spectral band information, instrument configuration, ancillary notes, and summary information for each flight, and browse images derived from each L1B data file.
  <br>

  #### MASTER_RSL_October_2010_2127
  This dataset includes Level 1B (L1B) data products from the MODIS/ASTER Airborne Simulator (MASTER) instrument. The spectral data were collected during six flights aboard a DOE B-200 aircraft over California, Arizona, and New Mexico, U.S., from 2010-10-04 to 2010-10-13. Objectives included mapping for California Fire-Burn Area Emergency Response (BAER) and Jornada Experimental Range in southern New Mexico (JORNEX). This deployment was coordinated by the U.S. Department of Energy's Remote Sensing Laboratory (RSL) located at Nellis Air Force Base near Las Vegas, Nevada. Data products include L1B georeferenced multispectral imagery of calibrated radiance in 50 bands covering wavelengths of 0.460 to 12.879 micrometers at approximately 10-meter spatial resolution. The L1B file format is HDF-4. In addition, the dataset includes flight paths, spectral band information, instrument configuration, ancillary notes, and summary information for each flight, and browse images derived from each L1B data file.
  <br>

  #### MASTER_Houston_2011_1972
  This dataset includes Level 1B (L1B) and Level 2 (L2) data products from the MODIS/ASTER Airborne Simulator (MASTER) instrument. The spectral data were collected during 16 flights aboard a NASA ER-2 aircraft over portions of California, Colorado, Wisconsin, Michigan, Louisiana, Mississippi, the central Mississippi River basin, and the Gulf of Mexico from 2011-07-19 to 2011-08-18. Data products include L1B georeferenced multispectral imagery of calibrated radiance in 50 bands covering wavelengths of 0.460 to 12.879 micrometers at approximately 50-meter spatial resolution. Derived L2 data products are emissivity in 5 bands in thermal infrared range (8.58 to 12.13 micrometers) and land surface temperature. The L1B file format is HDF-4, and L2 products are provided in ENVI and KMZ formats. In addition, the dataset includes the flight path, spectral band information, instrument configuration, ancillary notes, and summary information for each flight, and browse images derived from each L1B data file.
  <br>

