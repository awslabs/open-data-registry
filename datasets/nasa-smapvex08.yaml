Name: NASA SMAPVEX08 Project
Description: |
  This data set includes several parameters that were obtained from field surveys as part of the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08).
  <br>

  #### SV08V
  This data set includes in situ vegetation data collected during the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08) campaign. Sampling was designed to coincide with satellite overpasses, such as Landsat's Thematic Mapper (TM) 5 and the Moderate Resolution Imaging Spectroradiometer (MODIS) sensor on NASA's Terra satellite (MODIS/Terra), which can be then used to estimate vegetation water content on the regional scale.
  <br>

  #### SV08LC
  This data set consists of land cover classification data derived from satellite imagery and of data obtained in the field as part of the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08).
  <br>

  #### SV08PLBK
  This data set contains backscatter data obtained by the Passive Active L-band System (PALS) microwave aircraft radar instrument as part of the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08).
  <br>

  #### SV08PLTB
  This data set contains brightness temperatures obtained by the Passive Active L-band System (PALS) microwave aircraft radiometer instrument as part of the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08).
  <br>

  #### SV08ST
  This data set contains soil texture data that were extracted from a multi-layer soil characteristics database for the conterminous United States and generated for each regional study area. Data are representative of the conditions present in the regional study areas during the general timeline of the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08) campaign.
  <br>

  #### SV08SR
  Surface roughness data for this data set were collected at several field sites as part of the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08) campaign.
  <br>

  #### SV08VWC
  The Vegetation Water Content (VWC) map for the Soil Moisture Active Passive Validation Experiment 2008 (SMAPVEX08) was derived by calculating Normalized Difference Water Index (NDWI) from Satellite Pour l'Observation de la Terre-4 (SPOT-4) overpasses on 11 October 2008. In addition, samples from a range of vegetation types were used to compare VWC and NDWI to the satellite imagery.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
