  #### MYD11C2
  The MYD11C2 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MYD11C2 Version 6.1](https://doi.org/10.5067/MODIS/MYD11C2.061) data product. The MYD11C2 Version 6 product provides Land Surface Temperature and Emissivity (LST&E) values in a 0.05 degree (5,600 meters at the equator) latitude/longitude Climate Modeling Grid (CMG). A CMG granule follows a geographic grid with 7,200 columns and 3,600 rows, representing the entire globe. The LST&E values in the MYD11C2 product are derived by compositing and averaging the values from the corresponding eight [MYD11C1](https://doi.org/10.5067/MODIS/MYD11C1.006) daily files. The MYD11C2 granule consists of 17 layers. Each MYD11C2 product consists of the following layers for daytime and nighttime observations: LSTs, quality control assessments, observation times, view zenith angles, and number of clear-sky observations along with percentage of land in the grid and emissivities from bands 20, 22, 23, 29, 31, and 32. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Aqua&as=6).
