  #### MYD09Q1
  The MYD09Q1 Version 6.1 product provides an estimate of the surface spectral reflectance of Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) Bands 1 and 2, corrected for atmospheric conditions such as gasses, aerosols, and Rayleigh scattering. Provided along with the 250 meter (m) surface reflectance bands are two quality layers. For each pixel, a value is selected from all the acquisitions within the 8-day composite period. The criteria for the pixel choice include cloud and solar zenith. When several acquisitions meet the criteria the pixel with the minimum channel 3 (blue) value is used. Known Issues: Prior to the Aqua MODIS launch, Band 6 exhibited several anomalous detectors. Band 6 performance degraded seriously after launch and presently a majority of the Band 6 detectors are non-functional. Science users should read and use the non-functional detector flags and decide for themselves the optimum manner to handle non-functional detector "gaps" for their products. For complete information please refer to the [MODIS Characterization Support Team (MCST) website](https://mcst.gsfc.nasa.gov/time-dependent-list-non-functional-or-noisy-detector). * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Aqua&as=61).
