  The MYD11B1 Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MYD11B1 Version 6.1](https://doi.org/10.5067/MODIS/MYD11B1.061) data product. The MYD11B1 Version 6 product provides daily per pixel Land Surface Temperature and Emissivity (LST&E) in a 1,200 by 1,200 kilometer (km) tile with a pixel size of 5,600 meters (m). Each MOD11B1 granule consists of the following layers for daytime and nighttime observations: LSTs, quality control assessments, observation times, view zenith angles, number of clear-sky observations, and emissivities from bands 20, 22, 23, 29, 31, and 32 (bands 31 and 32 are daytime only) along with the percentage of land in the tile. Unique to the MYD11B products are additional day and night LST layers generated from band 31 of the corresponding 1 km [MYD11_L2](https://doi.org/10.5067/MODIS/MYD11_L2.006) swath product aggregated to the 6 km grid. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Aqua&as=6).
