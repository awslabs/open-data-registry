  #### MYD17A2HGF
  The MYD17A2HGF Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MYD17A2HGF Version 6.1](https://doi.org/10.5067/MODIS/MYD17A2HGF.061) data product. The MYD17A2HGF Version 6 Gross Primary Productivity (GPP) Gap-Filled product is a cumulative 8-day composite of values with 500 meter (m) pixel size based on the radiation use efficiency concept that can be potentially used as inputs to data models to calculate terrestrial energy, carbon, water cycle processes, and biogeochemistry of vegetation. The data product includes information about GPP and Net Photosynthesis (PSN). The PSN band values are the GPP less the Maintenance Respiration (MR). The data product also contains a PSN Quality Control (QC) layer. The quality layer contains quality information for both the GPP and the PSN. The MYD17A2HGF will be generated at the end of each year when the entire yearly 8-day [MYD15A2H](https://doi.org/10.5067/modis/myd15a2h.006) is available. Hence, the gap-filled MYD17A2HGF is the improved MYD17, which has cleaned the poor-quality inputs from 8-day Leaf Area Index and Fraction of Photosynthetically Active Radiation (LAI/FPAR) based on the Quality Control (QC) label for every pixel. If any LAI/FPAR pixel did not meet the quality screening criteria, its value is determined through linear interpolation. However, users cannot get MYD17A2HGF in near-real time because it will be generated only at the end of a given year. Known Issues: Operational and uncertainty issues are provided under Section 2 in the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Aqua&as=6).
  <br>

