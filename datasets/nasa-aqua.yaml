  #### MYD15A2H
  The MYD15A2H Version 6 data product was decommissioned on July 31, 2023. Users are encouraged to use the [MYD15A2H Version 6.1](https://doi.org/10.5067/MODIS/MYD15A2H.061) data product. The MYD15A2H Version 6 Moderate Resolution Imaging Spectroradiometer (MODIS) combined Leaf Area Index (LAI) and Fraction of Photosynthetically Active Radiation (FPAR) product is an 8-day composite dataset with 500 meter (m) pixel size. The algorithm chooses the “best” pixel available from all the acquisitions of the Aqua sensor from within the 8-day period. LAI is defined as the one-sided green leaf area per unit ground area in broadleaf canopies and as one-half the total needle surface area per unit ground area in coniferous canopies. FPAR is defined as the fraction of incident photosynthetically active radiation (400-700 nanometers (nm)) absorbed by the green elements of a vegetation canopy. Science Datasets (SDS) in the Level 4 (L4) MYD15A2H product include LAI, FPAR, two quality layers, and standard deviation for LAI and FPAR. Two low resolution browse images, LAI and FPAR, are also available for each MYD15A2H granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=MODIS&sat=Aqua&as=6).
