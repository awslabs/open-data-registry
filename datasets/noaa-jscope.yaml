ManagedBy: "[NOAA](http://www.noaa.gov/)"
UpdateFrequency: Quarterly. Updated in February, May and October with January, April, and September initialized forecast products respectively. We also do a year in review when the historical fields will be available and this is typically in January or February of the year following its occurrence.
