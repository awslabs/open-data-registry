Name: NASA ESDIS Project
Description: |
  This is a global simulation of black carbon (BC) aerosol concentrations and daily deposition (wet+dry) from the FLEX-ible PARTicle (FLEXPART) Lagrangian particle dispersion model version 10.4. The FLEXPART model code are open source and freely available.
  <br>

  #### DUSTFLEXPART
  This is a global simulation of mineral dust aerosol concentrations and daily deposition (wet+dry) from the FLEX-ible PARTicle (FLEXPART) Lagrangian particle dispersion model version 10.4. The FLEXPART model code are open source and freely available.
  <br>

  #### OCFLEXPART
  This is a global simulation of organic carbon (OC) aerosol concentrations and daily deposition (wet+dry) from the FLEX-ible PARTicle (FLEXPART) Lagrangian particle dispersion model version 10.4. The FLEXPART model code are open source and freely available.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.gesdisc.earthdata.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
