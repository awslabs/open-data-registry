  #### VJ143DNBA2
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Day/Night Band (DNB) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Quality (VJ143DNBA2) Version 2 product provides BRDF and Albedo quality at 1 kilometer (km) resolution. The VJ143DNBA2 product is produced daily using 16 days of VIIRS data and is weighted temporally to the ninth day, which is reflected in the file name. The VJ143DNBA2 product gives information regarding band quality and days of valid observation within a 16-day period for the VIIRS DNB. The VJ143 data products are designed to promote the continuity of NASA’s Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo data product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from [VJ143DNBA1](https://doi.org/10.5067/VIIRS/VJ143DNBA1.002) to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry ([VJ143DNBA4](https://doi.org/10.5067/VIIRS/VJ143DNBA4.002)), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) ([VJ143DNBA3](https://doi.org/10.5067/VIIRS/VJ143DNBA3.002)). Researchers can use the BRDF model parameters with a simple polynomial to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VJ143DNBA2 data product provides a total of seven SDS layers, including BRDF/Albedo band quality and days of valid observation within a 16-day period for the VIIRS DNB, as well as land water type class flag, snow BRDF albedo class flag, local solar noon, and the platform name. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
