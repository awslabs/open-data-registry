  #### VJ114IMG
  The Visible Infrared Imaging Radiometer Suite (VIIRS) Active Fires (VJ114IMG) Version 2 product is produced in 6-minute temporal satellite increments (swaths) at 375 meter resolution from the VIIRS sensor aboard the NOAA-20 satellite. This product is designed after the Terra and Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) Thermal Anomalies and Fire data products to promote the continuity of the Earth Observation System (EOS) mission. This data product can enable users to understand the location and intensity of fire events as well as thermal anomalies. The VJ114IMG product includes 26 science dataset layers to analyze key factors in fire detection, including atmospheric conditions (e.g., radiance, solar zenith angle, brightness temperature) and fuel type for the event. The fire mask layer in the VJ114IMG product is the primary layer and can be used to identify fires and other thermal anomalies such as volcanoes. Each swath of data is approximately 3,060 kilometers along track (long) and 3,060 kilometers across track (wide). The VJ114IMG product is also used to generate higher-level fire data products. Use of the [VJ103MODLL](https://doi.org/10.5067/viirs/vJ103modll.021) data product is required to apply accurate geolocation information to the VNP14IMG Science Datasets (SDS). Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ109
  The VIIRS/JPSS1 Atmospherically Corrected Surface Reflectance 6-Min L2 Swath 375m, 750m product, with short name VJ109, are estimates of surface reflectance in each of the Visible Infrared Imaging Radiometer Suite (VIIRS) reflective bands I1-I3, M1-M5, M7, M8, M10, and M11. The VJ109 contains approximately 6 minutes' worth of data. Surface reflectance for each moderate-resolution (750m) or imagery-resolution (375m) pixel is retrieved separately for the Level-2 products. Surface reflectance is obtained by adjusting top-of-atmosphere reflectance to compensate for atmospheric effects. Corrections are made for the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. All surface reflectance products are produced for daytime conditions only. The product is produced under all atmospheric conditions except for night and oceans.
  <br>

  #### VJ143C3
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Albedo Daily Global 0.05 Degree Climate Modeling Grid (CMG) Version 2 product (VJ143C3) is derived from the 30 arc second CMG VJ143D Version 2 product suite. VJ143C3 is generated daily from all available high-quality reflectance data over a 16-day moving window emphasizing the ninth day of the retrieval period, which is reflected in the Julian date in the filename. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from [VJ143C1](https://doi.org/10.5067/VIIRS/VJ143C1.002) to compute white-sky albedos and the black-sky albedos at local solar noon for the VIIRS Day/Night band (DNB), moderate resolution bands M1 through M5, M7, M8, M10, and M11, as well as the shortwave band, visible band, and near-infrared (NIR) broadbands. The quality and inversion status of the majority of the underlying 30 arc second pixels is provided as well as the percentage of the underlying pixels that were present or were snow covered. Users are encouraged to assess the quality information before using the BRDF/Albedo data. This 0.05 degree (5,600 meters at the equator) CMG product covers the entire globe for use in climate simulation models. The VJ143C3 product includes 26 layers containing white-sky albedos and the black-sky albedos for the VIIRS DNB, moderate resolution bands M1 through M5, M7, M8, M10, and M11, as well as the shortwave band, visible band, and NIR broadbands. Along with the albedo data for the 13 bands are five ancillary layers for uncertainty, quality, local solar noon, percent finer resolution inputs, and snow cover. A low-resolution image is also available showing retrievals of WSA for the shortwave broadband in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ143MA3
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo (VJ143MA3) Version 2 product provides albedo values at 1 kilometer (km) resolution for the bihemispherical reflectance white-sky albedo (WSA) and directional hemispherical reflectance black-sky albedo (BSA) at local solar noon. The VJ143MA3 product is produced daily using 16 days of VIIRS data and is weighted temporally to the ninth day, which is reflected in the file name. The VJ143 data products are designed to promote the continuity of NASA’s Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo data product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from [VJ143MA1](https://doi.org/10.5067/VIIRS/VJ143MA1.002) to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry ([VJ143MA4](https://doi.org/10.5067/VIIRS/VJ143MA4.002)), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) (VJ143MA3). Researchers can use the BRDF model parameters with a simple polynomial, to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial, to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VJ143MA3 product provides a total of 36 SDS layers including: BSA; WSA; and mandatory quality layers for nine VIIRS moderate bands M1-M5, M7-M8, and M10-M11; as well as near-infrared (NIR); shortwave; and visible broadbands. A low-resolution image is also available showing retrievals of WSA for band M1 in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ143IA3
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo (VJ143IA3) Version 2 product provides albedo values at 500 meter (m) resolution for the bihemispherical reflectance white-sky albedo (WSA) and directional hemispherical reflectance black-sky albedo (BSA) at local solar noon. The VJ143IA3 product is produced daily using 16 days of VIIRS data and is weighted temporally to the ninth day, which is reflected in the file name. The VJ143 data products are designed to promote the continuity of NASA’s Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo data product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from [VJ143IA1](https://doi.org/10.5067/VIIRS/VJ143IA1.002) to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry ([VJ143IA4](https://doi.org/10.5067/VIIRS/VJ143IA4.002)), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) (VJ143IA3). Researchers can use the BRDF model parameters with a simple polynomial, to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial, to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VJ143IA3 product provides a total of 9 SDS layers including: BSA, WSA, and mandatory quality layers for VIIRS imagery bands I1, I2, and I3. A low-resolution browse image is also available showing retrievals of WSA for band I1 in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ143D54
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Black-Sky Albedo for Band M1 (VJ143D54) is produced daily using 16 days of data at 30 arc second (1,000 meter) resolution. Data are temporally weighted to the ninth day, which is reflected in the file name. The VJ143D product suite is provided in a Climate Modeling Grid (CMG), which covers the entire globe for use in climate simulation models. Due to the large file size, each VJ143D product contains just one data layer. VJ143D54 through VJ143D79 are the albedo products of the VJ143D BRDF/Albedo product suite. Black-sky albedo (BSA) and white-sky albedo (WSA) values are provided for the nine VIIRS moderate resolution bands (M1 through M5, M7, M8, M10, and M11) along with the visible, near-infrared (NIR), and shortwave bands included in the [VJ143MA3](https://doi.org/10.5067/VIIRS/VJ143MA3.002) product. In addition to the bands included in VJ143MA3, this product suite includes albedo values for the VIIRS Day/Night Band (DNB). The black-sky albedo (directional hemispherical reflectance) is defined as albedo in the absence of a diffuse component and is a function of solar zenith angle. White-sky albedo (bihemispherical reflectance) is defined as albedo in the absence of a direct component when the diffuse component is isotropic. Details regarding methodology are available on the VJ143MA3 product page and in the Algorithm Theoretical Basis Document (ATBD). VJ143D54 is the BSA for VIIRS band M1 (0.412 μm). Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website]( https://landweb.modaps.eosdis.nasa.gov/knownissue).
  <br>

