  #### VJ121C1
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Land Surface Temperature and Emissivity (LST&E) Climate Modeling Grid Version 2 product (VJ121C) is compiled daily from daytime Level 2 Gridded (L2G) intermediate products. The L2G process maps the daily [VJ121](https://doi.org/10.5067/VIIRS/VJ121.002) swath granules onto a sinusoidal MODIS grid and stores all observations overlapping a gridded cell for a given day. The VJ121C1 algorithm sorts through all these observations for each cell and estimates the final LST value as an average from all cloud-free observations that have good LST accuracies. The 0.05 degree (5,600 m) dataset is derived through resampling the native 750 meter VIIRS resolution in the input product. The overall objective for NASA VIIRS products is to ensure the algorithms and products are compatible with the MODIS Terra and Aqua algorithms to promote the continuity of the Earth Observation System (EOS) mission. Additional details regarding the method used to create this Level 3 (L3) product are available in the Algorithm Theoretical Basis Document (ATBD). The VJ121C1 product contains 25 Science Datasets (SDS): LST, quality control, view zenith angle, and time of observation for both day and night observations along with emissivity for bands M14, M15, and M16. Low-resolution browse images for day and night LST are also available for each VJ121C1 granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide.
  <br>

  #### VJ121A1D
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Land Surface Temperature and Emissivity (LST&E) Day Version 2 product (VJ121A1D) is compiled daily from daytime Level 2 Gridded (L2G) intermediate products. The L2G process maps the daily [VJ121](https://doi.org/10.5067/VIIRS/VJ121.002) swath granules onto a sinusoidal MODIS grid and stores all observations overlapping a gridded cell for a given day. The VJ121A1 algorithm sorts through all these observations for each cell and estimates the final LST value as an average from all cloud-free observations that have good LST accuracies. The daytime average is weighted by the observation coverage for that cell. Only observations having observation coverage more than a certain threshold (15%) are considered for this averaging. The 1 kilometer dataset is derived through resampling the native 750 meter VIIRS resolution in the input product. The VJ121A1D product is developed synergistically with the Moderate Resolution Imaging Spectroradiometer (MODIS) LST&E Version 6.1 product ([MOD21A1D](https://doi.org/10.5067/MODIS/MOD21A1D.061)) using the same input atmospheric products and algorithmic approach. The overall objective for NASA VIIRS products is to ensure the algorithms and products are compatible with the MODIS Terra and Aqua algorithms to promote the continuity of the Earth Observation System (EOS) mission. Additional details regarding the method used to create this Level 3 (L3) product are available in the Algorithm Theoretical Basis Document (ATBD). The VJ121A1D product contains seven Science Datasets (SDS): LST, quality control, emissivity for bands M14, M15, and M16, view zenith angle, and time of observation. A low-resolution browse image for LST is also available for each VJ121A1D granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide.
  <br>

  #### VJ121A1N
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Land Surface Temperature and Emissivity (LST&E) Night Version 2 product (VJ121A1N) is compiled daily from nighttime Level 2 Gridded (L2G) intermediate products. The L2G process maps the daily [VJ121](https://doi.org/10.5067/VIIRS/VJ121.002) swath granules onto a sinusoidal MODIS grid and stores all observations overlapping a gridded cell for a given night. The VJ121A1 algorithm sorts through all these observations for each cell and estimates the final LST value as an average from all cloud-free observations that have good LST accuracies. The nighttime average is weighted by the observation coverage for that cell. Only observations having observation coverage more than a certain threshold (15%) are considered for this averaging. The 1 kilometer dataset is derived through resampling the native 750 meter VIIRS resolution in the input product. The VJ121A1N product is developed synergistically with the Moderate Resolution Imaging Spectroradiometer (MODIS) LST&E Version 6.1 product ([MOD21A1N](https://doi.org/10.5067/MODIS/MOD21A1N.061)) using the same input atmospheric products and algorithmic approach. The overall objective for NASA VIIRS products is to ensure the algorithms and products are compatible with the MODIS Terra and Aqua algorithms to promote the continuity of the Earth Observation System (EOS) mission. Additional details regarding the method used to create this Level 3 (L3) product are available in the Algorithm Theoretical Basis Document (ATBD). The VJ121A1N product contains seven Science Datasets (SDS): LST, quality control, emissivity for bands M14, M15, and M16, view zenith angle, and time of observation. A low-resolution browse image for LST is also available for each VJ121A1N granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide.
  <br>

  #### VJ121C3
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Land Surface Temperature and Emissivity (LST&E) monthly Climate Modeling Grid Version 2 product (VJ121C3) provides LST&E by a process of selecting the best available pixel over a monthly acquisition period at 0.05 degree (~5,600 meter) resolution. The VJ121C3 dataset is a monthly composite LST&E product that uses an algorithm based on a simple averaging method and is formatted as a CMG for use in climate simulation models. The algorithm calculates the average from all the cloud free [VJ121A1D](http://doi.org/10.5067/VIIRS/VJ121A1D.002) and [VJ121A1N](http://doi.org/10.5067/VIIRS/VJ121A1N.002) daily acquisitions from the monthly period. Unlike the VJ121A1 data sets where the daytime and nighttime acquisitions are separate products, the VJ121C3 contains both daytime and nighttime acquisitions as separate Science Dataset (SDS) layers within a single Hierarchical Data Format (HDF) file. Additional details regarding the method used to create this Level 3 (L3) product are available in the Algorithm Theoretical Basis Document (ATBD). The VJ121C3 product contains 25 Science Datasets (SDS): LST, quality control, view zenith angle, and time of observation for both day and night observations along with emissivity for bands M14, M15, and M16. Low-resolution browse images for day and night LST are also available for each VJ121C3 granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide.
  <br>

  #### VJ115A2H
  The Visible Infrared Imaging Radiometer Suite (VIIRS) Leaf Area Index (LAI) and Fraction of Photosynthetically Active Radiation (FPAR) Version 2 data product (VJ115A2H) provides information about the vegetative canopy layer at 500 meter resolution. The VIIRS sensor is located aboard the NOAA-20 satellite. LAI is an index that quantifies the one-sided leaf area of a canopy, while FPAR is the fraction of incoming solar energy absorbed through photosynthesis at 400 to 700 nanometers. This product is intentionally designed after the Terra and Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) LAI/FPAR operational algorithm to promote the continuity of the Earth Observation System (EOS) mission. The VJ115A2H product includes six Science Data Set Layers for the analysis of key factors in LAI/FPAR measurements. These include the LAI and FPAR measurements, quality detail for LAI/FPAR, extra quality detail for FPAR, and the standard deviation for LAI and FPAR. Two low resolution browse images are also available for each VJ115A2H granule: LAI and FPAR. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ102MOD
  The VIIRS/JPSS1 Moderate Resolution 6-Min L1B Swath 750 m, short-name VJ102MOD is VIIRS Level-1B calibrated radiances product that comprise sixteen moderate-resolution or M-bands, which have a spatial resolution of 750-meters at nadir. These M-bands comprise eleven reflective solar bands (RSB) and five thermal emissive bands (TEB). Each of the M-bands has 16 detectors in the along-track direction with 16 rows of pixels per scan that provide a 750-m resolution. Ranging in wavelengths from 0.402 µm to 12.49 µm, the M-bands are sensitive to visible, near-, shortwave-, mediumwave-, and longwave-infrared wavelengths. Derived from the NASA VIIRS L1A raw radiances, this product includes calibrated and geolocated radiance and reflectance data, quality flags, and granule- and collection-level metadata. In contrast to a MODIS L1B product, which temporally spans 5 minutes, the VIIRS L1B calibrated radiances product contains a nominal temporal duration of 6 minutes.
  <br>

  #### VJ103MODLL
  The Visible Infrared Imaging Radiometer Suite (VIIRS) Moderate Resolution Terrain Correction Geolocation (VJ103MODLL) Version 2.1 product from the NOAA-20 VIIRS sensor is produced in 6 minute temporal satellite increments (swaths) at 750 meter resolution. Intersecting the VIIRS line of sight vector with Earth’s geoid and the World Geodetic System (WGS) ellipsoid, this product is based on the SRTM30 Version 2 digital elevation model (DEM), which uses GTOPO30 data for areas from 60° North to 60° South. VJ103MODLL is a terrain correction geolocation product that provides the spatial location for various VIIRS data products. Each swath of data is approximately 3,060 kilometers along track (long) and 3,060 kilometers across track (wide). Provided in the VJ103MODLL product are layers for height, latitude, and longitude. These Science Data Sets (SDS) layers are used in conjunction with the ([VJ114](https://doi.org/10.5067/viirs/vj114.002)) swath product for accurate geolocation information. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ103MOD
  The VIIRS/JPSS1 Moderate Resolution Terrain Corrected Geolocation 6-Min L1 Swath 750m product, short-name VJ103MOD contains the derived line-of-sight (LOS) vectors for each of the 750-m moderate-resolution, or M-bands. The geolocation algorithm uses a number of inputs that include an Earth ellipsoid, geoid, and a digital terrain model along with the SNPP platform’s ephemeris and attitude data, and knowledge of the VIIRS sensor and satellite geometry. It produces geodetic coordinates (latitude and longitude), and related parameters for each VIIRS L1 pixel. The VJ103MOD product includes geodetic latitude, longitude, surface height above the geoid, solar zenith and azimuth angles, sensor zenith and azimuth angles, land/water mask, and quality flag for every pixel location.
  <br>

  #### VJ109A1
  The 8-day Visible Infrared Imaging Radiometer Suite (VIIRS) surface reflectance (VJ109A1) Version 2 composite product provides an estimate of land surface reflectance from the NOAA-20 VIIRS sensor for nine moderate resolution bands (M1 - M5, M7, M8, M10, M11) at nominal 1 kilometer resolution (~926 meter). The 1 kilometer dataset is derived through resampling the native 750 meter VIIRS resolution in the Level 2 input product. The data are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. Each pixel represents the best possible Level 2G observation during an 8-day period that is selected on the basis of high observation coverage, low sensor angle, the absence of clouds or cloud shadow, and aerosol loading. Included in the product along with the nine reflectance bands are day of year, reflectance band quality, control, reflectance state quality assurance, relative azimuth angle, sensor zenith angle, and solar zenith angle layers. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and in Section 4.0 of the User Guide.
  <br>

  #### VJ109H1
  The 8-day Visible Infrared Imaging Radiometer Suite (VIIRS) Surface Reflectance (VJ109H1) Version 2 composite product provides an estimate of land surface reflectance from the NOAA-20 VIIRS sensor for three imagery bands (I1, I2, I3) at nominal 500 meter resolution (~463 meter). The 500 meter dataset is derived through resampling the native 375 meter VIIRS resolution in the L2 input product. The data are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. Each pixel represents the best possible Level 2G observation during an 8-day period, which is selected on the basis of high observation coverage, low sensor angle, the absence of clouds or cloud shadow, and aerosol loading. In addition to the three reflectance bands, this product includes a state quality assurance (QA) layer and a reflectance band quality layer. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and in Section 4.0 of the User Guide.
  <br>

  #### VJ109GA
  The Visible Infrared Imaging Radiometer Suite (VIIRS) daily surface reflectance (VJ109GA) Version 2 product provides an estimate of land surface reflectance from the NOAA-20 VIIRS sensor. Data are provided for three imagery bands (I1-I3) at nominal 500 meter resolution (~463 meter) and nine moderate resolution bands (M1-M5, M7, M8, M10, M11) at nominal 1 kilometer (~926 meter) resolution. The 500 meter and 1 kilometer datasets are derived through resampling the native 375 meter and 750 meter VIIRS resolutions, respectively, in the Level 2 input product. These bands are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. The inputs to the surface reflectance algorithm are top-of-atmosphere reflectance for the VIIRS visible bands, the VIIRS cloud mask and aerosol product, aerosol optical thickness and atmospheric data obtained from the NOAA National Centers for Environmental Prediction (NCEP) reanalysis system. Along with the twelve reflectance bands are reflectance band quality, sensor azimuth angle, solar azimuth angle, sensor zenith angle, solar zenith angle, and observations layers. The reflectance layers from the VJ109GA data product are used as input data for many of the VIIRS land products. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and in Section 4.0 of the User Guide.
  <br>

  #### VJ109CMG
  The Visible Infrared Imaging Radiometer Suite (VIIRS) daily surface reflectance Climate Modeling Grid (VJ109CMG) Version 2 product provides an estimate of land surface reflectance from the NOAA-20 VIIRS sensor. Data are provided for three imagery bands (I1-I3) and nine moderate resolution bands (M1-M5, M7, M8, M10, M11) at 0.05 degree (~5,600 meter) resolution. The data are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. This product uses a weighted average of the best quality observation and is formatted as a CMG for use in climate simulation models. This product includes the twelve reflectance bands, five moderate resolution brightness temperature bands (M12-M16) and information layers representing relative azimuth angle, sensor zenith angle, solar zenith angle, reflectance band quality, time of day, and number mapping. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and in Section 4.0 of the User Guide.
  <br>

  #### VJ114A1
  The daily NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Thermal Anomalies and Fire (VJ114A1) Version 2 data product provides daily information about active fires and other thermal anomalies. The VJ114A1 data product is a global, 1 kilometer (km) gridded composite of fire pixels detected from VIIRS 750 meter (m) bands over a daily (24-hour) period. The VJ114 data products are designed after the Moderate Resolution Imaging Spectroradiometer (MODIS) Thermal Anomalies/Fire product suite. The VJ114A1 product provides a total of four Science Dataset (SDS) layers for the confidence of fire, maximum fire radiative power (FRP), quality assessment (QA), and position of fire within scan. Each data product file is provided in HDF-EOS5 format. A low resolution browse is also provided showing the fire mask layer with a color map applied in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and in Section 5.0 “Frequently Asked Questions” of the User Guide.
  <br>

  #### VJ114
  The Visible Infrared Imaging Radiometer Suite (VIIRS) Thermal Anomalies (VJ114) Version 2 product is produced in 6-minute temporal satellite increments (swaths) at 750 meter resolution from the VIIRS sensor located on the NOAA-20 satellite. This product is designed after the Terra and Aqua Moderate Resolution Imaging Spectroradiometer (MODIS) Thermal Anomalies and Fire data products to promote the continuity of the Earth Observation System (EOS) mission. This data product can enable users to understand the location and intensity of fire events as well as identifying thermal anomalies. The VJ114 product includes 31 science dataset layers to analyze key factors in fire detection, including atmospheric conditions (e.g., atmospheric reflectance, solar zenith angle, brightness temperature) and fuel type for the event. The fire mask layer in the VJ114 product is the primary layer and can be used to identify fires and other thermal anomalies such as volcanoes. In addition to the fire mask, brightness temperature is provided for VIIRS channels M5, M7, M11, M13, M15, and M16. Each swath of data is approximately 3,060 kilometers along track (long) and 3,060 kilometers across track (wide). The VJ114 product is also used to generate higher-level fire data products. Use of the [VJ103MODLL](https://doi.org/10.5067/viirs/vj103modll.021) data product is required to apply accurate geolocation information to the VJ114 Science Datasets (SDS). Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and in Section 5.0 “Frequently Asked Questions” of the User Guide.
  <br>

  #### VJ113C1
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Vegetation Indices (VJ113C1) Version 2 data product provides vegetation indices by a process of selecting the best available pixel over a 16-day acquisition period at 0.05 degree resolution. The VNP13 data products are designed after the Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua Vegetation Indices product suite to promote the continuity of the Earth Observation System (EOS) mission. The VJ113 algorithm process produces three vegetation indices: The Normalized Difference Vegetation Index (NDVI), the Enhanced Vegetation Index (EVI), and the Enhanced Vegetation Index-2 (EVI2). NDVI is one of the longest continual remotely sensed time series observations, using both the red and near-infrared (NIR) bands. EVI is a slightly different vegetation index that is more sensitive to canopy cover, while NDVI is more sensitive to chlorophyll. EVI2 is a reformation of the standard 3-band EVI, using the red band and NIR band. This reformation addresses arising issues when comparing VIIRS EVI to other EVI models that do not include a blue band. EVI2 will eventually become the standard EVI. Along with the three Vegetation Indices layers, this product also includes layers for the standard deviations of each Vegetation Index; NIR reflectance; three shortwave infrared (SWIR) reflectance; red, blue, and green reflectance; number of pixels, number of pixels used; pixel reliability; average sun angle, and a quality layer. Two low resolution browse images are also available for each VJ113C1 product: EVI and NDVI. Known Issues: Due to missing critical inputs, this product lacks coverage for tiles h33v07 and h18v14, which are located over water. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide and ATBD.
  <br>

  #### VJ113A2
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Vegetation Indices (VJ113A2) Version 2 data product provides vegetation indices by a process of selecting the best available pixel over a 16-day acquisition period at 1 kilometer (km) resolution. The VJ113 data products are designed after the Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua Vegetation Indices product suite to promote the continuity of the Earth Observation System (EOS) mission. The VJ113 algorithm process produces three vegetation indices: The Normalized Difference Vegetation Index (NDVI), the Enhanced Vegetation Index (EVI), and the Enhanced Vegetation Index-2 (EVI2). NDVI is one of the longest continual remotely sensed time series observations, using both the red and near-infrared (NIR) bands. EVI is a slightly different vegetation index that is more sensitive to canopy cover, while NDVI is more sensitive to chlorophyll. EVI2 is a reformation of the standard 3-band EVI, using the red band and NIR band. This reformation addresses arising issues when comparing VIIRS EVI to other EVI models that do not include a blue band. EVI2 will eventually become the standard EVI. Along with the three Vegetation Indices layers, this product also includes layers for NIR reflectance; three shortwave infrared (SWIR) reflectance; red, blue, and green reflectance; composite day of year; pixel reliability; relative azimuth, view, and sun angles, and a quality layer. Two low resolution browse images are also available for each VJ113A2 product: EVI and NDVI. Known Issues: Due to missing critical inputs, this product lacks coverage for tiles h33v07 and h18v14, which are located over water. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide and ATBD.
