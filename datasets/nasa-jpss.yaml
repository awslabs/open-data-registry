  #### VJ113C2
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Vegetation Indices (VJ113C2) Version 2 data product provides vegetation indices by a process of selecting the best available pixel over a monthly acquisition period at 0.05 degree resolution. The VNP13 data products are designed after the Moderate Resolution Imaging Spectroradiometer (MODIS) Terra and Aqua Vegetation Indices product suite to promote the continuity of the Earth Observation System (EOS) mission. The VNP13 algorithm process produces three vegetation indices: The Normalized Difference Vegetation Index (NDVI), the Enhanced Vegetation Index (EVI), and the Enhanced Vegetation Index-2 (EVI2). NDVI is one of the longest continual remotely sensed time series observations, using both the red and near-infrared (NIR) bands. EVI is a slightly different vegetation index that is more sensitive to canopy cover, while NDVI is more sensitive to chlorophyll. EVI2 is a reformation of the standard 3-band EVI, using the red band and NIR band. This reformation addresses arising issues when comparing VIIRS EVI to other EVI models that do not include a blue band. EVI2 will eventually become the standard EVI. Along with the three Vegetation Indices layers, this product also includes layers for the standard deviations of each Vegetation Index; NIR reflectance; three shortwave infrared (SWIR) reflectance; red, blue, and green reflectance; number of pixels, number of pixels used; pixel reliability; average sun angle, and a quality layer. Two low resolution browse images are also available for each VJ113C2 product: EVI and NDVI. Known Issues: Due to missing critical inputs, this product lacks coverage for tiles h33v07 and h18v14, which are located over water. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide and ATBD.
