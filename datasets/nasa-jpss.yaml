  #### VJ147IMG
  The Visible Infrared Imaging Radiometer Suite (VIIRS) FIre Light Detection Algorithm-2 (FILDA-2) Modified Combustion Efficiency (MCE) Version 2 swath product (VJ147IMG) is produced in 6-minute orbit segments 375 meter (m) resolution from the VIIRS sensor aboard the NOAA-20 satellite. The VJ147IMG product takes advantage of the rich information that visible band observation conveys at night to assess fire combustion efficiency and enhance fire detection. It also utilizes improvements made in fire detection algorithms to detect smaller and cooler fires. The VJ147IMG product includes 83 layers containing fire detection and retrievals of Radiative Power (FRP), fire Visible Energy Fraction (VEF), and Modified Combustion Efficiency (MCE). Known Issues: Known issues can be found in Section 5 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS&as=5200).
