  #### VJ143DNBA4
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Day/Night Band (DNB) Nadir Bidirectional Reflectance Distribution Function (BRDF) Adjusted Reflectance (NBAR) Version 2 product provides NBAR estimates at 1 kilometer (km) resolution. The VJ143DNBA4 product is produced daily using 16 days of VIIRS data and is weighted temporally to the ninth day, which is reflected in the file name. The view angle effects are removed from the directional reflectance resulting in a stable and consistent NBAR product. The VJ143 data products are designed after the Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from [VJ143DNBA1](https://doi.org/10.5067/VIIRS/VJ143DNBA1.002) to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry (VJ143DNBA4), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) ([VJ143DNBA3](https://doi.org/10.5067/VIIRS/VJ143DNBA3.002)). Researchers can use the BRDF model parameters with a simple polynomial to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VJ143DNBA4 product includes BRDF/Albedo mandatory quality and nadir reflectance for the VIIRS DNB. A low-resolution browse image is also available showing NBAR of the DNB as a red, green, blue (RGB) image in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
