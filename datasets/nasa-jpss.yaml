  #### VJ146A2
  The NOAA-20 VIIRS Gap-Filled Lunar BRDF-Adjusted Nighttime Lights Daily L3 Global 15 arc-second Linear Lat Lon Grid product, short-name VJ146A2 is a daily moonlight- and atmosphere-corrected Nighttime Lights (NTL) product. This product is available at 15 arc-second resolution and contains seven Science Data Sets (SDS) that include DNB BRDF-Corrected NTL, Gap-Filled DNB BRDF-Corrected NTL, DNB Lunar Irradiance, Latest High-Quality Retrieval, Mandatory Quality Flag, Cloud Mask Quality Flag, and Snow Flag. The VJ146A2 product files are provided in standard Hierarchical Data Format–Earth Observing System (HDF-EOS5) format. The current v2.0 collection contains several changes and differences relative to the previous v1.0 collection. These include radiance data format change from unsigned integer to floating-point, from exclusively for land surfaces coverage to both land and water surfaces, updated Mandatory_Quality_Flag layer, and others. Consult the v2.0-specific Black Marble User Guide for additional details at: https://landweb.modaps.eosdis.nasa.gov/data/userguide/BlackMarbleUserGuide_Collection2.0_20241203.pdf
  <br>

  #### VJ102IMG
  The VIIRS/JPSS1 Imagery Resolution 6-Min L1B Swath 375m, short-name VJ102IMG product that comprise five image-resolution or I-bands, which have a 375-meter resolution at nadir. These I-bands comprise three reflective solar bands (RSB) and two thermal emissive bands (TEB). Ranging in wavelengths from 0.6 µm to 12.4 µm, the I-bands are sensitive to visible/reflective, near-, shortwave-, mediumwave-, and longwave-infrared wavelengths. Derived from the NASA VIIRS L1A raw radiances, this product includes calibrated and geolocated radiance and reflectance data, quality flags, and granule- and collection-level metadata. In contrast to a MODIS L1B product, which temporally spans 5 minutes, the VIIRS L1B calibrated radiances product contains a nominal temporal duration of 6 minutes.
  <br>

  #### VJ103IMG
  The VIIRS/JPSS1 Imagery Resolution Terrain Corrected Geolocation 6-Min L1 Swath 375m product, short-name VJ103IMG, contains the derived line- of-sight (LOS) vectors for each of the 375-m image-resolution or I-bands. The geolocation algorithm uses a number of inputs that include an Earth ellipsoid, geoid, and a digital terrain model along with the SNPP platform’s ephemeris and attitude data, and knowledge of the VIIRS sensor and satellite geometry. It produces geodetic coordinates (latitude and longitude), and related parameters for each VIIRS L1 pixel. The VJ103IMG product includes geodetic latitude, longitude, surface height above the geoid, solar zenith and azimuth angles, sensor zenith and azimuth angles, land/water mask, and quality flag for every pixel location.
  <br>

  #### VJ121
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Land Surface Temperature and Emissivity (LST&E) Version 2 swath product (VJ121) is produced daily in 6-minute temporal increments of satellite acquisition. The VJ121 product uses a physics-based algorithm to dynamically retrieve both the LST and emissivity simultaneously for VIIRS thermal infrared bands M14 (8.55 µm), M15 (10.76 µm), and M16 (12 µm) at a spatial resolution of 750 meters. The VJ121 product is developed developed synergistically with the Moderate Resolution Imaging Spectroradiometer (MODIS) LST&E Version 6.1 product ([MOD21](https://doi.org/10.5067/MODIS/MOD21.061)) using the same input atmospheric products and algorithmic approach based on the ASTER Temperature Emissivity Separation (TES) technique. The TES algorithm is combined with an improved Water Vapor Scaling (WVS) atmospheric correction scheme to stabilize the retrieval during very warm and humid conditions. The overall objective for NASA VIIRS products is to ensure the algorithms and products are compatible with the MODIS Terra and Aqua algorithms to promote the continuity of the Earth Observation System (EOS) mission. VIIRS LST&E products are available two months after acquisition due to latency of data inputs. Additional details regarding the method used to create this Level 2 (L2) product are available in the Algorithm Theoretical Basis Document (ATBD). Provided in the VJ121 product are layers for LST, quality control, emissivity for bands M14, M15, and M16, LST&E errors, view angle, ASTER Global Emissivity Dataset (GED), Precipitable Water Vapor (PWV), ocean-land mask, latitude, and longitude. A low-resolution browse image for LST is also available for each VJ121 granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide.
  <br>

  #### VJ121C2
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Land Surface Temperature and Emissivity (LST&E) 8-day Climate Modeling Grid Version 2 product (VJ121C2) combines the daily [VJ121A1D](http://doi.org/10.5067/VIIRS/VJ121A1D.002) and [VJ121A1N](http://doi.org/10.5067/VIIRS/VJ121A1N.002) products over an 8-day compositing period into a single product. The VJ121C2 dataset is an 8-day composite LST&E product at 0.05 degree (~5,600 meter) resolution that uses an algorithm based on a simple-averaging method and is formatted as a CMG for use in climate simulation models. The algorithm calculates the average from all the cloud-free VJ121A1D and VJ121A1N daily acquisitions from the 8-day period. Unlike the VJ121A1 datasets where the daytime and nighttime acquisitions are separate products, the VJ121C2 contains both daytime and nighttime acquisitions as separate science dataset (SDS) layers within a single Hierarchical Data Format (HDF) file. The overall objective for NASA VIIRS products is to ensure the algorithms and products are compatible with the MODIS Terra and Aqua algorithms to promote the continuity of the Earth Observation System (EOS) mission. Additional details regarding the method used to create this Level 3 (L3) product are available in the Algorithm Theoretical Basis Document (ATBD). The VJ121C2 product contains 25 Science Datasets (SDS): LST, quality control, view zenith angle, and time of observation for both day and night observations along with emissivity for bands M14, M15, and M16. Low-resolution browse images for day and night LST are also available for each VJ121C2 granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide.
  <br>

  #### VJ121A2
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Land Surface Temperature and Emissivity (LST&E) 8-day product (VJ121A2) combines the daily [VJ121A1D](http://doi.org/10.5067/VIIRS/VJ121A1D.002) and [VJ121A1N](http://doi.org/10.5067/VIIRS/VJ121A1N.002) products over an 8-day compositing period into a single product. The VJ121A2 dataset is an 8-day composite LST&E product at 1 kilometer resolution that uses an algorithm based on a simple-averaging method. The algorithm calculates the average from all the cloud-free VJ121A1D and VJ121A1N daily acquisitions from the 8-day period. Unlike the VJ121A1 datasets where the daytime and nighttime acquisitions are separate products, the VJ121A2 contains both daytime and nighttime acquisitions as separate science dataset (SDS) layers within a single Hierarchical Data Format (HDF) file. The VJ121A2 product is developed synergistically with the Moderate Resolution Imaging Spectroradiometer (MODIS) LST&E Version 6.1 product ([MOD21A2](https://doi.org/10.5067/MODIS/MOD21A2.061)) using the same input atmospheric products and algorithmic approach. The overall objective for NASA VIIRS products is to ensure the algorithms and products are compatible with the MODIS Terra and Aqua algorithms to promote the continuity of the Earth Observation System (EOS) mission. Additional details regarding the method used to create this Level 3 (L3) product are available in the Algorithm Theoretical Basis Document (ATBD). The VJ121A2 product contains 11 Science Datasets (SDS): LST, quality control, view zenith angle, and time of observation for both day and night observations along with emissivity for bands M14, M15, and M16. Low-resolution browse images for day and night LST are also available for each VJ121A2 granule. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS) and the User Guide.
