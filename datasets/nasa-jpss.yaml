  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo white-sky albedo for band VIS (VJ143D76) is produced daily using 16 days of data at 30 arc second (1,000 meter) resolution. Data are temporally weighted to the ninth day, which is reflected in the file name. The VJ143D product suite is provided in a Climate Modeling Grid (CMG), which covers the entire globe for use in climate simulation models. Due to the large file size, each VJ143D product contains just one data layer. VJ143D54 through VJ143D79 are the albedo products of the VJ143D BRDF/Albedo product suite. Black-sky albedo (BSA) and white-sky albedo (WSA) values are provided for the nine VIIRS moderate resolution bands (M1 through M5, M7, M8, M10, and M11) along with the visible (VIS), near-infrared (NIR), and shortwave bands included in the [VJ143MA3](https://doi.org/10.5067/VIIRS/VJ143MA3.002) product. In addition to the bands included in VJ143MA3, this product suite includes albedo values for the VIIRS Day/Night Band (DNB). The black-sky albedo (directional hemispherical reflectance) is defined as albedo in the absence of a diffuse component and is a function of solar zenith angle. White-sky albedo (bihemispherical reflectance) is defined as albedo in the absence of a direct component when the diffuse component is isotropic. Details regarding methodology are available on the VJ143MA3 product page and in the Algorithm Theoretical Basis Document (ATBD). VJ143D76 is the WSA for the VIIRS visible broadband (0.64 μm). Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website]( https://landweb.modaps.eosdis.nasa.gov/knownissue).
