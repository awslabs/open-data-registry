udes such as desert and tropical vegetation areas. This has an impact on the retrieval of other downstream data products such as VJ113 Vegetation Indices and VJ143 BRDF/Albedo. * Improved cloud mask input product for corrections along coastlines and artifacts from use of coarse resolution climatology data * Replaced the land/water mask input product with MODIS heritage seven class land/water mask
