Name: NASA JPSS Project
Description: |
  This High-Resolution (0.1 x 0.1 degree) Level 3 daily Aerosol Optical Depth (AOD) product is generated by combining two Visible Infrared Imaging Radiometer Suite (VIIRS) operational algorithms, namely Deep Blue (DB) and Dark Target (DT), on board the NOAA-20 satellite. This dataset is provided in daily files ranging from 2018-02-17 to the present. The spatial coverage is global and the dataset is gridded at 0.1 x 0.1 degree spatial resolution. The data are generated using Level 2 AOD retrieved using DT and DB algorithms. The product provides multiple options for using data either from DT or DB or combined. Depending on user need and application, they can choose one or more relevant parameter. The pixels with highest quality as recommended by science teams are only considered in these averaging. In addition to averaged AOD at 0.1 x 0.1 degree resolution, standard deviation and number of pixels averaged from each algorithm are also provided. Average sensor zenith angle is also provided for additional filtering of the data. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
  <br>

  #### AER_DBDT_M10KM_L3_VIIRS_NOAA20
  This High-Resolution (0.1 x 0.1 degree) Level 3 monthly Aerosol Optical Depth (AOD) product is generated by combining two Visible Infrared Imaging Radiometer Suite (VIIRS) operational algorithms, namely Deep Blue (DB) and Dark Target (DT), on board the NOAA-20 satellite. This dataset is provided in monthly files ranging from February 2018 to the present. The spatial coverage is global and the dataset is gridded at 0.1 x 0.1 degree spatial resolution. The data are generated using Level 2 AOD retrieved using DT and DB algorithms. The product provides multiple options for using data either from DT or DB or combined. Depending on user need and application, they can choose one or more relevant parameter. The pixels with highest quality as recommended by science teams are only considered in these averaging. In addition to averaged AOD at 0.1 x 0.1 degree resolution, standard deviation and number of pixels averaged from each algorithm are also provided. Average sensor zenith angle is also provided for additional filtering of the data. If you have any questions, please read the README document first and post your question to the NASA Earthdata Forum (forum.earthdata.nasa.gov) or email the GES DISC Help Desk (gsfc-dl-help-disc@mail.nasa.gov).
