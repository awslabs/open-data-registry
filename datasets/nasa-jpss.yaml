  #### VJ143C2
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Snow-free Model Parameters Daily Global 0.05 Degree Climate Modeling Grid (CMG) Version 2 product (VJ143C2) is derived from the 30 arc second CMG VJ143D Version 2 product suite. VJ143C2 is generated daily from all available snow-free acquisitions over a 16-day moving window emphasizing the ninth day of the retrieval period, which is reflected in the Julian date in the filename. VJ143C2 supplies the weighting parameters associated with the RossThick/Li-Sparse-Reciprocal BRDF model, which is used to produce the [VJ143C3](https://doi.org/10.5067/VIIRS/VJ143C3.002) Albedo and [VJ143C4](https://doi.org/10.5067/VIIRS/VJ143C4.002) Nadir BRDF-Adjusted Reflectance (NBAR) products. The highest quality full inversion values are used for the temporal fitting effort and supplemented with lower quality pixels, spatial fitting, and spatial smoothing as needed. The status of each pixel can be found in the ancillary layers. Users are encouraged to assess the quality information before using the BRDF/Albedo data. This 0.05 degree (5,600 meters at the equator) CMG product covers the entire globe for use in climate simulation models. The VJ143C2 product includes 39 layers containing the three parameters (fiso, fvol, and fgeo) for the VIIRS Day/Night band (DNB), moderate resolution bands M1 through M5, M7, M8, M10, and M11, as well as the shortwave band, visible band, and near-infrared (NIR) broadbands. Along with the parameter data for the 13 bands are four ancillary layers for uncertainty, quality, local solar noon, and percent finer resolution inputs. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
