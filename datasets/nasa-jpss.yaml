  #### VJ143C1
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Model Parameters Daily Global 0.05 Degree Climate Modeling Grid (CMG) Version 2 product (VJ143C1) is derived from the 30 arc second CMG VJ143D Version 2 product suite. VJ143C1 is generated daily from all available high-quality reflectance data over a 16-day moving window emphasizing the ninth day of the retrieval period, which is reflected in the Julian date in the filename. VJ143C1 supplies the weighting parameters associated with the RossThick/Li-Sparse-Reciprocal BRDF model that best describes the anisotropy of each pixel, which is used to produce the [VJ143C3](https://doi.org/10.5067/VIIRS/VJ143C3.002) Albedo and [VJ143C4](https://doi.org/10.5067/VIIRS/VJ143C4.002) Nadir BRDF-Adjusted Reflectance (NBAR) products. The highest quality full inversion values are used for the temporal fitting effort and supplemented with lower quality pixels, spatial fitting, and spatial smoothing as needed. The status of each pixel can be found in the ancillary layers. Users are encouraged to assess the quality information before using the BRDF/Albedo data. This 0.05 degree (5,600 meters at the equator) CMG product covers the entire globe for use in climate simulation models. The VJ143C1 product includes 39 layers containing the three parameters (fiso, fvol, and fgeo) for the VIIRS Day/Night band (DNB), moderate resolution bands M1 through M5, M7, M8, M10, and M11, as well as the shortwave band, visible band, and near-infrared (NIR) broadbands. Along with the parameter data for the 13 bands are five ancillary layers for uncertainty, quality, local solar noon, percent finer resolution inputs, and snow cover. A low-resolution browse is also provided showing BRDF/Albedo parameters for bands M5, M4, and M3 as a red, green, blue (RGB) image in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ143MA1
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Model Parameters (VJ143MA1) Version 2 product provides BRDF/Albedo model parameters at 1 kilometer (km) resolution. The VJ143MA1 product is produced daily using 16-day VIIRS data and is weighted temporally to the 9th day, which is reflected in the file name. The VJ143 data products are designed to promote the continuity of NASA’s Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo data product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from VJ143MA1 to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry ([VJ143MA4](https://doi.org/10.5067/VIIRS/VJ143MA4.002)), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) ([VJ143MA3](https://doi.org/10.5067/VIIRS/VJ143MA3.002)). Researchers can use the BRDF model parameters with a simple polynomial, to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial, to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VJ143MA1 data product provides a total of 24 SDS layers including: mandatory quality bands and three multi-dimensional model parameter bands representing fiso, fvol, and fgeo for VIIRS moderate resolution bands M1-M5, M7-M8, and M10-M11. A low-resolution browse is also provided showing BRDF/Albedo parameters for bands M5, M7, and M5 as an RGB image in JPEG format. Known Issues: Known issues for VIIRS BRDF/Albedo data products can be found on the [VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ143IA1
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Model Parameters (VJ143IA1) Version 2 product provides kernel weights (parameters) at 500 meter (m) resolution. The VJ143IA1 product is produced daily using 16 days of VIIRS data, temporally weighted to the ninth day, which is reflected in the file name. The VJ143IA1 product provides three spectrally dependent kernel weights, also known as model parameters: isotropic (fiso), volumetric (fvol), and geometric (fgeo), which can be used to model anisotropic effects of the Earth’s surface. All VJ143 data products are designed to promote the continuity of NASA’s Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo data product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from VJ143IA1 to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry ([VJ143IA4](https://doi.org/10.5067/VIIRS/VJ143IA4.002)), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) ([VJ143IA3](https://doi.org/10.5067/VIIRS/VJ143IA3.002)). Researchers can use the BRDF model parameters with a simple polynomial, to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial, to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VNP43IA1 data product provides a total of six SDS layers including: three mandatory quality layers for bands I1, I2, and I3 and three multi-dimensional model parameter bands representing fiso, fvol, and fgeo for each imagery band. Each data product file is provided in HDF-EOS5 format. A low-resolution browse is also available showing BRDF/Albedo parameters for VIIRS imagery bands: I1, I2, and I1 as an RGB (red, green, blue) image in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
