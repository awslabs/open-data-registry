  #### OMPS_N21_LP_L1G_EV
  The OMPS-N21 L1G LP Radiance EV Wavelength-Altitude Grid swath orbital 3slit product contains the calibrated earth-viewing radiances measured by the Ozone Mapping and Profiling Suite (OMPS) Limb-Profiler (LP) sensor on the NOAA 21 (JPSS-2) satellite. The LP L1G product measures radiances in the wavelength region from 280 nm to 1000 nm. Each granule contains data from the daylight portion of each orbit measured for a full day. Spatial coverage is global (-90 to 90 degrees latitude), and there are about 14.5 orbits per day each measuring three limb profiles spaced approximately 250 km in the cross-track direction. The profiles are measured from the ground up to about 80 km with a vertical resolution of the retrieved profiles of approximately 1-2 km. The data are written using the Hierarchical Data Format Version 5 or HDF5.
  <br>

  #### SNDRJ1ATMSMAP
  The Advanced Technology Microwave Sounder (ATMS) Level 1B data files contain brightness temperature measurements along with ancillary spacecraft, instrument, and geolocation data of the ATMS instrument on the Joint Polar Satellite System-1 (JPSS-1) platform. This platform is also known as NOAA-20 (National Oceanic and Atmospheric Administration). The ATMS is a 22-channel mm-wave radiometer. The ATMS will measure upwelling radiances in six frequency bands centered at 23 GHz, 31 GHz, 50-58 GHz, 89 GHz, 66 GHz, and 183 GHz. The ATMS is a total power radiometer, with "through-the-antenna" radiometric calibration. Radiometric data is collected by a pair of antenna apertures, scanned by rotating flat plate reflectors. Scanning is performed cross-track to the satellite motion from sun to anti-sun, using the "integrate-while-scan" type data collection. The scan period is 8/3 second, synchronized to the Cross-track Infrared Sounder (CrIS) using a spacecraft provided scan synchronization pulse. Since the JPSS-1 satellite is orbiting at an altitude of about 830 km, the instantaneous spatial resolution on the ground at nadir is about 16 km, 32 km, or 75 km depending upon the channel. The brightness temperature data are contained in an array with 135 rows in the along-track direction, 96 columns in the cross-track direction, and a 3rd dimension for each of the 22 channels. The ATMS cross-track scan interval is 0.018 seconds and the along-track scan period is 8/3 seconds.. Data products are constructed on six minute boundaries. The Granule Map Product consists of daily images of granule coverage in PDF format.
  <br>

  #### SNDRJ1ML2RMS
  This level 2 product is generated by the RAMSES (Retrieval Algorithm for Microwave Sounders in Earth Science II algorithm.The RAMSES II algorithm is a microwave only retrieval algorithm using observations from the NOAA-20 (National Oceanic and Atmospheric Administration) also know as Joint Polar Satellite System (JPSS-1) Advanced Technology Microwave Sounder (ATMS) instrument. The ATMS instrument used for this product is a cross-track scanner with 22 channels in spectral bands from 23 GHz through 183 GHz. The RAMSES II Level-2 retrieval products contain a variety of geophysical parameters retrieved from ATMS measurements, including profiles of temperature, water in all phases as well as surface properties for six minutes of instrument observation at a time. The RAMSES II algorithm doesn't have a cloud clearing process and produces all weather retrieval A level 2 granule has been set as 6 minutes of data. There are 240 granules per day, with an orbit repeat cycle of approximately 16 day.
  <br>

