  #### VJ128C2
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Water Reservoir 8-day Level 3 (L3) Global (VJ128C2) Version 2 product provides current data for 151 man-made reservoirs and 13 regulated natural lakes for a total of 164 reservoirs. The VJ128C2 data product provides an 8-day time series of surface area, elevation, and water storage. Datasets are combined with pre-established [Area-Elevation (A-E) curves](https://doi.org/10.1016/j.rse.2020.111831) and image classifications of near-infrared (NIR) reflectance from the surface reflectance product acquired by the VIIRS satellite ([VJ109H1](https://lpdaac.usgs.gov/products/vj109h1v002/)). The VJ128C2 data product consists of a single layer with information about the reservoir identifier, dam location (longitude and latitude), reservoir surface area, elevation, and water storage capacity. Known Issues: Water occurrence images generally show smaller surface area dynamics in high latitude regions, creating pixels with low occurrence values that have relatively large uncertainties. In addition, the quality of raw water area classification can be affected by lake ice coverage typically creating an overestimation of surface area in the enhancement algorithm. This issue will be addressed in a future release of the enhancement algorithm. For additional information about known issues, refer to Section 4 in the User Guide.
  <br>

  #### VJ128C3
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Water Reservoir Monthly Level 3 (L3) Global (VJ128C3) Version 2 product provides current data for 151 man-made reservoirs and 13 regulated natural lakes for a total of 164 reservoirs. The VJ128C3 data product is a composite of the 8-day area classifications from [VJ128C2](https://lpdaac.usgs.gov/products/vj128c2v002/) which is converted to provide monthly elevation and water storage. The Lake Temperature and Evaporation Model ([LTEM](https://doi.org/10.1016/j.rse.2020.112104)) with input from VIIRS Land Surface Temperature and Emissivity ([VJ121A2](https://lpdaac.usgs.gov/products/vj121a2v002/)) and meteorological data from Global Land Data Assimilation System ([GLDAS](https://earth.gsfc.nasa.gov/hydro/data/gldas-global-land-data-assimilation-system-data)) are used to produce monthly evaporation rates and volume losses. The VJ128C3 data product provides a monthly time series that consists of a single layer with information about the reservoir identifier, dam location (longitude and latitude), reservoir surface area, elevation, water storage capacity, evaporation rate, and evaporation volume. Known Issues: Water occurrence images generally show smaller surface area dynamics in high latitude regions, creating pixels with low occurrence values that have relatively large uncertainties. In addition, the quality of raw water area classification can be affected by lake ice coverage typically creating an overestimation of surface area in the enhancement algorithm. This issue will be addressed in a future release of the enhancement algorithm. For additional information about known issues, refer to Section 4 in the User Guide.
  <br>

  #### VJ147MOD
  The Visible Infrared Imaging Radiometer Suite (VIIRS) FIre Light Detection Algorithm-2 (FILDA-2) Modified Combustion Efficiency (MCE) Version 2 swath product (VJ147MOD) is produced in 6-minute orbit segments 750 meter (m) resolution from the VIIRS sensor aboard the NOAA-20 satellite. The VJ147MOD product takes advantage of the rich information that visible band observation conveys at night to assess fire combustion efficiency and enhance fire detection. It also utilizes improvements made in fire detection algorithms to detect smaller and cooler fires. The VJ147MOD product includes 85 layers containing fire detection and retrievals of Radiative Power (FRP), fire Visible Energy Fraction (VEF), and Modified Combustion Efficiency (MCE). Known Issues: Known issues can be found in Section 5 of the User Guide. * For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS&as=5200).
  <br>

  #### VJ202DNB
  The VIIRS/JPSS2 Day/Night Band 6-Min L1B Swath 750 m, short-name VJ202DNB, of the Joint Polar-orbiting Satellite System-2 (JPSS-2/NOAA-21; referred to hereafter as J2) platform-derived single NASA VIIRS panchromatic Day-Night band (DNB) calibrated radiance product. The DNB is one of the M-bands with an at-nadir spatial resolution of 750 meters (across the entire scan). The panchromatic DNB’s spectral wavelength ranges from 0.5 micrometer to 0.9 micrometer. It facilitates measuring night lights, reflected solar/lunar lights with a large dynamic range between a low of a quarter moon illumination to the brightest daylight. The J2 VIIRS radiometric calibration Level-1B reprocessing includes a few calibration updates for the reflective solar bands (RSB), but no significant changes for the day-night band (DNB) or thermal emissive bands (TEB). For more information and for users guide, visit: https://ladsweb.modaps.eosdis.nasa.gov/missions-and-measurements/products/VJ202DNB
  <br>

  #### VJ203DNB
  The VIIRS/JPSS2 Day/Night Band Resolution Terrain Corrected Geolocation 6-Min L1 Swath 750 m, short-name VJ203DNB product is the Joint Polar-orbiting Satellite System-2 (JPSS-2/NOAA-21) platform-based NASA Visible Infrared Imaging Radiometer Suite (VIIRS) L1 terrain-corrected geolocation product, and contains the derived line-of-sight (LOS) vectors for the single panchromatic Day-Night band (DNB). The geolocation algorithm uses a number of inputs that include an Earth ellipsoid, geoid, and a digital terrain model along with the SNPP platform’s ephemeris and attitude data, and knowledge of the VIIRS sensor and satellite geometry. It provides geodetic coordinates (latitude and longitude), and related parameters for each VIIRS L1 pixel. The VJ203DNB product includes geodetic latitude, longitude, surface height above the geoid, solar zenith and azimuth angles, lunar zenith and azimuth angles, sensor zenith and azimuth angles, land/water mask, moon illumination fraction and phase angle, and quality flag for every pixel location. The J2 VIIRS geolocation underwent an on-orbit validation. Geolocation errors of about 350 m in the along-scan direction and about 165 m in the along-track direction were corrected for the image-resolution bands and moderate-resolution bands. The Day-Night band (DNB) geolocation error of about 2000 m was corrected. For more information and documents, visit LAADS product page at: https://ladsweb.modaps.eosdis.nasa.gov/missions-and-measurements/products/VJ203DNB
  <br>

  #### VJ202IMG
  The VIIRS/JPSS2 Imagery Resolution 6-Min L1B Swath 375m, short-name VJ202IMG is the Joint Polar-orbiting Satellite System-2 (JPSS-2/NOAA-21; referred to hereafter as J2) platform-derived NASA Visible Infrared Imaging Radiometer Suite (VIIRS) L1B calibrated radiances product that comprise five image-resolution or I-bands, which have a 375-meter resolution at nadir. These I-bands comprise three reflective solar bands (RSB) and two thermal emissive bands (TEB). Each of the I-bands has 32 detectors in the along-track direction with 32 rows of pixels per scan that offer a resolution that is twice finer than that of the moderate (M) and Day-Night bands (DNB). Ranging in wavelengths from 0.6 µm to 12.4 µm, the I-bands are sensitive to visible/reflective, near-, shortwave-, mediumwave-, and longwave-infrared wavelengths. The J2 VIIRS radiometric calibration Level-1B reprocessing includes a few calibration updates for the reflective solar bands (RSB), but no significant changes for the day-night band (DNB) or thermal emissive bands (TEB). For more information and documents, visit LAADS product page at: https://ladsweb.modaps.eosdis.nasa.gov/missions-and-measurements/products/VJ202IMG
  <br>

  #### VJ203IMG
  The VIIRS/JPSS2 Imagery Resolution Terrain Corrected Geolocation 6-Min L1 Swath 375 m, short-name VJ203IMG is the Joint Polar-orbiting Satellite System-2 (JPSS-2/NOAA-21) platform-derived NASA Visible-Infrared Imaging-Radiometer Suite (VIIRS) L1 terrain-corrected geolocation product and contains the derived line-of-sight (LOS) vectors for each of the 375-m image-resolution or I-bands. The geolocation algorithm uses a number of inputs that include an Earth ellipsoid, geoid, and a digital terrain model along with the SNPP platform’s ephemeris and attitude data, and knowledge of the VIIRS sensor and satellite geometry. It produces geodetic coordinates (latitude and longitude), and related parameters for each VIIRS L1 pixel. The VJ203IMG product includes geodetic latitude, longitude, surface height above the geoid, solar zenith and azimuth angles, sensor zenith and azimuth angles, land/water mask, and quality flag for every pixel location. VJ203IMG provides a fundamental input to derive a number of VIIRS I-band higher-level products. The J2 VIIRS geolocation underwent an on-orbit validation. Geolocation errors of about 350 m in the along-scan direction and about 165 m in the along-track direction were corrected for the image-resolution bands and moderate-resolution bands. The Day-Night band (DNB) geolocation error of about 2000 m was corrected. Further, the geolocation biases in the scan profile were also corrected. For more information and documents, visit LAADS product page at: https://ladsweb.modaps.eosdis.nasa.gov/missions-and-measurements/products/VJ203IMG
  <br>

  #### VJ202MOD
  The VIIRS/JPSS2 Moderate Resolution 6-Min L1B Swath 750m, short-name VJ202MOD is the Joint Polar-orbiting Satellite System-2 (JPSS-2/NOAA-21; referred to hereafter as J2) platform-derived NASA Visible Infrared Imaging Radiometer Suite (VIIRS) L1B calibrated radiances product that comprise sixteen moderate-resolution or M-bands, which have a spatial resolution of 750-meters at nadir. These M-bands comprise eleven reflective solar bands (RSB) and five thermal emissive bands (TEB). Each of the M-bands has 16 detectors in the along-track direction with 16 rows of pixels per scan that provide a 750-m resolution. Ranging in wavelengths from 0.402 µm to 12.49 µm, the M-bands are sensitive to visible, near-, shortwave-, mediumwave-, and longwave-infrared wavelengths. Derived from the NASA VIIRS L1A raw radiances, this product includes calibrated and geolocated radiance and reflectance data, quality flags, and granule- and collection-level metadata. The J2 VIIRS radiometric calibration Level-1B reprocessing includes a few calibration updates for the reflective solar bands (RSB), but no significant changes for the day-night band (DNB) or thermal emissive bands (TEB). For more information and documentation, visit LAADS product page at: https://ladsweb.modaps.eosdis.nasa.gov/missions-and-measurements/products/VJ202MOD
  <br>

  #### VJ203MOD
  The VIIRS/JPSS2 Moderate Resolution Terrain Corrected Geolocation 6-Min L1 Swath 750 m, short-name VJ203MOD is the Joint Polar-orbiting Satellite System-2 (JPSS-2/NOAA-21) platform-based NASA Visible-Infrared Imaging-Radiometer Suite (VIIRS) L1 terrain-corrected geolocation product, and contains the derived line-of-sight (LOS) vectors for each of the 750-m moderate-resolution, or M-bands. The geolocation algorithm uses a number of inputs that include an Earth ellipsoid, geoid, and a digital terrain model along with the SNPP platform’s ephemeris and attitude data, and knowledge of the VIIRS sensor and satellite geometry. It produces geodetic coordinates (latitude and longitude), and related parameters for each VIIRS L1 pixel. The VJ203MOD product includes geodetic latitude, longitude, surface height above the geoid, solar zenith and azimuth angles, sensor zenith and azimuth angles, land/water mask, and quality flag for every pixel location. VJ203MOD provides a fundamental input to derive a number of VIIRS M-band higher-level products. The J2 VIIRS geolocation underwent an on-orbit validation. Geolocation errors of about 350 m in the along-scan direction and about 165 m in the along-track direction were corrected for the image-resolution bands and moderate-resolution bands. The Day-Night band (DNB) geolocation error of about 2000 m was corrected. For more information and documents, visit LAADS product page at: https://ladsweb.modaps.eosdis.nasa.gov/missions-and-measurements/products/VJ203MOD
  <br>

  #### VJ209A1
  The 8-day Visible Infrared Imaging Radiometer Suite (VIIRS) surface reflectance (VJ209A1) Version 2 composite product provides an estimate of land surface reflectance from the NOAA-21 VIIRS sensor for nine moderate resolution bands (M1 - M5, M7, M8, M10, M11) at nominal 1 kilometer resolution (~926 meter). The 1 kilometer dataset is derived through resampling the native 750 meter VIIRS resolution in the Level 2 input product. The data are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. Each pixel represents the best possible Level 2G observation during an 8-day period that is selected on the basis of high observation coverage, low sensor angle, the absence of clouds or cloud shadow, and aerosol loading. Included in the product along with the nine reflectance bands are day of year, reflectance band quality, control, reflectance state quality assurance, relative azimuth angle, sensor zenith angle, and solar zenith angle layers. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS&sat=J2).
  <br>

  #### VJ209H1
  The 8-day Visible Infrared Imaging Radiometer Suite (VIIRS) Surface Reflectance (VJ209H1) Version 2 composite product provides an estimate of land surface reflectance from the NOAA-21 VIIRS sensor for three imagery bands (I1, I2, I3) at nominal 500 meter resolution (~463 meter). The 500 meter dataset is derived through resampling the native 375 meter VIIRS resolution in the L2 input product. The data are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. Each pixel represents the best possible Level 2G observation during an 8-day period, which is selected on the basis of high observation coverage, low sensor angle, the absence of clouds or cloud shadow, and aerosol loading. In addition to the three reflectance bands, this product includes a state quality assurance (QA) layer and a reflectance band quality layer. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS&sat=J2).
  <br>

  #### VJ209GA
  The Visible Infrared Imaging Radiometer Suite (VIIRS) daily surface reflectance (VJ209GA) Version 2 product provides an estimate of land surface reflectance from the NOAA-21 VIIRS sensor. Data are provided for three imagery bands (I1-I3) at nominal 500 meter resolution (~463 meter) and nine moderate resolution bands (M1-M5, M7, M8, M10, M11) at nominal 1 kilometer (~926 meter) resolution. The 500 meter and 1 kilometer datasets are derived through resampling the native 375 meter and 750 meter VIIRS resolutions, respectively, in the Level 2 input product. These bands are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. The inputs to the surface reflectance algorithm are top-of-atmosphere reflectance for the VIIRS visible bands, the VIIRS cloud mask and aerosol product, aerosol optical thickness and atmospheric data obtained from the NOAA National Centers for Environmental Prediction (NCEP) reanalysis system. Along with the twelve reflectance bands are reflectance band quality, sensor azimuth angle, solar azimuth angle, sensor zenith angle, solar zenith angle, and observations layers. The reflectance layers from the VJ209GA data product are used as input data for many of the VIIRS land products. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS&sat=J2).
  <br>

  #### VJ209CMG
  The Visible Infrared Imaging Radiometer Suite (VIIRS) daily surface reflectance Climate Modeling Grid (VJ209CMG) Version 2 product provides an estimate of land surface reflectance from the NOAA-21 VIIRS sensor. Data are provided for three imagery bands (I1-I3) and nine moderate resolution bands (M1-M5, M7, M8, M10, M11) at 0.05 degree (~5,600 meter) resolution. The data are corrected for atmospheric conditions such as the effects of molecular gases, including ozone and water vapor, and for the effects of atmospheric aerosols. This product uses a weighted average of the best quality observation and is formatted as a CMG for use in climate simulation models. This product includes the twelve reflectance bands, five moderate resolution brightness temperature bands (M12-M16) and information layers representing relative azimuth angle, sensor zenith angle, solar zenith angle, reflectance band quality, time of day, and number mapping. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS&sat=J2).
  <br>

