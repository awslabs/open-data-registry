  #### VJ146A1
  The NOAA-20 VIIRS Daily Gridded Day Night Band 15 arc-second Linear Lat Lon Grid Night product, short-name VJ146A1 is a daily, top-of-atmosphere, at-sensor nighttime radiance product. This product is available at 15 arc-second spatial resolution from January 2018 onward. The VJ146A1 product contains 26 Science Data Sets (SDS) that include sensor radiance, zenith and azimuth angles (at-sensor, solar, and lunar), cloud-mask flags, time, shortwave IR radiance, brightness temperatures, VIIRS quality flags, moon phase angle, and moon illumination fraction. It also provides Quality Flag (QF) information specific to the cloud-mask, VIIRS moderate-resolution bands M10, M11, M12, M13, M15, M16, and DNB. The current v2.0 collection contains several changes and differences relative to the previous v1.0 collection. These include radiance data format change from unsigned integer to floating-point, from exclusively for land surfaces coverage to both land and water surfaces, updated Mandatory_Quality_Flag layer, and others. Consult the v2.0-specific Black Marble User Guide for additional details at: https://landweb.modaps.eosdis.nasa.gov/data/userguide/BlackMarbleUserGuide_Collection2.0_20241203.pdf
  <br>

  #### VJ102DNB
  The VIIRS/JPSS1 Day/Night Band 6-Min L1B Swath 750 m, short-name VJ102DNB is platform-derived single NASA VIIRS panchromatic Day-Night band (DNB) calibrated radiance product. The DNB is one of the M-bands with an at-nadir spatial resolution of 750 meters (across the entire scan). The panchromatic DNB’s spectral wavelength ranges from 0.5 µm to 0.9 µm. It facilitates measuring night lights, reflected solar/lunar lights with a large dynamic range between a low of a quarter moon illumination to the brightest daylight. The spatial resolution of the instrument at viewing nadir is approximately 750 m for the DNB and the Moderate-resolution Bands and 375m for the Imagery bands. The DNB is aggregated to maintain nearly constant horizontal spatial resolution across the swath.
  <br>

  #### VJ103DNB
  The VIIRS/JPSS1 Day/Night Band Resolution Terrain Corrected Geolocation 6-Min L1 Swath 750m product contains the derived line-of-sight (LOS) vectors for the single panchromatic Day-Night band (DNB). The geolocation algorithm uses a number of inputs that include an Earth ellipsoid, geoid, and a digital terrain model along with the SNPP platform’s ephemeris and attitude data, and knowledge of the VIIRS sensor and satellite geometry. It provides geodetic coordinates (latitude and longitude), and related parameters for each VIIRS L1 pixel. The VJ103DNB product includes geodetic latitude, longitude, surface height above the geoid, solar zenith and azimuth angles, lunar zenith and azimuth angles, sensor zenith and azimuth angles, land/water mask, moon illumination fraction and phase angle, and quality flag for every pixel location.
  <br>

  #### VJ143DNBA3
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Day/Night Band (DNB) Bidirectional Reflectance Distribution Function (BRDF) and Albedo (VJ143DNBA3) Version 2 product provides albedo values at 1 kilometer (km) resolution for the bihemispherical reflectance white-sky albedos (WSA) and directional hemispherical reflectance black-sky albedos (BSA) at local solar noon. The VJ143DNBA3 product is produced daily using 16 days of VIIRS data and is weighted temporally to the ninth day, which is reflected in the file name. The VJ143 data products are designed to promote the continuity of NASA’s Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo data product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from [VJ143DNBA1](https://doi.org/10.5067/VIIRS/VJ143DNBA1.002) to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry ([VJ143DNBA4](https://doi.org/10.5067/VIIRS/VJ143DNBA4.002)), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) (VJ143DNBA3). Researchers can use the BRDF model parameters with a simple polynomial to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VJ143DNBA3 product provides BSA, WSA, and mandatory quality layers for the VIIRS DNB. A low-resolution image is also available showing retrievals of WSA for the shortwave broadband in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
  <br>

  #### VJ143DNBA1
  The NOAA-20 Visible Infrared Imaging Radiometer Suite (VIIRS) Day/Night Band (DNB) Bidirectional Reflectance Distribution Function (BRDF) and Albedo Model Parameters (VJ143DNBA1) Version 2 product provides BRDF/Albedo model parameters at 1 kilometer (km) resolution. The VJ143DNBA1 product is produced daily using 16 days of VIIRS data and is weighted temporally to the ninth day, which is reflected in the file name. The VJ143 data products are designed to promote the continuity of NASA’s Moderate Resolution Imaging Spectroradiometer (MODIS) BRDF/Albedo data product suite. The VJ143 algorithm uses the RossThick/Li-Sparse-Reciprocal (RTLSR) semi-empirical kernel-driven BRDF model, with the three kernel weights from VJ143DNBA1 to reconstruct surface anisotropic effects, correcting the directional reflectance to a common view geometry ([VJ143DNBA4](https://doi.org/10.5067/VIIRS/VJ143DNBA4.002)), while also computing integrated black-sky albedo (BSA) at local solar noon and white-sky albedo (WSA) ([VJ143DNBA3](https://doi.org/10.5067/VIIRS/VJ143DNBA3.002)). Researchers can use the BRDF model parameters with a simple polynomial to obtain black-sky albedo at any solar illumination angle. Likewise, both the BSA and WSA Science Dataset (SDS) layers can be used with a simple polynomial to manually estimate instantaneous actual albedo (blue-sky albedo). Additional details regarding the methodology are available in the Algorithm Theoretical Basis Document (ATBD). The VJ143DNBA1 data product provides two SDS layers for mandatory quality and model parameters representing fiso, fvol, and fgeo for the VIIRS DNB. A low-resolution browse is also available showing BRDF/Albedo parameters for the DNB as a red, green, blue (RGB) image in JPEG format. Known Issues: For complete information about known issues please refer to the [MODIS/VIIRS Land Quality Assessment website](https://landweb.modaps.eosdis.nasa.gov/knownissue?sensor=VIIRS).
