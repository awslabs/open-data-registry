Name: Bureau of meteorology Atmospheric Regional Projections for Australia (BARPA)
Description: BARPA is a high resolution climate simulations and projections over Australia and its surrounding regions developed by the Australian Bureau of Meteorology, downscaling global projections and global reanalysis (ERA5) using ACCESS as a limited-area dynamical coupled atmosphere-land model - Unified Model (UM) and JULES, spanning 1960 to 2100. <br/ ><br /> BARPA includes':' <br /> BARPA-R, a moderate-scale climate downscaling system based on a horizontal grid spacing of 0.154 degrees (around 17 km). The model is nested inside a global climate model simulation or a global reanalysis. The modelling domain is cropped over 88.0355 to 207.9275 degrees in longitude and -53.5755 to 13.632 degrees in latitude. The model is forced by the sub-daily atmospheric circulation and sea surface temperature from the global climate models (or global reanalyses). <br /> BARPA-C, a convective-scale climate downscaling system based on a horizontal grid spacing of 0.04 degrees (around 4.4 km). The model is nested inside the BARPA-R simulation. The modelling domain covers 107.02 to 160.90 degrees in longitude and -46.69 to -4.01 degrees in longitude.  <br /> BARPA-R Regional Projections, seven priority CMIP6 climate models were chosen for BARPA downscaling based on their performance, data availability, and ability to represent the range of projected Australian rainfall and temperature outcomes, including ACCESS-CM2, ACCESS-ESM1-5, NorESM2-MM, EC-Earth3, CESM2, CMCC-ESM2, MPI-ESM1-2-HR.<br /><br />Use for climate research and beyond, such as training of machine learning models for weather.
Documentation: "[BARPA](https://opus.nci.org.au/spaces/NDP/pages/264241161/BOM+BARPA+py18)"
