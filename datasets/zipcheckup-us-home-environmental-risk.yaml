Name: US Home Environmental Risk Compilation (ZipCheckup Open Data)
Description: |
  A normalized, address- and ZIP-level compilation of US public environmental
  health records: machine-parsed Consumer Confidence Reports (drinking water
  contaminant tables, including PFAS, for 9,700+ water systems, 2023-2024),
  lead service line records aggregated from 94 state and utility inventories
  (18.4M address-level records), a ZIP-level summary layer covering 41,000+
  ZIP codes across 17 environmental risk categories, and companion layers
  built from EPA SDWIS, UCMR5, FEMA NRI, USGS, CDC, and Census sources.
  All records are machine-readable, carry per-record source provenance
  (source document URL, legal authority, parse/refresh date), and are
  reproducible from cited public documents. CSV, JSON, and Parquet formats;
  Parquet mirrors of the large collections are provided for Amazon Athena
  and columnar workflows.
Documentation: https://github.com/artakulov/open-data-examples/blob/main/us-home-environmental-risk-compilation/DATA-DICTIONARY.md
Contact: contact@zipcheckup.com
ManagedBy: "[ZipCheckup](https://zipcheckup.com)"
UpdateFrequency: Core layers are updated daily via an automated pipeline; the parsed CCR corpus follows the annual Consumer Confidence Report cycle; the lead service line compilation is refreshed as source inventories update. Versioned archival snapshots are published to Zenodo.
Citation: Akulov, A. (2026). ZipCheckup U.S. Environmental Safety Data by ZIP Code [Data set]. Zenodo. https://doi.org/10.5281/zenodo.19427201
