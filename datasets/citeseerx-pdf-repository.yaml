Name: CiteSeerX PDF Repository
Description: The dataset contains a total of 12,479,682 PDFs ingested by CiteSeerX since its launch in 1997. The PDFs are collected through a multi-stage pipeline encompassing data acquisition, document classification, information extraction, and document ingestion. During data acquisition, PDF documents are either collected via a focused web crawler or downloaded in bulk from academic document repositories. A machine learning classifier is then applied to distinguish academic documents from non-academic ones. Metadata, plain text, and structured text , e.g. XMLs, of academic papers are subsequently extracted from the PDFs using machine learning models. Finally, duplicate PDFs are removed, files are renamed, and the documents are copied to a production repository. Certain PDFs may subsequently be removed from the repository upon receipt of DMCA takedown requests.
Documentation: https://github.com/SeerLabs/CiteSeerX/tree/master/doc
