Name: NASA ASTER GED Project
Description: |
  The AG1kmB Version 3 dataset was decommissioned as of December 14, 2016. Users are encouraged to use the ASTER Global Emissivity Dataset 1-kilometer [AG1km](https://doi.org/10.5067/Community/ASTER_GED/AG1km.003) dataset in HDF5. The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Emissivity Dataset (GED) land surface temperature and emissivity (LST&E) data products are generated using the ASTER Temperature Emissivity Separation (TES) algorithm with a Water Vapor Scaling (WVS) atmospheric correction method using Moderate Resolution Imaging Spectroradiometer (MODIS) MOD07 atmospheric profiles and the MODerate spectral resolution TRANsmittance (MODTRAN) 5.2 radiative transfer model. This dataset is computed from all clear-sky pixels of ASTER scenes acquired from 2000 through 2008. The HDF5 version of the data are available for distribution, please see [AG1km](https://doi.org/10.5067/Community/ASTER_GED/AG1km.003) for more information. The National Aeronautics and Space Administration’s (NASA) Jet Propulsion Laboratory (JPL), California Institute of Technology, developed the ASTER GED product. Knonw Issues * Known issues are provided in Section 4 of the User Guide.
  <br>

  #### AG100B
  The AG100B Version 3 dataset was decommissioned as of December 14, 2016. Users are encouraged to use the ASTER Global Emissivity Dataset 100-meter [AG100 Version 3](https://doi.org/10.5067/Community/ASTER_GED/AG100.003) dataset in HDF5. The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Emissivity Dataset (GED) land surface temperature and emissivity (LST&E) data products are generated using the ASTER Temperature Emissivity Separation (TES) algorithm with a Water Vapor Scaling (WVS) atmospheric correction method using Moderate Resolution Imaging Spectroradiometer (MODIS) MOD07 atmospheric profiles and the MODerate Spectral resolution TRANsmittance (MODTRAN) 5.2 radiative transfer model. This dataset is computed from all clear-sky pixels of ASTER scenes acquired from 2000 through 2008. The HDF5 version of the data are available for distribution, please see [AG100](https://doi.org/10.5067/Community/ASTER_GED/AG100.003) for more information. The National Aeronautics and Space Administration’s (NASA) Jet Propulsion Laboratory (JPL), California Institute of Technology, developed the ASTER GED product. Known Issues: Known Issues are provided in Section 4 of the ASTER GED User Guide.
  <br>

  #### AG1km
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Emissivity Dataset (GED) land surface temperature and emissivity (LST&E) data products are generated using the ASTER Temperature Emissivity Separation (TES) algorithm with a Water Vapor Scaling (WVS) atmospheric correction method using Moderate Resolution Imaging Spectroradiometer (MODIS) MOD07_L2 atmospheric profiles and the MODerate Spectral resolution TRANsmittance (MODTRAN 5.2) radiative transfer model. This dataset is computed from all clear-sky pixels of ASTER scenes acquired from 2000 through 2008. The National Aeronautics and Space Administration’s (NASA) Jet Propulsion Laboratory (JPL), California Institute of Technology, developed the ASTER GED product. Known Issues: Known issues are provided in Section 4 of the User Guide.
  <br>

  #### AG100
  Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Emissivity Dataset (GED) land surface temperature and emissivity (LST&E) data products are generated using the ASTER Temperature Emissivity Separation (TES) algorithm with a Water Vapor Scaling (WVS) atmospheric correction method using Moderate Resolution Imaging Spectroradiometer (MODIS) MOD07_L2 atmospheric profiles and the MODerate spectral resolution TRANsmittance (MODTRAN 5.2 radiative transfer model). This dataset is computed from all clear-sky pixels of ASTER scenes acquired from 2000 through 2008. AG100 data are available globally at spatial resolution of 100 meters. The National Aeronautics and Space Administration’s (NASA) Jet Propulsion Laboratory (JPL), California Institute of Technology, developed the ASTER GED product. Known Issues: Known issues are provided in Section 4, starting on page 8 of the User Guide.
  <br>

  #### AG5KMMOH
  The AG5KMMOH Version 4 dataset was decommissioned as of December 14, 2016. Users are encouraged to use [Version 4.1 ASTER Global Emissivity Dataset, Monthly, 0.05 degree, HDF5](https://doi.org/10.5067/Community/ASTER_GED/AG5KMMOH.041). The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Emissivity Dataset (GED) is a collection of monthly files for each year of global emissivity. The ASTER GED data products are generated for 2000 through 2015 using the ASTER Temperature Emissivity Separation (TES) algorithm atmospheric correction method. This algorithm method uses Moderate Resolution Imaging Spectroradiometer (MODIS) Atmospheric Profiles product [MOD07](https://doi.org/10.5067/MODIS/MOD07_L2.006) and the MODTRAN 5.2 radiative transfer model along with the snow cover data from the standard monthly MODIS/Terra snow cover monthly global 0.05 degree product [MOD10CM](https://doi.org/10.5067/MODIS/MOD10CM.006), and vegetation information from the MODIS monthly gridded Normalized Difference Vegetation Index (NDVI) product [MOD13C2](https://doi.org/10.5067/MODIS/MOD13C2.006). The National Aeronautics and Space Administration’s (NASA) Jet Propulsion Laboratory (JPL), California Institute of Technology, developed the ASTER GED product.
  <br>

  #### AG5KMMOH
  The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Emissivity Dataset (GED) is a collection of monthly files (see known issues for gaps) for each year of global emissivity. The ASTER GED data products are generated for 2000 through 2015 using the ASTER Temperature Emissivity Separation (TES) algorithm atmospheric correction method. This algorithm method uses Moderate Resolution Imaging Spectroradiometer (MODIS) Atmospheric Profiles product MOD07 and the MODerate spectral resolution TRANsmittance (MODTRAN) 5.2 radiative transfer model along with the snow cover data from the standard monthly MODIS/Terra snow cover monthly global 0.05 degree product [MOD10CM](https://doi.org/10.5067/MODIS/MOD10CM.006), and vegetation information from the MODIS monthly gridded NDVI product [MOD13C2](https://doi.org/10.5067/MODIS/MOD13C2.006). ASTER GED Monthly V041 data products are offered in Hierarchical Data Format 5 (HDF5). The National Aeronautics and Space Administration’s (NASA) Jet Propulsion Laboratory (JPL), California Institute of Technology, developed the ASTER GED product. Known Issues: Since ASTER GED Monthly V041 uses MOD10CM as an input, there will be some months that were unable to be created due to missing data. Please see the [MODIS/Terra Data Outages Webpage](https://landweb.modaps.eosdis.nasa.gov/knownissue?as=61) for more information.
  <br>

  #### AG5KMMON
  The AG5KMMOH Version 4 dataset was decommissioned as of December 14, 2016. Users are encouraged to use [Version 4.1 of ASTER Global Emissivity Dataset, Monthly, 0.05 degree, HDF5](https://doi.org/10.5067/Community/ASTER_GED/AG5KMMOH.041). The Terra Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) Global Emissivity Dataset (GED) is a collection of monthly files (see known issues for gaps) for each year of global emissivity. The ASTER GED data products are generated for 2000 through 2015 using the ASTER Temperature Emissivity Separation (TES) algorithm atmospheric correction method. This algorithm method uses Moderate Resolution Imaging Spectroradiometer (MODIS) Atmospheric Profiles product [MOD07](https://doi.org/10.5067/MODIS/MOD07_L2.006) and the MODerate spectral resolution TRANsmittance (MODTRAN) 5.2 radiative transfer model along with the snow cover data from the standard monthly MODIS/Terra snow cover monthly global 0.05 degree product [MOD10CM](https://doi.org/10.5067/MODIS/MOD10CM.006), and vegetation information from the MODIS monthly gridded Normalized Difference Vegetation Index (NDVI) product [MOD13C2](https://doi.org/10.5067/MODIS/MOD13C2.006). The National Aeronautics and Space Administration’s (NASA) Jet Propulsion Laboratory (JPL), California Institute of Technology, developed the ASTER GED product.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.lpdaac.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
