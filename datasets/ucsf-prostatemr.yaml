Name: UCSF Prostate MRI Dataset
Description: This dataset provides 973 prostate MRI exams performed between January 2016 and March 2019 for patients who underwent MRI/ultrasound fusion biopsy within one year at UCSF.
Documentation: https://github.com/LarsonLab/UCSF-ProstateMR
