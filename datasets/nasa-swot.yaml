Name: NASA swot Project
Description: |
  This dataset provides a simulated water surface elevation product that resembles the Ka-band Interferometer (KaRIn) measurements by the Surface Water and Ocean Topography (SWOT) mission. SWOT will provide a global coverage but this simulated subset focuses on the North America continent. The simulated SWOT KaRIN swaths span 128 km in the cross-swath direction with a 20-km nadir gap. This product is complementary to the L2_HR_PIXC_V1 product. It provides a less noisy, height-constrained geolocation (latitude, longitude, and height) of the L2_HR_PIXC_V1 pixels. In addition, this product provides an identifier associated with each pixel. The identifier contains the information of the river and/or lake features pulled from the Prior River Database (PRD) or in the Prior Lake Database (PLD). Note that this is a simulated SWOT product and not suited for any scientific exploration.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://archive.podaac.earthdata.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
