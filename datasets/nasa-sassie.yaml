  This dataset provides daily-averaged ocean velocity from the SASSIE ECCO Version 1 Release 1 (V1R1) ocean and sea-ice state estimate. ECCO (Estimating the Circulation and Climate of the Ocean) is a 4D ocean circulation model combining observations with a general circulation model (GCM) to estimate the complete time-evolving state of the global ocean. In this project, it was run over the Arctic polar region in support of the Salinity and Stratification at the Sea Ice Edge (SASSIE) field experiment - a NASA experiment focused on salinity anomalies in the upper ocean generated by melting sea ice. The SASSIE ECCO simulation was produced by downscaling the global ECCO state estimate from 1/3 to 1/12 degree grid cells, where the global solution provided initial and boundary conditions and atmospheric forcing. Model ocean and sea-ice state estimates are dynamically and kinematically-consistent reconstructions of the three-dimensional time-evolving ocean, sea-ice, and surface atmospheric states. The output fields for this dataset cover the period 2014-01-15T12:00:00 to 2021-02-07T12:00:00 and are consolidated onto a single curvilinear grid face focusing on the Arctic domain, using the 5 faces of the lat-lon-cap 1080 (llc1080) native grid from the original simulation. Data are provided at 90 depth levels from 0.5 meters to 6760 meters. Daily files are available in netCDF-4. <br><br> This dataset is one of 22 produced by SASSIE ECCO - the full list can be found in the user guide. To cite all 22 datasets with a single DOI, please cite the user guide (citation details and DOI can be found within the user guide).
  <br>

