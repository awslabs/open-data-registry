Name: NASA SMAPVEX16 Manitoba Project
Description: |
  This data set contains in situ measurements of soil moisture and bulk density collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_CRS
  This data set contains CropScan observations (solar irradiance and incidence angle) collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_V
  This data set contains in situ measurements of crop density, height, and biomass collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_LC
  This data set contains land cover classification data collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_LAI
  This data set contains in situ Leaf Area Index (LAI) data collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_MET
  This data set contains meteorological data collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_PSM
  This data set contains in situ measurements of soil moisture, soil and vegetation temperature, and real dielectric constant collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_TB
  This data set contains brightness temperatures obtained by in situ L-band radiometers. The data were collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_ST
  This data set contains soil texture data collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_SDB
  This data set contains detailed soil survey data used for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign. Data are provided in a relational geodatabase.
  <br>

  #### SV16M_SSM
  This data set contains soil moisture, temperature, and precipitation data collected at temporary soil stations and the Real-time In-Situ Soil Monitoring for Agriculture (RISMA) station network for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### SV16M_SR
  This data set contains surface soil roughness data collected for the Soil Moisture Active Passive Validation Experiment 2016 Manitoba (SMAPVEX16 Manitoba) campaign.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
