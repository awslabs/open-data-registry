Name: Downscaled CMIP6 projections over CONUS at 30-arcsecond horizontal resolution
Description: The NEX-DCP30-CMIP6 dataset contains daily, monthly, and annual downscaledCMIP6 projections over CONUS at 30-arcsecond hoirzontal resolution for maximum temperature, minimum temperature, precipitation, and vapor pressure.  
