Name: NASA amsr-2 Project
Description: |
  This AMSR Unified global ocean data set reports integrated water vapor and cloud liquid water content in the atmospheric column, plus 10-meter sea surface wind speeds. The data are derived from AMSR-E and AMSR2 brightness temperature observations that have been resampled by the Japan Aerospace Exploration Agency (JAXA) to facilitate an intercalibrated (i.e., “unified”) AMSR-E/AMSR2 data record. Ancillary files, including product history, quality assessment (QA), and file-specific metadata are also available.
  <br>

  #### AU_Rain
  This AMSR-E/AMSR2 Unified Level-2B data set reports instantaneous surface precipitation rates and types (over land and ocean) and precipitation profiles (over ocean). The data are derived by applying the AMSR-E/AMSR2 unified algorithm to L1R data obtained by the Advanced Microwave Scanning Radiometer (AMSR) for EOS (AMSR-E) and AMSR2 instruments.
  <br>

  #### AU_Land
  This Level-2B AMSR Unified product contains surface soil moisture at 25 km resolution, estimated from AMSR-E and AMSR2 brightness temperature observations using two different approaches: the Normalized Polarization Difference (NPD) algorithm and the Single Channel Algorithm (SCA). Data are provided in the NSIDC EASE-Grid Global projection. Soil moisture estimates are derived from AMSR-E and AMSR2 data which have been spatially resampled by the Japan Aerospace Exploration Agency (JAXA) to intercalibrate, or “unify,” the two sensors.
  <br>

  #### AU_SI12
  This data set reports average daily horizontally and vertically polarized brightness temperatures; sea ice concentrations; and snow depths over sea ice on 12.5 km resolution north and south polar stereographic grids. Ungridded sea ice motion data are also available for the Arctic. The data are derived from observations acquired by the Advanced Microwave Scanning Radiometer (AMSR) for EOS (AMSR-E) and AMSR2 instruments that have been spatially resampled by the Japan Aerospace Exploration Agency (JAXA) to unify the AMSR-E and AMSR2 missions. Brightness temperatures are available at 18.7 GHz, 23.8 GHz, 36.5 GHz and 89.0 GHz for ascending and descending orbits, and as a single daily average. Sea ice concentrations are generated with the Enhanced NASA Team (NT2) algorithm; a separate variable reports the daily sea ice concentration difference between the legacy AMSR Basic Bootstrap Algorithm (ABA) and the NT2.
  <br>

  #### AU_SI25
  This data set reports average daily horizontally and vertically polarized brightness temperatures and sea ice concentrations on 25 km resolution north and south polar stereographic grids. The data are derived from observations acquired by the Advanced Microwave Scanning Radiometer (AMSR) for EOS (AMSR-E) and AMSR2 instruments that have been spatially resampled by the Japan Aerospace Exploration Agency (JAXA) to unify the AMSR-E and AMSR2 missions. Brightness temperatures are available at 6.9 GHz, 10.7 GHz, 18.7 GHz, 23.8 GHz, 36.5 GHz and 89.0 GHz for ascending and descending orbits, and as a single daily average. Sea ice concentrations are generated with the Enhanced NASA Team (NT2) algorithm; a separate variable reports the daily sea ice concentration difference between the legacy AMSR Basic Bootstrap Algorithm (ABA) and the NT2.
  <br>

  #### AU_SI6
  This data set reports 6.25 km resolution, horizontally and vertically polarized average daily 89.0 GHz brightness temperatures for the Advanced Microwave Scanning Radiometer (AMSR) for EOS (AMSR-E) and AMSR2 instruments. The data are provided on north and south polar stereographic grids. The brightness temperatures are derived from Level 1R data that has been spatially resampled by the Japan Aerospace Exploration Agency (JAXA) to unify AMSR-E and AMSR2 observations.
  <br>

  #### AU_5DSno
  This AMSR-E/AMSR2 Unified Level-3 data set provides estimates of the 5-day snow water equivalent (SWE) at 25 km resolution, derived from brightness temperature measurements acquired by the Advanced Microwave Scanning Radiometer for EOS (AMSR-E) and AMSR2 instruments. SWE data are provided on the azimuthal 25 km Equal-Area Scalable Earth Grid (EASE-Grid) for both the Northern and Southern Hemisphere. The data were generated from input brightness temperatures which were resampled by the Japan Aerospace Exploration Agency (JAXA) to intercalibrate, or unify, the AMSR-E and AMSR2 missions.
  <br>

  #### AU_DySno
  This AMSR-E/AMSR2 Unified Level-3 data set provides daily estimates of snow water equivalent (SWE) at 25 km resolution, derived from brightness temperature measurements acquired by the Advanced Microwave Scanning Radiometer (AMSR) for EOS (AMSR-E) and AMSR2 instruments. SWE data are provided on the azimuthal 25 km Equal-Area Scalable Earth Grid (EASE-Grid) for both the Northern and Southern Hemisphere. The data were generated from input brightness temperatures which were resampled by the Japan Aerospace Exploration Agency (JAXA) to intercalibrate, or unify, the AMSR-E and AMSR2 missions.
  <br>

  #### AU_DyOcn
  The AMSR-E/AMSR2 Unified L3 Global Daily Ascending/Descending .25 x .25 deg Ocean Grids data set (AU_DyOcn) reports daily estimates of water vapor, cloud liquid water content, and surface wind speed over the ocean on a global 0.25° × 0.25° resolution grid. The data are derived from the AMSR-E/AMSR2 Unified L2B Global Swath Ocean Products, Version 1 data set. Sea surface temperatures from the NOAA 1/4° Daily Optimum Interpolation Sea Surface Temperature (OISST) product are also included.
  <br>

  #### AU_MoSno
  This AMSR-E/AMSR2 Unified Level-3 (L3) data set provides monthly estimates of snow water equivalent (SWE) derived from brightness temperature measurements acquired by the Advanced Microwave Scanning Radiometer for EOS (AMSR-E) and AMSR2 instruments. SWE data are provided on the azimuthal 25 km Equal-Area Scalable Earth Grid (EASE-Grid) for both the Northern and Southern Hemisphere. The data were generated from input brightness temperatures which were resampled by the Japan Aerospace Exploration Agency (JAXA) to intercalibrate, or unify, the AMSR-E and AMSR2 missions.
  <br>

  #### AU_MoOcn
  The AMSR-E/AMSR2 Unified L3 Global Monthly Ascending/Descending .25x.25 deg Ocean Grids data set is a gridded product that reports monthly estimates of water vapor, cloud liquid water content, and surface wind speed over the ocean. The data are derived from resampled Near Real-Time (NRT) Level-1R data provided by Japan Aerospace Exploration Agency (JAXA). Sea surface temperatures from the NOAA 1/4° Daily Optimum Interpolation Sea Surface Temperature (OISST) product are also included.
  <br>

  #### AU_WkOcn
  The AMSR-E/AMSR2 Unified L3 Global Weekly Ascending/Descending .25 x .25 deg Ocean Grids data set (AU_WkOcn) reports weekly estimates of water vapor, cloud liquid water content, and surface wind speed over the ocean on a global 0.25° × 0.25° resolution grid. The data are derived from the AMSR-E/AMSR2 Unified L2B Global Swath Ocean Products, Version 1 data set. Sea surface temperatures from the NOAA 1/4° Daily Optimum Interpolation Sea Surface Temperature (OISST) product are also included.
  <br>

  #### NSIDC-0477
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, contains a global record of the daily freeze/thaw status of the landscape. The record is derived from radiometric brightness temperatures acquired between 1979 and 2021 by four satellite-based, passive microwave sensors: the Scanning Multichannel Microwave Radiometer (SMMR), the Special Sensor Microwave/Imager (SSM/I), the Special Sensor Microwave Imager/Sounder (SSMIS), and the Advanced Microwave Scanning Radiometer 2 (AMSR2).
  <br>

  #### NISE_A2
  The Near-real-time Ice and Snow Extent (NISE) Advanced Microwave Scanning Radiometer 2 (AMSR2) data set provides daily, global maps of sea ice concentrations and snow extent. The data provides a best estimate of current ice and snow conditions based on information and algorithms available at the time the data are acquired. Near-real-time products are not intended for operational use in assessing sea ice conditions for navigation.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
