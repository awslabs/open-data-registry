License: There are no restrictions on the use of this data. Attribution of original source is requested.
Resources:
  - Description: Core data as defined in the [WMO Unified Data Policy (Resolution 1 (Cg-19))](https://library.wmo.int/idurl/4/58009). Data covers a global extent. Data is provided in WMO approved formats - GRIB, BUFR and NetCDF. Users should subscribe to receive notification messages about newly available data. Please refer to the documentation.
    ARN: arn:aws:s3:::global-cache-of-japan
    Region: ap-northeast-1
    Type: S3 Bucket
    Explore: 
    - '[Browse Bucket](https://global-cache-of-japan.s3.ap-northeast-1.amazonaws.com/index.html)'
  - Description: Notifications for new wis2globalcache data
    ARN: arn:aws:sns:ap-northeast-1:477591777891:wis2globalcachejma-object_created
    Region: ap-northeast-1
    Type: SNS Topic
