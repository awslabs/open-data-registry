Name: Global Cache of Japan
Description: >-
  The Global Cache of Japan is a WIS2 Global Cache service operated by the Japan Meteorological Agency (JMA). [WMO Information System 2.0 (WIS2)](https://community.wmo.int/site/knowledge-hub/programmes-and-initiatives/wmo-information-system-wis/wis2-overview) is the WMO framework for sharing Earth system data using open standards, Web technologies, and publish-subscribe notifications. The standard WIS2 workflow is to discover datasets, subscribe to notifications from a Global Broker, and download data using links in WIS2 notification messages. See [WIS 2.0 Global Services](https://community.wmo.int/site/knowledge-hub/programmes-and-initiatives/wmo-information-system-wis/wis-20-global-services) and [Operational WIS2 Nodes](https://community.wmo.int/site/knowledge-hub/programmes-and-initiatives/wmo-information-system-wis/operational-wis2-nodes). The AWS S3 access shown below is provided through AWS Open Data / ASDI for users who want to access public objects directly on AWS. It should be used alongside the standard WIS2 notification-based workflow. Data is retained for 24 hours. There are no restrictions on use; attribution of the original source is requested. 
Documentation: https://www.wis-jma.go.jp/cms/index.html
Contact: wis-jma@met.kishou.go.jp
ManagedBy: "[Japan Meteorological Agency](https://www.wis-jma.go.jp/cms/index.html)"
UpdateFrequency: Data is updated with new information every 24 hours or less.
