Name: Hawai'i Downscaled Climate Projections CMIP6
Description: The NEX-HIDCP-CMIP6 dataset contains high-resolution daily downscaled CMIP6 projections over Hawai'i for maximum temperature, minimum temperature, and precipitation. This dataset compliments the NEX-DCP30-CMIP6 collection of downscaled projections over CONUS.
Documentation: "https://doi.org/10.25966/nex-hidcp-cmip6"
