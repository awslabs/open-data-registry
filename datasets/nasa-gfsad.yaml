Name: NASA GFSAD Project
Description: |
  The Landsat-Derived Global Irrigated-Cropland Product Level 1 2020 (LGRIP30_L1_IRRI) Version 2 data provides high-resolution, 30 meter (m) cropland data to assist and address food and water security issues of the twenty-first century. As an extension of the Global Food Security-support Analysis Data ([GFSAD](https://www.usgs.gov/centers/western-geographic-science-center/science/global-food-security-support-analysis-data-30-m)) project, LGRIP_L1_IRRI V2 maps agricultural lands by dividing them into 32 irrigated cropland types and calculates applicable cropland areas across the globe. LGRIP data are produced using Landsat 8 time-series satellite sensor data for the 2019 through 2021 time period to create a nominal 2020 product. Each LGRIP30 L1 V2 Irrigated 30 m resolution GeoTIFF file contains a layer that identifies areas of irrigated cropland (cropland that had at least one irrigation during the crop growing period) divided into 32 types, non-irrigated land (rainfed cropland and areas not classified as cropland), and water bodies over a 10° by 10° area, as well as an accuracy assessment of the product. A low-resolution browse image is also included. Currently, LGRIP30 V2 products contain data only for the conterminous United States (CONUS). LGRIP30 V2 data covering the rest of the globe will be added at a later date.
  <br>

  #### LGRIP30_L2_IRRI
  The Landsat-Derived Global Irrigated-Cropland Product Level 2 2020 (LGRIP30_L2_IRRI) Version 2 data provides high-resolution, 30 meter (m) cropland data to assist and address food and water security issues of the twenty-first century. As an extension of the Global Food Security-support Analysis Data ([GFSAD](https://www.usgs.gov/centers/western-geographic-science-center/science/global-food-security-support-analysis-data-30-m)) project, LGRIP_L2_IRRI V2 maps agricultural lands by dividing them into irrigated single crop, double crop, and continuous croplands, and calculates applicable cropland areas across the globe. LGRIP data are produced using Landsat 8 time-series satellite sensor data for the 2019 through 2021 time period to create a nominal 2020 product. Each LGRIP L2 Irrigated 30 m resolution GeoTIFF file contains a layer that identifies areas of irrigated cropland (cropland that had at least one irrigation during the crop growing period) divided into single, double, and continuous crop classifications, non-irrigated land (rainfed cropland and areas not classified as cropland), and water bodies over a 10° by 10° area, as well as an accuracy assessment of the product. A low-resolution browse image is also included. Currently, LGRIP30 V2 products only contain data for the conterminous United States (CONUS). LGRIP30 V2 data covering the rest of the globe will be added at a later date.
  <br>

  #### LGRIP30_L3
  The Landsat-derived Global Rainfed and Irrigated-Cropland Product Level 3 2020 (LGRIP30_L3) Version 2 data provides high-resolution, 30 meter (m) cropland data to assist and address food and water security issues of the twenty-first century. As an extension of the Global Food Security-support Analysis Data ([GFSAD](https://www.usgs.gov/centers/western-geographic-science-center/science/global-food-security-support-analysis-data-30-m)) project, LGRIP L3 V2 maps agricultural croplands by dividing them into irrigated and rainfed croplands, and calculates irrigated and rainfed areas across the globe. LGRIP data are produced using Landsat 8 time-series satellite sensor data for the 2019 through 2021 time period to create a nominal 2020 product. Each LGRIP30 L3 V2 30 m resolution GeoTIFF file contains a layer that identifies areas of rainfed cropland (cropland areas that are purely dependent on direct precipitation without any artificial watering), irrigated cropland (cropland that had at least one irrigation during the crop growing period), non-cropland, and water bodies over a 10° by 10° area, as well as an accuracy assessment of the product. A low-resolution browse image is also included. Currently, LGRIP30 V2 products only contain data for the conterminous United States (CONUS). LGRIP30 V2 data covering the rest of the globe will be added at a later date.
  <br>

  #### LGRIP30_L1_RAIN
  The Landsat-Derived Global Rainfed-Cropland Product Level 1 2020 (LGRIP30_L1_RAIN) Version 2 data provides high-resolution, 30 meter (m) cropland data to assist and address food and water security issues of the twenty-first century. As an extension of the Global Food Security-support Analysis Data ([GFSAD](https://www.usgs.gov/centers/western-geographic-science-center/science/global-food-security-support-analysis-data-30-m)) project, LGRIP30_L1_RAIN V2 maps agricultural lands by dividing them into 24 types of rainfed croplands and calculates applicable cropland areas across the globe. LGRIP data are produced using Landsat 8 time-series satellite sensor data for the 2019 through 2021 time period to create a nominal 2020 product. Each LGRIP L1 Rainfed 30 m resolution GeoTIFF file contains a layer that identifies areas of rainfed cropland (cropland areas that are purely dependent on direct precipitation without any artificial watering) divided into 24 types, non-rainfed land (irrigated croplands and areas not classified as cropland), and water bodies over a 10° by 10° area, as well as an accuracy assessment of the product. A low-resolution browse image is also included. Currently, LGRIP30 V2 products only contain data for the conterminous United States (CONUS). LGRIP30 V2 data covering the rest of the globe will be added at a later date.
  <br>

  #### LGRIP30_L2_RAIN
  The Landsat-Derived Global Rainfed-Cropland Product Level 2 2020 (LGRIP30_L2_RAIN) Version 2 data provides high-resolution, 30 meter (m) cropland data to assist and address food and water security issues of the twenty-first century. As an extension of the Global Food Security-support Analysis Data ([GFSAD](https://www.usgs.gov/centers/western-geographic-science-center/science/global-food-security-support-analysis-data-30-m)) project, LGRIP_L2_RAIN V2 maps agricultural lands by dividing them into rainfed single croplands and rainfed single croplands mixed with natural vegetation, and calculates applicable cropland areas across the globe. LGRIP data are produced using Landsat 8 time-series satellite sensor data for the 2019 through 2021 time period to create a nominal 2020 product. Each LGRIP L2 Rainfed 30 m resolution GeoTIFF file contains a layer that identifies areas of rainfed cropland (cropland areas that are purely dependent on direct precipitation without any artificial watering) divided into single crop and single crop that is mixed with natural vegetation, non-rainfed land (irrigated croplands and areas not classified as cropland), and water bodies over a 10° by 10° area, as well as an accuracy assessment of the product. A low-resolution browse image is also included. Currently, LGRIP30 V2 products only contain data for the conterminous United States (CONUS). LGRIP30 V2 data covering the rest of the globe will be added at a later date.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.lpdaac.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
