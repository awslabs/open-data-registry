Name: NOAA National Digital Forecast Database (NDFD)
Description: |
  <br />
  <br />
  The National Digital Forecast Database (NDFD) is a suite of gridded forecasts of sensible weather elements (e.g., cloud cover, maximum temperature).  Forecasts prepared by NWS field offices working in collaboration with the National Centers for Environmental Prediction (NCEP) are combined in the NDFD to create a seamless mosaic of digital forecasts from which operational NWS products are generated. The most recent data is under the opnl and expr prefixes. A copy is also placed under the wmo prefix. The wmo prefix is structured like so: wmo/&lt;parameter&gt;/&lt;year&gt;/&lt;month&gt;/&lt;day&gt;/&lt;wmo-file-name&gt; The wmo filename codes can be deciphered using the spreadsheet in the root of the bucket.
Documentation: |
  Visit https://vlab.noaa.gov/web/mdl/ndfd for NDFD Product information, instructions, and lookup tables.
   <br />
   <br />
   Please note, when accessing the data, some decoders may incorrectly handle the NDFD grid’s scanning pattern. To ensure compatibility, we recommend using degrib or wgrib2 for Linux applications. For users working in Python, "[grib2io](https://github.com/NOAA-MDL/grib2io)" is the recommended library for opening and processing these files correctly.
Contact:  |
  For any questions regarding data delivery or any general questions regarding the NOAA Open Data Dissemination (NODD) Program, email the NODD Team at nodd@noaa.gov.
  <br /> We also seek to identify case studies on how NOAA data is being used and will be featuring those stories in joint publications and in upcoming events. If you are interested in seeing your story highlighted, please share it with the NODD team by emailing nodd@noaa.gov
ManagedBy: "[NOAA](http://www.noaa.gov/)"
UpdateFrequency: As often as once every half hour (varies by forecast element, forecast projection, and domain)
