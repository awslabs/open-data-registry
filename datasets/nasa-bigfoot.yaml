Name: NASA BigFoot Project
Description: |
  The BigFoot project gathered field data for selected EOS Land Validation Sites in North America from 1999 to 2003. Data collected and derived for varying intervals at the BigFoot sites and archived with this data set include FPAR, nitrogen content, allometry equations, root biomass, LAI, tree biomass, soil respiration, NPP, landcover images, and vegetation inventories.Each site is representative of one or two distinct biomes, including the Arctic tundra; boreal evergreen needleleaf forest; temperate cropland, grassland, and deciduous broadleaf forest; desert grassland and shrubland. The project collected multi-year, in situ measurements of ecosystem structure and functional characteristics related to the terrestrial carbon cycle at the sites listed in Table 1. Companion files include documentation of measurement data, site and plot locations (Figure 2), and plot photographs for the SEVI and TUND sites (Figure 3).BigFoot Project Background: Reflectance data from MODIS, the Moderate Resolution Imaging Spectrometer onboard NASA's Earth Observing System (EOS) satellites Terra and Aqua ( http://landval.gsfc.nasa.gov/MODIS/index.php ), was used to produce several science products including land cover, leaf area index (LAI), gross primary production (GPP), and net primary production (NPP). The overall goal of the BigFoot Project was to provide validation of these products. To do this, BigFoot combined ground measurements, additional high-resolution remote-sensing data, and ecosystem process models at six flux tower sites representing different biomes to evaluate the effects of the spatial and temporal patterns of ecosystem characteristics on MODIS products. BigFoot characterized up to a 7 x 7 km area (49 1-km MODIS pixels) surrounding the CO2 flux towers located at six of the nine BigFoot sites. The sampling design allowed the Project to examine scales and spatial patterns of these properties, the inter-annual variability and validity of MODIS products, and provided for a field-based ecological characterization of the flux tower footprint. BigFoot was funded by NASA's Terrestrial Ecology Program.
  <br>

  #### GPP_surfaces_749
  The BigFoot project gathered Gross Primary Production (GPP) data for nine EOS Land Validation Sites located from Alaska to Brazil from 2000 to 2004. Each site is representative of one or two distinct biomes, including the Arctic tundra; boreal evergreen needleleaf forest; temperate cropland, grassland, evergreen needleleaf forest, and deciduous broadleaf forest; desert grassland and shrubland; and tropical evergreen broadleaf forest. At this time we are archiving Northern Old Black Spruce (NOBS - BOREAS NSA, Canada) and Harvard Forest LTER (HARV - Massachusetts, USA) data collected in 2001.The GPP surfaces were produced by a spatial version of an ecosystem process model named, Biome-BGC. Inputs to the model included Landsat ETM+ derived Land Cover and LAI, tower derived meteorological variables, and a set of site level ecophysical parameters. The model was calibrated using field measured NPP and validated by tower derived estimates of GPP. For an in depth discussion of methods used to produce these surfaces, please see Turner et al. (2003).Each BigFoot GPP product covers a 7 x 7 km extent and consists of the GPP surface in BIP format (280 rows by 280 columns by 365 bands at 25 meter resolution) and an accompanying text file which provides metadata specific to the image (such as projection, data type, etc). Additional information on GPP surface development can be found on the BigFoot website at http://www.fsl.orst.edu/larse/bigfoot/ovr_mthd.html.BigFoot Project Background: Reflectance data from MODIS, the Moderate Resolution Imaging Spectrometer onboard NASA's Earth Observing System (EOS) satellite Terra (http://landval.gsfc.nasa.gov/MODIS/index.php), is used to produce several science products including land cover, leaf area index (LAI), gross primary production (GPP) and net primary production (NPP). The overall goal of the BigFoot Project was to provide validation of these products. To do this, BigFoot combined ground measurements, additional high resolution remote sensing data, and ecosystem process models at nine flux tower sites representing different biomes to evaluate the effects of the spatial and temporal patterns of ecosystem characteristics on MODIS products. BigFoot characterized up to a 7 x 7 km area (49 MODIS pixels) surrounding the CO2 flux towers located at each of the nine sites. We collected multi-year, in situ measurements of ecosystem structure and functional characteristics related to the terrestrial carbon cycle. Our sampling design allowed us to examine scales and spatial pattern of these properties, the inter-annual variability and validity of MODIS products, and provided for a field-based ecological characterization of the flux tower footprint. BigFoot was funded by NASA's Terrestrial Ecology Program.For more details on the BigFoot Project, please visit the website: http://www.fsl.orst.edu/larse/bigfoot/index.html.
  <br>

  #### Land_Cover_surfaces_748
  The BigFoot project gathered data for nine EOS Land Validation Sites located from Alaska to Brazil from 2000 to 2003. Each site is representative of one or two distinct biomes, including the Arctic tundra; boreal evergreen needleleaf forest; temperate cropland, grassland, evergreen needleleaf forest, and deciduous broadleaf forest; desert grassland and shrubland; and tropical evergreen broadleaf forest. These surfaces were produced from Landsat ETM+ imagery to explicitly characterize the land cover at the BigFoot Sites to provide validation of the MODIS land cover product. The land cover scheme is consistent with the categories defined by the MOD12 IGBP (http://geography.bu.edu/landcover/userguidelc/index.html) strategy. Each BigFoot land cover product covers approximately a 7 x 7 km extent and consists of the land cover surface image in standard geotiff format, an accompanying text file which provides metadata specific to the image (such as projection, data type, class names, etc), and associated auxiliary and world files. For an in depth discussion of methods used to produce these surfaces, please see references.Additional information on land cover surface development can be found on the BigFoot website at http://www.fsl.orst.edu/larse/bigfoot/ovr_mthd.html.BigFoot Project Background:Reflectance data from MODIS, the Moderate Resolution Imaging Spectrometer onboard NASA's Earth Observing System (EOS) satellite Terra (http://landval.gsfc.nasa.gov/MODIS/index.php), is used to produce several science products including land cover, leaf area index (LAI) and net primary production (NPP). The overall goal of the BigFoot Project was to provide validation of these products. To do this, BigFoot combined ground measurements, additional high resolution remote sensing data, and ecosystem process models at nine flux tower sites representing different biomes to evaluate the effects of the spatial and temporal patterns of ecosystem characteristics on MODIS products. BigFoot characterized up to a 7 x 7 km area (49 MODIS pixels) surrounding the CO2 flux towers located at each of the nine sites. We collected multi-year, in situ measurements of ecosystem structure and functional characteristics related to the terrestrial carbon cycle. Our sampling design allowed us to examine scales and spatial pattern of these properties, the inter-annual variability and validity of MODIS products, and provided for a field-based ecological characterization of the flux tower footprint. BigFoot was funded by NASA's Terrestrial Ecology Program.
  <br>

  #### LAI_surfaces_747
  The BigFoot project gathered leaf area index (LAI) data for nine EOS Land Validation Sites located from Alaska to Brazil from 2000 to 2003. Each site is representative of one or two distinct biomes, including the Arctic tundra; boreal evergreen needleleaf forest; temperate cropland, grassland, evergreen needleleaf forest, and deciduous broadleaf forest; desert grassland and shrubland; and tropical evergreen broadleaf forest. LAI was measured at plots within each site for at least two years using standard direct and optical methods at each site. Direct measurement approaches included periodic area harvest for non-forest sites and application of allometric equations to tree diameter data for forest sites. LAI was also estimated indirectly using the Li-Cor LAI-2000 Plant Canopy Analyzers (Gower et al. 1999). LAI was measured three times each year at the forest sites and four to six times at other sites depending upon the phenology of LAI development for a given ecosystem. To develop LAI surfaces at any given site, the Landsat ETM+ image closest in date to maximum LAI was chosen as a reference and images from other dates radiometrically normalized to it. Each LAI surface has a grain of 25 meters and covers a 7 x 7 km extent. The data set consists of the LAI surface images in standard geotiff format, an accompanying text file which provides metadata specific to the image (such as projection, data type, class names, etc), and associated auxiliary and world files. Additional information on LAI measurements and surface development can be found on the BigFoot website at http://www.fsl.orst.edu/larse/bigfoot/ovr_mthd.html. BigFoot Project Background: Reflectance data from MODIS, the Moderate Resolution Imaging Spectrometer onboard NASA's Earth Observing System (EOS) satellite Terra (http://landval.gsfc.nasa.gov/MODIS/index.php), is used to produce several science products including land cover, leaf area index (LAI) and net primary production (NPP). The overall goal of the BigFoot Project was to provide validation of these products. To do this, BigFoot combined ground measurements, additional high resolution remote sensing data, and ecosystem process models at nine flux tower sites representing different biomes to evaluate the effects of the spatial and temporal patterns of ecosystem characteristics on MODIS products. BigFoot characterized up to a 7 x 7 km area (49 MODIS pixels) surrounding the CO2 flux towers located at each of the nine sites. We collected multi-year, in situ measurements of ecosystem structure and functional characteristics related to the terrestrial carbon cycle. Our sampling design allowed us to examine scales and spatial pattern of these properties, the inter-annual variability and validity of MODIS products, and provided for a field-based ecological characterization of the flux tower footprint. BigFoot was funded by NASA's Terrestrial Ecology Program.
  <br>

  #### Meteorological_1065
  The BigFoot Project has compiled daily meteorological measurements for nine EOS Land Validation Sites located from Alaska to Brazil from 1991 to 2004. Each site is representative of one or two distinct biomes, including the Arctic tundra; boreal evergreen needleleaf forest; temperate cropland, grassland, evergreen needleleaf forest, and deciduous broadleaf forest; desert grassland and shrubland; and tropical evergreen broadleaf forest. The BigFoot Project needed meteorological data to run the ecosystem process models used for scaling GPP and NPP products, for monitoring interannual variability, and for model testing. Meteorological data were obtained from various agencies collecting data in the vicinity of the BigFoot sites and for more recent years, collected on co-located CO2 flux measurement towers. A comparable set of original measurements from all sites were aggregated to a common daily time step for use in the BIOME-BGC model.
  <br>

  #### NPP_surfaces_750
  The BigFoot project gathered Net Primary Production (NPP) data for nine EOS Land Validation Sites located from Alaska to Brazil from 2000 to 2004. Each site is representative of one or two distinct biomes, including the Arctic tundra; boreal evergreen needleleaf forest; temperate cropland, grassland, evergreen needleleaf forest, and deciduous broadleaf forest; desert grassland and shrubland; and tropical evergreen broadleaf forest. At this time we are archiving Northern Old Black Spruce (NOBS - BOREAS NSA, Canada) and Harvard Forest LTER (HARV - Massachusetts, USA) data collected in 2001.The NPP surfaces were produced by a spatial version of an ecosystem process model named, Biome-BGC. Inputs to the model included Landsat ETM+ derived Land Cover and LAI, tower derived meteorological variables, and a set of site-level ecophysical parameters. The model was calibrated using field measured NPP and validated by tower derived estimates of GPP. Each BigFoot NPP product covers a 7 x 7 km extent and consists of the NPP surface in ASCII Raster (BIL - Band Interleaved by Line) format (280 rows by 280 columns at 25 meter resolution) and an accompanying text file which provides metadata specific to the image (such as projection, data type, etc).Additional information on NPP surface development can be found on the BigFoot website at http://www.fsl.orst.edu/larse/bigfoot/ovr_mthd.html.BigFoot Project Background: Reflectance data from MODIS, the Moderate Resolution Imaging Spectrometer onboard NASA's Earth Observing System (EOS) satellite Terra (http://landval.gsfc.nasa.gov/MODIS/index.php), is used to produce several science products including land cover, leaf area index (LAI), gross primary production (GPP) and net primary production (NPP). The overall goal of the BigFoot Project was to provide validation of these products. To do this, BigFoot combined ground measurements, additional high resolution remote sensing data, and ecosystem process models at nine flux tower sites representing different biomes to evaluate the effects of the spatial and temporal patterns of ecosystem characteristics on MODIS products. BigFoot characterized up to a 7 x 7 km area (49 MODIS pixels) surrounding the CO2 flux towers located at each of the nine sites. We collected multi-year, in situ measurements of ecosystem structure and functional characteristics related to the terrestrial carbon cycle. Our sampling design allowed us to examine scales and spatial pattern of these properties, the inter-annual variability and validity of MODIS products, and provided for a field-based ecological characterization of the flux tower footprint. BigFoot was funded by NASA's Terrestrial Ecology Program.For more details on the BigFoot Project, please visit the website: http://www.fsl.orst.edu/larse/bigfoot/index.html.
