Name: Correlative Light and Electron Microscopy Dataset of Evidence Accumulation in Larval Zebrafish

Description: >
  A large-scale correlative light and electron microscopy (CLEM) dataset
  combining two-photon calcium imaging with serial-section electron microscopy
  in 7-day-old larval zebrafish. The dataset links functional activity
  recordings to nanometer-resolution synaptic connectivity and full neuronal
  reconstructions, enabling circuit-level analysis of evidence accumulation
  and decision-making networks.

Documentation: https://jboulanger91.github.io/fish1.5-release/

Contact: boulangerweill@fas.harvard.edu; jonathan.boulanger.weill@gmail.com

ManagedBy: Harvard University

UpdateFrequency: Static dataset; no planned updates

Tags:
  - neuroscience
  - microscopy
  - connectomics
  - imaging
  - biology

License: MIT License (https://opensource.org/licenses/MIT)

Citation: >
  Boulanger-Weill J, Kämpf F, Schuhknecht GFP, Schalek RL,
  Petkova M, Vohra SK, et al.
  Correlative light and electron microscopy reveals the fine circuit
  structure underlying evidence accumulation in larval zebrafish.
  bioRxiv 2025.03.14.643363.
  https://doi.org/10.1101/2025.03.14.643363

