  #### EOLE1
  The Eole 1 Raw Temperature, Pressure and Location Data Near 200 mbar product was obtained from the experimenter and originally consisted of a BCD tape generated on a CDC 6600 computer, subsequently converted to ASCII characters. The data are arranged sequentially by orbit. Data from each orbit are contained in a single record and consist of a heading giving the orbit number, the number of balloons contacted, and a control number. Following the heading, the balloon number, date of observation, location, and ambient temperature and pressure are listed. A maximum of 25 balloon contacts may appear in a single record. Empty records with no balloon contacts have been omitted. These data were obtained from balloons near 200 mbar and are for the region between 30 deg S and 60 deg S. The upper level wind speed and direction can be generated from these data by comparing individual balloon locations obtained from successive orbits. Eole, also known as the Cooperative Application Satellite (CAS-A), was the the second French experimental relay and meteorological satellite and the first launched by NASA under a cooperative agreement with the Centre National d'Etudes Spatiales (CNES).
  <br>

  #### EXP7L1TRTWHT
  Explorer-7 Thermal Radiation Experiment Selected White Sensor Temperature (Nighttime) Values product contains the temperatures measured by the white sensor at night. The white sensor was designed to measure terrestrial radiation. There is a single file for the entire mission (Nov. 15, 1959 to May 24, 1960). The data were originally written on IBM 7094 machines to magnetic tapes. In addition to the temperature values, the file contains radiance, geolocation and orbit information. The data have been restored and are archived in their original IBM EBCDIC text format. The Explorer-7 satellite was successfully launched on October 13, 1959. The radius of the circle of coverage was about 23 deg (~2500 km) at perigee and 31.5 deg (~3500 km) at apogee. Half the radiation is received from an area below the satellite with a radius of 5.3 deg (545 km) at perigee and 9 deg (~1015 km) at apogee. The Thermal Radiation Experiment successfully returned the first set of Earth looking data from space. The instrument was operational from launch until Feb. 28, 1961. The Principal Investigator for these data was Verner E. Suomi from the University of Wisconsin. This product was previously available from the NSSDC with the identifier ESAD-00248 (old ID 59-009A-01A).
  <br>

  #### EXP7L1TRTALL
  Explorer-7 Thermal Radiation Experiment Temperature Values from All Sensors product contains temperature readings from all five bolometers in order to measure solar, reflected and terrestrial radiation. There are two files for the entire mission (Oct. 19, 1959 to April 16, 1960 and April 16, 1960 to June 4, 1960. Note there is no geolocation information included with these data. The data were originally written on IBM 7094 machines on magnetic tapes. The data have been restored and are archived in their original IBM 36-bit word binary format. The Explorer-7 satellite was successfully launched on October 13, 1959. The radius of the circle of coverage was about 23 deg (~2500 km) at perigee and 31.5 deg (~3500 km) at apogee. Half the radiation is received from an area below the satellite with a radius of 5.3 deg (545 km) at perigee and 9 deg (~1015 km) at apogee. The Thermal Radiation Experiment successfully returned the first set of Earth looking data from space. The instrument was operational from launch until Feb. 28, 1961. The Principal Investigator for these data was Verner E. Suomi from the University of Wisconsin. This product was previously available from the NSSDC with the identifier ESAD-00249 (old ID 59-009A-01B).
  <br>

  #### GEOS2OBSINPUTINTL
  GEOS2OBSINPUTINTL is the optical beacon system data product which contains reduced raw geodetic optical observations obtained by various international camera systems. These data were used as input to the Quality Control Program to create the product called the International Optical Beacon Pass Summary Data. The optical beacon system, used for geometric geodesy studies, consisted of four xenon flash tubes programmed to flash sequentially, in a series of five or seven flashes. Data are available for the time period from 1968-02-20 to 1968-10-03 in a single file with 1689 data records where each is a line of ASCII text.\n\nThe principal investigator for the Optical Beacon System experiment was R. E. Williston from APL. A previous version of this instrument flew on the first GEOS-1 satellite.
  <br>

  #### GEOS3STST
  GEOS3STST is the satellite-to-satellite tracking data product which contains observations, obtained from the S-band transponders on GEOS 3 relayed by the ATS 6 spacecraft to various ground stations, used for geodetic studies. Data are available for the time period from 1975-04-13 to 1976-04-28 in sixteen files, written in ASCII text, where each measurement is recorded as two lines of text.\n\nThe principal investigator for the Satellite-to-Satellite Tracking experiment was Indalecio Y. Galicinao from NASA/GSFC.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
