Name: Bureau of meteorology Atmospheric Regional Reanalysis for Australia (BARRA)
Description: BARRA is a high resolution regional atmospheric reanalysis model over Australia and surrounding regions developed by the Australian Bureau of Meteorology. BARRA is designed for providing multi-decadal meteorological data. It is intended to complement existing climate datasets. <br/ ><br/ > BARRA 1 includes':'<br/ > BARRA R (Regional Reanalysis) covers Australia and surrounding regions providing multi-decadal, 1990 to 2019, meteorological data. It uses a 12 km horizontal resolution and 70 vertical levels up to 80 km. <br/ > BARRA [SY, TA, PH, AD] are convective scale downscaling models nested within BARRA R using 1.5 km resolution and 70 levels extending up to 40 km. <br/ ><br/ > BARRA2 is the new version of the regional atmospheric reanalysis over Australia and surrounding regions. <br/ > Use for climate research and beyond, such as training of machine learning models for weather.
Documentation: Documentation is available for "[BARRA 1](https://thredds.nci.org.au/thredds/fileServer/cj37/BARRA/FAQ_BARRA_August_2020.pdf)"
Contact: data_governance_office@bom.gov.au
