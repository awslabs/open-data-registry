Name: NASA FLASHFLUX Project
Description: |
  FLASH_SSF_Aqua-FM3-MODIS_Version4A is the Fast Longwave And Shortwave Radiative Fluxes (FLASHFlux) Clouds and Radiative Swath (SSF) Aqua-FM3-MODIS data in HDF Version 4A data product. This product consists of Low latency (< 5 days from observation) Top-of-Atmosphere (TOA) fluxes and parameterized surface radiative fluxes at Clouds and the Earth's Radiant Energy System (CERES) Single Scanner Footprint (SSF) level for quick-look purposes. Data collection for this product is in progress. FLASHFlux data are a product line of the CERES project designed to process and release TOA and surface radiative fluxes for applied sciences and education uses. The FLASHFlux data product is a rapid-release product based on the algorithms developed for and data collected by the CERES project. CERES is currently producing world-class climate data products derived from measurements taken aboard NASA's Terra and Aqua spacecraft. While of exceptional fidelity, these data products require considerable processing time to assure quality, verify accuracy, and assess precision. The result is that CERES data are typically released up to six months after acquiring the initial measurements. Such delays are of little consequence for climate studies, especially considering the improved quality of the released data products. Thus, FLASHFlux products are not intended to achieve climate quality. FLASHFlux data products were envisioned as a resource whereby CERES data could be provided to the community within a few days of the initial measurements, with some calibration accuracy requirements relaxed to gain speed. The SSF TOA/Surface Fluxes and Clouds product contains one hour of instantaneous FLASHFlux data for a single CERES scanner instrument. The SSF combines instantaneous CERES data with scene information from a higher-resolution imager, such as Moderate-Resolution Imaging Spectroradiometer (MODIS) on the Terra and Aqua satellites and meteorological and ozone information from The Goddard Earth Observing System GEOS-5 FP-IT Atmospheric Data Assimilation System (GEOS-5 ADAS). Scene identification and cloud properties are defined at the higher image resolution, and these data are averaged over the larger CERES footprint. For each CERES footprint, the SSF contains Top-of-Atmosphere fluxes in SW, LW, and NET, surface fluxes using the Langley parameterized shortwave and longwave algorithms, and cloud information. CERES is a key Earth Observing System (EOS) program component. The CERES instruments provide radiometric measurements of the Earth's atmosphere from three broadband channels. The CERES mission is a follow-up to the successful Earth Radiation Budget Experiment (ERBE) mission. The first CERES instrument (PFM) was launched on November 27, 1997, as part of the Tropical Rainfall Measuring Mission (TRMM). Two CERES instruments (FM1 and FM2) were launched into polar orbit on board the EOS flagship Terra on December 18, 1999. Two additional CERES instruments (FM3 and FM4) were launched on board EOS Aqua on May 4, 2002. The newest CERES instrument Flight Model 5 (FM5), was launched on board the Suomi National Polar-orbiting Partnership (NPP) satellite.
  <br>

  #### FLASH_SSF_Terra-FM1-MODIS
