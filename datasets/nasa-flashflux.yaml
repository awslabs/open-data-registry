  #### FLASH_TISA_NOAA20
  FLASH_TISA_NOAA20_Version1A is the Fast Longwave And SHortwave Fluxes (FLASHFlux) Daily Gridded Single Satellite Top-of-Atmosphere (TOA) and Surfaces/Clouds Version 1A data product. This product contains low latency (< 7 days from observations) NOAA-20 FLASHFlux Single Scanner Footprint (SSF) globally gridded TOA and parameterized surface radiative fluxes for applied science uses. Data collection for this product is in progress.
  <br>

