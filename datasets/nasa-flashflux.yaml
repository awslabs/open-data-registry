Assimilation System (GEOS-5 ADAS). Scene identification and cloud properties are defined at the higher image resolution, and these data are averaged over the larger CERES footprint. For each CERES footprint, the SSF contains Top-of-Atmosphere fluxes in SW, LW, and NET, surface fluxes using the Langley parameterized shortwave and longwave algorithms, and cloud information. CERES is a key Earth Observing System (EOS) program component. The CERES instruments provide radiometric measurements of the Earth's atmosphere from three broadband channels. The CERES mission is a follow-up to the successful Earth Radiation Budget Experiment (ERBE) mission. The first CERES instrument (PFM) was launched on November 27, 1997, as part of the Tropical Rainfall Measuring Mission (TRMM). Two CERES instruments (FM1 and FM2) were launched into polar orbit on board the EOS flagship Terra on December 18, 1999. Two additional CERES instruments (FM3 and FM4) were launched on board EOS Aqua on May 4, 2002. The newest CERES instrument, Flight Model 5 (FM5), was launched on board the Suomi National Polar-orbiting Partnership (NPP) satellite.
