Name: NOAA Joint Polar Satellite System (JPSS) 
Description: |
  <h4>Update</h4>
  The JPSS data on Amazon Web Services (AWS) is managed through the NODD Program, utilizing AWS and NOAA-owned and managed S3 buckets that are continuously updated as soon as new data becomes available. 
  <br/><br/>
  Starting September 14, 2026, JPSS data on AWS will maintain an average total storage of 1PB. A subset of products will have a 90-day, rolling basis, retention policy applied while the remainder will be provided continually. The following JPSS data products will be provided without a retention policy:
  - ATMS-SDR
  - ATMS-TDR
  - ATMS-SDR-GEO
  - CrIS-FS-SDR
  - CrIS-SDR-GEO
  - VIIRS-DNB-GEO
  - VIIRS-DNB-SDR
  - VIIRS_EFIRE_VIIRSI_EDR
  - VIIRS-I1-SDR
  - VIIRS-I2-SDR
  - VIIRS-I3-SDR
  - VIIRS-I4-SDR
  - VIIRS-I5-SDR
  - VIIRS-IMG-GEO-TC
  <br/><br/>
  The list of products may change over time. This page will be updated as any changes are made.
  <br/><br/>
  The full suite of JPSS data is available via the <a href="https://www.google.com/url?q=https://www.class.noaa.gov/data_available/jpss/index.htm&sa=D&source=docs&ust=1783978138931750&usg=AOvVaw2KP9ByvjyQrwSj7n--Kn0z">NOAA NCEI CLASS FTP</a>. JPSS data can also be accessed via <a href="https://console.cloud.google.com/marketplace/product/noaa-public/noaa-jpss?hl=en&project=nmfs-trusted-images">Google Cloud</a> and Microsoft Azure. Microsoft Azure containers must be accessed via command line or the Azure Portal at this time: <a href="https://jpss.blob.core.windows.net/noaa-20">NOAA-20</a>, <a href="https://jpss.blob.core.windows.net/noaa-21">NOAA-21</a>, and <a href="https://jpss.blob.core.windows.net/snpp">SNPP</a>.
  <hr/>
  <br /> Satellites in the JPSS constellation gather global measurements of atmospheric, terrestrial and oceanic conditions, including sea and land surface temperatures, vegetation, clouds, rainfall, snow and ice cover, fire locations and smoke plumes, atmospheric temperature, water vapor and ozone. JPSS delivers key observations for the Nation's essential products and services, including forecasting severe weather like hurricanes, tornadoes and blizzards days in advance, and assessing environmental hazards such as droughts, forest fires, poor air quality and harmful coastal waters. Further, JPSS will provide continuity of critical, global observations of Earth’s atmosphere, oceans and land through 2038.
Documentation: https://github.com/NOAA-Big-Data-Program/bdp-data-docs/tree/main/JPSS
Contact: For any questions regarding data delivery or any general questions regarding the NOAA Open Data Dissemination (NODD) Program, email the NODD Team at nodd@noaa.gov.
  <br /> We also seek to identify case studies on how NOAA data is being used and will be featuring those stories in joint publications and in upcoming events. If you are interested in seeing your story highlighted, please share it with the NODD team by emailing nodd@noaa.gov

ManagedBy: "[NOAA](http://www.noaa.gov/)"
