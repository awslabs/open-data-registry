Name: BrainWideBench - IBL Benchmark for Neural Foundation Models in Neuroscience
Description: >
  BrainWideBench is a large-scale, multi-task benchmark for evaluating neural foundation models,
  derived from the International Brain Laboratory (IBL) Brainwide Map dataset. It contains
  preprocessed Neuropixels recordings from 139 mice spanning 276 brain regions during a
  standardized visual decision-making task. The benchmark is organized around three complementary
  task suites: behavioral decoding (TS1), neural activity prediction (TS2), and brain region
  identification (TS3). Data are processed into a standardized format using the torch_brain library
  and include spike-sorted neural recordings, behavioral signals (wheel movements, paw kinematics,
  whisker motion energy, lick detection), trial structure, stimulus parameters, and anatomical
  annotations. A strict animal-level train/evaluation split separates 126 pretraining animals
  (423 sessions) from 13 held-out evaluation animals (29 sessions), enabling reproducible
  evaluation of across-animal generalization.
Documentation: https://torch-brain.readthedocs.io/en/latest/
