Name: NASA SCP Project
Description: |
  This European Remote Sensing (ERS) Sigma-0 dataset is generated by the Scatterometer Climate Record Pathfinder (SCP) project at Brigham Young University (BYU) and is generated using a Scatterometer Image Reconstruction (SIR) technique developed by Dr. David Long at BYU. The dataset provides SIR processed Sigma-0 data from the ERS-1 C-band scatterometer, which is also known as the Active Microwave Instrument (AMI). AMI is a multimode radar operating at a frequency of 5.3 GHz (C-band), using vertically polarized antennas for both transmission and reception. The SIR technique results in an enhanced resolution image reconstruction and gridded on an equal-area grid (for non-polar regions) at 8.9 km pixel resolution stored in SIR files; polar regions are gridded at the same resolution using a polar-stereographic technique. A non-enhanced version is provided at 44.5 km pixel resolution in a format known as GRD (i.e., gridded) files. All files are produced in IEEE formatted binary. All data files are separated and organized by region, parameter, and sampling technique (i.e., SIR vs. GRD). The regions of China and Japan are combined into a single region. In addition to Sigma-0, various statistical parameters are provided for added guidance, including but not limited to: standard deviation, measurement counts, pixel time, Sigma-0 error, and average incidence angle. This dataset was once distributed on tape, but has been made available on FTP thanks to the BYU SCP.
  <br>

  #### NSCAT_BYU_L3_OW_SIGMA0_ENHANCED
  This NASA Scatterometer (NSCAT) satellite Sigma-0 dataset is generated by the Scatterometer Climate Record Pathfinder (SCP) project at Brigham Young University (BYU) and is generated using a Scatterometer Image Reconstruction (SIR) technique developed by Dr. David Long. The SIR technique results in an enhanced resolution image reconstruction and gridded on an equal-area grid (for non-polar regions) at 4.45 km pixel resolution stored in SIR files; polar regions are gridded using a polar-stereographic technique. A non-enhanced version is provided at 22.25 km pixel resolution in a format known as GRD files. All files are produced in IEEE formatted binary. All data files are separated and organized by region, polarization, parameter, and sampling technique (i.e., SIR vs. GRD). The regions of China and Japan are combined into a single region. In additional to Sigma-0, various statistical parameters are provided for added guidance, including but not limited to: standard deviation, measurement counts, pixel time, Sigma-0 error, and average incidence angle. For more information, please visti: http://www.scp.byu.edu/docs/NSCAT_user_notes.html
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://archive.podaac.earthdata.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
