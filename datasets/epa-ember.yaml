Name: >-
  EMBER Modeling Files 
Description: >-
  These data are being released to support states in wildfire Exceptional Events demonstrations. 
  EPA released fire impacts modeling data for the 2023 fire season called the Expedited Modeling
  of Burn Events Results (EMBER) in December 2024. EPA has updated the EMBER Dataset Tool on the 
  EPA website to include summary tables and graphics four new years of EMBER data: 2021, 2022, 
  2024, and 2025. As part of the effort to update the EMBER data, we are posting the full model
  input and output files publicly here to aid state, local, and Tribal air agencies in constructing
  any potential Exceptional Events demonstrations.
  For more information about EMBER, see the following web page:
  https://www.epa.gov/air-quality-analysis/expedited-modeling-burn-events-results-ember
Documentation: >-
  Dataset Description for 2023: 
  https://www.sciencedirect.com/science/article/pii/S2352340924011703

