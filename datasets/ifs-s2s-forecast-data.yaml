Name: Planette ECMWF IFS S2S Forecast Data
Description: |
The ECMWF IFS S2S forecast dataset provides global, daily, probabilistic forecasts of the Earth system, enabling users to assess the likelihood of future climate states. These forecasts are particularly valuable for studying slowly evolving climate patterns.

This dataset is derived from the ECMWF Data Store and includes IFS hindcasts (2006-2025) and forecasts (2026-present) at 1.5°x1.5° global resolution.

The planette ECMWF IFS archive stores this data in cloud native format for easy access and analysis using Zarr format with icechunk for efficient cloud access.
Documentation: https://github.com/PlanetteAI/planette_ifs_archive/blob/main/README.md
