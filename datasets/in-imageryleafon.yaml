Name: Indiana Statewide Leaf-on Digital Aerial Imagery Catalog
Description: | 
    The State of Indiana Geographic Information Office (GIO) provides a statewide, enhanced NAIP, high-resolution 6-in (15 cm) leaf-on digital orthoimagery catalog. Captured during the summer of 2025, this imagery features an enhanced horizontal accuracy. Primary deliverables are hosted as standard GeoTIFF (.tif), JPEG, and highly performant Cloud Optimized GeoTIFF (COG) files to optimize cloud-native streaming and raster rendering.

Managed by the Indiana Geographic Information Office (IGIO) and integrated directly into the State’s open data imagery repository on AWS, this public-domain dataset is freely accessible without licensing restrictions. It supports direct downloads, seamless streaming via REST services, and native compatibility with web maps, GIS platforms, and desktop CAD applications. Additionally, this repository is SpatioTemporal Asset Catalog (STAC) enabled.
Documentation: https://imagery.gio.in.gov/
Contact: sscholer@iot.in.gov
ManagedBy: Indiana Geographic Information Office 
UpdateFrequency: The 2025 acquisition was published and integrated into the AWS Open Data repository in mid 2026. Future leaf-on updates are contingent upon leveraging upcoming USDA NAIP collection schedules for Indiana (the next tentatively planned for 2027), subject to securing collaborative funding.
