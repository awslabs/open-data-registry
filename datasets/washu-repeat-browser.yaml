Name: WashU Repeat Browser genomic and epigenomic profiles
Description: >-
  The WashU Repeat Browser dataset provides processed genomic and epigenomic
  profiles for studying repetitive elements in human (hg38) and mouse (mm10).
  It contains 8,774 indexed entries spanning CAGE, epigenomic, conservation,
  transcription-factor and repeat-overlap resources in CSV, BigWig and Zarr
  formats. The data support genome-wide, repeat-family and consensus-level
  analysis in Repeat Browser and standard bioinformatics tools.
Documentation: https://github.com/twlab/Repeat-Browser/blob/main/WashU_Repeat_Browser_AWS/README.md
Contact: "Daofeng Li (dli23@wustl.edu); Jiawei Shen (jiaweishen@wustl.edu)"
ManagedBy: "[Ting Wang Laboratory, Department of Genetics, Washington University in St. Louis](https://wang.wustl.edu/)"
UpdateFrequency: The collection is updated irregularly as new supported public datasets and processed profiles become available.
