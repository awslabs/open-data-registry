Name: Infant 3T/7T Precision Imaging
Description: Infant 3T/7T MRI precision imaging data, including raw BIDS, preprocessed Infant fMRIPrep derivatives, and XCP-D derivatives (N=6 highly sampled infant participants)
Documentation: https://github.com/DCAN-Labs/infant_3T_7T_precision_imaging/tree/main#infant-3t7t-precision-imaging-data
Contact: Julia Moser (moser297@umn.edu)
ManagedBy: Masonic Institute for the Developing Brain (MIDB) Open Data Initiative
UpdateFrequency: "The repository will potentially be updated in the future as new data is acquired or current data is processed with updated processing pipelines/workflows."
Tags:
