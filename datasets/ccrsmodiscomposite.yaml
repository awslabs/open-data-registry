Name: CCRS MODIS Clear-Sky Composites over Canada | Composites MODIS sous ciel dégagé du CCT couvrant le Canada 
Description:
            The MODIS Clear-Sky TOA Composites dataset over Canada consists of 10-day composite time series at 250m resolution, produced by CCRS since February 2000. It includes clear-sky composites for MODIS bands B1–B7, primarily for land applications, with separate forward (FRW) and backward (BKW) scattering products for each period. All imagery is downscaled and reprojected to Lambert Conformal Conic over a 5,700 × 4,800km area. The processing system was developed by CCRS to maximize the quality of MODIS L1B swath imagery at northern latitudes.
            Le jeu de données MODIS de réflectance au sommet de l’atmosphère (TOA) en ciel clair couvrant le Canada, produit par le CCT depuis février 2000, consiste en des séries temporelles de composites sur 10 jours à une résolution de 250 m. Il comprend des composites en ciel clair pour les bandes MODIS B1 à B7, principalement destinés aux applications terrestres, avec des produits distincts de diffusion vers l’avant (FRW) et vers l’arrière (BKW) pour chaque période. Toutes les images sont rééchantillonnées et reprojetées en projection conique conforme de Lambert sur une zone de 5700 × 4800 km. Le système de traitement a été développé par le CCT afin d’optimiser la qualité des images en fauchée MODIS L1B aux latitudes nordiques.
