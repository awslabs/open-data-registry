Name: EEGDash on AWS
Description: >
  The EEG-DaSh (EEG Data Sharing) data archive is a large-scale data-sharing resource for
  magnetoencephalography and electroencephalography (MEEG) data hosted at the Swartz Center
  for Computational Neuroscience (SCCN), UC San Diego. It provides curated, BIDS-formatted
  datasets for neuroscience research, machine learning, and deep learning applications.
  The archive spans three S3 buckets: (1) the EEGDash bucket for data served through the
  EEGDash platform, (2) the NEMAR archive containing datasets contributed through the
  NEMAR (Neuroelectromagnetic Data Archive and Tools Resource) platform, which serves as
  the upstream data source for EEGDash, and (3) a competition-specific collection of
  datasets adapted and preprocessed for machine learning benchmarks and competitions.
Documentation: https://eegdash.org
Contact: adelorme@ucsd.edu
ManagedBy: "[Swartz Center for Computational Neuroscience](https://sccn.ucsd.edu/)"
UpdateFrequency: About once a week
Tags:
  - aws-pds
  - life sciences
  - machine learning
  - deep learning
  - neuroscience
  - neuroimaging
License: There are no restrictions on the use of this data.
Resources:
  - Description: EEGDash data
    ARN: arn:aws:s3:::eegdash
    Region: us-east-2
    Type: S3 Bucket
  - Description: NEMAR datasets - primary archive of MEEG datasets contributed through the NEMAR platform
    ARN: arn:aws:s3:::nemar
    Region: us-east-2
    Type: S3 Bucket
  - Description: Competition datasets - MEEG datasets adapted and preprocessed for machine learning benchmarks
    ARN: arn:aws:s3:::nmdatasets
    Region: us-east-2
    Type: S3 Bucket
  - Description: Notifications for EEGDash
    ARN: arn:aws:sns:us-east-2:191754232783:eegdash-nemar
    Region: us-east-2
    Type: SNS Topic
