Name: NASA landsat-8 Project
Description: |
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, consists of mean monthly velocity maps for selected glacier outlet areas. The maps are generated by tracking visible features between optical image pairs acquired by the Landsat 4 and 5 Thematic Mapper (TM), the Landsat 7 Enhanced Thematic Mapper Plus (ETM+), the Landsat 8 Operational Land Imager (OLI), and the Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER). See <a href="http://nsidc.org/data/measures/gimp">Greenland Ice Mapping Project (GIMP)</a> for related data.
  <br>

  #### NSIDC-0775
  This data set, part of NASA's Making Earth System Data Records for Use in Research Environments (MEaSUREs) Program, consists of ice velocities at 240 m resolution, generated from Landsat 4, 5, 7, and 8 optical image pairs. Velocities were derived using the autonomous Repeat Image Feature Tracking algorithm (autoRIFT) processing chain. Data are available for all land ice areas larger than 5 square km, spanning the period from 1985 to 2018 (subject to image availability and quality). Data scarcity and/or low radiometric quality are significant limiting factors for many regions during the earlier years of the data record. Annual, global coverage is nearly complete after the 2013 launch of Landsat 8.
  <br>

  #### NSIDC-0670
  This data set, part of the NASA Making Earth System Data Records for Use in Research Environments (MEaSUREs) program, contains a multi-year ice-sheet-wide velocity mosaic for Greenland, derived from Interferometric Synthetic Aperture Radar (InSAR), Synthetic Aperture Radar (SAR), and Landsat 8 optical imagery data. See <a href="http://nsidc.org/data/measures/gimp">Greenland Ice Mapping Project (GIMP)</a> for related data.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
