Name: Pancreatlas - Human Pancreas Biomolecular Imaging Data
Description: |
  Pancreatlas is a collection of over 4,200 pancreas-specific biological images
  from 908 de-identified organ donors, available for interactive browsing at
  pancreatlas.org. Data was generated using tissue from organ donors studied by
  multiple national and international phenotyping consortia. Image modalities
  include traditional histology, brightfield and fluorescence
  immunohistochemistry, multiplexed immunohistochemistry (CODEX), and imaging
  mass cytometry (IMC). Many images are large whole-slide cross-sectional scans
  measuring >100 square millimeters (~500,000–2,000,000 cells per image).
  The dataset spans the human lifespan (birth to 79 years) and includes donors
  with non-diabetic, type 1 diabetes (T1D), type 2 diabetes (T2D), cystic
  fibrosis-related diabetes (CFRD), neonatal diabetes (NDM), autoantibody-
  positive (AAB), and atypical diabetes phenotypes. Expression patterns of 70+
  proteins are visualized by immunohistochemistry, alongside rich morphological
  information from traditional histological imaging. Images are organized into
  ten research collections contributed by programs including nPOD, HPAP,
  HANDEL-P, HANDEL-I, IIDP, EADB, and the Vanderbilt Pancreas Biorepository.
  Pancreatlas is the only publicly available reference dataset for human pancreas
  tissue architecture, making it a critical resource for research into diabetes,
  pancreatitis, and pancreatic cancer.
Documentation: https://www.pancreatlas.org/data
Contact: jp.cartailler@vanderbilt.edu
ManagedBy: "[Vanderbilt University](https://www.vanderbilt.edu)"
UpdateFrequency: |
  New image collections are added as contributing research programs complete
  data processing, which occurs on a rolling basis.
