Name: "Liar's Bench Expanded: LLM Activations for On-Policy Deception Detection"

Description: >
  This dataset expands Liar's Bench (Kretschmar et al., 2025; arXiv:2511.16035), a benchmark of
  labeled honest and deceptive outputs from large language models (LLMs), with pre-computed
  internal activations from the models that generated each example. The original Liar's Bench
  contains 72,863 labeled examples across seven datasets and four open-weight models, capturing
  on-policy lies — statements that appear to contradict the model's own internal beliefs as
  established in control contexts. This expanded dataset pairs each transcript with residual-stream
  activation tensors extracted at inference time via the National Deep Inference Fabric (NDIF),
  enabling white-box lie detection research. New model organisms and deception scenarios
  are contributed by red teams from a structured competition co-organized by Schmidt Sciences,
  NDIF, and Cadenza Labs. Activations are organized by model, dataset, split, record, and layer
  to support parallelized probe training across transformer layers. Each record stores the
  residual-stream activation at the response-token position (one vector per layer per record).
  Teams can query activations directly from S3 for probe training on publicly available
  validation data.

Documentation: >
  https://github.com/ndif-team/liars-bench-expanded

