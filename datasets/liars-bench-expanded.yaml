Resources:
  - Description: >
      Residual-stream LLM activation tensors paired with deception labels and transcript metadata.
      The bucket is public and can be read anonymously. Metadata is stored as Parquet files under
      `metadata/<dataset>/<split>/`. Each metadata row is one example/conversation and includes
      fields such as `index`, `dataset`, `split`, `captured`, `model`, `lora`, `deceptive`,
      `temperature`, `messages`, `n_tokens`, `n_layers`, `hidden_dim`, `layers`, and `error`.
      Some shape columns in metadata may be incomplete for older uploads; for activation shape and
      token count, read the record's `_complete.json` file. Activations are stored under
      `data/<dataset>/<split>/<index>/`, where `<index>` is the metadata row's `index` value. Each
      record folder contains `_complete.json` and one numbered subfolder per token position:
      `<token_pos>/activations.safetensors`. Each safetensors file contains one tensor named
      `activations` with shape `(n_layers, hidden_dim)` and dtype float16 for that token position.
      A full record is therefore represented conceptually as `(n_tokens, n_layers, hidden_dim)` by
      stacking its token-position files. Current development data includes `instructed-deception`
      and `varied-deception` under the `dev` split, with Qwen, Gemma, and Nemotron model/LoRA
      combinations described in the metadata tables. Structured as:
        s3://liars-bench-expanded/
          metadata/
            instructed-deception/
              dev/
                records.parquet
                records-nemotron.parquet
            varied-deception/
              dev/
                records.parquet
          data/
            <dataset>/
              <split>/
                <index>/
                  _complete.json
                  <token_pos>/
                    activations.safetensors
    ARN: "arn:aws:s3:::liars-bench-expanded"
    Region: us-east-1
    Type: S3 Bucket

