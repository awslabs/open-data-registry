ManagedBy: "[National Deep Inference Fabric (NDIF), Northeastern University](https://ndif.us) and [Cadenza Labs](https://cadenzalabs.org/)"

UpdateFrequency: >
  New model organisms and deception datasets are added following each competition cycle.
  The initial release covers the Summer 2026 hackathon cohort; subsequent releases are
  planned annually as new red-team submissions are evaluated and incorporated.

