Name: "Liar's Bench Expanded: LLM Activations for On-Policy Deception Detection"

Description: >
  This dataset expands Liar's Bench (Kretschmar et al., 2025; arXiv:2511.16035), a benchmark of
  labeled honest and deceptive outputs from large language models (LLMs), with pre-computed
  internal activations for competition development examples. The original Liar's Bench contains
  72,863 labeled examples across seven datasets and four open-weight models, capturing on-policy
  lies — statements that appear to contradict the model's own internal beliefs as established in
  control contexts. This expanded dataset pairs each transcript with residual-stream activation
  tensors extracted at inference time via the National Deep Inference Fabric (NDIF), enabling
  white-box lie detection research. New model organisms and deception scenarios are contributed by
  red teams from a structured competition co-organized by Schmidt Sciences, NDIF, and Cadenza Labs.
  The S3 bucket stores metadata tables separately from activation files. Each metadata row is one
  example/conversation and has an `index` value; that `index` maps to the activation folder under
  `data/<dataset>/<split>/<index>/`. The numeric activation folders are not self-describing, so
  users should start from the metadata Parquet files to identify the dataset, split, model, LoRA,
  label, prompt, and response for each example.

Documentation: >
  https://github.com/ndif-team/liars-bench-expanded

