Resources:
  - Description: >
      Residual-stream LLM activation tensors at the response-token position, paired with
      deception labels and transcript metadata. Each record captures a single token's
      activations across all layers of the captured model (shape per record: n_layers ×
      hidden_dim). Activations are stored as Zarr v3 arrays (shape: n_records × n_layers ×
      hidden_dim, dtype float16, chunks 1000×1×4096) partitioned by the model whose
      internals were captured (captured_model) and the competition scenario. This chunking
      enables efficient layer-slice reads directly from S3 for probe training without
      downloading the full array (~19 GB total). Scenario names encode the
      (generator_model, source_dataset, year) tuple using Hive-safe slugs, e.g.,
      `qwen-2.5-72b-instruct_wmdp-bio-2026` (slashes and HuggingFace org prefixes stripped).
      Record-level metadata is stored in Parquet alongside each activation array, preserving
      the original Liar's Bench schema and adding expansion fields. Core fields present for
      all records: index, model, messages (list of {content, role}), deceptive, canary,
      captured_model, num_layers, hidden_size, n_response_tokens, seq_len. Optional fields
      carried through from source configs where present: temperature (convincing-game,
      gender-secret, harm-pressure-*), meta (convincing-game, gender-secret), dataset and
      dataset_index (harm-pressure-*, instructed-deception). Null for configs where absent. Structured as:
        s3://[bucket-name]/
          README.txt
          metadata/
            captured_model=[model-name]/
              scenario=[scenario-name]-[year]/
                split=[split-name]/
                  records.parquet
          data/
            captured_model=[model-name]/
              scenario=[scenario-name]-[year]/
                split=[split-name]/
                  activations.zarr/
    ARN: "arn:aws:s3:::[To be completed after AWS account creation]"
    Region: us-east-1
    Type: S3 Bucket

