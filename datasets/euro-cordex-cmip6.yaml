Name: EURO-CORDEX-CMIP6 - European component of the Coordinated Regional Downscaling Experiment
Description: |
  The EURO-CORDEX dataset contains regional climate model data for Europe, for use in impacts, decision-making, and climate science. 
  Currently, the bucket contains the CORE ensemble data downscaled from CMIP6 global model datasets using different
  regional climate models.
Documentation: https://euro-cordex.github.io/joint-evaluation/README.html
