  The Nimbus-7 Total Ozone Mapping Spectrometer (TOMS) version 8 orbital swath data product contains total column ozone, UV aerosol index, and Lambertian effective surface reflectivity (Rayleigh corrected) at approximately 50x50 km2 resolution (at nadir). This product also contains some auxiliary derived and ancillary parameters including N-values, SO2 index, cloud fraction, cloud pressure, ozone below clouds, terrain height, geolocation, solar and satellite viewing angles, and data quality flags. These data are stored in the version 5 EOS Hierarchical Data Format (HDF-EOS5). The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
