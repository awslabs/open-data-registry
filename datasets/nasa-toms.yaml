Name: NASA TOMS Project
Description: |
  The Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily ground station overpass data product contains total column ozone, UV aerosol index, Lambertian effective surface reflectivity (Rayleigh corrected), UV aerosol index and sulfur dioxide index values. The overpass data files contain the data derived from the best-matched TOMS field-of-view (FOV) to a site for every day the TOMS instrument was operational. The data are stored in an ASCII format. TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3dtoz
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily global gridded data product contains total column ozone values. The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3mtoz
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 monthly averaged global gridded data product contains total column ozone values. The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3daer
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily global gridded data product contains UV aerosol index values. The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3maer
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 monthly averaged global gridded data product contains UV aerosol index values. The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3dref
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily global gridded data product contains Lambertian effective surface reflectivity values (Rayleigh corrected). The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3mref
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 monthly averaged global gridded data product contains Lambertian effective surface reflectivity values (Rayleigh corrected). The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3dery
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily global gridded data product contains UV-B erythemal local noon irradiance values. The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3mery
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 monthly averaged global gridded data product contains UV-B erythemal local noon irradiance values. The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL2
  The Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 orbital swath data product contains total column ozone, UV aerosol index, and Lambertian effective surface reflectivity (Rayleigh corrected) at approximately 50x50 km2 resolution (at nadir). This product also contains some auxiliary derived and ancillary parameters including N-values, SO2 index, cloud fraction, cloud pressure, ozone below clouds, terrain height, geolocation, solar and satellite viewing angles, and data quality flags. These data are stored in the version 5 EOS Hierarchical Data Format (HDF-EOS5). The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3
  The Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily global gridded data product contains total column ozone, UV aerosol index, Lambertian effective surface reflectivity (Rayleigh corrected), and UV-B erythemal local noon irradiances. The data are mapped to a global grid of size 180 x 288 with a lat-long resolution of 1.00 x 1.25 degrees. These data are stored in the EOS Hierarchical Data Format (HDF-EOS). The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3ztoz
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily zonal means data product contains total column ozone values. The data are averaged in 5 degree latitude bands. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3zaer
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily zonal means data product contains UV aerosol index values. The data are averaged in 5 degree latitude bands. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSEPL3zref
  This Earth Probe (EP) Total Ozone Mapping Spectrometer (TOMS) version 8 daily zonal means data product contains Lambertian effective surface reflectivity values (Rayleigh corrected). The data are averaged in 5 degree latitude bands. These data are stored in an ASCII format. The TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSM3OVP
  The Meteor-3 Total Ozone Mapping Spectrometer (TOMS) version 8 daily ground station overpass data product contains total column ozone, UV aerosol index, Lambertian effective surface reflectivity (Rayleigh corrected), UV aerosol index and sulfur dioxide index values. The overpass data files contain the data derived from the best-matched TOMS field-of-view (FOV) to a site for every day the TOMS instrument was operational. The data are stored in an ASCII format. TOMS data were produced by the Laboratory for Atmospheres at NASA Goddard Space Flight Center (Code 614).
  <br>

  #### TOMSM3L3dtoz
