Name: DWD ICON-EU - dynamical.org Icechunk Zarr
Description: |
    <p>ICON-EU is a regional weather forecast model operated by Deutscher Wetterdienst (DWD), Germany's national meteorological service. ICON-EU is a nested configuration of DWD's global ICON (Icosahedral Non-hydrostatic) model that provides high-resolution forecasts over Europe.</p>
    <p>These datasets have been translated to cloud-optimized Icechunk Zarr format by <a href="https://dynamical.org">dynamical.org</a>.</p>
    <ul>
      <li><a href="https://dynamical.org/catalog/dwd-icon-eu-forecast-5-day/">DWD ICON-EU forecast, 5 day</a> - High-resolution weather forecasts for Europe from the ICON-EU model operated by Deutscher Wetterdienst (DWD).</li>
    </ul>
Documentation: https://dynamical.org/catalog/
