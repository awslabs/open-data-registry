Name: NASA SMAPVEX12 Project
Description: |
  This data set contains in situ soil moisture data collected with coring devices at several agricultural sites as part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12CST
  This data set contains in situ soil texture data collected with coring devices at several sites as part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12VA
  This data set contains in situ vegetation data collected at several agricultural sites as a part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12VF
  This data set contains in situ vegetation data collected at several forest sites as a part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12LC
  This data set consists of land cover classification data derived from satellite imagery as part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12). Images from the RADARSAT-2, Système Pour l'Observation de la Terre (SPOT-4), and DMC International Imaging Ltd (DMCii) of the study area were retrieved for the summer of 2012. The land use classification image provides information about vegetation present in the study area at a resolution of 20 meters.
  <br>

  #### SV12PLBK
  This data set contains backscatter data obtained by the Passive Active L-band System (PALS) microwave aircraft instrument as part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12PLTB
  This data set contains brightness temperatures obtained by the Passive Active L-band System (PALS) aircraft instrument. The data were collected as part of SMAPVEX12, the Soil Moisture Active Passive Validation Experiment 2012.
  <br>

  #### SV12PSMA
  This data set contains in situ soil moisture data collected at several agricultural sites as part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12PSMF
  This data set contains in situ soil moisture data collected at several forested sites as a part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12STM
  This data set consists of soil texture classification data derived from field surveys as part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12). The soil texture classification map provides information about vegetation present in the study area.
  <br>

  #### SV12SRA
  This data set contains surface roughness data collected at several agricultural sites as a part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12SRF
  This data set contains surface roughness data collected at several forested sites as a part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12UBK
  This data set contains backscatter data obtained by the Uninhabited Aerial Vehicle Synthetic Aperture Radar (UAVSAR) instrument. The data were collected as part of the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12).
  <br>

  #### SV12VWC
  The daily Vegetation Water Content (VWC) maps for the Soil Moisture Active Passive Validation Experiment 2012 (SMAPVEX12) were derived by calculating Normalized Difference Vegetation Index (NDVI) from SPOT and RapidEye satellite overpasses and then interpolating it for each day of the campaign. In addition, samples from a range of vegetation types were used to compare ground-based measurements to the satellite-based estimates.
  <br>

  #### Data Discovery
  Explore this data using NASA's [Earthdata Search](https://search.earthdata.nasa.gov/), a comprehensive tool for discovering and visualizing Earth science datasets.
  <br>

  #### Data Access
  Access requires an [Earthdata Login](https://urs.earthdata.nasa.gov/) account. [Read our guide on obtaining AWS credentials](https://data.nsidc.earthdatacloud.nasa.gov/s3credentialsREADME) to retrieve this data from AWS.
  <br><br>
