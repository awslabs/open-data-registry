  #### ECO4ESIALEXI
  The ECO4ESIALEXI Version 1 data product was decommissioned on January 30, 2026. Users are encouraged to use the [ECO_L4G_ESI_ALEXI](https://doi.org/10.5067/ECOSTRESS/ECO_L4G_ESI_ALEXI.002) and [ECO_L4T_ESI_ALEXI](https://doi.org/10.5067/ECOSTRESS/ECO_L4T_ESI_ALEXI.002) Version 2 data product(s). The ECOsystem Spaceborne Thermal Radiometer Experiment on Space Station (ECOSTRESS) mission measures the temperature of plants to better understand how much water plants need and how they respond to stress. ECOSTRESS is attached to the International Space Station (ISS) and collects data globally between 52 degrees N and 52 degrees S latitudes. The NASA Jet Propulsion Laboratory (JPL) ECO4ESIALEXI Version 1 data product provides the Evaporative Stress Index (ESI), which is computed from clear-sky estimates of the relative daily evapotranspiration (ET) fraction: ESI = ET/ETo, where ET is ETdaily from the ECOSTRESS Level 3 product and ETo is the reference ET. A description of the major components of the ECOSTRESS algorithm implemented in Version 1 of the Atmosphere Land Exchange Inverse (ALEXI) Disaggregation algorithm (DisALEXI) ESI code is provided in the Algorithm Theoretical Basis Document (ATBD). ESI applications include indicating agricultural drought and observing vegetation stress. ECO4ESIALEXI is available for CONUS at 70-meter (m) pixel resolution. The ECO4ESIALEXI Version 1 data product contains variables of daily evaporative stress index, evaporative stress index uncertainty, and associated quality flags. A low-resolution browse is also available showing daily ESI as a stretched image with a color ramp in JPEG format. Known Issues: Data acquisition gaps: ECOSTRESS was launched on June 29, 2018, and moved to autonomous science operations on August 20, 2018, following a successful in-orbit checkout period. On September 29, 2018, ECOSTRESS experienced an anomaly with its primary mass storage unit (MSU). ECOSTRESS has a primary and secondary MSU (A and B). On December 5, 2018, the instrument was switched to the secondary MSU and science operations resumed. On March 14, 2019, the secondary MSU experienced a similar anomaly, temporarily halting science acquisitions. On May 15, 2019, a new data acquisition approach was implemented, and science acquisitions resumed. To optimize the new acquisition approach, only TIR bands 2, 4, and 5 are being downloaded. The data products are the same as before, but the bands not downloaded contain fill values (L1 radiance and L2 emissivity). This approach was implemented from May 15, 2019, through April 28, 2023. * Data acquisition gap: From February 8 to February 16, 2020, an ECOSTRESS instrument issue resulted in a data anomaly that created striping in band 4 (10.5 micron). These data products have been reprocessed and are available for download. No ECOSTRESS data were acquired on February 17, 2020, due to the instrument being in SAFEHOLD. Data acquired following the anomaly have not been affected. * Data acquisition: ECOSTRESS has now successfully returned to 5-band mode after being in 3-band mode since 2019. This feature was successfully enabled following a Data Processing Unit firmware update (version 4.1) to the payload on April 28, 2023. To better balance contiguous science data scene variables, 3-band collection is currently being interleaved with 5-band acquisitions over the orbital day/night periods.
