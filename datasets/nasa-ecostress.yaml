  #### ECO1BMAPRAD
  The ECO1BMAPRAD Version 1 data product was decommissioned on February 14, 2025. Users are encouraged to use the [ECO_L1CT_RAD](https://doi.org/10.5067/ECOSTRESS/ECO_L1CT_RAD.002) Version 2 and [ECO_L1CG_RAD](https://doi.org/10.5067/ECOSTRESS/ECO_L1CG_RAD.002) Version 2 data products. The ECOsystem Spaceborne Thermal Radiometer Experiment on Space Station (ECOSTRESS) mission measures the temperature of plants to better understand how much water plants need and how they respond to stress. ECOSTRESS is attached to the International Space Station (ISS) and collects data globally between 52 degrees N and 52 degrees S latitudes. A map of the acquisition coverage can be found in Figure 2 on the [ECOSTRESS website](https://ecostress.jpl.nasa.gov/science). The ECO1BMAPRAD Version 1 data product combines the at-sensor calibrated radiance values retrieved for the ECO1BRAD data product and the geolocation information provided in the ECO1BGEO data product to produce a geotagged, resampled radiance product. The ECO1BMAPRAD data product is produced as a map registered product that is in a rotated geographic projection with a spatial resolution of 70 meters (m). The ECO1BMAPRAD data product accounts for the overlap and variable pixel size in the ECO1BRAD data product. The ECO1BMAPRAD Version 1 data product contains data variables including the radiance values for the five thermal infrared (TIR) bands, digital number (DN) values for the shortwave infrared (SWIR) band, associated data quality indicators, latitude and longitude values, solar and view geometry information, and surface height. Known Issues: Data acquisition gap: ECOSTRESS was launched on June 29, 2018, and moved to autonomous science operations on August 20, 2018, following a successful in-orbit checkout period. On September 29, 2018, ECOSTRESS experienced an anomaly with its primary mass storage unit (MSU). ECOSTRESS has a primary and secondary MSU (A and B). On December 5, 2018, the instrument was switched to the secondary MSU and science operations resumed. On March 14, 2019, the secondary MSU experienced a similar anomaly temporarily halting science acquisitions. On May 15, 2019, a new data acquisition approach was implemented and science acquisitions resumed. To optimize the new acquisition approach TIR bands 2, 4 and 5 are being downloaded. The data products are as previously, except the bands not downloaded contain fill values (L1 radiance and L2 emissivity). This approach was implemented from May 15, 2019, through April 28, 2023. * Data acquisition gap: From February 8 to February 16, 2020, an ECOSTRESS instrument issue resulted in a data anomaly that created striping in band 4 (10.5 micron). These data products have been reprocessed and are available for download. No ECOSTRESS data were acquired on February 17, 2020, due to the instrument being in SAFEHOLD. Data acquired following the anomaly have not been affected. * Resampled data: The data has been resampled, so users interested in working with data closest to that acquired by the instrument may want to work with the swath products. * Missing scan data: During testing, an instrument artifact was encountered in ECOSTRESS bands 1 and 5, resulting in missing values. A machine learning algorithm has been applied to interpolate missing values. For more information on the missing scan filling techniques and outcomes, see Section 3.3.2 of the User Guide. * Cold bias: ECOSTRESS Level-1 Radiance data shows high correlation with in-situ ground measurements (R2 = 0.99 in all bands). Currently, ECOSTRESS has a cold bias of approximately 0.7 Kelvin (K), which will be corrected through calibration in future data releases. * Data acquisition: ECOSTRESS has now successfully returned to 5-band mode after being in 3-band mode since 2019. This feature was successfully enabled following a Data Processing Unit firmware update (version 4.1) to the payload on April 28, 2023. To better balance contiguous science data scene variables, 3-band collection is currently being interleaved with 5-band acquisitions over the orbital day/night periods.
  <br>

  #### ECO4WUE
  The ECO4WUE Version 1 data product was deprecated on September 30, 2025. Users are encouraged to use the [ECO_L4T_WUE]( https://doi.org/10.5067/ECOSTRESS/ECO_L4T_WUE.002) and [ECO_L4G_WUE]( https://doi.org/10.5067/ECOSTRESS/ECO_L4G_WUE.002) Version 2 data products. The ECOsystem Spaceborne Thermal Radiometer Experiment on Space Station (ECOSTRESS) mission measures the temperature of plants to better understand how much water plants need and how they respond to stress. ECOSTRESS is attached to the International Space Station (ISS) and collects data globally between 52 degrees N and 52 degrees S latitudes. The ECO4WUE Version 1 data product provides Water Use Efficiency (WUE) data generated according to the Priestley-Taylor Jet Propulsion Laboratory (PT-JPL) algorithm described in the ECOSTRESS Level 4 WUE Algorithm Theoretical Basis Document (ATBD). WUE is the ratio of carbon stored by plants to water evaporated by plants. This ratio is given as grams of carbon stored per kilogram of water evaporated over the course of the day from sunrise to sunset on the day when the ECOSTRESS granule was acquired. The ECO4WUE Version 1 data product contains a single variable of water use efficiency. Known Issues: Data acquisition gaps: ECOSTRESS was launched on June 29, 2018, and moved to autonomous science operations on August 20, 2018, following a successful in-orbit checkout period. On September 29, 2018, ECOSTRESS experienced an anomaly with its primary mass storage unit (MSU). ECOSTRESS has a primary and secondary MSU (A and B). On December 5, 2018, the instrument was switched to the secondary MSU and science operations resumed. On March 14, 2019, the secondary MSU experienced a similar anomaly temporarily halting science acquisitions. On May 15, 2019, a new data acquisition approach was implemented and science acquisitions resumed. To optimize the new acquisition approach TIR bands 2, 4 and 5 are being downloaded. The data products are as previously, except the bands not downloaded contain fill values (L1 radiance and L2 emissivity). This approach was implemented from May 15, 2019, through April 28, 2023. * Data acquisition gap: From February 8 to February 16, 2020, an ECOSTRESS instrument issue resulted in a data anomaly that created striping in band 4 (10.5 micron). These data products have been reprocessed and are available for download. No ECOSTRESS data were acquired on February 17, 2020, due to the instrument being in SAFEHOLD. Data acquired following the anomaly have not been affected. * Data acquisition: ECOSTRESS has now successfully returned to 5-band mode after being in 3-band mode since 2019. This feature was successfully enabled following a Data Processing Unit firmware update (version 4.1) to the payload on April 28, 2023. To better balance contiguous science data scene variables, 3-band collection is currently being interleaved with 5-band acquisitions over the orbital day/night periods.
