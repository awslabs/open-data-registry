  #### ECO3ETALEXI
  The ECO3ETALEXI Version 1 data product was decommissioned on January 30th, 2026. Users are encouraged to use the [ECO_L3T_ET_ALEXI](https://doi.org/10.5067/ECOSTRESS/ECO_L3T_ET_ALEXI.002) and [ECO_L3G_ET_ALEXI](https://doi.org/10.5067/ECOSTRESS/ECO_L3G_ET_ALEXI.002) Version 2 data product(s). The ECOsystem Spaceborne Thermal Radiometer Experiment on Space Station (ECOSTRESS) mission measures the temperature of plants to better understand how much water plants need and how they respond to stress. ECOSTRESS is attached to the International Space Station (ISS) and collects data globally between 52 degrees N and 52 degrees S latitudes. The NASA Jet Propulsion Laboratory (JPL) ECO3ETALEXI Version 1 data product provides estimates of daily evapotranspiration (ET) using the ECOSTRESS Level 2 (L2) land surface temperature and emissivity (LST&E) product, along with ancillary meteorological data and remotely sensed vegetation cover information. The ECO3ETALEXI data product is derived using a physics-based surface energy balance (SEB) algorithm, the Atmosphere Land Exchange Inverse (ALEXI) Disaggregation algorithm (DisALEXI). Described in the Algorithm Theoretical Basis Document (ATBD), DisALEXI is based on spatial disaggregation of regional-scale fluxes from the ALEXI SEB model. There are many approaches for spatially mapping ET; however, SEB methods are favored for remote sensing retrievals based on land-surface temperature. ALEXI was initially developed for managed landscapes and has now been evaluated in comparison with micrometeorological flux tower observations over crop, forest, grassland, wetland, and semiarid desert sites. Applications include crop water use, crop phenology monitoring, and drought early warning or water stress detection. ECO3ETALEXI is available for CONUS at 70-meter (m) pixel resolution. The ECO3ETALEXI Version 1 data product contains variables of daily ET, ET uncertainty, and associated quality flags. A low-resolution browse is also available showing daily ET as a stretched image with a color ramp in JPEG format. Known Issues: Data acquisition gaps: ECOSTRESS was launched on June 29, 2018, and moved to autonomous science operations on August 20, 2018, following a successful in-orbit checkout period. On September 29, 2018, ECOSTRESS experienced an anomaly with its primary mass storage unit (MSU). ECOSTRESS has a primary and secondary MSU (A and B). On December 5, 2018, the instrument was switched to the secondary MSU and science operations resumed. On March 14, 2019, the secondary MSU experienced a similar anomaly, temporarily halting science acquisitions. On May 15, 2019, a new data acquisition approach was implemented, and science acquisitions resumed. To optimize the new acquisition approach, only TIR bands 2, 4, and 5 are being downloaded. The data products are the same as before, but the bands not downloaded contain fill values (L1 radiance and L2 emissivity). This approach was implemented from May 15, 2019, through April 28, 2023. * Data acquisition gap: From February 8 to February 16, 2020, an ECOSTRESS instrument issue resulted in a data anomaly that created striping in band 4 (10.5 micron). These data products have been reprocessed and are available for download. No ECOSTRESS data were acquired on February 17, 2020, due to the instrument being in SAFEHOLD. Data acquired following the anomaly have not been affected. * Data acquisition: ECOSTRESS has now successfully returned to 5-band mode after being in 3-band mode since 2019. This feature was successfully enabled following a Data Processing Unit firmware update (version 4.1) to the payload on April 28, 2023. To better balance contiguous science data scene variables, 3-band collection is currently being interleaved with 5-band acquisitions over the orbital day/night periods.
