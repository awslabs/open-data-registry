Name: "Sid Sijbrandij's osteosarcoma dataset"
Description: "Sid was diagnosed with osteosarcoma in November 2022 and after running out of standard of care treatment options he began: maximum diagnostics, created new treatments, started doing treatments in parallel, and scaling this for others. This dataset includes the clinical and molecular data generated by and for Sid throughout this journey: longitudinal single cell and bulk RNA and DNA sequencing, spatial transcriptomics, residual disease testing (MRD), flow cytometry, imaging, and clinical lab results. This data is being freely shared with the community to advance cancer research."
Documentation: "https://osteosarc.com/data/"
Contact: cancer@sytse.com
ManagedBy: "[Rare Cancer Research Foundation](https://rarecancer.org/)"
UpdateFrequency: Periodically as new data is generated
License: "CC0 1.0; https://creativecommons.org/publicdomain/zero/1.0/"
Tags:
  - sarcoma
  - genomics
  - spatial biology
  - bioinformatics
  - life sciences
