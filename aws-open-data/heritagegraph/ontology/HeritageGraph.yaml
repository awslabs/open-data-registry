id: HeritageGraph
name: HeritageGraph
description: >-
  An event-centric LinkML schema for representing Nepal cultural heritage
  information, fully aligned with CIDOC-CRM v7.2.1 and PROV-O. Enables
  provenance tracking, ritual-spatial-temporal reasoning, and multi-calendar
  date representation. DL expressivity: ALCIQ(D).
version: 1.0.0
license: CC-BY-4.0


imports:
  - linkml:types
default_range: string

types:
  wktLiteral:
    description: "OGC GeoSPARQL Well-Known Text literal encoding a geometry (e.g. POINT, POLYGON)."
    typeof: string
    uri: "http://www.opengis.net/ont/geosparql#wktLiteral"

enums:
  ConditionTypeEnum:
    description: "Controlled vocabulary for physical condition categories of heritage objects."
    permissible_values:
      Good:
        description: "No significant damage"
        meaning: heritageGraph:Good
      Damaged:
        description: "Partially damaged"
        meaning: heritageGraph:Damaged
      Ruined:
        description: "Severely damaged or collapsed"
        meaning: heritageGraph:Ruined
      Restored:
        description: "Repaired and stabilized"
        meaning: heritageGraph:Restored


  ExistenceStatusEnum:
    description: "Controlled vocabulary for whether a heritage object or structure still exists."
    permissible_values:
      Extant:
        description: "Currently exists in physical form"
        meaning: heritageGraph:Extant
      PartiallyExtant:
        description: "Fragments or ruins remain"
        meaning: heritageGraph:PartiallyExtant
      Destroyed:
        description: "Known to have been destroyed; no physical remains"
        meaning: heritageGraph:Destroyed
      Lost:
        description: "Existence documented but location/remains unknown"
        meaning: heritageGraph:Lost
      Hypothetical:
        description: "Reconstructed or theorized; never physically realized"
        meaning: heritageGraph:Hypothetical
      Unknown:
        description: "Existence status uncertain"
        meaning: heritageGraph:Unknown

  RitualTypeEnum:
    description: "Controlled vocabulary for ritual and festival activity types in Nepalese living heritage."
    permissible_values:
      NityaPuja:
        description: "Daily mandatory worship"
        meaning: heritageGraph:NityaPuja
      NaimittikaPuja:
        description: "Occasional/Festival worship"
        meaning: heritageGraph:NaimittikaPuja
      KamyaPuja:
        description: "Desire-based optional worship"
        meaning: heritageGraph:KamyaPuja
      Abhisheka:
        description: "Ritual bathing/anointing of deity"
        meaning: heritageGraph:Abhisheka
      Homa:
        description: "Fire offering ritual"
        meaning: heritageGraph:Homa
      Bhajan:
        description: "Devotional singing ritual"
        meaning: heritageGraph:Bhajan
      Yagna:
        description: "Vedic sacrifice ritual"
        meaning: heritageGraph:Yagna
      Vrata:
        description: "Vow observance ritual"
        meaning: heritageGraph:Vrata
      Jatra:
        description: "Festival procession ritual"
        meaning: heritageGraph:Jatra
        broad_mappings:
          - aat:300069290  # processions
      ChariotProcession:
        description: "Ritual chariot pulling"
        meaning: heritageGraph:ChariotProcession
        broad_mappings:
          - aat:300069290  # processions
      MaskedPerformance:
        description: "Ritual masked dance"
        meaning: heritageGraph:MaskedPerformance
      RitualConsecration:
        description: "Consecration/activation ritual"
        meaning: heritageGraph:RitualConsecration
      ProcessionRitual:
        description: "Ritual procession/movement"
        meaning: heritageGraph:ProcessionRitual
      InstallationRitual:
        description: "Installation/enshrinement ritual"
        meaning: heritageGraph:InstallationRitual
      DeinstallationRitual:
        description: "De-installation/conclusion ritual"
        meaning: heritageGraph:DeinstallationRitual
      ReturningRitual:
        description: "Return to normal state ritual"
        meaning: heritageGraph:ReturningRitual
      Circumambulation:
        description: "Ritual circular movement around sacred site"
        meaning: heritageGraph:Circumambulation
      RelicTour:
        description: "Procession with sacred relics between sites"
        meaning: heritageGraph:RelicTour
      ProcessionalMovement:
        description: "General ritual movement between locations"
        meaning: heritageGraph:ProcessionalMovement

  
  DatePrecisionEnum:
    description: "Controlled vocabulary for temporal precision of heritage dates."
    permissible_values:
      Exact:
        description: "Precise date known"
        meaning: heritageGraph:Exact
      Year:
        description: "Year-level precision only"
        meaning: heritageGraph:Year
      Decade:
        description: "Within 10-year range"
        meaning: heritageGraph:Decade
      Century:
        description: "Within century range"
        meaning: heritageGraph:Century
      Circa:
        description: "Approximate date"
        meaning: heritageGraph:Circa

  # Syncretic relationship types
  SyncreticTypeEnum:
    description: "Controlled vocabulary for types of syncretic theological relationships between deities."
    permissible_values:
      Equivalence:
        description: "Same deity in different traditions (e.g., Avalokiteshvara = Matsyendranath)"
        meaning: heritageGraph:Equivalence
      Appropriation:
        description: "Deity borrowed from one tradition into another"
        meaning: heritageGraph:Appropriation
      Fusion:
        description: "Intrinsically syncretic deity merging multiple traditions"
        meaning: heritageGraph:Fusion
      Historical:
        description: "Gradual syncretism over time"
        meaning: heritageGraph:Historical

  
  ArchitecturalStyleEnum:
      description: "A vocabulary of architectural styles for South Asian heritage, mapped to CIDOC E55 Type."
      enum_uri: heritageGraph:ArchitecturalStyleEnum
      permissible_values:
        Pagoda:
          description: "Multi-tiered roof style indigenous to Nepal"
          meaning: heritageGraph:Pagoda
          exact_mappings:
            - aat:300004829
        Shikhara:
          description: "North Indian spire-shaped style"
          meaning: heritageGraph:Shikhara
          exact_mappings:
            - aat:300446671
        Dome:
          description: "Dome-based style (Mughal/Neo-classical influence)"
          meaning: heritageGraph:Dome
          exact_mappings:
            - aat:300001285
        Chaitya:
          description: "Buddhist votive shrine style"
          meaning: heritageGraph:ChaityaStyle
          exact_mappings:
            - aat:300007562
        Stupa:
          description: "Buddhist dome-shaped reliquary"
          meaning: heritageGraph:StupaStyle
          exact_mappings:
            - aat:300007576

  # Guthi type enum
  GuthiTypeEnum:
    description: "Controlled vocabulary of Guthi functional types (CRM E55_Type)"
    permissible_values:
      SiGuthi:
        description: "Funeral trust"
        meaning: heritageGraph:SiGuthi
      JatraGuthi:
        description: "Festival organization trust"
        meaning: heritageGraph:JatraGuthi
      PujaGuthi:
        description: "Daily worship trust"
        meaning: heritageGraph:PujaGuthi
      TempleGuthi:
        description: "Temple maintenance trust"
        meaning: heritageGraph:TempleGuthi
      NashaGuthi:
        description: "Music and dance trust"
        meaning: heritageGraph:NashaGuthi
      SanaGuthi:
        description: "Agricultural cooperative trust"
        meaning: heritageGraph:SanaGuthi
      SanGuthi:
        description: "Life-cycle ritual trust"
        meaning: heritageGraph:SanGuthi
      RajGuthi:
        description: "Royal endowment trust"
        meaning: heritageGraph:RajGuthi

  SourceTypeEnum:
    description: "Controlled vocabulary for heritage data source types"
    permissible_values:
      OralHistory:
        description: "Oral history interview or community narrative"
        meaning: heritageGraph:OralHistory
      Inscription:
        description: "Epigraphic or carved textual source"
        meaning: heritageGraph:Inscription
      FieldSurvey:
        description: "Field survey, measurement, or conservation assessment"
        meaning: heritageGraph:FieldSurvey
      ArchivalRecord:
        description: "Administrative or archival document"
        meaning: heritageGraph:ArchivalRecordSource
      PublishedScholarship:
        description: "Published scholarly work"
        meaning: heritageGraph:PublishedScholarship
      CommunityNarrative:
        description: "Community-held narrative not yet fully documented in writing"
        meaning: heritageGraph:CommunityNarrative
      RitualProtocol:
        description: "Ritual manual, priestly instruction, or liturgical protocol"
        meaning: heritageGraph:RitualProtocol

  EpistemicStanceEnum:
    description: "Epistemic standing of a source or assertion"
    permissible_values:
      Scholarly:
        description: "Academic or philological interpretation"
        meaning: heritageGraph:Scholarly
      Community:
        description: "Community or custodial tradition-bearer account"
        meaning: heritageGraph:Community
      Priestly:
        description: "Priestly or ritual-specialist account"
        meaning: heritageGraph:Priestly
      State:
        description: "Government or institutional administrative account"
        meaning: heritageGraph:State
      SyncreticTradition:
        description: "Account grounded in multi-tradition ritual practice"
        meaning: heritageGraph:SyncreticTradition
      Uncertain:
        description: "Deliberately uncertain, provisional, or contested"
        meaning: heritageGraph:Uncertain


prefixes:
  # Core namespace
  heritageGraph: "https://cair-nepal.org/heritagegraph/"
  linkml: "https://w3id.org/linkml/"
  # W3C / OWL stack (LinkML generator)
  rdf: "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  rdfs: "http://www.w3.org/2000/01/rdf-schema#"
  owl: "http://www.w3.org/2002/07/owl#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  skos: "http://www.w3.org/2004/02/skos/core#"
  # Dublin Core & provenance metadata
  dcterms: "http://purl.org/dc/terms/"
  dct: "http://purl.org/dc/terms/"        # Turtle alias used in release TTL
  pav: "http://purl.org/pav/"
  void: "http://rdfs.org/ns/void#"
  # Spatial / temporal
  geo: "http://www.opengis.net/ont/geosparql#"
  time: "http://www.w3.org/2006/time#"
  wgs84: "http://www.w3.org/2003/01/geo/wgs84_pos#"
  # Cultural-heritage authorities & federation targets
  aat: "http://vocab.getty.edu/aat/"
  tgn: "http://vocab.getty.edu/tgn/"
  wikidata: "http://www.wikidata.org/entity/"
  schema: "http://schema.org/"
  dbo: "http://dbpedia.org/ontology/"
  foaf: "http://xmlns.com/foaf/0.1/"
  edm: "http://www.europeana.eu/schemas/edm/"
  orcid: "https://orcid.org/"
  localcontexts: "https://voc.localcontexts.org/"
  datacite: "http://purl.org/spar/datacite/"
  # CRM family & PROV
  prov: "http://www.w3.org/ns/prov#"
  crm: "http://www.cidoc-crm.org/cidoc-crm/"
  # Official CIDOC-CRM extension namespaces (per cidoc-crm.org/extensions/*)
  crmsci: "http://www.cidoc-crm.org/extensions/crmsci/"
  crminf: "http://www.cidoc-crm.org/extensions/crminf/"
  rico: "https://www.ica.org/standards/RiC/ontology#"

default_prefix: heritageGraph

annotations:
  owl:ontologyIRI: "https://cair-nepal.org/heritagegraph/ontology"
  owl:versionIRI: "https://cair-nepal.org/heritagegraph/ontology/1.0.0"
  pav:version: "1.0.0"
  dcterms:creator: "CAIR-Nepal"
  dcterms:publisher: "CAIR-Nepal"
  dcterms:license: "https://creativecommons.org/licenses/by/4.0/"
  # NOTE: LinkML's OWL generator does not currently accept list-valued
  # annotations for owl:imports. We add imports in the release artifact
  # post-processing step instead (as real IRI objects, not a string literal).

classes:
  # ========================================================================
  # CORE TANGIBLE HERITAGE (CIDOC E22 Human-Made Objects)
  # ========================================================================
  HumanMadeObject:
    class_uri: crm:E22_Human-Made_Object
    description: "Physical objects created by human activity"
    broad_mappings:
      - edm:PhysicalThing
    disjoint_with:
      - Deity
      - Place
      - TimeSpan
      - Actor
    exact_mappings:
      - schema:CreativeWork
      - aat:300117127  # artifacts (object genre)
      - wikidata:Q838948
    slots:
      - id
      - name
      - has_current_location
      - was_produced_by_event
      - has_condition_assessment
      - participates_in_ritual
      - has_custody_event
      - was_documented_by
    slot_usage:
      name:
        required: true

  ArchitecturalStructure:
    is_a: HumanMadeObject
    description: "Physical structures built for religious, social, or civic purposes. Links to events of production, use, custody, and documentation."
    disjoint_with:
      - IconographicObject
      - ArchitecturalElement
    exact_mappings:
      - wikidata:Q811979
    broad_mappings:
      - aat:300004792  # buildings (structures)
    close_mappings:
      - schema:CivicStructure
    slots:
      - name
      - note
      # Event-centric relationships (not direct attribution)
      - was_produced_by_event
      - has_current_location
      - has_condition_assessment
      - has_component
      - has_architectural_style
      # slots for tracking existence status
      - existence_status
      - last_known_existence_date
      - destruction_event
      - hypothesized_location
      - documented_in_source
      # slots for provenance assertions
      - has_provenance_assertion
    slot_usage:
      name:
        required: true
      has_current_location:
        required: true
        minimum_cardinality: 1
        maximum_cardinality: 1

  Temple:
    is_a: ArchitecturalStructure
    description: "Sacred architectural structure legally classified as an 'Ancient Monument' under Nepal's preservation laws, characterized by deity enshrinement and ritual activation."
    disjoint_with:
      - BuddhistMonument
      - RestHouse
      - WaterStructure
    exact_mappings:
      - schema:HinduTemple
      - aat:300007595
      - wikidata:Q44539
      - dbo:ReligiousBuilding
      - dbo:Temple
    close_mappings:
      - schema:PlaceOfWorship
    slots:
      - enshrines_deity_through_event
      - has_architectural_style
    slot_usage:
      has_architectural_style:
        required: true
        minimum_cardinality: 1

  BuddhistMonument:
    is_a: ArchitecturalStructure
    description: "Buddhist sacred structure (Stupa, Chaitya) with circumambulation and ritual activation patterns"
    disjoint_with:
      - Temple
      - RestHouse
      - WaterStructure
    exact_mappings:
      - aat:300007576  # stupa
      - wikidata:Q177980

  Stupa:
    is_a: BuddhistMonument
    description: "Buddhist dome-shaped reliquary shrine (e.g., Boudhanath, Swayambhunath)"
    disjoint_with:
      - Chaitya

  Chaitya:
    is_a: BuddhistMonument
    description: "Buddhist votive shrine or prayer hall"
    disjoint_with:
      - Stupa

  RestHouse:
    is_a: ArchitecturalStructure
    description: "Community structures for travelers and pilgrims, maintained by Guthi organizations"
    disjoint_with:
      - Temple
      - BuddhistMonument
      - WaterStructure

  Pati:
    is_a: RestHouse
    description: "Open-air pavilion for resting travelers"
    disjoint_with:
      - Sattal
      - Dharmashala

  Sattal:
    is_a: RestHouse
    description: "Multi-story rest house (3-5 floors) with ritual and social functions"
    disjoint_with:
      - Pati
      - Dharmashala

  Dharmashala:
    is_a: RestHouse
    description: "Pilgrim lodge operated by a Guthi organization"
    disjoint_with:
      - Pati
      - Sattal

  WaterStructure:
    is_a: ArchitecturalStructure
    description: "Engineered water supply systems with ritual and civic significance"
    disjoint_with:
      - Temple
      - BuddhistMonument
      - RestHouse

  DhungeDhara:
    is_a: WaterStructure
    description: "Stone spout (hiti) with carved imagery, used for ritual bathing and daily water supply"
    disjoint_with:
      - Pokhari

  Pokhari:
    is_a: WaterStructure
    description: "Pond or tank for water storage, ritual bathing, and ecological management"
    disjoint_with:
      - DhungeDhara

  IconographicObject:
    is_a: HumanMadeObject
    description: "Sacred visual art objects that depict or embody deities through iconographic conventions"
    disjoint_with:
      - ArchitecturalStructure
      - ArchitecturalElement
    exact_mappings:
      - dbo:Artwork
    broad_mappings:
      - aat:300264387  # images (object genre)
    close_mappings:
      - crm:E36_Visual_Item
    slots:
      - name
      - note
      - depicts_deity
      - was_produced_by_event
      - participates_in_ritual
      - has_current_location
      - used_by
    slot_usage:
      name:
        required: true

  Paubha:
    is_a: IconographicObject
    description: "Traditional Newari scroll painting (thangka) with mandala and deity iconography"
    disjoint_with:
      - Murti
    broad_mappings:
      - aat:300033666  # scroll paintings
    close_mappings:
      - wikidata:Q130993  # thangka (Paubha is Newar-specific subtype)

  Murti:
    is_a: IconographicObject
    description: "Consecrated statue of a deity, ritually activated to serve as divine presence (not merely depiction)"
    disjoint_with:
      - Paubha
    exact_mappings:
      - aat:300047090  # sculpture (visual works)
      - wikidata:Q2594295
    slots:
      - consecrated_by_event
      - is_about_deity

  ArchitecturalElement:
    class_uri: crm:E25_Architectural_Element
    description: "Carved or constructed component of an architectural structure (e.g., Gajur, Torana, Tundal)"
    disjoint_with:
      - ArchitecturalStructure
      - IconographicObject
      - Deity
      - Person
    exact_mappings:
      - aat:300000885  # architectural elements
    slots:
      - name
      - note
      - is_component_of
    slot_usage:
      name:
        required: true
      is_component_of:
        required: true
        minimum_cardinality: 1
        maximum_cardinality: 1

  # ========================================================================
  # CONCEPTUAL ENTITIES (CIDOC E28 Conceptual Objects)
  # ========================================================================

  PhysicalHeritageThing:
    description: "Union of tangible heritage object classes: structures, iconographic objects, and architectural elements."
    broad_mappings:
      - edm:PhysicalThing
    union_of:
      - ArchitecturalStructure
      - IconographicObject
      - ArchitecturalElement

  Deity:
    class_uri: crm:E28_Conceptual_Object
    description: "Divine conceptual entity in Hindu, Buddhist, or syncretic traditions. Distinct from physical representations (Murti) and ritual presences."
    disjoint_with:
      - HumanMadeObject
      - Person
      - Place
      - Guthi
      - CasteGroup
    exact_mappings:
      - aat:300343850  # deities
      - dbo:Deity
      - schema:Deity
    slots:
      - name
      - note
      - has_religious_tradition
      - is_depicted_in
      - is_invoked_in_ritual
      - is_enshrined_through_event
    slot_usage:
      name:
        required: true

  ReligiousTradition:
    class_uri: crm:E55_Type
    description: "Religious or philosophical tradition (e.g., Hindu, Buddhist, Syncretic)"
    exact_mappings:
      - aat:300073708 
    slots:
      - name
      - note
    slot_usage:
      name:
        required: true

  HistoricalEvent:
    class_uri: crm:E5_Event
    description: "Major event affecting heritage structures or ritual life
      (earthquake, epidemic, political transition, fire, flood)."
    slots:
      - name
      - note
      - has_timespan
      - took_place_at
      - architectural_structures
      - includes_ritual_event
    slot_usage:
      name:
        required: true
      has_timespan:
        required: true

  CalendarSystem:
    class_uri: time:Calendar
    description: "Calendar reckoning system with conversion rules for multi-calendar temporal reasoning"
    disjoint_with:
      - Person
      - Deity
      - Place
    broad_mappings:
      - crm:E29_Designated_Reference_System
    slots:
      - name
      - epoch_date_gregorian
      - is_primary_for_tradition
      - year_offset_from_gregorian
      - note
    slot_usage:
      name:
        required: true

  # ========================================================================
  # EVENT CLASSES (CIDOC-CRM Event-Centric Core)
  # ========================================================================

  HeritageActivity:
    abstract: true
    description: "Abstract superclass for intentional heritage-related activities, aligned with CIDOC CRM E7 Activity."
    exact_mappings:
      - crm:E7_Activity
    disjoint_with:
      - HeritageAssertion
      - DataSource
      - HumanMadeObject
      - Deity
      - Place

  HeritageEvent:
    description: "Union of heritage event classes used for actor participation and temporal reasoning."
    union_of:
      - Production
      - RitualEvent
      - TransferOfCustody
      - ConditionAssessment
      - DocumentationActivity
      - HistoricalEvent
      - DestructionEvent

  Production:
    class_uri: crm:E12_Production
    description: "Event of creating an architectural structure, murti, or paubha"
    disjoint_with:
      - Consecration
      - Enshrinement
      - TransferOfCustody
      - ConditionAssessment
    slots:
      - name
      - produced_object
      - carried_out_by
      - used_technique
      - took_place_at
      - has_timespan
      - commissioned_by
      - was_documented_by
      - has_provenance_assertion
    slot_usage:
      name:
        required: true
      produced_object:
        required: true
        minimum_cardinality: 1
      carried_out_by:
        minimum_cardinality: 1
      has_timespan:
        required: true

  RitualEvent:
    is_a: HeritageActivity
    description: "Intentional ritual activity that activates sacred space, invokes deities, and binds social groups"
    disjoint_with:
      - Production
      - TransferOfCustody
      - ConditionAssessment
    exact_mappings:
      - crm:E7_Activity
    broad_mappings:
      - aat:300054754  # ceremonies
      - edm:Event
    slots:
      - name
      - note
      - ritual_type
      - ritual_on_structure
      - has_timespan
      - lunar_date_tithi
      - recurrence_pattern
      - invokes_deity
      - manifests_divine_presence
      - carried_out_by
      - performed_by_group
      - is_part_of_festival
      - managed_by_guthi
      - was_documented_by
      - has_provenance_assertion
      - occurs_before
      - occurs_after
      - used_materials
      # for moving processions
      - route_places          
      - start_place         
      - end_place            
      - route_description 
    slot_usage:
      name:
        required: true
      has_timespan:
        required: true

  Festival:
    is_a: RitualEvent
    description: "Large-scale community ritual event (Jatra) involving processions, music, and collective participation"
    disjoint_with:
      - Consecration
      - Enshrinement
    slots:
      - includes_ritual_event

  ChariotFestival:
    is_a: Festival
    description: "Festival involving ceremonial chariot procession (e.g., Rato Machhindranath Jatra)"
    disjoint_with:
      - MaskedDance

  MaskedDance:
    is_a: Festival
    description: "Festival featuring masked dancers embodying deities (e.g., Kartik Naach)"
    disjoint_with:
      - ChariotFestival

  Consecration:
    is_a: RitualEvent
    description: "Ritual event that transforms an object into a sacred vessel (e.g., Prana Pratistha for Murti)"
    slots:
      - name
      - consecrated_object
      - carried_out_by
      - took_place_at
      - has_timespan
      - makes_deity_present
    slot_usage:
      name:
        required: true
      consecrated_object:
        required: true
        minimum_cardinality: 1
        maximum_cardinality: 1
      carried_out_by:
        minimum_cardinality: 1
      has_timespan:
        required: true

  Enshrinement:
    is_a: RitualEvent
    description: "Event of installing a deity's murti or symbol within a temple sanctum"
    slots:
      - name
      - enshrined_deity
      - enshrined_in_structure
      - carried_out_by
      - has_timespan
    slot_usage:
      name:
        required: true
      enshrined_deity:
        required: true
        minimum_cardinality: 1
      enshrined_in_structure:
        required: true
        minimum_cardinality: 1
        maximum_cardinality: 1
      has_timespan:
        required: true

  TransferOfCustody:
    class_uri: crm:E10_Transfer_of_Custody
    description: "Event of transferring responsibility for temple maintenance, ritual performance, or artifact stewardship"
    disjoint_with:
      - Production
      - Consecration
      - Enshrinement
      - ConditionAssessment
    slots:
      - name
      - transferred_object
      - transferred_from_actor
      - transferred_to_actor
      - transferred_to_guthi
      - took_place_at
      - has_timespan
    slot_usage:
      name:
        required: true
      transferred_object:
        required: true
        minimum_cardinality: 1
      has_timespan:
        required: true

  ConditionAssessment:
    class_uri: crm:E14_Condition_Assessment
    description: "Event of evaluating the physical state of a heritage object or structure"
    disjoint_with:
      - Production
      - Consecration
      - Enshrinement
      - TransferOfCustody
    slots:
      - name
      - assessed_object
      - assessed_condition_state
      - carried_out_by
      - has_timespan
    slot_usage:
      assessed_object:
        required: true
        minimum_cardinality: 1
      assessed_condition_state:
        required: true
      has_timespan:
        required: true

  ConditionState:
    class_uri: crm:E3_Condition_State
    description: "A physical condition state of a heritage object"
    slots:
      - name
      - note
      - has_condition_type
    slot_usage:
      has_condition_type:
        required: true


  # ========================================================================
  # SOCIAL ORGANIZATIONS (CIDOC E74 Group)
  # ========================================================================

  Guthi:
    description: "Endowed trust organization unique to Nepal, managing temples, rituals, and land through hereditary or voluntary membership"
    disjoint_with:
      - CasteGroup
      - Person
      - Deity
      - Place
    broad_mappings:
      - crm:E74_Group
    slots:
      - name
      - note
      - guthi_type
      - performs_ritual
      - holds_custody_of
      - has_membership
    slot_usage:
      name:
        required: true
      guthi_type:
        range: GuthiTypeEnum
        required: true

  CasteGroup:
    description: "Hereditary social group (Jati) with specific ritual roles and occupational duties"
    disjoint_with:
      - Guthi
      - Person
      - Deity
      - Place
    broad_mappings:
      - crm:E74_Group
    slots:
      - name
      - note
      - traditional_role
    slot_usage:
      name:
        required: true

  # ========================================================================
  # ACTORS (CIDOC E39 Actor / E21 Person)
  # ========================================================================

  Person:
    is_a: Actor
    class_uri: crm:E21_Person
    description: "Individual person who performs, commissions, documents, or verifies heritage activities"
    broad_mappings:
      - foaf:Person
      - edm:Agent
    disjoint_with:
      - Guthi
      - CasteGroup
      - Deity
      - Place
      - HumanMadeObject
    slots:
      - id
      - name
      - note
      - orcid_identifier
      - birth_timespan
      - death_timespan
      - member_of_group
      - carried_out_activity
      - institutional_affiliation
      - expertise_area
    slot_usage:
      name:
        required: true

  Actor:
    class_uri: crm:E39_Actor
    description: "General actor (person or group) responsible for events"
    broad_mappings:
      - edm:Agent
    slots:
      - name
      - note
      - carried_out_activity

  # ========================================================================
  # SPATIOTEMPORAL CLASSES
  # ========================================================================

  Place:
    class_uri: crm:E53_Place
    description: "Defined geographic location where events occur and structures exist"
    broad_mappings:
      - edm:Place
    disjoint_with:
      - Person
      - Deity
      - HumanMadeObject
      - Guthi
      - CasteGroup
    slots:
      - name
      - place_coordinates
      - place_type
      - contains_structure
    slot_usage:
      name:
        required: true

  TimeSpan:
    class_uri: crm:E52_Time-Span
    description: "Temporal extent of an event or period"
    disjoint_with:
      - Place
      - Person
      - Deity
    slots:
      - date_earliest
      - date_latest
      - calendar_system
      - date_precision
    slot_usage:
      calendar_system:
        range: CalendarSystem
      date_precision:
        range: DatePrecisionEnum
      date_earliest:
        required: true

  # ========================================================================
  # PROVENANCE CLASSES (PROV-O aligned with CIDOC)
  # ========================================================================

  AssertableEntity:
    class_uri: crm:E1_CRM_Entity
    description: "Any entity that can be the subject of a heritage assertion"
    union_of:
      - HumanMadeObject
      - ArchitecturalStructure
      - IconographicObject
      - ArchitecturalElement
      - Deity
      - Person
      - Guthi
      - CasteGroup
      - Place
      - TimeSpan
      - Material
      - Technique

  HeritageAssertion:
    class_uri: crminf:I2_Belief
    description: "A single factual claim about a heritage entity, with explicit source, author, date, and confidence"
    disjoint_with:
      - DataSource
      - DocumentationActivity
    exact_mappings:
      - schema:Claim
    broad_mappings:
      - prov:Entity
    slots:
      - assertion_content
      - asserts_about_entity
      - asserts_about_event
      - was_derived_from_source
      - was_attributed_to_agent
      - generated_at_time
      - confidence_score
      - data_quality_note
      - reconciliation_status
      # to track what is being asserted
      - asserted_property
      - asserted_value
      - supersedes_assertion
      - conflicts_with_assertion
      - epistemic_stance
    slot_usage:
      was_derived_from_source:
        minimum_cardinality: 1
      generated_at_time:
        required: true

  DataSource:
    description: "Original source from which heritage information was derived"
    broad_mappings:
      - edm:WebResource
      - crm:E73_Information_Object
    disjoint_with:
      - HeritageAssertion
      - DocumentationActivity
    slots:
      - name
      - datacite_identifier
      - datacite_identifier_type
      - datacite_creator
      - datacite_publisher
      - datacite_resource_type
      - publication_timespan
      - source_citation
      - source_url
      - source_language
      - source_type
      - archival_location
      - note
      - epistemic_stance
      - community_attribution
      - traditional_knowledge_notice
      - local_contexts_label
    slot_usage:
      name:
        required: true

  FieldSurveyActivity:
    is_a: DocumentationActivity
    class_uri: crmsci:S4_Observation 
    description: "The activity of measuring, photographing, or assessing a site in person."
    disjoint_with:
      - OralHistoryInterview
      - Verification

  OralHistoryInterview:
    is_a: DocumentationActivity
    class_uri: crm:E7_Activity
    description: "The interaction event between a researcher and a knowledge holder (oral history fieldwork)."
    disjoint_with:
      - FieldSurveyActivity
      - Verification

  FieldSurveyDataset:
    is_a: DataSource
    class_uri: crm:E31_Document
    description: "The structured data or report resulting from a field survey."
    disjoint_with:
      - OralHistoryRecording
      - ArchivalRecord

  OralHistoryRecording:
    is_a: DataSource
    class_uri: crm:E33_Linguistic_Object
    description: "The recording or transcript of an oral history interview."
    disjoint_with:
      - FieldSurveyDataset
      - ArchivalRecord
    slots:
      - derived_from_interview

  ArchivalRecord:
    is_a: DataSource
    description: "Government or institutional administrative record"
    disjoint_with:
      - FieldSurveyDataset
      - OralHistoryRecording
    exact_mappings:
      - rico:Record  
    broad_mappings:
      - crm:E31_Document

  DocumentationActivity:
    is_a: HeritageActivity
    description: "The intellectual or technical process of recording information about a heritage entity, aligned with CIDOC E7 Activity and PROV-O Activity."
    disjoint_with:
      - HeritageAssertion
      - DataSource
      - Production
    exact_mappings:
      - crm:E7_Activity
    broad_mappings:
      - prov:Activity
    slots:
      - name
      - produced_information_object 
      - subject_entity
      - subject_event 
      - performed_by_agent
      - used_method
      - used_equipment
      - generated_assertion
      - has_timespan
    slot_usage:
      name:
        required: true
      has_timespan:
        required: true

  InformationObject:
    is_a: DataSource
    description: "A recorded piece of information about heritage"
    slots:
      - name
      - is_about_entity
      - created_by_documentation
      - is_about_event
      - was_documented_by
      - source_language

  Verification:
    is_a: DocumentationActivity
    description: "Process of cross-checking heritage claims against multiple sources"
    disjoint_with:
      - FieldSurveyActivity
      - OralHistoryInterview
    slots:
      - verification_method
      - note
      - verified_assertion
      - verified_by_expert

  DataCustodian:
    class_uri: prov:Agent
    description: "Institution or person currently stewarding heritage data"
    slots:
      - name
      - custodian_type
      - note
    slot_usage:
      name:
        required: true
  
  DestructionEvent:
    is_a: HistoricalEvent
    class_uri: crm:E6_Destruction
    description: "Event that destroyed or damaged a structure."
    slots:
      - note
      - has_timespan
      - took_place_at

  # ============================================================================
  # LIVING GODDESS (KUMARI) CLASSES
  # ============================================================================

  SyncreticRelationship:
    class_uri: crm:E13_Attribute_Assignment
    description: "Formalizes the syncretic equivalence between divine entities across different
      theological frameworks. Following CIDOC CRM E13, it treats syncretism as a
      propositional claim with associated epistemic authority and provenance."
    slots:
      - name
      - note
      - assigned_to_deity       
      - assigned_equivalent     
      - syncretic_type     
      - was_derived_from_source
      - was_documented_by
      - documented_in_source
      - assertion_author
      - confidence_score
      - has_timespan
      - reconciliation_status
    slot_usage:
      assigned_to_deity:
        required: true
      assigned_equivalent:
        required: true
        minimum_cardinality: 1
      was_derived_from_source:
        minimum_cardinality: 1
      syncretic_type:
        required: true

  LivingGoddessTenure:
    class_uri: crm:E4_Period
    description: "Time-bounded role where a person embodies a deity as Living Goddess (Kumari),
      residing at a specific god-house and supported by religious institutions.
      This class captures the unique Nepali tradition of living deity embodiment
      in young girls selected from Buddhist Shakya/Vajracharya families."
    slots:
      - name
      - had_participant
      - embodied_deity
      - residence_structure
      - has_timespan
      - supported_by_institution
      - has_retirement_event 
      - was_documented_by
    slot_usage:
      name:
        required: true
        description: "Name of this tenure period (e.g., 'Kumari Samita Bajracharya Tenure 2015-2023')"
      had_participant:
        required: true
        range: Person
        minimum_cardinality: 1
        maximum_cardinality: 1
        description: "The girl serving as Living Goddess during this period"
      embodied_deity:
        required: true
        range: Deity
        minimum_cardinality: 1
        maximum_cardinality: 1
        description: "Deity believed to be present in this person (e.g., Taleju, Kumari Devi)"
      residence_structure:
        required: true
        range: ArchitecturalStructure
        minimum_cardinality: 1
        maximum_cardinality: 1
        description: "God-house where Living Goddess resides (e.g., Kumari Ghar)"
      has_timespan:
        required: true
        range: TimeSpan
        description: "Duration of Living Goddess tenure (from selection to retirement)"
      supported_by_institution:
        range: Guthi
        multivalued: true
        description: "Guthi or state body providing economic/ritual support during tenure"

  LivingGoddessRetirement:
    is_a: RitualEvent
    description: "Ritual or administrative event that formally ends a Living Goddess tenure,
      marking the person's return to secular status. Common triggers include
      first menstruation, injury causing blood loss, or serious illness.
      This event terminates the divine embodiment and restores the girl to ordinary status."
    disjoint_with:
      - LivingGoddessSelection
    broad_mappings:
      - crm:E7_Activity
    slots:
      - name
      - ended_tenure_of
      - has_timespan
      - note
      - carried_out_by
      - performed_by_group
      - took_place_at
      - has_provenance_assertion
      - was_documented_by
    slot_usage:
      name:
        required: true
        description: "Name of retirement event"
      ended_tenure_of:
        required: true
        range: LivingGoddessTenure
        minimum_cardinality: 1
        maximum_cardinality: 1
        description: "The Living Goddess tenure that this event terminated"
      has_timespan:
        required: true
        range: TimeSpan
        description: "When the retirement occurred"
      carried_out_by:
        range: Person
        multivalued: true
        description: "Priests or officials who performed the retirement ritual"
      took_place_at:
        range: Place
        description: "Where the retirement ceremony occurred"

  LivingGoddessSelection:
    is_a: RitualEvent
    description: "Tantric ritual process of selecting a new Living Goddess from eligible candidates.
      Involves examination of 32 auspicious physical marks (lakshana), horoscope matching
      with the city and ruling authority, and tests of fearlessness (e.g., remaining calm
      among buffalo heads and masked dancers in darkness). Performed by committee of
      Vajracharya priests, royal priest (Raj Jyotish), and astrologer."
    disjoint_with:
      - LivingGoddessRetirement
    broad_mappings:
      - crm:E7_Activity
    slots:
      - name
      - selected_person
      - initiated_tenure
      - has_timespan
      - carried_out_by
      - performed_by_group
      - took_place_at
      - selection_criteria_met
      - has_provenance_assertion
      - was_documented_by
      - is_critical_for_festival
    slot_usage:
      name:
        required: true
        description: "Name of selection event"
      selected_person:
        required: true
        range: Person
        minimum_cardinality: 1
        maximum_cardinality: 1
        description: "Girl selected to become Living Goddess"
      initiated_tenure:
        required: true
        range: LivingGoddessTenure
        minimum_cardinality: 1
        maximum_cardinality: 1
        description: "Living Goddess tenure that this selection event initiated"
      selection_criteria_met:
        range: string
        multivalued: true
        description: "List of selection criteria verified"

  Technique:
    class_uri: crm:E29_Design_or_Procedure
    description: "Method or craft process used in production or ritual"
    disjoint_with:
      - Material
    slots:
      - name
      - note

  Material:
    class_uri: crm:E57_Material
    description: "Physical substance used in construction or crafting"
    disjoint_with:
      - Technique
    slots:
      - name
      - note

  Container:
    tree_root: true
    description: "Root container for cultural heritage data instances"
    attributes:
      places:
        description: "Collection of Place instances"
        range: Place
        multivalued: true
        inlined: true
        inlined_as_list: true
      calendar_systems:
        description: "Collection of CalendarSystem instances"
        range: CalendarSystem
        multivalued: true
        inlined: true
        inlined_as_list: true
      syncretic_relationships:
        description: "Collection of SyncreticRelationship instances"
        range: SyncreticRelationship
        multivalued: true
        inlined: true
        inlined_as_list: true
      physical_heritage_things:
        description: "Collection of all physical heritage objects"
        range: PhysicalHeritageThing
        multivalued: true
        inlined: true
        inlined_as_list: true
      religious_traditions:
        description: "Collection of ReligiousTradition instances"
        range: ReligiousTradition
        multivalued: true
        inlined: true
        inlined_as_list: true
      deities:
        description: "Collection of Deity instances"
        range: Deity
        multivalued: true
        inlined: true
        inlined_as_list: true
      has_architectural_style:
        description: "Collection of ArchitecturalStyle instances"
        range: ArchitecturalStyleEnum
        multivalued: true
      architectural_elements:
        description: "Collection of ArchitecturalElement instances"
        range: ArchitecturalElement
        multivalued: true
        inlined: true
        inlined_as_list: true
      persons:
        description: "Collection of Person instances"
        range: Person
        multivalued: true
        inlined: true
        inlined_as_list: true
      caste_groups:
        description: "Collection of CasteGroup instances"
        range: CasteGroup
        multivalued: true
        inlined: true
        inlined_as_list: true
      guthis:
        description: "Collection of Guthi instances"
        range: Guthi
        multivalued: true
        inlined: true
        inlined_as_list: true
      production_events:
        description: "Collection of Production event instances"
        range: Production
        multivalued: true
        inlined: true
        inlined_as_list: true
      enshrinement_events:
        description: "Collection of Enshrinement event instances"
        range: Enshrinement
        multivalued: true
        inlined: true
        inlined_as_list: true
      consecration_events:
        description: "Collection of Consecration event instances"
        range: Consecration
        multivalued: true
        inlined: true
        inlined_as_list: true
      ritual_events:
        description: "Collection of RitualEvent instances"
        range: RitualEvent
        multivalued: true
        inlined: true
        inlined_as_list: true
      festivals:
        description: "Collection of Festival instances"
        range: Festival
        multivalued: true
        inlined: true
        inlined_as_list: true
      custody_events:
        description: "Collection of TransferOfCustody event instances"
        range: TransferOfCustody
        multivalued: true
        inlined: true
        inlined_as_list: true
      data_sources:
        description: "Collection of DataSource instances"
        range: DataSource
        multivalued: true
        inlined: true
        inlined_as_list: true
      data_custodians:
        description: "Collection of DataCustodian instances"
        range: DataCustodian
        multivalued: true
        inlined: true
        inlined_as_list: true
      provenance_assertions:
        description: "Collection of Assertion instances"
        range: HeritageAssertion
        multivalued: true
        inlined: true
        inlined_as_list: true
      documentation_activities:
        description: "Collection of DocumentationActivity instances"
        range: DocumentationActivity
        multivalued: true
        inlined: true
        inlined_as_list: true
      information_objects:
        description: "Collection of InformationObject instances"
        range: InformationObject
        multivalued: true
        inlined: true
        inlined_as_list: true
      materials:
        description: "Collection of Material instances"
        range: Material
        multivalued: true
        inlined: true
        inlined_as_list: true
      metadata:
        description: "Dataset metadata"
        range: Metadata

  Metadata:
    description: "Dataset metadata information"
    attributes:
      dataset_name:
        description: "Human-readable name of the heritage dataset."
        range: string
      dataset_version:
        description: "Version identifier of the dataset instance (e.g. semantic version or release date)."
        range: string
      schema_version:
        description: "Version of the HeritageGraph schema the dataset conforms to."
        range: string
      generated_date:
        description: "Date the dataset was generated or last exported (ISO 8601)."
        range: string
      license:
        description: "License under which the dataset is published (e.g. CC BY 4.0)."
        range: string
      curator:
        description: "Person or institution responsible for curating the dataset."
        range: string

# ============================================================================
# SLOTS (PROPERTIES)
# ============================================================================

slots:
  architectural_structures:
    slot_uri: crm:P12_occurred_in_the_presence_of
    range: ArchitecturalStructure
    multivalued: true
    description: "Heritage structures affected by or present during this historical event"

  id:
    identifier: true
    range: uriorcurie 
    required: true
    description: "Globally unique URI identifier"
    slot_uri: dcterms:identifier
    exact_mappings:
      - schema:identifier

  route_places:
    slot_uri: heritageGraph:route_places
    range: Place
    multivalued: true
    description: "Ordered list of places visited during movement ritual"
    broad_mappings:
      - crm:P7_took_place_at

  start_place:
    slot_uri: heritageGraph:start_place
    range: Place
    description: "Starting location of movement ritual"

  end_place:
    slot_uri: heritageGraph:end_place
    range: Place
    description: "Ending location of movement ritual"

  route_description:
    slot_uri: heritageGraph:route_description
    range: string
    description: "Text description of the procession route"

  name:
    slot_uri: rdfs:label 
    range: string
    description: "Primary name or label"

  is_component_of:
    slot_uri: crm:P46i_forms_part_of
    domain: ArchitecturalElement
    range: ArchitecturalStructure
    description: "Larger structure that this element is part of"
    inverse: has_component

  note:
    slot_uri: crm:P3_has_note
    range: string
    description: "Free-text note (description, reason, verification notes)"

  # ============================================================================
  # LIVING GODDESS (KUMARI) SLOTS
  # ============================================================================

  had_participant:
    slot_uri: crm:P11_had_participant
    range: Actor
    multivalued: true
    description: "Actor(s) who participated in this event or period"

  embodied_deity:
    slot_uri: crm:P14.1_in_the_role_of
    range: Deity
    description: "Deity role embodied by participant"

  residence_structure:
    slot_uri: crm:P74_has_current_or_former_residence
    range: ArchitecturalStructure
    description: "Structure where a person resides during a specific period. For Living Goddess, this is typically a Kumari Ghar (god-house)."

  supported_by_institution:
    slot_uri: heritageGraph:supported_by_institution
    range: Guthi
    multivalued: true
    description: "Institution(s) providing economic support (stipend, land endowment) or ritual support (priest salaries) for a Living Goddess during tenure. Extends Guthi role beyond structure management to person support."

  ended_tenure_of:
    slot_uri: heritageGraph:ended_tenure_of
    domain: LivingGoddessRetirement
    range: LivingGoddessTenure
    description: "Points from a LivingGoddessRetirement event to the tenure that it terminated. Enables reconstruction of complete Living Goddess lifecycle."
    inverse: has_retirement_event

  has_retirement_event:
    slot_uri: heritageGraph:has_retirement_event
    domain: LivingGoddessTenure
    range: LivingGoddessRetirement
    description: "Retirement event that ended this Living Goddess tenure"
    inverse: ended_tenure_of

  selected_person:
    slot_uri: heritageGraph:selected_person
    range: Person
    description: "Person selected through a ritual selection process to assume a sacred role or office"

  initiated_tenure:
    slot_uri: heritageGraph:initiated_tenure
    range: LivingGoddessTenure
    description: "Living Goddess tenure that was initiated by this selection event"

  selection_criteria_met:
    slot_uri: heritageGraph:selection_criteria_met
    range: string
    multivalued: true
    description: "List of selection criteria verified during Living Goddess selection process (e.g., '32 lakshana present', 'No scars or blemishes', 'Horoscope compatible with city', 'Passed fearlessness test')"

  # ============================================================================
  # TEMPORAL PROPERTIES
  # ============================================================================

  has_timespan:
    slot_uri: crm:P4_has_time-span
    range: TimeSpan
    description: "Links event to its temporal extent"

  date_earliest:
    slot_uri: crm:P82a_begin_of_the_begin
    range: date
    description: "Earliest possible date (for uncertain dates)"

  date_latest:
    slot_uri: crm:P82b_end_of_the_end
    range: date
    description: "Latest possible date (for uncertain dates)"

  calendar_system:
    slot_uri: heritageGraph:calendar_system
    range: CalendarSystem
    description: "Calendar system used for date representation"

  lunar_date_tithi:
    slot_uri: heritageGraph:lunar_date_tithi
    range: string
    description: "Lunar day (Tithi) for ritual timing"

  recurrence_pattern:
    slot_uri: heritageGraph:recurrence_pattern
    range: string
    description: "Frequency of recurring ritual (e.g., annual, monthly)"

  birth_timespan:
    slot_uri: heritageGraph:birth_timespan
    range: TimeSpan
    description: "Person's birth timespan"
    broad_mappings:
      - crm:P4_has_time-span

  death_timespan:
    slot_uri: heritageGraph:death_timespan
    range: TimeSpan
    description: "Person's death timespan"
    broad_mappings:
      - crm:P4_has_time-span

  publication_timespan:
    slot_uri: heritageGraph:publication_timespan
    range: TimeSpan
    description: "When source was published"
    broad_mappings:
      - crm:P4_has_time-span

  # --- SPATIAL PROPERTIES ---

  place_coordinates:
    slot_uri: geo:asWKT  
    range: wktLiteral
    description: "Coordinates as WKT literal"

  place_type:
    slot_uri: heritageGraph:place_type
    range: string
    description: "Type of place (city, village, region)"
    broad_mappings:
      - crm:P2_has_type

  has_current_location:
    slot_uri: crm:P55_has_current_location
    domain: PhysicalHeritageThing
    range: Place
    description: "Current location of object or structure"
    inverse: contains_structure

  took_place_at:
    slot_uri: crm:P7_took_place_at 
    range: Place
    description: "Place where event occurred"

  ritual_on_structure:
    slot_uri: crm:P8_took_place_on_or_within
    range: PhysicalHeritageThing
    description: "Ritual occurs at specific temple or monument"

  contains_structure:
    slot_uri: crm:P53i_is_former_or_current_location_of
    domain: Place
    range: PhysicalHeritageThing
    multivalued: true
    description: "Structures located in this place"
    inverse: has_current_location

  # --- EVENT-CENTRIC PRODUCTION RELATIONSHIPS ---
  is_primary_for_tradition:
    slot_uri: heritageGraph:is_primary_for_tradition
    range: ReligiousTradition
    multivalued: true
