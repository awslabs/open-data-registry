License: |
  HeritageGraph (ontology, SHACL shapes, and the core knowledge graph) is released
  by CAIR-Nepal under Creative Commons Attribution 4.0 International (CC BY 4.0),
  https://creativecommons.org/licenses/by/4.0/. Attribution: "HeritageGraph (c)
  CAIR-Nepal, CC BY 4.0".
    - kg/heritagegraph-core.ttl : CC BY 4.0. Combines Wikidata-sourced facts
      (originally CC0 1.0), UNESCO World Heritage Centre factual data, the curated
      intangible-heritage layer, and the crosswalk links between them. Contains no
      OpenStreetMap data.
    - kg/heritagegraph-osm.ttl  : ODbL 1.0 (share-alike, attribution
      "(c) OpenStreetMap contributors"), https://opendatacommons.org/licenses/odbl/1-0/.
      The OpenStreetMap layer is kept separate because ODbL is share-alike; any
      database that incorporates it must also be released under ODbL.
  Some underlying facts are sourced from Wikidata, the UNESCO World Heritage Centre,
  and OpenStreetMap. See heritagegraph/LICENSE.txt for full terms.
Resources:
  - Description: HeritageGraph knowledge graph (RDF Turtle - CC BY core plus separate ODbL OpenStreetMap layer), ontology, SHACL shapes and examples, under the s3://[BUCKET_NAME]/heritagegraph/ prefix.
