License: |
  This dataset combines sources published under different open licenses, kept in
  separate named-graph files so each can be used under its own terms:
    - kg/wikidata.ttl   : CC0 1.0 (public domain)  https://creativecommons.org/publicdomain/zero/1.0/
    - kg/osm.ttl        : ODbL 1.0 (share-alike, attribution "(c) OpenStreetMap contributors")  https://opendatacommons.org/licenses/odbl/1-0/
    - kg/unesco.ttl     : UNESCO World Heritage Centre factual data (attribution)
    - kg/intangible.ttl : CC BY 4.0  https://creativecommons.org/licenses/by/4.0/
    - kg/crosswalk.ttl and kg/intangible_crosswalk.ttl : mixed provenance; each
      link inherits the license of the source it references.
  The schema (ontology/) is CC BY 4.0. Any database derived from the combined
  graph that includes the OpenStreetMap layer is subject to ODbL. See
  heritagegraph/LICENSE.txt for full terms.
Resources:
  - Description: HeritageGraph knowledge graph (RDF Turtle named graphs), ontology, SHACL shapes and examples, under the s3://[BUCKET_NAME]/heritagegraph/ prefix.
