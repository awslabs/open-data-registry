Name: HeritageGraph - Knowledge Graph of Nepal's Cultural Heritage
Description: |
  HeritageGraph is an RDF knowledge graph of Nepal's tangible and intangible
  cultural heritage, built on the CIDOC-CRM-aligned HeritageGraph ontology
  (https://cairnepal.github.io/heritagegraphontology/) and populated from trusted
  open sources. It contains ~7,850 tangible heritage entities (temples, stupas,
  monasteries, traditional stone water spouts / dhunge dhara, monuments) with
  coordinates, dates and images, plus a curated intangible-heritage layer
  (festivals and chariot festivals, masked dances, Guthi institutions, the
  Living-Goddess Kumari lifecycle, caste ritual roles, deities and syncretic
  relationships). Every entity carries machine-readable provenance (source,
  confidence and epistemic stance) and, where available, owl:sameAs links to
  Wikidata and OpenStreetMap. Data is published as RDF 1.1 Turtle in separate
  named graphs per source so each can be used under its own license, and is
  validated against the published SHACL shapes. No synthetic data is used.
Documentation: https://cairnepal.github.io/heritagegraphontology/
